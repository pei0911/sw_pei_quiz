<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社工師考古題練習系統</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #fafaf8; --surface: #ffffff; --surface2: #f4f3ef;
  --border: #e8e6e0; --border-strong: #d0cdc5;
  --text-primary: #1a1916; --text-secondary: #5c5a54; --text-muted: #9a9890;
  --accent: #2d6a4f; --accent-light: #d8ede3; --accent-hover: #245a42;
  --danger: #c0392b; --danger-light: #fdecea;
  --warning: #e67e22; --warning-light: #fef5ec;
  --correct: #27ae60; --correct-light: #eafaf1;
  --wrong: #e74c3c; --wrong-light: #fdecea;
  --radius: 10px; --radius-sm: 6px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06); --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
  --font-serif: 'Noto Serif TC', serif; --font-sans: 'Noto Sans TC', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: var(--bg); color: var(--text-primary); min-height: 100vh; font-size: 15px; line-height: 1.7; }
#app { display: flex; flex-direction: column; min-height: 100vh; }

header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 20px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow);
}
.header-logo { font-family: var(--font-serif); font-size: 17px; font-weight: 700; color: var(--accent); cursor: pointer; }
.header-nav { display: flex; gap: 6px; }
.nav-btn {
  padding: 6px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: transparent; color: var(--text-secondary); font-size: 13px;
  cursor: pointer; font-family: var(--font-sans); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.nav-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
.nav-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

main { flex: 1; padding: 24px 20px; max-width: 860px; margin: 0 auto; width: 100%; }

.screen { display: none; }
.screen.active { display: block; }

/* 首頁 */
.home-hero { text-align: center; padding: 32px 0 24px; }
.home-hero h1 { font-family: var(--font-serif); font-size: 24px; font-weight: 700; margin-bottom: 6px; }
.home-hero p { color: var(--text-secondary); font-size: 14px; }

.subject-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
.subject-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px 20px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
}
.subject-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  background: var(--accent); opacity: 0; transition: opacity 0.2s;
}
.subject-card:hover { border-color: var(--accent); box-shadow: var(--shadow-lg); transform: translateY(-2px); }
.subject-card:hover::before { opacity: 1; }
.subject-card h3 { font-family: var(--font-serif); font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.subject-card p { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
.subject-progress { margin-top: 10px; display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-secondary); }
.progress-bar { flex: 1; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

/* 返回按鈕 */
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--text-secondary); font-size: 13px; cursor: pointer;
  padding: 6px 0; margin-bottom: 18px; border: none; background: none;
  font-family: var(--font-sans);
}
.back-btn:hover { color: var(--accent); }

/* 科目頁 */
.page-header { margin-bottom: 20px; }
.page-header h2 { font-family: var(--font-serif); font-size: 20px; font-weight: 700; margin-bottom: 3px; }
.page-header p { color: var(--text-secondary); font-size: 13px; }

.notes-btn {
  width: 100%; padding: 11px; border: 1.5px dashed var(--border-strong);
  border-radius: var(--radius); background: transparent; color: var(--text-secondary);
  font-size: 13px; cursor: pointer; font-family: var(--font-sans);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  margin-bottom: 14px; transition: all 0.2s;
}
.notes-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

.category-list { display: flex; flex-direction: column; gap: 9px; }
.category-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 18px; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: space-between;
}
.category-card:hover { border-color: var(--accent); background: var(--accent-light); }
.category-card h4 { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
.category-card p { font-size: 12px; color: var(--text-muted); }
.category-card .cat-arrow { color: var(--text-muted); font-size: 18px; flex-shrink: 0; }
.category-card:hover .cat-arrow { color: var(--accent); }

/* 練習頁 */
.quiz-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 8px; }
.quiz-info { font-size: 13px; color: var(--text-secondary); }
.quiz-info strong { color: var(--text-primary); }

.question-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; margin-bottom: 14px; box-shadow: var(--shadow);
}
.question-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 14px; flex-wrap: wrap; }
.q-badge {
  font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500;
}
.q-badge.year { background: var(--accent-light); color: var(--accent); }
.q-badge.cat { background: var(--surface2); color: var(--text-muted); }
.heart-toggle { margin-left: auto; background: none; border: none; cursor: pointer; font-size: 20px; transition: transform 0.2s; line-height: 1; flex-shrink: 0; }
.heart-toggle:hover { transform: scale(1.2); }
.question-text { font-size: 15px; line-height: 1.9; color: var(--text-primary); margin-bottom: 18px; font-family: var(--font-serif); }

.options-list { display: flex; flex-direction: column; gap: 9px; }
.option-btn {
  width: 100%; padding: 12px 15px; border-radius: var(--radius);
  border: 1.5px solid var(--border); background: var(--surface);
  color: var(--text-primary); font-size: 14px; text-align: left;
  cursor: pointer; font-family: var(--font-sans); line-height: 1.6;
  transition: all 0.15s; display: flex; gap: 10px; align-items: flex-start;
}
.option-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); }
.option-btn:disabled { cursor: default; }
.option-btn.selected-correct { border-color: var(--correct); background: var(--correct-light); color: #1a5c35; }
.option-btn.selected-wrong { border-color: var(--wrong); background: var(--wrong-light); color: #7a1c14; }
.option-btn.show-correct { border-color: var(--correct); background: var(--correct-light); color: #1a5c35; }
.option-label {
  width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid currentColor;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 1px;
}

.explanation-box { margin-top: 14px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
.explanation-toggle {
  width: 100%; padding: 10px 15px; background: var(--surface2);
  border: none; font-family: var(--font-sans); font-size: 13px;
  color: var(--text-secondary); cursor: pointer; text-align: left;
  display: flex; align-items: center; gap: 6px; transition: background 0.15s;
}
.explanation-toggle:hover { background: var(--border); }
.explanation-content { display: none; padding: 15px; font-size: 14px; color: var(--text-secondary); line-height: 1.85; background: var(--surface); border-top: 1px solid var(--border); }
.explanation-content.open { display: block; }

.quiz-actions { display: flex; gap: 9px; margin-top: 6px; flex-wrap: wrap; }
.btn-primary {
  padding: 10px 22px; background: var(--accent); color: white; border: none;
  border-radius: var(--radius); font-family: var(--font-sans); font-size: 14px;
  font-weight: 500; cursor: pointer; transition: background 0.15s;
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:disabled { opacity: 0.45; cursor: default; }
.btn-secondary {
  padding: 10px 22px; background: transparent; color: var(--text-secondary);
  border: 1px solid var(--border); border-radius: var(--radius);
  font-family: var(--font-sans); font-size: 14px; cursor: pointer; transition: all 0.15s;
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

/* 愛心頁 */
.heart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
.heart-header h2 { font-family: var(--font-serif); font-size: 20px; font-weight: 700; }

.heart-subject-section { margin-bottom: 20px; }
.heart-subject-title {
  font-family: var(--font-serif); font-size: 15px; font-weight: 600;
  color: var(--accent); padding: 8px 0; margin-bottom: 8px;
  border-bottom: 1px solid var(--accent-light);
  display: flex; align-items: center; justify-content: space-between;
}
.heart-practice-cat-btn {
  font-size: 12px; padding: 4px 10px; background: var(--accent-light);
  color: var(--accent); border: 1px solid var(--accent); border-radius: 20px;
  cursor: pointer; font-family: var(--font-sans); transition: all 0.15s;
}
.heart-practice-cat-btn:hover { background: var(--accent); color: white; }

.heart-empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.heart-empty .empty-icon { font-size: 48px; margin-bottom: 12px; }
.heart-empty p { font-size: 14px; }
.heart-item {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px 15px; display: flex; align-items: flex-start; gap: 10px;
  cursor: pointer; transition: all 0.15s; margin-bottom: 8px;
}
.heart-item:hover { border-color: var(--accent); background: var(--accent-light); }
.heart-item-text { flex: 1; font-size: 13px; line-height: 1.6; }
.heart-item-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
.heart-item-remove { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 15px; padding: 2px; transition: color 0.15s; flex-shrink: 0; }
.heart-item-remove:hover { color: var(--wrong); }

/* 統計頁 */
.stats-section { margin-bottom: 26px; }
.stats-section h3 { font-family: var(--font-serif); font-size: 15px; font-weight: 700; margin-bottom: 12px; padding-bottom: 7px; border-bottom: 1px solid var(--border); }
.stats-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.stats-table th { background: var(--surface2); padding: 9px 12px; text-align: left; font-size: 12px; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border); }
.stats-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); }
.stats-table tr:last-child td { border-bottom: none; }
.acc-bar-wrap { display: flex; align-items: center; gap: 8px; }
.acc-bar { flex: 1; height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.acc-fill { height: 100%; background: var(--accent); border-radius: 3px; }
.acc-label { font-size: 12px; color: var(--text-secondary); min-width: 34px; text-align: right; }
.reset-btn { padding: 8px 16px; background: transparent; color: var(--danger); border: 1px solid var(--danger); border-radius: var(--radius); font-size: 13px; cursor: pointer; font-family: var(--font-sans); transition: all 0.15s; }
.reset-btn:hover { background: var(--danger-light); }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: none; align-items: flex-start; justify-content: center; padding: 16px; overflow-y: auto; }
.modal-overlay.active { display: flex; }
.modal { background: var(--surface); border-radius: 14px; width: 100%; max-width: 700px; margin: auto; box-shadow: var(--shadow-lg); overflow: hidden; }
.modal-header { padding: 18px 22px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-header h3 { font-family: var(--font-serif); font-size: 17px; font-weight: 700; }
.modal-close { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border); background: transparent; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: all 0.15s; }
.modal-close:hover { background: var(--surface2); color: var(--text-primary); }
.modal-body { padding: 22px; max-height: 78vh; overflow-y: auto; }
.modal-body h4 { font-family: var(--font-serif); font-size: 14px; font-weight: 700; color: var(--accent); margin: 18px 0 7px; padding-bottom: 5px; border-bottom: 1px solid var(--accent-light); }
.modal-body h4:first-child { margin-top: 0; }
.modal-body p { font-size: 13px; color: var(--text-secondary); margin-bottom: 7px; line-height: 1.85; }
.modal-body ul { padding-left: 18px; margin-bottom: 8px; }
.modal-body li { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; line-height: 1.8; }
.modal-body .hl { background: var(--accent-light); border-left: 3px solid var(--accent); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 9px 13px; margin: 9px 0; font-size: 13px; }
.modal-body .wn { background: var(--warning-light); border-left: 3px solid var(--warning); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 9px 13px; margin: 9px 0; font-size: 13px; }
.modal-body table { width: 100%; border-collapse: collapse; margin: 9px 0; font-size: 12px; }
.modal-body th { background: var(--surface2); padding: 7px 10px; text-align: left; font-weight: 600; border: 1px solid var(--border); }
.modal-body td { padding: 7px 10px; border: 1px solid var(--border); line-height: 1.6; }


/* Loading & Toast */
.loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px; z-index: 999; }
.loading-spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--text-secondary); font-size: 14px; }
.toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text-primary); color: white; padding: 9px 18px; border-radius: 20px; font-size: 13px; transition: transform 0.3s ease; z-index: 500; white-space: nowrap; pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 560px) {
  header { padding: 0 14px; }
  main { padding: 14px; }
  .subject-grid { grid-template-columns: 1fr; }
  .question-card { padding: 16px; }
  .header-logo { font-size: 14px; }
  .nav-btn { padding: 5px 9px; font-size: 12px; }
}
</style>
</head>
<body>



<div id="loadingOverlay" class="loading-overlay" style="display:none">
  <div class="loading-spinner"></div>
  <div class="loading-text">載入中，請稍候⋯⋯</div>
</div>

<div id="app">
  <header>
    <div class="header-logo" onclick="showScreen('home')">📚 社工師練題系統</div>
    <nav class="header-nav">
      <button class="nav-btn" onclick="showScreen('heart')">❤️ 愛心題目</button>
      <button class="nav-btn" onclick="showScreen('stats')">📊 統計</button>
    </nav>
  </header>

  <main>
    <!-- 首頁 -->
    <div id="screen-home" class="screen active">
      <div class="home-hero">
        <h1>社工師考古題練習系統</h1>
        <p>110年～114年考古題 · 依命題大綱分類 · 跨裝置同步</p>
      </div>
      <div class="subject-grid" id="subjectGrid"></div>
    </div>

    <!-- 科目頁 -->
    <div id="screen-subject" class="screen">
      <button class="back-btn" onclick="showScreen('home')">← 返回首頁</button>
      <div class="page-header">
        <h2 id="subjectTitle"></h2>
        <p id="subjectDesc"></p>
      </div>
      <button class="notes-btn" onclick="openSubjectNotes()">📖 查看本科目重點筆記總覽</button>
      <div class="category-list" id="categoryList"></div>
    </div>

    <!-- 分類頁 -->
    <div id="screen-category" class="screen">
      <button class="back-btn" id="catBackBtn">← 返回科目</button>
      <div class="page-header">
        <h2 id="categoryTitle"></h2>
        <p id="categoryDesc"></p>
      </div>
      <button class="notes-btn" id="categoryNotesBtn">📖 查看本分類重點筆記</button>
      <button class="btn-primary" style="width:100%;margin-bottom:10px" onclick="startQuiz()">開始練習（亂序出題）</button>
      <div id="catStatsRow" style="font-size:13px;color:var(--text-secondary);margin-bottom:4px"></div>
    </div>

    <!-- 練習頁 -->
    <div id="screen-quiz" class="screen">
      <div class="quiz-topbar">
        <button class="back-btn" style="margin-bottom:0" onclick="exitQuiz()">← 結束練習</button>
        <div class="quiz-info">第 <strong id="quizCurrent">1</strong> / <strong id="quizTotal">1</strong> 題 &nbsp;·&nbsp; 本次正確 <strong id="quizCorrect">0</strong></div>
      </div>
      <div id="questionContainer"></div>
      <div class="quiz-actions" id="quizActions">
        <button class="btn-primary" id="confirmBtn" onclick="confirmAnswer()">確認答案</button>
        <button class="btn-primary" id="nextBtn" onclick="nextQuestion()" style="display:none">下一題 →</button>
        <button class="btn-secondary" onclick="exitQuiz()">結束練習</button>
      </div>
    </div>

    <!-- 愛心題目 -->
    <div id="screen-heart" class="screen">
      <div class="heart-header">
        <h2>❤️ 愛心題目</h2>
        <button class="btn-primary" onclick="startHeartQuizAll()" style="font-size:13px;padding:8px 14px">全部複習</button>
      </div>
      <div id="heartList"></div>
    </div>

    <!-- 統計 -->
    <div id="screen-stats" class="screen">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px">
        <h2 style="font-family:var(--font-serif);font-size:20px;font-weight:700">📊 學習統計</h2>
        <button class="reset-btn" onclick="confirmReset()">重置記錄</button>
      </div>
      <div id="statsContent"></div>
    </div>
  </main>
</div>

<!-- 筆記 Modal -->
<div class="modal-overlay" id="notesModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="notesModalTitle">重點筆記</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="notesModalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>



<script>
// ==================== 科目定義 ====================
const SUBJECTS = [
  { id:'sw', name:'社會工作', desc:'專業歷史、本質角色、理論應用、哲學倫理、實務領域',
    categories:[
      { id:'sw_history', name:'社會工作專業發展歷史', desc:'臺灣與國際社工專業化歷程、意涵演變',
        subcategories:[
          {id:'sw_history_intl',  name:'國際社工發展歷史', desc:'COS、睦鄰運動、專業化里程碑'},
          {id:'sw_history_tw',    name:'臺灣社工發展歷史', desc:'日治至今的臺灣社工發展脈絡'},
          {id:'sw_history_meaning', name:'社會工作意涵演變', desc:'社工定義與意涵的歷史演變'},
        ]
      },
      { id:'sw_nature', name:'社會工作的本質、特性與角色功能', desc:'社工定義、功能、角色',
        subcategories:[
          {id:'sw_nature_def',   name:'社會工作本質與特性', desc:'社工的藝術性、科學性、專業性'},

<h4>一、生態系統理論（最重要！）</h4>
<p>Bronfenbrenner提出，強調個人在多層次環境系統中發展：</p>
<table>
<tr><th>層次</th><th>定義</th><th>例子</th></tr>
<tr><td>微視系統（microsystem）</td><td>個人直接接觸的環境</td><td>家庭、學校、同儕</td></tr>
<tr><td>中介系統（mesosystem）</td><td>微視系統之間的互動關係</td><td>家庭與學校的關係</td></tr>
<tr><td>外部系統（exosystem）</td><td>個人未直接參與但受影響的環境</td><td>父母的工作環境</td></tr>
<tr><td>鉅視系統（macrosystem）</td><td>社會文化、意識形態、政策制度</td><td>文化價值觀、社會政策</td></tr>
</table>
<div class="hl">社工實務應用的相關概念：棲息地（habitat）、位置（niche）、適應（adaptation）、勝任能力（competence）</div>
<h4>二、增權（Empowerment）取向</h4>
<ul>
<li>核心：弱勢問題源自外在環境壓迫，非個人缺陷</li>
<li>三個目標層面：個人層面（能力提升）、人際層面（支持網絡）、政治層面（集體行動）</li>

<p>核心概念：「人在情境中」（person-in-situation）。關注改善人際關係和生活情境壓力。注意：此派非「功能派」（功能派強調機構功能與案主意志）。</p>
<h4>四、女性主義各派別</h4>
<table>
<tr><th>派別</th><th>核心主張</th><th>行動方向</th></tr>
<tr><td>自由主義</td><td>法律層面的不平等</td><td>立法改革爭取平等權利</td></tr>
<tr><td>激進主義</td><td>父權制度是一切壓迫根源</td><td>消除父權結構</td></tr>
<tr><td>社會主義</td><td>階級與性別壓迫相互交織</td><td>階級與性別雙重革命</td></tr>
<tr><td>後現代</td><td>拒絕單一解放論述，重視差異</td><td>多元策略，無固定路線</td></tr>
</table>
<div class="hl">各派共通性：性別不平等是社會造成的、個人即政治（personal is political）、批判父權</div>
<h4>五、後現代取向</h4>
<p>語言與論述建構現實；知識具相對性與脈絡性；重視案主主觀詮釋與生命敘事。代表：敘事治療、社會建構主義。與「客觀診斷、標準化介入」的現代主義精神相對立。</p>
<h4>六、任務中心模式 vs 危機處遇</h4>
<table>
<tr><th></th><th>任務中心模式</th><th>危機處遇</th></tr>
<tr><td>時間框架</td><td>短期有時限（通常8-12次）</td><td>非常短期（4-8週）</td></tr>
<tr><td>問題性質</td><td>案主認定的具體特定問題</td><td>突發性危機事件</td></tr>
<tr><td>目標</td><td>完成具體任務解決問題</td><td>恢復至危機前功能水準</td></tr>
<tr><td>特點</td><td>不處理深層心理問題</td><td>立即性介入</td></tr>
</table>` },

  sw_ethics: { title:'社會工作哲學與倫理', content:`
<h4>一、NASW六大核心價值（1996，必背！）</h4>
<p>①服務（service）、②社會正義（social justice）、③人的尊嚴與價值、④人際關係的重要性、⑤誠信（integrity）、⑥能力（competence）</p>
<div class="hl">效率、科學、自主等均不在六大價值中，常作為陷阱選項</div>
<h4>二、倫理學派別</h4>
<table>
<tr><th>學派</th><th>核心概念</th><th>社工應用</th></tr>
<tr><td>義務論（康德）</td><td>人是目的，不是工具；普遍法則</td><td>Biestek個別化原則的哲學基礎</td></tr>
<tr><td>效益主義</td><td>最大多數最大幸福</td><td>資源分配決策</td></tr>
<tr><td>關懷倫理學</td><td>感性回應、人際關係為核心</td><td>女性取向倫理觀（Gilligan）</td></tr>
<tr><td>德行倫理學</td><td>培養德性品格</td><td>社工人格修養</td></tr>
</table>
<h4>三、業務過失三類型（Reamer, 1995）</h4>
<ul>
<li><strong>不當行為（malfeasance）：</strong>主動從事有害不當行為，如挪用案主金錢</li>
<li><strong>疏失（misfeasance）：</strong>以不當方式執行本應適當的任務</li>
<li><strong>失職（nonfeasance）：</strong>未履行應盡的職責</li>
</ul>
<h4>四、倫理優先順序</h4>
<p>一般原則：保護生命 > 自我決定 > 公益 > 個人利益。父權主義（paternalism）：以保護案主為由凌駕其自主意志，是倫理兩難的核心情境之一。</p>
<h4>五、文化敏感工作</h4>
<p>文化能力（cultural competence）是持續發展的過程，非終點。文化謙遜（cultural humility）強調終身學習與自我反思。三要素：認知、情感、行動。禁止以主流文化標準評估案主行為。</p>
<h4>六、雙重關係</h4>
<p>應盡量避免但非絕對禁止，農村或小型社區有其不可避免性。界線跨越（boundary crossing）不必然造成傷害，需視情境判斷；界線侵犯（boundary violation）則會對案主造成傷害。</p>` },

  sw_practice: { title:'社會工作實務領域', content:`
<h4>各領域核心取向對照表</h4>
<table>
<tr><th>領域</th><th>核心取向</th><th>考試重點</th></tr>
<tr><td>家庭社工</td><td>以家庭為中心（family-centered）</td><td>家庭維繫服務＝到宅（home-based），非機構</td></tr>
<tr><td>兒童社工</td><td>兒童最佳利益</td><td>以不移除原則為優先；家庭維繫→家庭重整→長期安置</td></tr>
<tr><td>青少年社工</td><td>外展工作、優勢觀點</td><td>外展＝主動到案主生活環境，非等案主上門</td></tr>
<tr><td>婦女社工</td><td>充能（empowerment）取向</td><td>協助意識化，了解受壓迫是社會結構問題</td></tr>
<tr><td>老人社工</td><td>在地老化（aging in place）</td><td>機構安置為最後手段，非優先考量</td></tr>
<tr><td>身障社工</td><td>社會模式（social model）</td><td>障礙由社會環境造成，非個人缺陷；CRPD強調人權保障</td></tr>
<tr><td>醫務社工</td><td>心理社會調適</td><td>處理心理、社會、情緒面；非醫療診斷或治療決策</td></tr>
<tr><td>精神社工</td><td>個案管理、復元（recovery）</td><td>整合服務協助在社區生活；非控管行為</td></tr>
<tr><td>學校社工</td><td>生態系統整合</td><td>協助社會功能障礙；與輔導老師分工非取代</td></tr>
<tr><td>司法社工</td><td>修復式司法（restorative justice）</td><td>修復傷害非懲罰；三方（加害、被害、社區）共同參與</td></tr>
<tr><td>職業社工</td><td>勞工權益保障</td><td>以勞工利益為主，非雇主利益優先</td></tr>
<tr><td>多元文化</td><td>文化謙遜</td><td>持續學習歷程；避免文化霸權</td></tr>
</table>` },

  ds_casework: { title:'個案工作', content:`
<h4>一、個案工作基本概念</h4>
<p>個案工作（casework）是以個人或家庭為單位，運用專業關係協助案主解決問題、提升社會功能的社工方法。Mary Richmond（1917年《社會診斷》）是個案工作的奠基者。</p>
<h4>二、Biestek七大原則</h4>
<ul>
<li><strong>個別化（individualization）：</strong>將每位案主視為獨特個體</li>
<li><strong>有目的的情感表達（purposeful expression of feelings）：</strong>鼓勵案主自由表達感受</li>
<li><strong>控制的情緒涉入（controlled emotional involvement）：</strong>社工有意識地運用情感回應</li>
<li><strong>接納（acceptance）：</strong>接納案主的真實樣貌</li>
<li><strong>非評判態度（non-judgmental attitude）：</strong>不評判案主的價值與行為</li>
<li><strong>案主自決（client self-determination）：</strong>尊重案主的自我決定權</li>
<li><strong>保密（confidentiality）：</strong>保護案主分享的資訊</li>
</ul>
<h4>三、個案工作過程</h4>
<p>接案→預估（assessment）→計畫→介入→評估→結案。預估是理解案主問題、需求與優勢的過程，非單純診斷。</p>
<h4>四、重要技術</h4>
<ul>
<li><strong>同理心（empathy）：</strong>理解案主的主觀感受與處境</li>
<li><strong>積極傾聽（active listening）：</strong>全神貫注理解案主所說</li>
<li><strong>澄清（clarification）：</strong>協助案主清楚表達或理解問題</li>
<li><strong>對質（confrontation）：</strong>指出案主言行間的矛盾（需謹慎使用）</li>
<li><strong>再框架（reframing）：</strong>以不同角度詮釋問題</li>
</ul>
<div class="hl">面談技巧：開放式問句優於封閉式問句，有助案主自由表達；雙重問句應避免使用</div>` },

  ds_group: { title:'團體工作', content:`
<h4>一、團體工作類型</h4>
<table>
<tr><th>類型</th><th>目標</th><th>例子</th></tr>
<tr><td>治療性團體</td><td>個人改變、問題解決</td><td>支持團體、治療團體</td></tr>
<tr><td>成長性團體</td><td>個人成長、潛能發展</td><td>成長團體、訓練團體</td></tr>
<tr><td>教育性團體</td><td>知識技能學習</td><td>親職教育團體</td></tr>
<tr><td>任務性團體</td><td>完成特定任務</td><td>委員會、工作小組</td></tr>
<tr><td>社會化團體</td><td>社會技巧發展</td><td>青少年休閒團體</td></tr>
</table>
<h4>二、團體發展階段（Garland, Jones & Kolodny）</h4>
<ul>
<li>前身階段（pre-affiliation）：試探、防衛、趨近與迴避</li>
<li>權力與控制階段（power and control）：爭奪地位、挑戰領導者</li>
<li>親密階段（intimacy）：信任增強、分享加深</li>
<li>差異化階段（differentiation）：成員各自展現獨特性</li>
<li>分離階段（separation）：結束準備、失落感處理</li>
</ul>
<h4>三、領導者角色與技術</h4>
<p>領導者風格：民主式（democratic）、權威式（autocratic）、放任式（laissez-faire）。民主式最有助於成員成長。重要技術：連結（linking）、阻斷（blocking）、催化（facilitating）、示範（modeling）。</p>
<div class="hl">團體凝聚力（cohesion）是成員留在團體的吸引力，對治療效果有正向影響</div>` },

  ds_community: { title:'社區工作', content:`
<h4>一、Rothman三大模式</h4>
<table>
<tr><th>模式</th><th>目標</th><th>策略</th><th>社工角色</th></tr>
<tr><td>地方發展（locality development）</td><td>社區能力建構</td><td>共識、參與</td><td>使能者、協調者</td></tr>
<tr><td>社會計畫（social planning）</td><td>解決特定社會問題</td><td>技術性、數據導向</td><td>專家、分析師</td></tr>
<tr><td>社會行動（social action）</td><td>改變權力結構</td><td>衝突、對抗</td><td>倡導者、組織者</td></tr>
</table>
<h4>二、社區工作過程</h4>
<p>社區分析→目標設定→計畫發展→執行→評估。社區分析包含：人口結構、資源分布、權力結構、需求評估。</p>
<h4>三、重要概念</h4>
<ul>
<li><strong>社區能力（community capacity）：</strong>社區解決問題的能力與資源</li>
<li><strong>社會資本（social capital）：</strong>社區成員間的信任與合作網絡</li>
<li><strong>社區充能（community empowerment）：</strong>增強社區的集體力量與自主能力</li>
</ul>` },
};

NOTES['sp'] = {title:'社會政策與立法 — 科目重點總覽', content:`
<h4>一、本科考試特點</h4>
<p>本科分為「社會政策」（理論概念）與「社會立法」（法條規定）兩大部分，各約佔一半題數。社會政策部分重視理論辨別；立法部分需熟記各法的具體規定。</p>
<div class="hl">高頻考點：Titmuss三模式、Esping-Andersen三體制、第三條路vs新自由主義、俾斯麥vs貝佛里奇、六大主要立法條文細節</div>
<h4>二、各分類關鍵提示</h4>
<ul>
<li><strong>社會政策：</strong>掌握各意識形態（社會民主/新自由主義/第三條路）的差異；福利模式分類；給付方式（普及式vs選擇式）</li>
<li><strong>主要六法：</strong>老人福利法、兒少福利法、身心障礙者法、家暴防治法、社會救助法、社工師法的關鍵條文數字</li>
<li><strong>其餘各法：</strong>長照服務法財源、志願服務法、國民年金、公益勸募、兒少性剝削等法條要點</li>
</ul>`};

NOTES['sp_policy'] = {title:'社會政策', content:`
<h4>一、重要意識形態對比</h4>
<table>
<tr><th>派別</th><th>社會民主（老左派）</th><th>新自由主義（新右派）</th><th>第三條路（新工黨）</th></tr>
<tr><td>國家角色</td><td>大政府、福利國家</td><td>小政府、殘補式</td><td>社會投資國家</td></tr>
<tr><td>經濟取向</td><td>政府主導混合經濟</td><td>市場教義派</td><td>新式混合經濟</td></tr>
<tr><td>政策目標</td><td>結果平等、充分就業</td><td>機會平等、低通膨</td><td>強調就業能力</td></tr>
<tr><td>福利取向</td><td>普及式、去商品化</td><td>選擇式、商品化</td><td>工作福利（workfare）</td></tr>
</table>
<div class="hl">第三條路關鍵字：「有能者工作、失能者給付、用工作取得報酬」→社會投資，非傳統左派也非右派</div>

<h4>二、Titmuss福利模式三分法</h4>
<ul>
<li><strong>殘補式（residual）：</strong>家庭與市場失靈後，社會福利才介入，是最後手段</li>
<li><strong>工業成就績效模式（industrial achievement performance）：</strong>福利與工作/績效掛鉤，貢獻決定給付</li>
<li><strong>制度再分配模式（institutional redistributive）：</strong>社會福利是社會主要整合制度，提供普及性服務，重視社會平等</li>
</ul>

<h4>三、Esping-Andersen三種福利國家體制</h4>
<table>
<tr><th>體制</th><th>代表國家</th><th>特色</th><th>去商品化程度</th></tr>
<tr><td>自由主義體制</td><td>美國、英國、加拿大</td><td>市場為主，資產調查，殘補式</td><td>低</td></tr>
<tr><td>保守主義體制</td><td>德國、法國</td><td>職業別給付，強調家庭角色</td><td>中</td></tr>
<tr><td>社會民主體制</td><td>瑞典、丹麥等北歐</td><td>普及性，高度去商品化</td><td>高</td></tr>
</table>

<h4>四、俾斯麥 vs 貝佛里奇模式</h4>
<table>
<tr><th></th><th>俾斯麥模式</th><th>貝佛里奇模式</th></tr>
<tr><td>財源</td><td>保險費（雇主+受雇者）</td><td>稅收</td></tr>
<tr><td>對象</td><td>受雇者（職業別）</td><td>全體國民</td></tr>
<tr><td>給付</td><td>所得相關（繳越多領越多）</td><td>定額（flat rate）</td></tr>
<tr><td>代表</td><td>德國社會保險</td><td>英國NHS</td></tr>
</table>

<h4>五、普及式 vs 選擇式福利</h4>
<table>
<tr><th></th><th>普及式</th><th>選擇式</th></tr>
<tr><td>涵蓋</td><td>高</td><td>低</td></tr>
<tr><td>行政成本</td><td>低</td><td>高（需財力調查）</td></tr>
<tr><td>污名化</td><td>不易</td><td>容易</td></tr>
<tr><td>社會整合</td><td>促進</td><td>較難</td></tr>
<tr><td>目標效率</td><td>低（資源分散）</td><td>高（針對需求者）</td></tr>
</table>

<h4>六、新管理主義（3Es）</h4>
<p>①經濟（economy）②效率（efficiency）③效益（effectiveness）。強調引進私部門管理模式、績效評估、競爭機制、契約外包，是1980年代以後福利改革的主要方向。</p>`};

NOTES['sp_main6'] = {title:'主要六個立法', content:`
<h4>一、老人福利法重點</h4>
<ul>
<li>老人定義：<strong>年滿65歲以上</strong>之人</li>
<li>機構類型：安養機構（生活可自理）、養護機構（生活自理有缺損）、長期照顧機構（需醫護服務）</li>
<li>家庭照顧者支持：喘息服務、照顧技巧訓練、諮詢服務等</li>
</ul>
<h4>二、兒童及少年福利與權益保障法重點</h4>
<ul>
<li>主管機關每<strong>5年</strong>調查兒少身心發展現況</li>
<li>收出養媒合：安排收養人與兒少「<strong>漸進式</strong>」接觸（非儘快接觸）</li>
<li>有對外勸募或享受租稅減免：設立許可起<strong>1年</strong>內辦財團法人登記</li>
<li>居家式托育服務：由<strong>三親等外</strong>人員於居家環境收費照顧</li>
<li>寄養費用：向兒少之<strong>法定代理人</strong>收取</li>
</ul>
<h4>三、身心障礙者權益保障法重點</h4>
<ul>
<li>緊急保護安置：不得超過<strong>72小時</strong></li>
<li>身體系統構造或功能損傷：共<strong>8款</strong></li>
<li>相關代表比例：身心障礙者或監護人代表及民間機構代表不得少於<strong>1/2</strong></li>
<li>CRPD八大原則：含<strong>尊重兒童</strong>（非老人）</li>
</ul>
<h4>四、家庭暴力防治法重點</h4>
<ul>
<li>通常保護令效期：最長<strong>2年</strong>（可延長）</li>
<li>未同居伴侶適用：被害人年滿<strong>16歲</strong>可申請保護令</li>
<li>社工職責：緊急保護安置、協助申請保護令、訪視輔導（<strong>非</strong>逮捕行為人）</li>
</ul>
<h4>五、社會救助法重點</h4>
<ul>
<li>中央主管機關：<strong>衛生福利部</strong></li>
<li>資格審核：由<strong>地方</strong>（直轄市、縣市）主管機關辦理</li>
<li>給付原則：<strong>補充性原則</strong>（其他資源用盡後才介入）</li>
<li>在校學生工作收入：部分免計入（非全額免計）</li>
</ul>
<h4>六、社會工作師法重點</h4>

NOTES['hb_theory'] = {title:'人類行為發展理論', content:`
<h4>一、Piaget認知發展四階段</h4>
<table>
<tr><th>階段</th><th>年齡</th><th>特徵</th></tr>
<tr><td>感覺動作期</td><td>0-2歲</td><td>靠感覺與動作探索世界；發展物體恆存概念</td></tr>
<tr><td>前運思期</td><td>2-7歲</td><td>自我中心；萬物有靈；單向思考不可逆</td></tr>
<tr><td>具體運思期</td><td>7-11歲</td><td>可逆思考；保留概念（質量、數量、體積）；需依賴具體事物</td></tr>
<tr><td>形式運思期</td><td>11歲↑</td><td>抽象思考；邏輯推理；假設演繹</td></tr>
</table>
<div class="hl">保留概念（conservation）屬具體運思期；自我中心（egocentrism）屬前運思期。形式運思期才能進行抽象邏輯推理。</div>

<h4>二、生態系統論四層次</h4>
<table>
<tr><th>層次</th><th>定義</th><th>例子</th></tr>
<tr><td>微視系統（microsystem）</td><td>個人直接接觸的環境</td><td>家庭、學校、同儕</td></tr>
<tr><td>中介系統（mesosystem）</td><td>微視系統之間的互動關係</td><td>家庭與學校的關係</td></tr>
<tr><td>外部系統（exosystem）</td><td>個人未直接參與但受影響的環境</td><td>父母的工作環境</td></tr>
<tr><td>鉅視系統（macrosystem）</td><td>社會文化、意識形態、政策制度</td><td>文化價值觀、社會政策</td></tr>
</table>
<p>相關概念：棲息地（habitat）＝生活環境；棲位（niche）＝個人在社會中的地位與角色；適應（adaptation）＝人與環境互動調整達到平衡的過程。</p>

<h4>三、系統理論特性</h4>
<ul>
<li><strong>開放性：</strong>系統可與外界交換資源、能量、資訊</li>
<li><strong>非加總性（non-summativity）：</strong>整體大於部分的總和</li>
<li><strong>回饋（feedback）：</strong>系統依輸出結果調整行為</li>
<li><strong>穩定狀態（steady state）：</strong>系統維持動態平衡</li>
</ul>

<h4>四、Freud人格結構</h4>
<table>
<tr><th>結構</th><th>原則</th><th>說明</th></tr>
<tr><td>本我（id）</td><td>快樂原則</td><td>追求立即滿足，在潛意識層面</td></tr>
<tr><td>自我（ego）</td><td>現實原則</td><td>在現實與本我之間調節</td></tr>
<tr><td>超我（superego）</td><td>道德原則</td><td>代表道德良知與社會規範</td></tr>
</table>

<h4>五、Vygotsky鷹架理論</h4>
<p>近側發展區（ZPD）：個體獨力無法完成，但在他人支持（鷹架）下可以完成的任務範圍。強調社會互動對認知發展的重要性。</p>`};

<table>

<table>

<h4>四、Sternberg愛情三角理論</h4>

</ul>`};

  'sw_nature': { title:'社會工作的本質、特性與角色功能', content:`
<h4>一、本質</h4>
<p>社會工作同時具有科學性、藝術性與專業性。既要有理論依據，也要能在關係中運用自我、判斷情境與拿捏介入時機。</p>
<h4>二、常考角色</h4>
<table>
<tr><th>角色</th><th>關鍵功能</th></tr>
<tr><td>使能者</td><td>協助案主發展能力</td></tr>
<tr><td>仲介者</td><td>連結資源與服務</td></tr>
<tr><td>倡導者</td><td>爭取權益與制度回應</td></tr>
<tr><td>調停者</td><td>協助衝突雙方溝通協商</td></tr>
<tr><td>教育者</td><td>提供知識、技能與資訊</td></tr>
</table>
<h4>三、綜融觀點</h4>
<p>從人與環境互動出發，整合不同方法與多層次系統，而非只聚焦單一技術。</p>`},

  'sw_nature_def': { title:'社會工作本質與特性', content:`
<h4>一、三大特性</h4>
<ul>
<li><strong>科學性：</strong>有理論、知識、研究與系統化思考。</li>
<li><strong>藝術性：</strong>重視關係、直覺、實務智慧、運用自我。</li>
<li><strong>專業性：</strong>具有倫理、專業權威、專業文化與社會認可。</li>
</ul>
<h4>二、藝術性常考點</h4>
<p>England 強調社工的藝術性來自直覺、實務智慧與運用自我；「冷靜抽離的評估」較偏科學性，不是藝術性代表。</p>
<div class="hl">考題若問「何者不是藝術性」時，常把客觀評估、標準化、抽離等放進去當答案。</div>`},

  'sw_nature_role': { title:'社會工作角色與功能', content:`
<h4>一、解題口訣</h4>
<ul>
<li>幫忙找資源、轉介服務 → <strong>仲介者</strong></li>
<li>陪案主發現能力與做決定 → <strong>使能者</strong></li>
<li>幫忙與他人談判或修補衝突 → <strong>調停者</strong></li>
<li>替案主向制度發聲爭權益 → <strong>倡導者</strong></li>
<li>提供知識訓練與資訊 → <strong>教育者</strong></li>
</ul>
<h4>二、常考情境</h4>
<p>離婚協商、勞資爭議、社區衝突，多半是在考調停者；社會救助、福利資格申請，多半是在考仲介者或倡導者。</p>`},

  'sw_nature_generalist': { title:'綜融式社會工作', content:`
<h4>一、核心概念</h4>
<p>綜融式社工把工作者視為通才，不侷限於單一方法，而是整合個案、團體、社區、行政與研究的思維與技術。</p>
<h4>二、重點特徵</h4>
<ul>
<li>多層次問題解決：微觀、中介、外部、鉅視系統都要能分析。</li>
<li>具備生態系統觀點與多種理論架構。</li>
<li>與案主及其環境體系共同工作。</li>
<li>整合社會工作實務、政策與研究。</li>
</ul>
<div class="hl">綜融式社工不是高度專精化治療技術，而是整合與轉化能力。</div>`},

  'sw_nature_professional': { title:'專業關係與專業化', content:`
<h4>一、專業化常考人物</h4>
<ul>
<li><strong>Flexner：</strong>促發社工反思專業性。</li>
<li><strong>Greenwood：</strong>整理專業五特質。</li>
</ul>
<h4>二、專業關係重點</h4>
<p>專業關係不是私人關係，重點在於有目的、有限制、以案主福祉為核心，並受倫理規範與專業界線約束。</p>
<h4>三、考試重點</h4>
<ul>
<li>界線管理</li>
<li>專業目的性</li>
<li>專業權威與社會認可</li>
</ul>`},

  'sw_theory': { title:'社會工作理論與應用', content:`
<h4>一、命題方式</h4>
<p>理論題最常考「核心概念、代表人物、與其他理論的差異」。不是背名詞而已，而是看你能不能抓理論背後的助人觀點。</p>
<h4>二、必考理論群</h4>
<ul>
<li>心理暨社會派：人在情境中</li>
<li>認知行為理論：認知改變帶動情緒與行為改變</li>
<li>問題解決／任務中心／焦點解決：短期、具體、問題導向</li>
<li>生態系統理論：人與環境互動、多層次系統</li>
<li>增權與優勢觀點：結構壓迫、力量回到案主</li>
<li>女性主義與批判觀點：看見權力與性別不平等</li>
</ul>
<div class="hl">出現環境、互動、資源流動→生態；出現壓迫、權力、倡議→增權／批判；出現例外、奇蹟問句→焦點解決。</div>`},

  'sw_theory_psychosocial': { title:'心理暨社會派', content:`
<h4>一、核心概念</h4>
<p>心理暨社會派重視「人在情境中（person-in-situation）」，同時看個體內在心理與外在社會環境，不把問題只歸因於個人。</p>
<h4>二、考試重點</h4>
<ul>
<li>不是只看心理，也不是只看環境，而是兩者互動。</li>
<li>常與功能派做比較，功能派更重視機構功能與案主意志。</li>
</ul>
<div class="hl">看到 PIE、內在與環境並重，多半就是心理暨社會派。</div>`},

  'sw_theory_cbt': { title:'認知行為理論', content:`
<h4>一、核心概念</h4>
<p>個體的情緒與行為會受到認知、信念、解釋方式影響，因此改變非理性想法與錯誤認知，可帶動情緒與行為改變。</p>
<h4>二、考點</h4>
<ul>
<li>Beck、Ellis 常是代表人物。</li>
<li>重視現在的認知與可觀察行為。</li>
<li>強調結構化、具體化、可操作技術。</li>
</ul>
<div class="wn">若題目強調深層潛意識衝突，就不是認知行為取向。</div>`},

  'sw_theory_problem': { title:'問題解決派', content:`
<h4>一、常考三個短期取向</h4>
<table>
<tr><th>取向</th><th>關鍵字</th></tr>
<tr><td>問題解決</td><td>提升案主解決生活問題能力</td></tr>
<tr><td>任務中心</td><td>短期、具體任務、契約、聚焦目標問題</td></tr>
<tr><td>焦點解決</td><td>例外、奇蹟問句、量尺問句、優勢</td></tr>
</table>
<h4>二、任務中心</h4>
<ul>
<li>處理案主認定且願意處理的問題。</li>
<li>強調具體、可操作、有限時。</li>
<li>不處理深層長期人格問題。</li>
</ul>
<h4>三、焦點解決</h4>
<ul>
<li>重視例外經驗與成功經驗。</li>
<li>相信案主有能力，是問題解決專家。</li>
<li>工作焦點放在未來與改變，而非問題成因。</li>
</ul>`},

  'sw_theory_eco': { title:'生態系統理論', content:`
<h4>一、核心</h4>
<p>人的問題不是單一個體缺陷，而是人與環境互動失衡的結果。社工要分析個體、家庭、組織、社區與制度之間的互動。</p>
<h4>二、常考系統層次</h4>
<table>
<tr><th>層次</th><th>判斷重點</th></tr>
<tr><td>微視系統</td><td>直接接觸與互動，如家庭、學校、同儕</td></tr>
<tr><td>中介系統</td><td>兩個微視系統間互動，如家校關係</td></tr>
<tr><td>外部系統</td><td>未直接參與但會影響個體，如父母工作環境</td></tr>
<tr><td>鉅視系統</td><td>文化、政策、法律、意識形態</td></tr>
</table>
<h4>三、延伸概念</h4>
<ul>
<li>棲地（habitat）：生活環境</li>
<li>棲位（niche）：社會位置與角色</li>
<li>適應（adaptation）：人對環境調整歷程</li>
<li>社會支持：可作為壓力緩衝</li>
</ul>
<div class="hl">解題不是死背「某項一定是哪一層」，而是回到題意判斷是否直接互動、是否間接影響。</div>`},

  'sw_theory_empower': { title:'增權與倡導取向', content:`
<h4>一、核心觀點</h4>
<p>弱勢處境常來自結構壓迫與權力不平等，不應只把問題個人化。社工任務是協助案主取得控制感、決定權、行動權與資源。</p>
<h4>二、三層面</h4>
<ul>
<li>個人層面：提升能力、自我效能、掌控感</li>
<li>人際層面：擴大支持網絡與互動影響力</li>
<li>政治層面：集體行動、倡議、結構改變</li>
</ul>
<h4>三、考試陷阱</h4>
<ul>
<li>社工不是唯一有力量的人。</li>
<li>案主不是被動接受者，而是合作夥伴。</li>
<li>增權與優勢觀點常一起出現。</li>
</ul>`},

  'sw_theory_feminist': { title:'女性主義與批判視角', content:`
<h4>一、共同核心</h4>
<ul>
<li>性別不平等不是自然現象，而是社會建構。</li>
<li>個人即政治（the personal is political）。</li>
<li>重視權力關係、父權體制與結構壓迫。</li>
</ul>
<h4>二、常考派別</h4>
<table>
<tr><th>派別</th><th>重點</th></tr>
<tr><td>自由女性主義</td><td>法律與制度平權</td></tr>
<tr><td>激進女性主義</td><td>批判父權是壓迫根源</td></tr>
<tr><td>社會主義女性主義</td><td>性別與階級壓迫交織</td></tr>
<tr><td>後現代女性主義</td><td>拒絕單一女性經驗，重視差異</td></tr>
</table>
<div class="hl">看到女性貧窮、父權、壓迫結構、意識覺醒，多半就是女性主義或批判視角。</div>`},

  'sw_theory_other': { title:'其他新興理論', content:`
<h4>一、常見新興理論</h4>
<ul>
<li><strong>復原力：</strong>重視保護因子與逆境中的適應能力。</li>
<li><strong>優勢觀點：</strong>先看能力、資源與可能性，而不是缺陷。</li>
<li><strong>敘事／社會建構：</strong>重視語言、故事與意義建構。</li>
<li><strong>文化敏感／文化謙遜：</strong>強調反思權力與文化位置。</li>
</ul>
<h4>二、考法</h4>
<p>常以情境題出現，要抓關鍵字：風險與保護因子＝復原力；故事重寫＝敘事；優點與資源＝優勢觀點。</p>`},

  'sw_ethics': { title:'社會工作哲學與倫理', content:`
<h4>一、倫理題命題重點</h4>
<p>社工倫理不是背守則而已，重點在於當價值衝突時，能不能做出可辯護的專業判斷。</p>
<h4>二、高頻主題</h4>
<ul>
<li>NASW 六大核心價值</li>
<li>自決與保護的衝突</li>
<li>保密例外</li>
<li>雙重關係與專業界線</li>
<li>業務過失與倫理違反</li>
</ul>
<div class="hl">倫理題常不是問你「理想上」怎樣，而是問你在風險、法律、公益、自主互相衝突時，哪個優先。</div>`},

  'sw_ethics_value': { title:'社會工作價值體系', content:`
<h4>一、NASW 六大核心價值</h4>
<ul>
<li>服務（service）</li>
<li>社會正義（social justice）</li>
<li>人的尊嚴與價值</li>
<li>人際關係的重要性</li>
<li>誠信（integrity）</li>
<li>能力（competence）</li>
</ul>
<h4>二、常考觀念</h4>
<ul>
<li>效率、科學、自主本身不是 NASW 六大核心價值名稱。</li>
<li>社會工作價值不只關心個人，也關心結構不正義。</li>
</ul>
<div class="wn">看到選項裡有「效率」或「專業權威」混入 NASW 六大價值時，要特別小心。</div>`},

  'sw_ethics_code': { title:'專業倫理規範與業務過失', content:`
<h4>一、Reamer 常考類型</h4>
<ul>
<li><strong>不當行為（malfeasance）：</strong>主動做出不當行為。</li>
<li><strong>疏失（misfeasance）：</strong>做了該做的事，但做法不當。</li>
<li><strong>失職（nonfeasance）：</strong>該做而未做。</li>
</ul>
<h4>二、實務判斷</h4>
<ul>
<li>保管案主金錢不當、多重剝削關係 → 常屬不當行為</li>
<li>處遇執行錯誤造成損害 → 常屬疏失</li>
<li>明知需通報卻未通報 → 常屬失職</li>
</ul>
<h4>三、考試提醒</h4>
<p>倫理守則不只是禁止事項，也包含能力維持、紀錄責任、專業界線、保密義務等。</p>`},

  'sw_ethics_dilemma': { title:'倫理兩難與抉擇', content:`
<h4>一、常見兩難</h4>
<ul>
<li>自決 vs 保護生命安全</li>
<li>保密 vs 通報責任</li>
<li>個人利益 vs 公共利益</li>
<li>專業界線 vs 人情壓力</li>
</ul>
<h4>二、判斷方向</h4>
<p>一般而言，涉及立即生命危險、重大傷害風險時，保護優先性通常高於自決；但仍須保留最少侵害原則與紀錄理由。</p>
<h4>三、考試常見陷阱</h4>
<ul>
<li>把自決說成完全無限制 → 錯</li>
<li>把保密說成絕對不能揭露 → 錯</li>
<li>把雙重關係說成一律違反倫理 → 過度簡化</li>
</ul>`},

  'sw_practice': { title:'社會工作實務領域', content:`
<h4>一、出題方式</h4>
<p>本區最常考「某領域的核心理念是什麼」。重點不是背服務流程，而是記住每個領域最核心的價值與取向。</p>
<h4>二、記憶方式</h4>
<ul>
<li>家庭／兒少：家庭為中心、兒童最佳利益</li>
<li>青少年：外展、優勢、參與</li>
<li>婦女：充能、意識覺醒、性別平等</li>
<li>老人：在地老化、連續照顧</li>
<li>身障：社會模式、CRPD、去機構化</li>
<li>醫務／精神：心理社會調適、復元、個管</li>
<li>司法：修復式司法</li>
<li>多元文化：文化能力與文化謙遜</li>
</ul>`},

  'sw_practice_family': { title:'家庭與兒童社會工作', content:`
<h4>一、家庭社工</h4>
<p>重點是以家庭為中心（family-centered），把家庭視為介入單位，而不是只看單一成員。</p>
<h4>二、兒童社工</h4>
<ul>
<li>以兒童最佳利益為優先。</li>
<li>重視家庭維繫、家庭重整與安全照顧。</li>
<li>非必要不移除原生家庭，但安全風險高時仍需保護。</li>
</ul>
<div class="hl">考題常把「機構安置」包裝成首選，通常要小心，因為多半不是第一優先。</div>`},

  'sw_practice_youth': { title:'青少年社會工作', content:`
<h4>一、核心取向</h4>
<ul>
<li>優勢觀點</li>
<li>外展工作</li>
<li>青少年參與</li>
</ul>
<h4>二、外展工作重點</h4>
<p>外展不是等青少年上門，而是社工主動到其生活現場接觸，包括街頭、社區、網路場域等。</p>
<h4>三、考試重點</h4>
<p>若情境出現中輟、曝險、街頭接觸、網絡接觸，通常在考外展與青少年工作特性。</p>`},

  'sw_practice_women': { title:'婦女社會工作', content:`
<h4>一、核心觀點</h4>
<p>婦女工作強調充能、意識覺醒與性別平等，協助當事人看見自己困境與性別權力結構的關係。</p>
<h4>二、常考內容</h4>
<ul>
<li>性別壓迫不是個人失敗</li>
<li>重視經濟、照顧、暴力與貧窮議題</li>
<li>介入不只是支持個人，也包括倡議制度改變</li>
</ul>`},

  'sw_practice_elderly': { title:'老人社會工作', content:`
<h4>一、核心取向</h4>
<ul>
<li>在地老化（aging in place）</li>
<li>連續性照顧</li>
<li>維持自主與生活品質</li>
</ul>
<h4>二、考試重點</h4>
<p>機構安置通常不是優先原則，應先思考社區支持、家庭支持、居家與社區式服務。</p>
<h4>三、常見關鍵字</h4>
<p>長照、失能、退休、社會參與、支持網絡、照顧者負荷。</p>`},

  'sw_practice_disability': { title:'身心障礙者社會工作', content:`
<h4>一、核心理念</h4>
<p>以社會模式理解障礙：障礙不只來自個人損傷，更來自環境障礙、制度排除與不友善設計。</p>
<h4>二、考試重點</h4>
<ul>
<li>CRPD 的人權觀點</li>
<li>去機構化與社區生活</li>
<li>合理調整、平等參與</li>
</ul>
<div class="hl">看到「障礙主要是個人缺陷」這種說法，通常與社會模式相反。</div>`},

  'sw_practice_medical': { title:'醫務與精神照護社會工作', content:`
<h4>一、醫務社工</h4>
<p>重點在處理疾病帶來的心理、家庭、社會與資源調適，不是做醫師的診斷工作。</p>
<h4>二、精神社工</h4>
<ul>
<li>復元（recovery）</li>

<tr><td>生態系統理論</td><td>人與環境不契合</td><td>調適、資源、環境改變</td></tr>
<tr><td>增權</td><td>壓迫與權力失衡</td><td>提升控制感與集體行動</td></tr>
<tr><td>女性主義</td><td>父權與結構不平等</td><td>意識化、去壓迫、關係平等</td></tr>
</table>

<div class="hl">
理論題判斷技巧：<br>
看到「人與環境」→ 生態系統理論<br>
看到「壓迫、權力、倡導」→ 增權<br>
看到「信念、思考、重建」→ 認知行為理論<br>
看到「短期、任務、可操作」→ 任務中心<br>
看到「性別壓迫、父權」→ 女性主義
</div>
`},

  'sw_theory_psychosocial': { title:'心理暨社會派', content:`
<h4>一、核心概念</h4>
<p>心理暨社會學派（psychosocial approach）強調案主問題不能只從內在心理理解，也不能只從外在環境理解，而要放在「人在情境中（person-in-situation, PIE）」的架構中整合分析。</p>

<h4>二、重點內容</h4>
<ul>
<li>重視個人內在心理歷程與社會環境壓力的交互影響。</li>
<li>案主目前功能表現與過去經驗、人際關係、環境需求都有關聯。</li>
<li>社工工作不是只診斷個人，也要理解家庭、社會角色與生活情境。</li>
</ul>

<h4>三、常見考點</h4>
<ul>
<li>PIE 是本派關鍵字。</li>
<li>本派不等於功能派（functional approach）。</li>
<li>本派常與診斷學派、個案工作發展脈絡一起出題。</li>
</ul>
`},

  'sw_theory_cbt': { title:'認知行為理論', content:`
<h4>一、核心概念</h4>
<p>認知行為理論（cognitive behavioral theory, CBT）主張想法、情緒與行為彼此相互影響。案主的痛苦常與非理性信念、扭曲認知或不適應行為模式有關。</p>

<h4>二、重點內容</h4>
<ul>
<li>重視此時此地（here and now）的問題。</li>
<li>強調可觀察、可操作、可練習的改變。</li>
<li>常用技術：認知重建（cognitive restructuring）、行為練習、暴露、增強、自我監測。</li>
</ul>

<h4>三、易考比較</h4>
<ul>
<li>和精神分析不同：不強調潛意識深層衝突，而強調當前認知與行為模式。</li>
<li>和後現代不同：CBT 通常較結構化、目標化。</li>
</ul>

<div class="hl">
題幹出現「非理性信念」、「思考重建」、「行為練習」、「自我監測」，通常就是認知行為理論（CBT）。
</div>
`},

  'sw_theory_problem': { title:'問題解決派', content:`
<h4>一、包含的高頻模式</h4>
<ul>
<li>問題解決模式（problem-solving model）</li>
<li>任務中心模式（task-centered model）</li>
<li>危機處遇（crisis intervention）</li>
<li>焦點解決短期治療（solution-focused brief therapy, SFBT）</li>
</ul>

<h4>二、任務中心模式</h4>
<ul>
<li>短期、有時限、聚焦於案主認定且願意處理的問題。</li>
<li>問題需具體、明確、可操作。</li>
<li>不以深層人格重整為主要目標。</li>
</ul>

<h4>三、危機處遇</h4>
<ul>
<li>針對突發事件造成的失衡狀態。</li>
<li>強調立即介入、短期處理、恢復功能。</li>
<li>目標通常是恢復到危機前或可接受的功能狀態，而非全面人格改造。</li>
</ul>

<h4>四、焦點解決短期治療</h4>
<ul>
<li>不一直追問問題成因，而是尋找例外（exceptions）、資源、成功經驗與未來解方。</li>
<li>常用技術：奇蹟問句（miracle question）、量尺問句（scaling question）、例外問句。</li>
</ul>
`},

  'sw_theory_eco': { title:'生態系統理論', content:`
<h4>一、核心概念</h4>
<p>生態系統理論（ecological systems theory）認為人的行為與困境，不是單一線性原因造成，而是個人與多層次環境互動的結果。社工介入時，需要同時看到案主能力、環境資源、制度限制與社會支持。</p>

<h4>二、四層系統（必背）</h4>
<table>
<tr><th>層次</th><th>說明</th><th>例子</th></tr>
<tr><td>微視系統（microsystem）</td><td>案主直接參與的環境</td><td>家庭、學校、同儕</td></tr>
<tr><td>中介系統（mesosystem）</td><td>不同微視系統間互動</td><td>家校合作、家庭與醫療體系互動</td></tr>
<tr><td>外部系統（exosystem）</td><td>案主未直接參與，但會受影響</td><td>父母工作環境、社區資源分布</td></tr>
<tr><td>鉅視系統（macrosystem）</td><td>文化、法律、制度、價值</td><td>社會政策、文化規範、意識形態</td></tr>
</table>

<h4>三、常見延伸名詞</h4>
<ul>
<li><strong>棲息地（habitat）：</strong>生活環境與生存條件。</li>
<li><strong>棲位（niche）：</strong>個人在環境中的位置、角色與適配程度。</li>
<li><strong>適應（adaptation）：</strong>人與環境互動後的調整過程。</li>
<li><strong>勝任能力（competence）：</strong>個體有效因應環境需求的能力。</li>
<li><strong>社會支持網絡（social support network）：</strong>可提供情緒、資訊、實質協助的人際與制度資源。</li>
</ul>

<h4>四、社工角色</h4>
<ul>
<li>使能者（enabler）</li>
<li>調停者（mediator）</li>
<li>仲介者（broker）</li>
<li>倡導者（advocate）</li>
</ul>

<div class="hl">
解題技巧：<br>
有沒有「直接接觸」是判斷微視系統的核心；<br>
看到「父母職場」多半是外部系統（exosystem）；<br>
看到「法律、文化、政策」多半是鉅視系統（macrosystem）。
</div>
`},

  'sw_theory_empower': { title:'增權與倡導取向', content:`
<h4>一、核心概念</h4>
<p>增權（empowerment）強調弱勢處境往往不是個人失敗，而是資源不平等、壓迫關係與制度排除所造成。社工工作在於協助案主看見自己的力量、提升控制感、連結資源並參與改變。</p>

<h4>二、三個目標層面</h4>
<ul>
<li><strong>個人層面：</strong>提升自我效能、知識與能力。</li>
<li><strong>人際層面：</strong>增強支持網絡、人際互動與集體連結。</li>
<li><strong>政治層面：</strong>促進參與、倡議、制度改變與集體行動。</li>
</ul>

<h4>三、常見考點</h4>
<ul>
<li>案主不是被動接受者，而是改變的主體。</li>
<li>社工不是唯一掌握力量的人。</li>
<li>與優勢觀點（strengths perspective）高度相關。</li>
<li>與倡導（advocacy）、社會正義（social justice）常連動命題。</li>
</ul>
`},

  'sw_theory_feminist': { title:'女性主義與批判視角', content:`
<h4>一、核心概念</h4>
<p>女性主義（feminism）社工觀點認為許多困境不只是個人適應問題，而是結構性性別不平等、父權體制（patriarchy）與權力關係造成。批判視角則更進一步檢視階級、種族、性別、制度與論述如何形成壓迫。</p>

<h4>二、常考派別</h4>
<table>
<tr><th>派別</th><th>重點</th></tr>
<tr><td>自由女性主義（liberal feminism）</td><td>重法律與機會平等</td></tr>
<tr><td>激進女性主義（radical feminism）</td><td>批判父權為壓迫核心</td></tr>
<tr><td>社會主義女性主義（socialist feminism）</td><td>結合階級與性別壓迫分析</td></tr>
<tr><td>後現代女性主義（postmodern feminism）</td><td>反單一女性經驗，重差異與多元</td></tr>
</table>

<h4>三、必背原則</h4>
<ul>
<li>個人即政治（the personal is political）</li>
<li>重視意識化（consciousness raising）</li>
<li>關注權力不對等與關係中的壓迫</li>
<li>去專家化、與案主建立較平等合作關係</li>
</ul>
`},

  'sw_theory_other': { title:'其他新興理論', content:`
<h4>一、常見範圍</h4>
<ul>
<li><strong>復原力（resilience）：</strong>個體或家庭在逆境中的恢復與因應能力。</li>
<li><strong>靈性（spirituality）：</strong>看見價值、信念、生命意義與超越性資源。</li>
<li><strong>社會建構主義（social constructionism）：</strong>現實與問題的意義是透過語言與互動建構。</li>
<li><strong>敘事取向（narrative approach）：</strong>透過重述生命故事，鬆動問題主導的身分敘說。</li>
<li><strong>文化敏感與文化能力：</strong>重視文化脈絡、權力差異與反思。</li>
</ul>

<h4>二、命題方向</h4>
<p>通常以概念辨識題為主，考「哪個理論重視故事／語言／主觀經驗」、「哪個理論看見逆境中的優勢」、「哪個理論納入靈性資源」。</p>
`},

  'sw_ethics': { title:'社會工作哲學與倫理', content:`
<h4>一、命題焦點</h4>
<p>倫理題不只考守則內容，還會考價值排序、兩難判斷、界線拿捏與專業責任。要讀到可以把原則套進情境裡。</p>

<h4>二、六大核心價值（NASW core values）</h4>
<ul>
<li>服務（service）</li>
<li>社會正義（social justice）</li>
<li>人的尊嚴與價值</li>
<li>人際關係的重要性</li>
<li>誠信（integrity）</li>
<li>能力（competence）</li>
</ul>

<h4>三、常考倫理主題</h4>
<ul>
<li><strong>保密（confidentiality）：</strong>原則上保密，但在自傷他傷、高度危險、法定通報等情況可能需要例外處理。</li>
<li><strong>自我決定（self-determination）：</strong>尊重案主做決定的權利，但不是無限上綱。</li>
<li><strong>父權主義（paternalism）：</strong>以保護名義限制案主自主，是常見兩難。</li>
<li><strong>雙重關係（dual relationship）：</strong>要盡量避免造成權力濫用或利益衝突。</li>
<li><strong>業務過失（professional malpractice）：</strong>要能分辨不當行為、疏失、失職。</li>
</ul>

<div class="hl">
倫理題解法：先辨認衝突的價值，再看是否涉及生命安全、權力不對等、專業界線與法定義務。
</div>
`},

  'sw_ethics_value': { title:'社會工作價值體系', content:`
<h4>一、核心內容</h4>
<p>價值是社工專業的基礎。出題重點通常在於區辨哪些屬於社工核心價值，哪些只是工具性概念或其他領域重視的原則。</p>

<h4>二、六大核心價值（NASW core values）</h4>
<ul>
<li>服務（service）</li>
<li>社會正義（social justice）</li>
<li>人的尊嚴與價值</li>
<li>人際關係的重要性</li>
<li>誠信（integrity）</li>
<li>能力（competence）</li>
</ul>

<h4>三、常見陷阱</h4>
<ul>
<li>效率、科學、中立、自主等，不是 NASW 六大核心價值的正式列項。</li>
<li>價值不等於技術；技術是做事方法，價值是專業判斷基礎。</li>
</ul>

<h4>四、相關哲學取向</h4>
<ul>
<li>義務論（deontology）</li>
<li>效益主義（utilitarianism）</li>
<li>關懷倫理學（ethics of care）</li>
<li>德行倫理學（virtue ethics）</li>
</ul>
`},

  'sw_ethics_code': { title:'專業倫理規範與業務過失', content:`
<h4>一、專業倫理規範</h4>
<p>社工倫理規範的功能在於提供實務判準、保護服務對象、維護專業信任，並形成專業共同體的最低實務標準。</p>

<h4>二、業務過失（professional malpractice）三類型</h4>
<ul>
<li><strong>不當行為（malfeasance）：</strong>明知不當仍做出有害行為。</li>
<li><strong>疏失（misfeasance）：</strong>執行應做工作，但方法錯誤或不當。</li>
<li><strong>失職（nonfeasance）：</strong>該做卻未做，未履行應有責任。</li>
</ul>

<h4>三、常見命題情境</h4>
<ul>
<li>未做必要通報</li>
<li>洩漏案主資訊</li>
<li>收受不當利益</li>
<li>未保存適當紀錄</li>
<li>界線侵犯（boundary violation）</li>
</ul>
`},

  'sw_ethics_dilemma': { title:'倫理兩難與抉擇', content:`
<h4>一、什麼是倫理兩難</h4>
<p>倫理兩難（ethical dilemma）是指兩個以上重要價值或責任彼此衝突，無法同時完全滿足。例如保密與保護生命、自決與安全、個人利益與公共利益之間的衝突。</p>

<h4>二、常見兩難主題</h4>
<ul>
<li>保密（confidentiality） vs. 保護生命與安全</li>
<li>自我決定（self-determination） vs. 父權主義（paternalism）</li>
<li>專業界線 vs. 在地社區人際現實</li>
<li>案主利益 vs. 機構規範</li>
</ul>

<h4>三、判斷原則</h4>
<ul>
<li>先確認是否涉及立即生命危險或法定義務。</li>
<li>辨識各方權益與權力差異。</li>
<li>盡量保留案主參與與知情。</li>
<li>必要時進行督導與倫理諮詢。</li>
<li>留下完整專業紀錄。</li>
</ul>
`},

  'sw_practice': { title:'社會工作實務領域', content:`
<h4>一、命題方式</h4>
<p>實務領域題常考「各領域的核心取向」。也就是說，題目看起來像在問服務對象，其實真正要你答的是該領域背後的價值與工作模式。</p>

<h4>二、核心取向總表</h4>
<table>
<tr><th>領域</th><th>核心取向</th><th>高頻關鍵字</th></tr>
<tr><td>家庭與兒童</td><td>以家庭為中心、兒童最佳利益</td><td>家庭維繫、保護安置、家庭重整</td></tr>
<tr><td>青少年</td><td>優勢觀點、外展工作</td><td>街頭外展、培力、參與</td></tr>
<tr><td>婦女</td><td>充能、意識化</td><td>性別壓迫、暴力、經濟自主</td></tr>
<tr><td>老人</td><td>在地老化（aging in place）</td><td>長照、退休、成功老化</td></tr>
<tr><td>身心障礙</td><td>社會模式（social model）</td><td>CRPD、去機構化、合理調整</td></tr>
<tr><td>醫務與精神</td><td>心理社會調適、復元</td><td>疾病適應、個案管理、社區生活</td></tr>
<tr><td>學校與職業</td><td>生態整合、權益保障</td><td>家校合作、職災、勞工支持</td></tr>
<tr><td>司法與多元文化</td><td>修復式司法、文化謙遜</td><td>修復、差異、文化敏感</td></tr>
</table>
`},

  'sw_practice_family': { title:'家庭與兒童社會工作', content:`
<h4>一、核心原則</h4>
<ul>
<li>以家庭為中心（family-centered）</li>
<li>兒童最佳利益（best interests of the child）</li>
<li>優先支持家庭功能，而不是輕率移除兒童</li>
</ul>

<h4>二、常考概念</h4>
<ul>
<li><strong>家庭維繫服務（family preservation）：</strong>協助兒少留在原家庭安全成長，通常偏到宅與家庭支持，不是以機構安置為主。</li>
<li><strong>家庭重整（family reunification）：</strong>兒少安置後，透過支持讓其有機會回到家庭。</li>
<li><strong>保護安置：</strong>在安全受威脅時必要啟動，但不是第一順位常態方案。</li>
</ul>
`},

  'sw_practice_youth': { title:'青少年社會工作', content:`
<h4>一、核心取向</h4>
<p>青少年社會工作重視優勢觀點（strengths perspective）、參與、培力與外展工作（outreach work）。</p>

<h4>二、常考內容</h4>
<ul>
<li>外展工作是社工主動進入青少年生活場域，而不是等待其上門。</li>
<li>重視同儕文化、認同形成與發展任務。</li>
<li>與安置、自立生活、偏差行為預防、網路風險、街頭少年等議題常一起命題。</li>
</ul>

<h4>三、實務重點</h4>
<ul>
<li>建立關係比說教更重要。</li>
<li>看見資源與韌力，不只看到問題。</li>
<li>支持參與與自我決策能力。</li>
</ul>
`},

  'sw_practice_women': { title:'婦女社會工作', content:`
<h4>一、核心取向</h4>
<p>婦女社會工作以充能（empowerment）與女性主義觀點為核心，重視結構性性別壓迫、暴力經驗、經濟依賴與照顧負擔。</p>

<h4>二、常考重點</h4>
<ul>
<li>協助服務對象意識到問題不只是個人失敗，而與性別制度有關。</li>
<li>重視安全、權益、自主與資源控制。</li>
<li>常與家庭暴力、單親、就業、照顧壓力、社會排除議題連動。</li>
</ul>
`},

  'sw_practice_elderly': { title:'老人社會工作', content:`
<h4>一、核心取向</h4>
<ul>
<li>在地老化（aging in place）</li>
<li>成功老化（successful aging）</li>
<li>維持自主、參與與生活品質</li>
</ul>

<h4>二、常考內容</h4>
<ul>
<li>機構安置通常不是首選，而是必要時的支持方案之一。</li>
<li>長期照顧、家庭照顧者支持、失智症、退休調適與喪親議題常見。</li>
<li>老年工作不只是照顧，也涉及倡導、資源連結與權益保障。</li>
</ul>
`},

  'sw_practice_disability': { title:'身心障礙者社會工作', content:`
<h4>一、核心取向</h4>
<p>身心障礙者社會工作重點在於從社會模式（social model）理解障礙，認為障礙不只是個人損傷，而是社會環境未能提供適當支持與可近性的結果。</p>

<h4>二、常考重點</h4>
<ul>
<li>聯合國身心障礙者權利公約（Convention on the Rights of Persons with Disabilities, CRPD）</li>
<li>去機構化（deinstitutionalization）</li>
<li>自立生活、合理調整、無障礙、社區參與</li>
</ul>

<h4>三、常見陷阱</h4>
<ul>
<li>把障礙完全視為個人缺陷 → 錯</li>
<li>把照顧控制當成主要目標 → 錯；更重要的是權利與參與</li>
</ul>
`},

  'sw_practice_medical': { title:'醫務與精神照護社會工作', content:`
<h4>一、核心取向</h4>
<ul>
<li>醫務社工：心理社會調適（psychosocial adjustment）</li>
<li>精神社工：復元（recovery）與個案管理（case management）</li>
</ul>

<h4>二、醫務社工重點</h4>
<ul>
<li>協助個人與家庭因應疾病、失能、住院、重大診斷與醫療決策壓力。</li>
<li>重點是心理、社會、家庭與資源面支持，不是取代醫師做醫療判斷。</li>
</ul>

<h4>三、精神社工重點</h4>
<ul>
<li>重視社區生活、支持網絡、復元導向。</li>
<li>不是只做症狀控制，更重視生活功能、權利、關係與社會參與。</li>
</ul>
`},

  'sw_practice_school': { title:'學校與職業社會工作', content:`
<h4>一、學校社工</h4>
<ul>
<li>以生態系統觀點整合學生、家庭、學校與社區。</li>
<li>重視家校合作、社會適應、保護議題與資源轉介。</li>
<li>不是取代輔導教師，而是與教育體系分工合作。</li>
</ul>

<h4>二、職業社會工作</h4>
<ul>
<li>重視勞工權益、就業支持、職災協助與工作適應。</li>
<li>看見工作與家庭、身心健康、制度保障之間的關係。</li>
</ul>
`},

  'sw_practice_justice': { title:'司法與多元文化社會工作', content:`
<h4>一、司法社工</h4>
<ul>
<li>常見核心概念：修復式司法（restorative justice）</li>
<li>重視修復關係、回應傷害、促進責任承擔與社區參與。</li>
<li>不以單純懲罰為唯一目的。</li>
</ul>

<h4>二、多元文化工作</h4>
<ul>
<li>重視文化能力（cultural competence）與文化謙遜（cultural humility）。</li>
<li>避免用主流價值直接評斷服務對象。</li>

`},

  'sw_practice_work': { title:'職業社會工作', content:`
<h4>一、核心重點</h4>

<h4>二、考試方向</h4>
<ul>
<li>社工不是站在雇主利益的管理立場，而是兼顧權益保障與支持功能。</li>
<li>需理解勞動權益、支持服務與制度倡議的關係。</li>
</ul>
`},

<h4>二、實務重點</h4>
<ul>

<h4>一、核心概念</h4>

<h4>二、特徵</h4>
<ul>
<li>同時關注個人、家庭、團體、組織與社區。</li>
<li>重視人與環境互動。</li>
<li>可依情境選擇角色：使能、仲介、倡導、教育、協調等。</li>

</ul>
`},

<h4>一、社工的本質</h4>
<ul>
<li>助人專業</li>
<li>兼具科學性與藝術性</li>
<li>以關係為媒介</li>
<li>兼顧個人福祉與社會正義</li>
</ul>

<h4>二、常見考點</h4>
<ul>
<li><strong>藝術性：</strong>運用自我、直覺、實務智慧。</li>
<li><strong>科學性：</strong>評估、證據、理論、紀錄與方法。</li>

</ul>

  'sw_nature_role': { title:'社會工作角色與功能', content:`
<h4>一、角色辨識表</h4>
<table>
<tr><th>角色</th><th>核心任務</th><th>題幹常見語句</th></tr>
<tr><td>使能者（enabler）</td><td>協助案主發揮能力</td><td>增強能力、支持、鼓勵</td></tr>
<tr><td>仲介者（broker）</td><td>連結服務資源</td><td>轉介、媒合、資源提供</td></tr>
<tr><td>倡導者（advocate）</td><td>爭取權利</td><td>發聲、爭取福利、抗爭不公平</td></tr>
<tr><td>調停者（mediator）</td><td>處理衝突協商</td><td>協調爭議、妥協、調解</td></tr>
<tr><td>教育者（educator）</td><td>提供知識與技能</td><td>衛教、教導、訓練</td></tr>
</table>

<h4>二、解題技巧</h4>
<p>先看社工「實際在做什麼」，不要只看他「好像在幫忙」。幫忙很多種，連結是仲介、說明是教育、爭權是倡導、喬衝突是調停。</p>
`},

  'sw_nature_professional': { title:'專業關係與專業化', content:`
<h4>一、專業關係</h4>
<p>專業關係是有目的的助人關係，不是一般私人關係。它以服務目標、專業界線、倫理責任與案主利益為中心。</p>

<h4>二、專業化重點</h4>
<ul>
<li>知識體系</li>
<li>教育訓練</li>
<li>倫理守則</li>
<li>社會認可</li>
<li>專業文化</li>
<li>證照制度</li>
</ul>

<h4>三、常見命題</h4>
<ul>
<li>哪個特徵屬於專業？</li>
<li>專業關係與私人關係差在哪裡？</li>
<li>界線維持與雙重關係如何判斷？</li>
</ul>
`}

   text:'就生態觀點的核心概念來看，長期在兒少安置機構成長、結束安置後的自立生活青年，其自立初期主要面臨那些議題？①位置與棲息地的轉變 ②社會角色互惠性期待的不同 ③親密關係的創傷 ④個人勝任能力的考驗 ⑤鉅視系統的歧視壓迫',
   options:['A.①②③④','B.①②④⑤','C.①②③⑤','D.②③④⑤'],
   answer:'B',explanation:'生態觀點核心概念包含棲息地、位置、社會角色互惠期待、勝任能力等。自立青年面臨：①位置與棲息地改變、②社會角色互惠期待不同、④個人勝任能力考驗、⑤鉅視系統歧視壓迫。「親密關係的創傷」（③）屬心理層面，非生態觀點核心概念。'},
  {id:'sw_110_1_15',subject:'sw',year:110,session:1,num:15,categories:['sw_theory_empower'],
   text:'帕森斯等人（Parsons, Gutiérrez, & Cox, 1998）曾將增權觀點的策略活動依其目標性質分為那四個向度？①建立關係 ②教育學習 ③志願服務 ④獲取資源 ⑤社會行動',
   options:['A.①②③④','B.①②④⑤','C.②③④⑤','D.①③④⑤'],
   answer:'B',explanation:'Parsons等人（1998）增權四個策略向度：①建立關係、②教育學習、④獲取資源、⑤社會行動。「志願服務」（③）並非其四個向度之一。'},
  {id:'sw_110_1_16',subject:'sw',year:110,session:1,num:16,categories:['sw_theory_feminist'],
   text:'Valentich（1986）認為女性主義發展多元，但仍有共通性。下列敘述何者不是女性主義各派別的共通特性？',
   options:['A.認為社會不平等是由性別歧視所導致','B.主張女性的個人處境是政治問題','C.認為資本主義是女性受壓迫的唯一根源','D.批判父權制度對女性的壓迫'],
   answer:'C',explanation:'「資本主義是唯一根源」是社會主義女性主義的特定主張，並非所有派別共通立場。各派共通性：性別不平等、個人即政治、批判父權。'},
  {id:'sw_110_1_17',subject:'sw',year:110,session:1,num:17,categories:['sw_theory_feminist'],
   text:'不同派別女性主義各有獨特主張，下列敘述何者錯誤？',
   options:['A.自由主義女性主義主張透過立法改革爭取兩性平等權利','B.激進女性主義認為父權制度是所有壓迫的根本原因','C.社會主義女性主義認為階級與性別的壓迫相互交織','D.後現代女性主義強調尋求單一的女性解放論述'],
   answer:'D',explanation:'後現代女性主義批判任何單一、普遍性的大論述，強調多元、差異、去中心。「尋求單一解放論述」與後現代女性主義精神相悖，故D錯誤。'},
  {id:'sw_110_1_18',subject:'sw',year:110,session:1,num:18,categories:['sw_practice_medical'],
   text:'下列何者不是「後現代取向」社會工作理論的主要概念？',
   options:['A.語言與論述建構現實','B.知識具有相對性與脈絡性','C.強調客觀診斷與標準化介入','D.重視案主的主觀詮釋與生命敘事'],
   answer:'C',explanation:'後現代取向強調語言建構現實、知識相對性、案主主觀詮釋。「客觀診斷與標準化介入」是現代主義、醫療模式的概念，與後現代取向相違背。'},
  {id:'sw_110_1_19',subject:'sw',year:110,session:1,num:19,categories:['sw_ethics_value'],
   text:'關於社會工作價值與倫理發展的敘述，下列何者正確？①19世紀末期，社會工作專業開始發展階段即關注社會工作者的道德，案主的思想行為是否符合道德標準為其次 ②20世紀睦鄰運動的興起，社會工作者轉而偏重關注社會改革議題，而非案主的道德觀 ③1960年代，社會工作者關注焦點轉向社會正義、權利與改革 ④1970年代，應用性的專業倫理興起',
   options:['A.①②','B.②③','C.②③④','D.①②③④'],
   answer:'C',explanation:'①19世紀COS時期，重點是評估案主道德、改善案主品格，社工本身的道德為其次，故①錯誤。②睦鄰運動確實轉向社會改革，③1960年代民權運動影響下轉向社會正義，④1970年代應用倫理興起，②③④均正確。'},
  {id:'sw_110_1_20',subject:'sw',year:110,session:1,num:20,categories:['sw_ethics_value'],
   text:'美國社會工作人員協會（NASW）於 1996 年發表六項當時常見的社會工作價值，下列何者未包含在內？',
   options:['A.服務（service）','B.社會正義（social justice）','C.效率（efficiency）','D.人際關係的重要性（importance of human relationships）'],
   answer:'C',explanation:'NASW（1996）六大核心價值：①服務、②社會正義、③人的尊嚴與價值、④人際關係的重要性、⑤誠信、⑥能力。「效率」並非其中之一。'},
  {id:'sw_110_1_21',subject:'sw',year:110,session:1,num:21,categories:['sw_ethics_value'],
   text:'根據 Reamer（1999）的說法，社會工作的發展史上至少有六種不同的價值取向。下列那一個取向極少涉及價值或規範性的概念？',
   options:['A.道德取向','B.科學取向','C.人本取向','D.宗教取向'],
   answer:'B',explanation:'Reamer（1999）指出科學取向（scientific orientation）強調客觀性與實證研究，極少涉及價值或規範性概念，試圖以科學方法取代道德判斷。'},
  {id:'sw_110_1_22',subject:'sw',year:110,session:1,num:22,categories:['sw_ethics_value'],
   text:'Banks（2014）認為 Biestek 的「個別化」個案工作原則，是承襲自康德的那一個關於人的重要主張？',
   options:['A.人是目的，不是工具','B.最大多數人的最大幸福','C.人應遵循自然法則','D.人的行為受社會契約約束'],
   answer:'A',explanation:'Biestek的個別化原則強調每位案主都是獨特的個體，應被視為有尊嚴的主體。這承襲自康德「人性公式」：人是目的，不是工具（treat persons as ends in themselves）。'},
  {id:'sw_110_1_23',subject:'sw',year:110,session:1,num:23,categories:['sw_practice_women'],
   text:'下列那一種倫理學將「感性回應」視為主軸，且與女性取向的倫理觀特別有關連？',
   options:['A.義務論（deontology）','B.效益主義（utilitarianism）','C.關懷倫理學（ethics of care）','D.德行倫理學（virtue ethics）'],
   answer:'C',explanation:'關懷倫理學（Carol Gilligan等）強調人際關係、情感連結與感性回應，特別與女性取向道德觀有關，強調照顧、責任與關係。'},
  {id:'sw_110_1_24',subject:'sw',year:110,session:1,num:24,categories:['sw_ethics_code'],
   text:'按照 Reamer（1995）對於業務過失（malpractice）的定義，一間職能復健機構的社會工作師未經機構的案主們同意，就挪用案主的工作復健基金作為營養午餐費用，這是屬於何種業務過失？',
   options:['A.知情同意的缺失','B.不當行為（malfeasance）','C.失職行為（nonfeasance）','D.能力不足的過失'],
   answer:'B',explanation:'Reamer（1995）業務過失三類：不當行為（主動從事不適當有害行為）、疏失（以不當方式執行適當任務）、失職（未履行應盡責任）。本題社工主動挪用案主基金，屬主動的不當行為（malfeasance）。'},
  {id:'sw_110_1_25',subject:'sw',year:110,session:1,num:25,categories:['sw_practice_other'],
   text:'Cournoyer 在有關文化敏感觀點社會工作實務的論述中，達到包容的「文化同理」具有三個要素，下列敘述何者錯誤？',
   options:['A.認知要素：了解文化差異對行為的影響','B.情感要素：對不同文化背景者抱持尊重與接納','C.行動要素：以跨文化溝通技巧與不同族群互動','D.評估要素：以主流文化標準評估案主適應程度'],
   answer:'D',explanation:'Cournoyer的文化同理三要素：認知、情感、行動。「以主流文化標準評估案主」違背文化敏感原則，故D為錯誤。'},
  {id:'sw_110_1_26',subject:'sw',year:110,session:1,num:26,categories:['sw_ethics_code'],
   text:'下列有關專業關係界線的敘述，何者錯誤？',
   options:['A.界線是用來保護案主免於受到剝削的','B.社工與案主的雙重關係（dual relationship）一律不被允許','C.觸摸案主可能是適當的，端視情境而定','D.界線跨越（boundary crossing）不必然是傷害案主的行為'],
   answer:'B',explanation:'雙重關係應盡量避免，但並非「一律不被允許」。在農村、原住民社區等小型社區，完全避免雙重關係不切實際，關鍵在於是否造成利益衝突或傷害。「一律不被允許」過於絕對，故B錯誤。'},
  {id:'sw_110_1_27',subject:'sw',year:110,session:1,num:27,categories:['sw_ethics_value'],
   text:'下列何者不是 Reamer（1995）提出有限資源分配的基本原則？',
   options:['A.平等原則：對所有人一視同仁','B.需求原則：最需要者優先','C.補償原則：彌補歷史上的不公平','D.貢獻原則：依個人對社會的貢獻分配'],
   answer:'D',explanation:'Reamer（1995）有限資源分配原則包含：平等、需求、補償、效率、先到先得等。「貢獻原則」並非其中之一，故D為非其原則。'},
  {id:'sw_110_1_28',subject:'sw',year:110,session:1,num:28,categories:['sw_practice_disability'],
   text:'一名因意外而導致下半身癱瘓的身心障礙服務對象獨居多年。近日，該服務對象因故跌倒、骨折受傷無力爬起，直到隔日居家服務員到訪才被發現送醫。社會工作者積極促成服務對象入住長期安養機構，當服務對象堅決不願意時，社會工作者仍將其安置。這是考量何種倫理原則優先順序所做的決策？',
   options:['A.自主原則優先於保護原則','B.保護原則（父權主義）優先於自主原則','C.平等原則優先於公益原則','D.公益原則優先於個人自主原則'],
   answer:'B',explanation:'案主堅決不願入住（自主原則），社工仍強制安置以保護安全（保護原則/父權主義paternalism）。這是「保護原則優先於自主原則」的倫理決策。'},
  {id:'sw_110_1_29',subject:'sw',year:110,session:1,num:29,categories:['sw_practice_work'],
   text:'依據職業社會工作的服務精神，有關職業社工的敘述，下列何者錯誤？',
   options:['A.職業社工應協助勞工了解職業傷病的申請程序','B.職業社工的服務對象包含雇主與勞工','C.職業社工應以雇主利益為最優先考量','D.職業社工可協助勞工連結醫療及福利資源'],
   answer:'C',explanation:'職業社工強調協助勞工保障其權益、維護職業健康與福利。「以雇主利益為最優先」違背職業社工的倡導立場與社會正義核心價值，故C錯誤。'},
  {id:'sw_110_1_30',subject:'sw',year:110,session:1,num:30,categories:['sw_practice_family'],
   text:'關於家庭社會工作的敘述，下列何者錯誤？',
   options:['A.家庭維繫服務（family preservation service）目的在避免兒童不必要的家外安置','B.家庭重整服務（family reunification service）是協助已安置兒童返家','C.家庭解體服務（family dissolution service）是當家庭功能嚴重失能時終止親權','D.家庭維繫服務以機構為基礎，需要案主至機構接受密集服務'],
   answer:'D',explanation:'家庭維繫服務（如Homebuilders模式）的特點是「以家庭為基礎（home-based）」，社工密集到宅服務，而非要求案主至機構。故D錯誤。'},
  {id:'sw_110_1_31',subject:'sw',year:110,session:1,num:31,categories:['sw_practice_medical'],
   text:'下列何者是醫務社會工作者在加護病房（ICU）的主要工作任務？',
   options:['A.診斷病患的醫療問題','B.執行護理照護計畫','C.協助病患與家屬的心理社會調適','D.決定病患的治療方案'],
   answer:'C',explanation:'醫務社工在ICU的核心角色是協助病患及家屬因應嚴重病情帶來的心理、社會、情緒衝擊，包括悲傷輔導、資源連結、家庭溝通協調等。診斷、護理、治療決策屬醫療團隊職責。'},
  {id:'sw_110_1_32',subject:'sw',year:110,session:1,num:32,categories:['sw_practice_medical'],
   text:'精神衛生社會工作中，關於「個案管理」的敘述，下列何者正確？',
   options:['A.個案管理者應為精神科醫師','B.個案管理的目的在於管控精神病患的行為','C.個案管理強調服務的整合與協調，協助個案在社區中生活','D.個案管理僅適用於急性發作期的精神病患'],
   answer:'C',explanation:'精神衛生領域個案管理強調跨機構、跨專業服務整合與協調，目標是協助慢性精神病患維持社區生活、提升生活品質。個案管理者可以是社工、護理師等，不限精神科醫師。'},
  {id:'sw_110_1_33',subject:'sw',year:110,session:1,num:33,categories:['sw_practice_school'],
   text:'下列何者是學校社會工作者的主要角色任務？',
   options:['A.擔任學校的行政決策者','B.協助具有社會功能障礙的學生及其家庭','C.取代輔導教師的諮商功能','D.負責課程設計與教學'],
   answer:'B',explanation:'學校社工的核心任務是協助在學校、家庭、社會環境中遭遇困難的學生，處理影響學習與發展的社會功能障礙問題。社工與輔導老師有分工，並非取代關係。'},
  {id:'sw_110_1_34',subject:'sw',year:110,session:1,num:34,categories:['sw_practice_justice'],
   text:'司法社會工作中，關於「修復式司法」（restorative justice）的敘述，下列何者錯誤？',
   options:['A.強調被害人、加害人與社區共同參與','B.目的在於修補犯罪造成的傷害','C.以嚴厲懲罰加害人作為主要手段','D.強調加害人對被害人及社區的責任'],
   answer:'C',explanation:'修復式司法強調以對話、協商、補償等方式修復犯罪造成的傷害，而非以嚴厲懲罰為主要手段。其核心是修復關係與傷害，與報復性司法理念不同。'},
  {id:'sw_110_1_35',subject:'sw',year:110,session:1,num:35,categories:['sw_practice_elderly'],
   text:'關於老人社會工作的敘述，下列何者正確？',
   options:['A.老人福利服務應以機構安置為優先考量','B.老人社工的核心概念包含老化理論、社會支持與資源連結','C.老人社工應避免討論死亡與臨終議題','D.老人社工的服務對象僅限65歲以上的老人'],
   answer:'B',explanation:'老人社工以老化理論為基礎，強調社會支持網絡的建構與資源連結，是其核心概念。老人福利服務應以「在地老化」為優先，非機構安置優先。'},
  {id:'sw_110_1_36',subject:'sw',year:110,session:1,num:36,categories:['sw_practice_disability'],
   text:'關於身心障礙社會工作的敘述，下列何者最符合當代觀點？',
   options:['A.身心障礙者的問題主要源自個人的生理缺陷','B.社會模式認為障礙是由社會環境造成的','C.復健取向是當代身心障礙工作的唯一框架','D.身心障礙者應依賴專業人員做出所有決定'],
   answer:'B',explanation:'當代身心障礙社工採用社會模式（social model of disability），認為障礙不是個人生理缺陷所致，而是社會環境不友善設計造成的，強調社會責任與環境改善。'},
  {id:'sw_110_1_37',subject:'sw',year:110,session:1,num:37,categories:['sw_practice_youth'],
   text:'青少年社會工作中，關於「外展工作」（outreach work）的敘述，下列何者正確？',
   options:['A.外展工作是在機構內等待案主前來求助','B.外展工作主動深入案主的生活環境提供服務','C.外展工作僅適用於有機構設施的環境','D.外展工作的目標是說服案主改變生活方式'],
   answer:'B',explanation:'外展工作的特點是社工主動走出機構，深入案主所在的街頭、社區、日常生活環境中建立關係、提供服務，接觸不會主動求助的邊緣青少年。精神是「去找案主」而非「等案主上門」。'},
  {id:'sw_110_1_38',subject:'sw',year:110,session:1,num:38,categories:['sw_practice_other'],
   text:'關於多元文化社會工作的敘述，下列何者錯誤？',
   options:['A.文化謙遜（cultural humility）強調持續反思自己的文化偏見','B.文化能力（cultural competence）是一種終點，達成後即可停止學習','C.社工應了解服務對象的文化背景對其行為的影響','D.多元文化社工強調重視文化差異，避免文化霸權'],
   answer:'B',explanation:'文化能力是持續發展的過程，而非可以「達成」的終點。當代更強調「文化謙遜」的概念，認為文化學習是終身歷程，需要持續自我反思，故B錯誤。'},
  {id:'sw_110_1_39',subject:'sw',year:110,session:1,num:39,categories:['sw_practice_women'],
   text:'婦女社會工作中，以「充能（empowerment）」觀點來看，下列何者最能代表此取向的實務作為？',
   options:['A.為受暴婦女提供庇護所安置服務','B.協助婦女了解自身受暴是個人特質問題','C.協助婦女辨識權力不平等並發展集體行動能力','D.由社工代替婦女做所有重要決定'],
   answer:'C',explanation:'充能取向婦女社工強調協助婦女意識化，了解自身處境是社會結構問題而非個人缺陷，發展集體行動能力以改變壓迫性社會條件。C最能體現充能取向精神。'},
  {id:'sw_110_1_40',subject:'sw',year:110,session:1,num:40,categories:['sw_practice_family'],
   text:'關於兒童社會工作「以家庭為中心」（family-centered）實務取向的敘述，下列何者正確？',
   options:['A.以家庭為中心代表將兒童利益置於家庭利益之下','B.以家庭為中心取向將家庭視為服務的單位與夥伴','C.此取向認為家庭功能不佳時應立即移除兒童','D.此取向忽略了兒童個人的發展需求'],
   answer:'B',explanation:'「以家庭為中心」取向將整個家庭視為服務的對象與合作夥伴，強調家庭優勢、增強家庭功能，兒童最佳利益通常在原生家庭中實現，不主張立即移除兒童。'},

  // ===== 110年下 社會工作（40題）=====
  {id:'sw_110_2_01',subject:'sw',year:110,session:2,num:1,categories:['sw_history_intl'],
   text:'關於社會工作發展，下列敘述何者錯誤？',
   options:['A.慈善組織會社（COS）的工作人員是最早被稱為「社會工作者」的群體之一','B.Mary Richmond的《社會診斷》一書奠定個案工作的基礎','C.睦鄰運動（Settlement Movement）強調個人道德改造，是個案工作的起源','D.社會工作的發展與社會改革運動密切相關'],
   answer:'C',explanation:'睦鄰運動強調的是社會環境改革，而非個人道德改造（個人道德改造是COS的特徵）。睦鄰運動是社區工作的起源，而非個案工作。故C為錯誤。'},
  {id:'sw_110_2_02',subject:'sw',year:110,session:2,num:2,categories:['sw_ethics_code'],
   text:'社會工作師執業應接受繼續教育，並每6年提出完成繼續教育證明文件，辦理執業執照更新。其繼續教育積分合計應達多少點以上？',
   options:['A.120點','B.150點','C.180點','D.240點'],
   answer:'C',explanation:'依社會工作師法相關規定，社工師執業執照更新每6年需完成繼續教育，積分合計應達180點以上，方可辦理執業執照更新。'},
  {id:'sw_110_2_03',subject:'sw',year:110,session:2,num:3,categories:['sw_practice_family'],
   text:'關於綜融社會工作，下列敘述何者正確？',
   options:['A.綜融社工強調專精化的治療技術','B.綜融社工僅關注個人層面的問題','C.綜融社工整合知識、技術與價值，與不同規模的案主體系工作','D.綜融社工主要適用於機構場域，不適用於社區'],
   answer:'C',explanation:'綜融社會工作（generalist social work）整合社工知識、技術與價值，能與個人、家庭、團體、社區等不同規模的案主體系工作，強調廣度而非單一專精化治療技術。'},
  {id:'sw_110_2_04',subject:'sw',year:110,session:2,num:4,categories:['sw_ethics_value'],
   text:'在制度與文化的態度、行為中，將貧窮者污名化，並視富有者有較高的價值。前述屬於何種歧視類型？',
   options:['A.種族歧視（racism）','B.性別歧視（sexism）','C.年齡歧視（ageism）','D.階級歧視（classism）'],
   answer:'D',explanation:'依據社會階層地位（貧富）對人進行污名化或差別對待，視富有者有較高價值、貧窮者較低價值，這屬於階級歧視（classism）。'},
  {id:'sw_110_2_05',subject:'sw',year:110,session:2,num:5,categories:['sw_nature_role'],
   text:'下列何者不屬於Skidmore, R.和Thackeray, M.歸納之社會工作的功能？',
   options:['A.恢復功能（restorative function）','B.預防功能（preventive function）','C.監控功能（surveillance function）','D.發展功能（developmental function）'],
   answer:'C',explanation:'Skidmore & Thackeray歸納社工功能主要包含：恢復（restorative）、預防（preventive）、發展（developmental）等功能。「監控功能」並非其所歸納的社工主要功能，且與社工服務精神不符。'},
  {id:'sw_110_2_06',subject:'sw',year:110,session:2,num:6,categories:['sw_ethics_value'],
   text:'美國社會工作者協會（NASW）於1999年指出當代社會工作價值的架構，其中，社會工作者最基本的目標在協助有需要者，且對於社會問題予以關注及採取行動。這是屬於那一項核心價值？',
   options:['A.社會正義（social justice）','B.服務（service）','C.誠信（integrity）','D.能力（competence）'],
   answer:'B',explanation:'「協助有需要者，對社會問題予以關注及採取行動」正是NASW核心價值「服務（service）」的倫理原則，強調社工最基本的目標是服務他人、貢獻社會。'},
  {id:'sw_110_2_07',subject:'sw',year:110,session:2,num:7,categories:['sw_nature_professional'],
   text:'有關綜融式（generalist）社會工作實務取向之敘述，下列何者正確？①從社會環境脈絡中了解人的行為 ②整合社會工作實務、社會政策與社會工作研究 ③專精化治療技術 ④以案主介入為焦點 ⑤與案主及其環境體系工作',
   options:['A.①②③','B.①②⑤','C.②③④','D.③④⑤'],
   answer:'B',explanation:'綜融式社工的特點：①從社會環境脈絡理解人的行為、②整合實務、政策與研究、⑤與案主及其環境體系工作。「專精化治療技術」（③）是專科社工（specialist）的特徵，非綜融式；「以案主介入為焦點」（④）也過於狹隘，故選B。'},
  {id:'sw_110_2_08',subject:'sw',year:110,session:2,num:8,categories:['sw_practice_medical'],
   text:'下列何者不是社會團體工作的主要任務？',
   options:['A.協助成員增進社會功能','B.提供成員情緒支持','C.診斷成員的精神疾病','D.促進成員的個人成長'],
   answer:'C',explanation:'社會團體工作的主要任務包含：增進社會功能、提供情緒支持、促進個人成長、發展社會技巧等。「診斷精神疾病」屬醫療行為，是精神科醫師的職責，非社會團體工作的主要任務。'},
  {id:'sw_110_2_09',subject:'sw',year:110,session:2,num:9,categories:['sw_practice_medical'],
   text:'關於護理之家（Nursing Home）的社會工作者主要角色，下列敘述何者錯誤？',
   options:['A.協助住民及家屬適應機構生活','B.連結住民所需的各類社會資源','C.負責住民的醫療照護決策','D.協助住民維持與家屬的聯繫'],
   answer:'C',explanation:'護理之家社工的角色包含：協助住民及家屬適應機構生活、連結社會資源、維持家屬聯繫等。「負責醫療照護決策」屬醫療團隊（醫師、護理師）的職責，非社工的主要角色，故C錯誤。'},
  {id:'sw_110_2_10',subject:'sw',year:110,session:2,num:10,categories:['sw_practice_medical'],
   text:'85歲的某先生因肺癌且出現肺積水而急性住院。家屬對於安寧病房和社區安寧療護的服務選擇意見不一，處遇計畫呈現難以取捨的狀態。下列何者不是社會工作者在此階段應優先扮演的主要角色？',
   options:['A.協調者（coordinator）：協助家屬溝通並整合各方意見','B.資源連結者（broker）：提供安寧療護相關資源資訊','C.治療者（therapist）：對家屬進行心理治療','D.調停者（mediator）：協助家屬達成共識'],
   answer:'C',explanation:'在家屬難以抉擇的情況下，社工應優先扮演協調者、資源連結者、調停者等角色協助家屬溝通與決策。「對家屬進行心理治療」屬心理師或精神科醫師的專業職責，非社工在此階段的優先角色。'},
  {id:'sw_110_2_11',subject:'sw',year:110,session:2,num:11,categories:['sw_nature_professional'],
   text:'「以關係為基礎」（relationship-based）的社會工作取向之敘述，下列何者錯誤？',
   options:['A.強調社工與案主之間的專業關係是介入的核心工具','B.重視案主的情感需求與主觀經驗','C.認為客觀、技術性的評估工具比關係更重要','D.受客體關係理論（object relations theory）的影響'],
   answer:'C',explanation:'「以關係為基礎」的社工取向強調專業關係是介入的核心工具，重視情感與主觀經驗。認為「客觀技術性評估工具比關係更重要」與此取向精神相違背，故C錯誤。'},
  {id:'sw_110_2_12',subject:'sw',year:110,session:2,num:12,categories:['sw_nature_role'],
   text:'關於心理暨社會學派之敘述，下列何者正確？①強調對案主問題的診斷，應建立在此時此刻的生活經驗 ②此派亦稱為「功能派」 ③關注的重點在改善人際關係和生活情境壓力 ④「人在情境中」為此派的中心概念',
   options:['A.①②','B.②③','C.③④','D.①④'],
   answer:'C',explanation:'心理暨社會學派（Psychosocial Approach）：①診斷應建立在過去與現在的生活經驗（非僅此時此刻），①錯誤；②此派又稱「診斷派」，非「功能派」，②錯誤；③關注改善人際關係和生活情境壓力，③正確；④「人在情境中」是此派中心概念，④正確。故選C。'},
  {id:'sw_110_2_13',subject:'sw',year:110,session:2,num:13,categories:['sw_practice_medical'],
   text:'關於「病人自主權利法」的敘述，下列何者正確？①具完全行為能力之人，得為預立醫療決定，然不得隨時以書面撤回或變更之 ②當意願人為預立醫療決定時，應參與醫療機構提供之預立醫療照護諮商 ③病人自主權立法的目的是為了尊重病人醫療自主、保障其善終權益，促進醫病關係和諧 ④意願人指定之醫療委任代理人應以20歲以上具完全行為能力之人為限',
   options:['A.①②','B.②③','C.②③④','D.①②③④'],
   answer:'C',explanation:'①錯誤：意願人可隨時以書面撤回或變更預立醫療決定。②③④均正確：預立醫療決定需參與諮商（②）；立法目的在於尊重自主與善終（③）；委任代理人需20歲以上具完全行為能力（④）。故選C。'},
  {id:'sw_110_2_14',subject:'sw',year:110,session:2,num:14,categories:['sw_theory_problem'],
   text:'關於危機處遇的基本假定，下列敘述何者正確？',
   options:['A.危機是一種永久性的失功能狀態','B.危機期間，當事人的心理防衛機制最強','C.危機同時蘊含危險與轉機，也是改變的契機','D.危機處遇應由精神科醫師主導，社工僅負責資源連結'],
   answer:'C',explanation:'危機處遇的基本假定：危機是暫時性的失衡狀態（非永久）；危機期間心理防衛機制較脆弱，反而是介入的好時機；危機同時蘊含危險與轉機，是改變與成長的契機。故C正確。'},
  {id:'sw_110_2_15',subject:'sw',year:110,session:2,num:15,categories:['sw_theory_problem'],
   text:'問題解決模式針對案主有所謂的MCO評定（MCO assessment），其中的M所指的是下列何者？',
   options:['A.動機（motivation）','B.方法（method）','C.機構（machine）','D.管理（management）'],
   answer:'A',explanation:'Helen Harris Perlman的問題解決模式MCO評定中：M代表動機（Motivation）——案主改變的動機與意願；C代表能力（Capacity）——案主解決問題的能力；O代表機會（Opportunity）——環境中可利用的機會與資源。'},
  {id:'sw_110_2_16',subject:'sw',year:110,session:2,num:16,categories:['sw_ethics_dilemma'],
   text:'對於社會工作理論的敘述，下列何者正確？①一般系統理論的干預目標之一是進行系統內的改革為優先 ②生態系統觀點的干預目標之一是增進個人運用環境資源的能力 ③社會支持網絡處遇的干預目標是增進兩性平等 ④任務中心取向的干預目標之一是確立標的問題是個案能處理的，且是明確可列出順序',
   options:['A.①②','B.②④','C.①③','D.③④'],
   answer:'B',explanation:'②生態系統觀點干預目標之一是增進個人運用環境資源的能力，正確；④任務中心取向強調確立可處理的標的問題並排列優先順序，正確。①一般系統理論干預重點是促進系統間的溝通與整合，非僅「系統內改革優先」；③社會支持網絡處遇目標是增強社會支持，非增進兩性平等。故選B。'},
  {id:'sw_110_2_17',subject:'sw',year:110,session:2,num:17,categories:['sw_practice_medical'],
   text:'Solomon（1976）主張造成受壓迫者或團體無力感的來源，下列何者錯誤？',
   options:['A.負向的自我評價（negative self-concept）','B.直接的權力阻礙（direct power blocks）','C.個人的先天能力不足（innate lack of ability）','D.間接的權力阻礙（indirect power blocks）'],
   answer:'C',explanation:'Solomon（1976）認為無力感來自：負向的自我評價（內化的壓迫）、直接的權力阻礙（外在歧視）、間接的權力阻礙（制度性障礙）。「先天能力不足」是醫療/缺陷模式的觀點，Solomon的增權理論強調無力感是社會建構的，非先天能力問題。'},
  {id:'sw_110_2_18',subject:'sw',year:110,session:2,num:18,categories:['sw_theory_feminist'],
   text:'不同派別的女性主義對於女性處於弱勢的根源解釋不同，其行動方向也不同。下列敘述何者錯誤？',
   options:['A.自由主義女性主義主張透過立法與政策改革爭取兩性平等','B.激進女性主義認為父權制度是所有壓迫的根源，需從根本上消除','C.社會主義女性主義認為性別歧視是資本主義的副產品，消除資本主義即可解決','D.黑人女性主義（Black feminism）強調種族、性別與階級的交叉壓迫'],
   answer:'C',explanation:'社會主義女性主義認為階級壓迫與性別壓迫「相互交織」，並非簡單認為「消除資本主義即可解決性別問題」，兩者需同時對抗。將其簡化為「消除資本主義即可」是錯誤的，故C錯誤。'},
  {id:'sw_110_2_19',subject:'sw',year:110,session:2,num:19,categories:['sw_practice_family'],
   text:'有關家庭復原力（family resilience）的敘述，下列何者正確？',
   options:['A.家庭復原力是指家庭成員個人心理強韌度的總和','B.家庭復原力強調家庭在逆境中恢復與成長的能力','C.只有功能健全的家庭才具有復原力','D.家庭復原力與外部支持資源無關'],
   answer:'B',explanation:'家庭復原力（Walsh提出）是指家庭系統在面對逆境、壓力或創傷時，能夠恢復功能、適應並成長的整體能力。它是家庭系統的特性，非個人能力的總和；任何家庭都可以發展復原力；外部支持資源也是重要因素。'},
  {id:'sw_110_2_20',subject:'sw',year:110,session:2,num:20,categories:['sw_ethics_value'],
   text:'下列何者不是Galper（1975）所提出基進派（radical approach）社會工作倫理準則之內涵？',
   options:['A.以服務受壓迫群體為優先','B.質疑並挑戰現有的社會制度','C.維持現有社會秩序以確保案主穩定','D.促進社會結構的根本改變'],
   answer:'C',explanation:'Galper（1975）基進派社工倫理準則強調：服務受壓迫群體、質疑現有制度、促進根本性的社會改變。「維持現有社會秩序」與基進派精神相悖，基進派正是要挑戰與改變現有秩序，故C不屬其倫理準則。'},
  {id:'sw_110_2_21',subject:'sw',year:110,session:2,num:21,categories:['sw_ethics_dilemma'],
   text:'下列那一項不是McLeod和Meyer所提及社會工作價值衝突的類型？',
   options:['A.社工的個人價值vs.社工專業價值','B.案主的價值vs.社工的價值','C.機構的價值vs.社工的價值','D.政府的政策vs.國際社工準則'],
   answer:'D',explanation:'McLeod和Meyer提出社工面臨的價值衝突類型包含：①社工個人價值vs.專業價值、②案主價值vs.社工價值、③機構價值vs.社工價值、④社會整體價值vs.案主價值。「政府政策vs.國際社工準則」並非其所提及的主要衝突類型，故D為答案。'},
  {id:'sw_110_2_22',subject:'sw',year:110,session:2,num:22,categories:['sw_practice_other'],
   text:'下列何者不是Sarah Banks對倫理守則的批評？',
   options:['A.倫理守則可能過於僵化，無法應對複雜的倫理兩難','B.倫理守則有助於規範專業行為，保護案主','C.倫理守則可能被用來保護專業者而非案主','D.倫理守則難以反映社工實踐中的多元文化脈絡'],
   answer:'B',explanation:'Banks對倫理守則的批評包含：過於僵化（A）、可能保護專業者而非案主（C）、難以反映多元文化脈絡（D）等。B（倫理守則有助規範行為、保護案主）是正面評價，非批評，故B不是Banks的批評。'},
  {id:'sw_110_2_23',subject:'sw',year:110,session:2,num:23,categories:['sw_ethics_code'],
   text:'正在攻讀研究所的社會工作者，邀請自己所服務的成年案主參與他的研究，且告知案主參與研究不會影響其接受服務的權利。此舉可能引發下列何種社會工作倫理之討論？',
   options:['A.保密原則的違反','B.雙重關係（dual relationship）的問題','C.強制服務（mandatory service）的倫理','D.告知後同意（informed consent）不足的問題'],
   answer:'B',explanation:'社工同時擔任案主的服務者與研究者，形成雙重關係（dual relationship）。即使社工告知「不影響服務」，案主仍可能感受到隱性壓力而難以自由拒絕，此即雙重關係引發的倫理問題。'},
  {id:'sw_110_2_24',subject:'sw',year:110,session:2,num:24,categories:['sw_ethics_code'],
   text:'下列何者不符合社會工作倫理守則規範？',
   options:['A.社工應維護案主的隱私與保密','B.社工應尊重案主的自我決定權','C.社工應將機構利益置於案主利益之上','D.社工應誠實面對自己的能力限制'],
   answer:'C',explanation:'社工倫理守則強調案主的最佳利益應優先於機構利益。當機構政策與案主利益衝突時，社工有責任倡導案主利益，必要時向上反映。「將機構利益置於案主利益之上」違背社工倫理，故C不符合。'},
  {id:'sw_110_2_25',subject:'sw',year:110,session:2,num:25,categories:['sw_ethics_value'],
   text:'對於無力自我保護的案主群，在未盤點是否有足夠的資源與人力前，就期待有社會支持網絡，可以在危機時提供及時協助，這樣的期待只是「許願清單」。此為下列何種倫理的觀點？',
   options:['A.效益主義倫理觀','B.義務論倫理觀','C.美德倫理觀','D.批判倫理觀'],
   answer:'A',explanation:'效益主義（utilitarianism）強調評估實際效益，關注行動的結果與資源的現實條件。「在未確認資源是否足夠前，期待社會支持網絡能及時協助，只是許願清單」，這反映了效益主義對於實際可行性與資源現實的重視，而非單純的道德義務。'},
  {id:'sw_110_2_26',subject:'sw',year:110,session:2,num:26,categories:['sw_ethics_code'],
   text:'下列那個行為是專業關係中的界線侵犯（boundary violation）？',
   options:['A.社工在案主悲傷時給予短暫的擁抱以表達支持','B.社工在結案後很長時間與前案主發展性關係','C.社工在家庭訪視時接受案主準備的一杯茶','D.社工在危機情境下提供個人電話號碼以備緊急聯繫'],
   answer:'B',explanation:'界線侵犯（boundary violation）是指跨越界線後對案主造成傷害的行為。社工與前案主發展性關係，即使在結案後很長時間，仍屬嚴重的界線侵犯，因為專業關係的權力動態可能持續影響當事人。'},
  {id:'sw_110_2_27',subject:'sw',year:110,session:2,num:27,categories:['sw_ethics_code'],
   text:'下列何者不屬於服務對象自我決定之範圍？',
   options:['A.案主有權選擇是否接受社工的服務','B.案主有權決定自己的生活方式','C.案主有權做出可能傷害他人的決定','D.案主有權了解自己可以選擇的服務選項'],
   answer:'C',explanation:'自我決定（self-determination）是社工的核心價值，但並非無限制。當案主的決定可能傷害他人時，自我決定的範圍受到限制。「有權做出傷害他人的決定」超出自我決定的合理範圍，故C不屬於自我決定的範疇。'},
  {id:'sw_110_2_28',subject:'sw',year:110,session:2,num:28,categories:['sw_practice_disability'],
   text:'將低收獨居者、重度身心障礙者的補助款轉入社會工作者自己的個人帳戶，是屬於下列何種業務過失？',
   options:['A.疏失（misfeasance）','B.失職（nonfeasance）','C.不當行為（malfeasance）','D.管理失當（mismanagement）'],
   answer:'C',explanation:'主動挪用案主補助款至個人帳戶，是主動從事的不適當、有害行為，屬於不當行為（malfeasance）。與110年上第24題類似，挪用案主財物均屬malfeasance。'},
  {id:'sw_110_2_29',subject:'sw',year:110,session:2,num:29,categories:['sw_nature_role'],
   text:'社會工作者針對社會不正義和剝削現象，與社區內的弱勢群體一起工作以改變社區的權力結構和資源運用。前述社會工作者的主要角色是：',
   options:['A.倡導者（advocate）','B.使能者（enabler）','C.行動者/社會行動者（activist）','D.調停者（mediator）'],
   answer:'C',explanation:'與社區弱勢群體合作以改變社區權力結構和資源分配，這是「社會行動者（activist）」的角色，強調集體行動與結構性改變，而非個別倡導（advocate為個案層次的爭取）。'},
  {id:'sw_110_2_30',subject:'sw',year:110,session:2,num:30,categories:['sw_ethics_value'],
   text:'關於效益主義（Utilitarianism）的敘述，下列何者正確？',
   options:['A.效益主義以行為的動機而非後果來判斷行為的道德性','B.效益主義強調行為的結果，以最大多數人的最大幸福為原則','C.效益主義重視每個個體的固有尊嚴，不能為了多數而犧牲少數','D.效益主義是義務論（deontology）的一個分支'],
   answer:'B',explanation:'效益主義（彌爾、邊沁）的核心：以行為的後果而非動機來判斷道德性（A錯）；追求最大多數人的最大幸福（B正確）；可能為多數利益犧牲少數（C錯）；效益主義與義務論是不同的倫理學傳統（D錯）。'},
  {id:'sw_110_2_31',subject:'sw',year:110,session:2,num:31,categories:['sw_practice_medical'],
   text:'「以家庭為中心，以社區為基礎」為社會安全網的規劃主軸。關於社會安全網服務，下列何者正確？①整合社政單位建構的網絡 ②以家庭為中心是放棄以兒童為中心思考的服務 ③及早介入因生活事件導致個人或家庭危機升高的脆弱家庭 ④運用個案管理工作方法',
   options:['A.①②③','B.①③④','C.②③④','D.①②④'],
   answer:'B',explanation:'社會安全網強調：①整合社政網絡、③及早介入脆弱家庭、④個案管理方法均正確。②「以家庭為中心」並非放棄以兒童為中心，兩者並不衝突，家庭中心是手段，兒童福祉仍是核心目標，故②錯誤。選B。'},
  {id:'sw_110_2_32',subject:'sw',year:110,session:2,num:32,categories:['sw_practice_family'],
   text:'評估家庭系統的核心元素為何？①家庭系統具非等加性 ②改變任一位家庭成員，就能影響所有家庭成員 ③家庭有自己發展的軌跡脈絡，不易受社會環境影響 ④辨認與找出家庭內部溝通的重覆模式 ⑤有功能的家庭系統是維持穩定不變',
   options:['A.①②③','B.①②④','C.②③⑤','D.③④⑤'],
   answer:'B',explanation:'家庭系統的核心概念：①非等加性（整體大於部分總和）正確；②牽一髮動全身，改變一人影響全體，正確；③家庭受社會環境影響深遠（如生態系統理論），③錯誤；④辨認溝通重複模式是評估核心，正確；⑤有功能的家庭應能動態調適，非一成不變，⑤錯誤。選B。'},
  {id:'sw_110_2_33',subject:'sw',year:110,session:2,num:33,categories:['sw_practice_women'],
   text:'下列何者為2004年所訂定之婦女政策綱領的基本原則？①兩性共治共決的政策參與 ②提升婦女勞動參與率、建立女性經濟自主的勞動政策 ③降低婦女照顧負擔、協助婦女自立的福利政策 ④落實具性別平等意識、尊重多元文化之教育政策 ⑤建構健康優先、具女性意識醫學倫理的健康政策 ⑥兩性平等參與，萬物平等共生的整體性',
   options:['A.①②③④⑤','B.①②③⑤⑥','C.①②④⑤⑥','D.②③④⑤⑥'],
   answer:'A',explanation:'2004年婦女政策綱領六大基本原則包含政策參與（①）、勞動政策（②）、福利政策（③）、教育政策（④）、健康政策（⑤）等。「萬物平等共生」（⑥）較屬生態主義論述，非2004年婦女政策綱領的基本原則，故選A（①②③④⑤）。'},
  {id:'sw_110_2_34',subject:'sw',year:110,session:2,num:34,categories:['sw_practice_school'],
   text:'透過學校系統培養青少年復原力的敘述，下列何者錯誤？',
   options:['A.建立關懷與支持的師生關係有助於復原力發展','B.提供高期望並給予相應支持，促進青少年正向發展','C.復原力的培養主要取決於個人特質，學校環境影響有限','D.增強青少年的問題解決能力與社會技巧有助於復原力'],
   answer:'C',explanation:'復原力（resilience）的研究顯示，環境因素（如學校支持、師生關係、社區資源）對復原力的發展具有重要影響，並非主要取決於個人特質。學校是培養青少年復原力的重要系統，故C錯誤。'},
  {id:'sw_110_2_35',subject:'sw',year:110,session:2,num:35,categories:['sw_practice_medical'],
   text:'聯合國身心障礙者權利公約（CRPD）主要強調對於身心障礙者何種權利的保障？',
   options:['A.醫療復健的優先保障','B.機構安置的生活品質保障','C.以人權為基礎的完全參與與融合','D.職業訓練與就業的優先安排'],
   answer:'C',explanation:'CRPD（2006年通過）以人權模式為基礎，強調身心障礙者的自主、尊嚴、完全參與社會，以及融合（inclusion）的理念，反對隔離與歧視。重點在於人權保障，而非單純醫療復健或機構照顧。'},
  {id:'sw_110_2_36',subject:'sw',year:110,session:2,num:36,categories:['sw_practice_work'],
   text:'下列何者非為外籍移工建立友善職場環境的主要做法？',
   options:['A.提供語言翻譯與文化橋接服務','B.建立申訴管道保障移工權益','C.限制移工與本國勞工的互動以避免衝突','D.提供職場安全與健康知識的教育訓練'],
   answer:'C',explanation:'建立友善職場環境應促進文化融合與相互理解，而非限制移工與本國勞工互動。限制互動反而可能加深隔閡與歧視，違背多元文化社工的精神，故C非友善職場的做法。'},
  {id:'sw_110_2_37',subject:'sw',year:110,session:2,num:37,categories:['sw_practice_medical'],
   text:'下列何者不是生活模式（life model）的核心概念？',
   options:['A.生活壓力源（life stressors）','B.適應性挑戰（adaptive challenges）','C.個案的心理病理診斷（psychopathological diagnosis）','D.人與環境的適配性（goodness of fit）'],
   answer:'C',explanation:'生活模式（Germain & Gitterman）是生態系統理論的實務應用，核心概念包含：生活壓力源、適應性挑戰、人與環境的適配性等。「心理病理診斷」屬醫療模式概念，與生活模式強調人與環境互動的精神不符，故C不是生活模式的核心概念。'},
  {id:'sw_110_2_38',subject:'sw',year:110,session:2,num:38,categories:['sw_practice_medical'],
   text:'Howe將社會工作型態由4種變成16種，有關「精神醫療社工在介入過程中，儘量去聆聽及理解案主在精神病症狀、診斷和標籤精神疾病、治療和住院過程的主觀觀點」是屬於下列那一種介入模式？',
   options:['A.客觀主義－秩序取向','B.客觀主義－衝突取向','C.主觀主義－秩序取向','D.主觀主義－衝突取向'],
   answer:'C',explanation:'重視案主的主觀經驗與詮釋（主觀主義），目標在於理解案主並協助其在現有環境中調適（秩序取向，非結構性改變），屬於「主觀主義－秩序取向」的介入模式，對應Howe的現象學／詮釋學取向。'},
  {id:'sw_110_2_39',subject:'sw',year:110,session:2,num:39,categories:['sw_theory_eco'],
   text:'關於「優勢觀點（strengths perspective）」的敘述，下列何者正確？',
   options:['A.優勢觀點認為問題與診斷是協助案主的起點','B.優勢觀點強調挖掘案主本身的能力、資源與潛能','C.優勢觀點僅適用於輕度問題的案主，不適用於嚴重精神疾患','D.優勢觀點主張社工應為案主設定改變目標'],
   answer:'B',explanation:'優勢觀點（Saleebey）強調：以案主的能力、資源、潛能為起點而非問題與診斷（A錯）；挖掘優勢（B正確）；適用於各類案主包括精神疾患（C錯）；目標應由案主自己設定（D錯）。'},
  {id:'sw_110_2_40',subject:'sw',year:110,session:2,num:40,categories:['sw_practice_elderly'],
   text:'關於「老人保護服務」的敘述，下列何者正確？',
   options:['A.老人保護服務僅處理身體虐待，不含財務剝削','B.老人自我疏忽（self-neglect）不屬於老人保護服務的範疇','C.老人保護服務應優先考量老人的安全，必要時可不顧其意願強制介入','D.老人保護工作強調以機構安置作為首要保護手段'],
   answer:'C',explanation:'老人保護服務在老人安全受到嚴重威脅時，必要情況下可基於保護原則（父權主義）強制介入，即使老人不願意。老人保護範疇包含財務剝削與自我疏忽；機構安置非首要手段，在地保護為優先。'},

  // ===== 111年上 社會工作（40題）=====
  {id:'sw_111_1_01',subject:'sw',year:111,session:1,num:1,categories:['sw_ethics_code'],text:'現行的社會工作倫理守則，由那一個機關或團體所訂定？',options:['A.立法院','B.臺灣社會工作專業人員協會','C.台灣社會工作教育學會','D.中華民國社會工作師公會聯合會'],answer:'D',explanation:'依社會工作師法第17條規定，倫理守則由全國社會工作師公會聯合會訂定，提請會員（會員代表）大會通過後，報請中央主管機關備查。'},
  {id:'sw_111_1_02',subject:'sw',year:111,session:1,num:2,categories:['sw_history_meaning'],text:'有關社會工作專業化的整體發展趨勢，下列敘述何者錯誤？',options:['A.從消極的救濟工作發展到積極的福利措施','B.從傳統個案工作為主發展到整體、綜合性的福利行政、立法與制度','C.從講究方案成本效益的評估分析到低估成本不計代價的工作','D.從事後的補救、治療發展到事先的預防'],answer:'C',explanation:'C選項明顯錯誤。社會工作專業化趨勢是更加重視成本效益評估，而非低估成本不計代價。'},
  {id:'sw_111_1_03',subject:'sw',year:111,session:1,num:3,categories:['sw_ethics_value'],text:'有關社會工作專業價值之敘述，下列何者錯誤？',options:['A.人擁有各種的潛能','B.人有實踐潛能的義務','C.人對社會僅有法定義務','D.社會有責任以社會正義之方式促使個人的自我完成'],answer:'C',explanation:'C選項中「僅有」一詞過於絕對，錯誤。人對社會不只有法定義務，也有道德、公民等多種責任與連帶關係，社工價值觀強調人與社會的相互責任。'},
  {id:'sw_111_1_04',subject:'sw',year:111,session:1,num:4,categories:['sw_practice_women'],text:'社會中的某些團體可能受到偏見，被認為次等或是不正常，因而受到剝削或不公平對待。其中，對於低經濟階級存有偏見的意識形態，屬於下列何者？',options:['A.種族主義','B.菁英主義','C.性別主義','D.年齡主義'],answer:'B',explanation:'菁英主義（elitism）是對特定社會階層的崇拜，對低經濟階級存有偏見，認為社會資源應由菁英優先掌握。種族主義針對種族，性別主義針對性別，年齡主義針對年齡。'},
  {id:'sw_111_1_05',subject:'sw',year:111,session:1,num:5,categories:['sw_history_meaning'],text:'IFSW 2014 年社會工作全球定義，最後一段「……在國家或區域的層次上，上述定義可能會再擴大」是反應該協會對何種現實狀況的理解？',options:['A.社會工作重視科學與藝術','B.保留定義的彈性，以因應各地環境差異與變化','C.社會工作定義應清楚一致，以利各國社工專業對話','D.專業化的後進國家，應學習專業化相對較深的國家'],answer:'B',explanation:'IFSW 2014年定義強調定義可因國家或區域層次再擴大，正是保留定義彈性以因應各地差異的體現，而非追求定義清楚一致。'},
  {id:'sw_111_1_06',subject:'sw',year:111,session:1,num:6,categories:['sw_practice_school'],text:'為避免群聚，預防傳染病傳播，各級學校採用線上教學，但因每個學童家庭數位資源不同，下列那些做法可縮短家庭之間數位教育資源的差距？①友善網路教學介面 ②平價或免費網路 ③到宅線上設備安裝指導 ④配送營養午餐到宅 ⑤電子書替代紙本書籍',options:['A.②③','B.③④','C.①⑤','D.④⑤'],answer:'A',explanation:'縮短數位教育資源差距的關鍵在於改善網路近用性（②平價或免費網路）與設備使用能力（③到宅安裝指導）。④配送午餐與數位資源無關，⑤電子書可能反而加深差距。'},
  {id:'sw_111_1_07',subject:'sw',year:111,session:1,num:7,categories:['sw_ethics_value'],text:'社會工作對於人的基本信念，下列何者錯誤？',options:['A.社會工作相信物競天擇，要對自我負責','B.社會工作相信每個人都有異於別人的個別性','C.社會工作相信人是群居的，但也有獨特性','D.社會工作相信人與社會均要負起責任'],answer:'A',explanation:'社會工作的精神與物競天擇相反，社工強調協助弱勢、促進社會正義，而非放任自然淘汰。社工相信每個人都有固有尊嚴與價值，社會有責任協助成員。'},
  {id:'sw_111_1_08',subject:'sw',year:111,session:1,num:8,categories:['sw_nature_professional'],text:'社區工作中強調應將社區歸還給當地居民，讓他們選擇自己有興趣的項目，以自己熟悉的運作方式，參與社區事務的管理與決策，發揮屬於自己的社區特色，係指下列何種模式？',options:['A.社區治理','B.社區倡導','C.社區循證','D.社區基地'],answer:'A',explanation:'社區治理強調將社區事務的決策權還給居民，讓居民以自己熟悉的方式參與管理與決策，體現社區自主的精神。'},
  {id:'sw_111_1_09',subject:'sw',year:111,session:1,num:9,categories:['sw_nature_role'],text:'下列何者不是社會工作者在社區組織內的角色？',options:['A.促進者','B.教導者','C.領導者','D.催化者'],answer:'C',explanation:'社區工作強調培養居民能力、以居民為主人，社工扮演促進者、教導者、催化者等輔助角色。「領導者」代表主導社區，與社區工作讓居民自主的精神不符。'},
  {id:'sw_111_1_10',subject:'sw',year:111,session:1,num:10,categories:['sw_nature_role'],text:'Beckett 認為社會工作的角色可分為三大類：倡導者、直接改變代理者與執行者；其中，執行者的角色內涵包括那些？①諮商治療者 ②居間協調者 ③責任擔負者 ④控制代理者 ⑤直接倡導者',options:['A.①②⑤','B.②③⑤','C.①③④','D.②③④'],answer:'D',explanation:'Beckett的三類角色：倡導者（⑤直接倡導）、直接改變代理者（①諮商治療者）、執行者（②居間協調者、③責任擔負者、④控制代理者）。執行者利用外部資源作為改變手段，故選②③④。'},
  {id:'sw_111_1_11',subject:'sw',year:111,session:1,num:11,categories:['sw_ethics_value'],text:'由西普琳（Siporin）建構的專業社會工作實施模型中，其實施理論包含那兩項實施原則？',options:['A.結構性與技術性','B.結構性與倫理性','C.倫理性與功能性','D.倫理性與技術性'],answer:'D',explanation:'Siporin（1975）提出的實施模型，兩個基本元素為價值體系與知識體系，兩項實施原則為倫理性實施原則與技術性實施原則。'},
