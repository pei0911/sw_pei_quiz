  {id:'sw_111_1_12',subject:'sw',year:111,session:1,num:12,categories:['sw_theory_psychosocial'],text:'下列何者不是心理暨社會學派的問題處置策略？',options:['A.評量安全需求並提供保護性措施','B.對案主內在情緒經驗的治療','C.對案主個人問題的直接治療','D.經由減除環境壓力的治療'],answer:'A',explanation:'心理暨社會學派（診斷派）強調「人在情境中」，處置策略包含對內在心理（B、C）與外在社會環境（D）的介入。「評量安全需求並提供保護性措施」不屬於此學派的核心處置策略。'},
  {id:'sw_111_1_13',subject:'sw',year:111,session:1,num:13,categories:['sw_theory_feminist'],text:'下列何者屬於社會工作的微視觀點？',options:['A.系統理論','B.女性主義社會工作','C.充權觀點社會工作','D.認知行為理論'],answer:'D',explanation:'認知行為理論聚焦於個人的認知與行為改變，屬微視觀點。系統理論涵蓋微視至鉅視；女性主義與充權觀點均強調社會環境與結構層面，屬中介至鉅視觀點。'},
  {id:'sw_111_1_14',subject:'sw',year:111,session:1,num:14,categories:['sw_theory_problem'],text:'就危機干預模式來看，判斷是否構成個人「危機」的必要要素包括下列那些組合？①會引發重大社會變革的事件 ②個人缺乏有系統解決問題的能力 ③在短時間內個人一定要做選擇和設法取得平衡 ④超出個人固有因應機制可以應對的範圍',options:['A.①②③','B.②③④','C.①③④','D.①②④'],answer:'B',explanation:'危機的構成要素在於個人層面：事件超出固有因應機制（④）、缺乏系統性解決能力（②）、需在短時間取得平衡（③）。①「引發重大社會變革」屬社會層面，並非個人危機的必要要素。'},
  {id:'sw_111_1_15',subject:'sw',year:111,session:1,num:15,categories:['sw_theory_other'],text:'在戒治所成功戒除毒癮後重返社會生活者，常再度陷入毒品濫用、成癮與再度進入戒治所戒癮的循環。從壓力因應理論來看，成癮是與何種壓力因應型態有關？',options:['A.運用邏輯分析壓力事件的成因','B.藉由物質濫用逃避壓力','C.責怪他人造成生活壓力','D.主動尋求資源，以解決壓力'],answer:'B',explanation:'物質成癮通常是一種逃避型壓力因應方式，藉由物質濫用暫時逃脫壓力感受，但無法真正解決問題，因此形成循環。'},
  {id:'sw_111_1_16',subject:'sw',year:111,session:1,num:16,categories:['sw_practice_elderly'],text:'高齡化速度增加，各類型長期照顧機構仍有人力缺口。為彌補人力缺口，行政院以積極方式吸引照顧相關科系畢業生加入產業。以 Pincus 與 Minaham 社會工作實務四系統分析，下列敘述何者錯誤？',options:['A.案主系統（client system）為使用長期照顧服務長者','B.標的系統（target system）為照顧相關科系畢業生','C.行動系統（action system）主要為行政院所屬相關部會','D.改變代理者系統（change agent system）為機構業者、家屬與提供照顧者等'],answer:'C',explanation:'四系統中，行動系統是指為達成目標而合作的人，以本題而言合作對象應為大專院校等，而非行政院本身（行政院更接近改變代理者系統）。D選項對改變代理者系統的描述亦有爭議，但C最明顯錯誤。'},
  {id:'sw_111_1_17',subject:'sw',year:111,session:1,num:17,categories:['sw_theory_empower'],text:'有關齊默曼（Zimmerman）提出心理增權（Psychological Empowerment）的觀點中，下列敘述何者正確？',options:['A.心理增權需要促使服務使用者瞭解社區和相關社會政治議題','B.同一類別服務使用者，應有同一形式的服務策略','C.心理增權之三要素分別為前置、內在與互動','D.增權是一個容易概推性的概念'],answer:'A',explanation:'Zimmerman（1995）指出心理增權是服務使用者藉由學習、參與、合作，獲得控制自身事務的力量，包含瞭解社區與社會政治議題的能力。增權概念在不同群體、背景和時代有不同樣式，並非統一形式。'},
  {id:'sw_111_1_18',subject:'sw',year:111,session:1,num:18,categories:['sw_theory_feminist'],text:'女性主義理論派別中，以人生而自由平等出發、基於天賦人權概念、關注與重視法律的是下列何種主義？',options:['A.自由主義女性主義','B.社會主義女性主義','C.激/基進女性主義','D.後現代女性主義'],answer:'A',explanation:'自由主義女性主義強調男女生而自由平等，基於天賦人權，主張透過立法改革爭取平等權利。社會主義女性主義關注資本主義與性別壓迫；激進女性主義主張男女天生有差異；後現代女性主義重視多元性別與解構。'},
  {id:'sw_111_1_19',subject:'sw',year:111,session:1,num:19,categories:['sw_history_intl'],text:'優勢觀點的敘述，下列何者正確？①優勢觀點的發源地來自西歐的英國 ②優勢觀點與焦點解決有強烈的相關性 ③優勢觀點強調探索案主未來的可能性 ④優勢觀點強調個人不是問題',options:['A.①②③','B.①②④','C.②③④','D.①③④'],answer:'C',explanation:'①優勢觀點發展自美國堪薩斯大學，非西歐英國，故①錯誤。②優勢觀點強調解決問題勝過發現問題，與焦點解決相呼應，正確。③正確。④優勢觀點強調問題由人界定，相信案主潛能，正確。故選②③④。'},
  {id:'sw_111_1_20',subject:'sw',year:111,session:1,num:20,categories:['sw_practice_other'],text:'具備文化能力（cultural competence）的社會工作者所遵循的理論觀點，較不屬於下列何種觀點？',options:['A.生態理論','B.充權理論','C.優勢觀點','D.精神分析理論'],answer:'D',explanation:'精神分析理論帶有較強烈的主觀分析色彩，治療者的詮釋主導性強，較難反映多元文化敏感性。生態理論、充權理論、優勢觀點均強調人與環境脈絡、案主自主與潛能，較符合文化能力的精神。'},
  {id:'sw_111_1_21',subject:'sw',year:111,session:1,num:21,categories:['sw_ethics_value'],text:'下列何者為社會工作專業的核心價值？①服務 ②廉正 ③能力 ④效率',options:['A.①③④','B.②③④','C.①②④','D.①②③'],answer:'D',explanation:'NASW六大核心價值：服務①、社會正義、人的尊嚴與價值、人際關係的重要性、廉潔正直②、專業能力③。「效率④」並非核心價值之一。'},
  {id:'sw_111_1_22',subject:'sw',year:111,session:1,num:22,categories:['sw_ethics_dilemma'],text:'社會工作價值觀對服務工作的影響，可能包含下列那些層面？①社會工作者升遷的機會 ②社會工作者與案主的關係 ③社會工作者服務方法的運用 ④實務工作中倫理兩難的解決',options:['A.①②④','B.①②③','C.①③④','D.②③④'],answer:'D',explanation:'社工價值觀直接影響與案主的關係②、服務方法的選擇③、倫理兩難的解決④。升遷機會①屬組織行政事務，與價值觀無直接關聯，故不選。'},
  {id:'sw_111_1_23',subject:'sw',year:111,session:1,num:23,categories:['sw_ethics_value'],text:'有關社會工作倫理與價值的意義，下列何者錯誤？',options:['A.價值是一種被視為應該、值得、優於或更重要的觀念','B.倫理討論的是人們認為對的事物，包含守則、原則或行動準則','C.社會工作對人的價值觀，不包含每個人都有追求更美好生活的能力、慾望與動機','D.社會工作的倫理提供工作者行為規範、面對兩難情境、並建立起集體化的良心'],answer:'C',explanation:'社會工作相信每個人都有追求更美好生活的能力、慾望與動機，此為社工的基本人本信念，C的說法明顯錯誤。'},
  {id:'sw_111_1_24',subject:'sw',year:111,session:1,num:24,categories:['sw_ethics_code'],text:'Reamer 所提出的社會工作倫理抉擇六原則，下列敘述何者正確？',options:['A.個人基本幸福權優先於另一個人的自由權','B.個人的基本幸福權優先於他人的幸福權','C.在衝突時，法律、規則、規定和自願組織的安排優先於個人自我決定權','D.保護個人財產優先於防止如飢餓等基本權益的傷害，以及推行公共善的義務'],answer:'A',explanation:'Reamer倫理抉擇原則中，個人基本幸福權（如生命安全）優先於另一個人的自由權。個人自我決定權優先於法律規則（C錯）；基本需求（防止飢餓）優先於財產保護（D錯）。'},
  {id:'sw_111_1_25',subject:'sw',year:111,session:1,num:25,categories:['sw_practice_youth'],text:'某社會工作者在服務弱勢兒少時，兒少主動告知其父親使用非法藥物，並要求保密。下列何者不屬於該社會工作者面對的倫理困境？',options:['A.義務與期望的衝突','B.保密或隱私權','C.有限物資資源的分配','D.案主自決或專業父權'],answer:'C',explanation:'此情境涉及通報義務vs.兒少要求保密（A）、保密原則（B）、尊重兒少意願vs.社工專業判斷（D）。「有限物資資源的分配」與本案情境完全無關，故C不屬於此倫理困境。'},
  {id:'sw_111_1_26',subject:'sw',year:111,session:1,num:26,categories:['sw_ethics_code'],text:'當社會工作者認為依照規則與程序行事，會讓自己較不致產生業務過失，且盡責完成對機構的義務，而非做自己認為道德正確的事。此種實務工作者係屬下列何種類型？',options:['A.反思型','B.責任型','C.反身型','D.防禦型'],answer:'D',explanation:'防禦型實務工作者以「依法行政」保護自己，注重規則程序以避免業務過失，而非以案主最佳利益為優先考量。此為防禦型的核心特徵。'},
  {id:'sw_111_1_27',subject:'sw',year:111,session:1,num:27,categories:['sw_ethics_code'],text:'社會工作師法第 20 條規定：社會工作師依據相關法令及專業倫理守則執行業務，當涉及訴訟時，下列敘述何者正確？',options:['A.警察機關得提供必要之安全協助','B.所屬團體、事務所得提供必要之法律協助','C.中央主管機關得提供必要之法律協助','D.所屬機關（構）得提供必要之經濟協助'],answer:'B',explanation:'依社會工作師法第20條，社會工作師執行業務涉及訴訟時，所屬團體、事務所得提供必要之法律協助。此規定是為保障社工在高爭議性服務場域中的法律保障。'},
  {id:'sw_111_1_28',subject:'sw',year:111,session:1,num:28,categories:['sw_practice_medical'],text:'社會工作者陪同出庭必須有法源依據，下列何者並未有專業人員出庭的相關條文規定？',options:['A.家庭暴力防治法','B.性侵害犯罪防治法','C.精神衛生法','D.家事事件法'],answer:'C',explanation:'家庭暴力防治法（A）、性侵害犯罪防治法（B）、家事事件法（D）均有社工或專業人員陪同出庭的相關規定，以保護弱勢當事人。精神衛生法無此規定。'},
  {id:'sw_111_1_29',subject:'sw',year:111,session:1,num:29,categories:['sw_ethics_code'],text:'有關雙重關係的敘述，下列何者正確？',options:['A.社會工作者與案主有雙重關係就是不符合專業倫理','B.界線跨越是指社會工作者對案主利益形成嚴重損害','C.界線侵犯是指與案主產生另一種關係，但不一定有利益損害','D.雙重關係是指社會工作者與案主有一種以上的關係'],answer:'D',explanation:'雙重關係指社工與案主存在一種以上的關係（D正確）。界線侵犯才是指對案主利益形成嚴重損害（B錯）；界線跨越不一定有害（C錯）；雙重關係在某些場域（如小型社區）並非絕對不符合倫理（A錯）。'},
  {id:'sw_111_1_30',subject:'sw',year:111,session:1,num:30,categories:['sw_ethics_value'],text:'有關 Reamer 的倫理決策模式之順序，應為下列何者？①釐清倫理議題 ②指出利害相關人 ③找出可能的行動與參與者 ④檢視贊成與反對行動之理由 ⑤徵詢同儕及專家意見',options:['A.①②③④⑤','B.⑤①②③④','C.①⑤②③④','D.⑤②①③④'],answer:'A',explanation:'Reamer倫理決策模式的邏輯順序：先釐清問題（①）→確認誰受影響（②）→找出行動方案（③）→分析利弊（④）→徵詢意見（⑤）。依此邏輯，①②③④⑤為正確順序。'},
  {id:'sw_111_1_31',subject:'sw',year:111,session:1,num:31,categories:['sw_practice_other'],text:'有關我國成年監護宣告事件，下列敘述何者正確？①社福機構依法可擔任監護人 ②縣市政府社會局依法可擔任監護人 ③監護宣告事件之聲請人絕大多數是社福機構 ④監護宣告事件之監護人絕大多數是社福機構',options:['A.①②','B.③④','C.①③','D.②④'],answer:'A',explanation:'依民法規定，法人（含社福機構）及政府機關均可依法擔任監護人（①②正確）。實務上監護宣告的聲請人與監護人絕大多數仍為家屬，並非社福機構（③④錯誤）。'},
  {id:'sw_111_1_32',subject:'sw',year:111,session:1,num:32,categories:['sw_practice_other'],text:'多元文化能力是社會工作者基本素養。就文化能力光譜（Goode & Harrison, 2004）評估而論，下列敘述何者錯誤？',options:['A.因為原住民與新住民均為少數族群，可以合併舉辦活動的認知，是屬文化盲（cultural blindness）','B.設置服務中心時，徵詢居民與部落耆老對空間規劃意見，是基本文化能力（basic cultural competence）','C.不能接受新住民需要維繫婚姻關係之資源，是屬文化無能（cultural incapacity）','D.機構有定少數族群員工比例，與少數族群 NGO 共同規劃社區活動，是文化初始能力（cultural pre-competence）'],answer:'D',explanation:'文化能力光譜：文化初始能力是「開始尊重其他文化並開始行動」的階段；而機構訂定員工比例、與少數族群NGO共同規劃活動，已屬積極實踐，應為第五階段「具備文化能力（cultural competence）」，而非初始能力。'},
  {id:'sw_111_1_33',subject:'sw',year:111,session:1,num:33,categories:['sw_practice_family'],text:'下列何者不屬於家庭生態處遇內容？',options:['A.重新框架成員對家庭問題的認知定義','B.培養和提升家庭內部和外部支持系統','C.增進各種組織對家庭需求的回應程度','D.改善不良制度環境對家庭帶來的壓力'],answer:'A',explanation:'重新框架（reframing）是認知行為學派的技術，非生態觀點的處遇核心。家庭生態處遇強調支持系統（B）、外部組織回應（C）、改善制度環境（D）等人與環境互動面向。'},
  {id:'sw_111_1_34',subject:'sw',year:111,session:1,num:34,categories:['sw_history_meaning'],text:'我國最早成立的康復之友協會為何？',options:['A.臺北市康復之友協會','B.臺中市康復之友協會','C.彰化縣康復之友協會','D.高雄市康復之友協會'],answer:'D',explanation:'高雄市康復之友協會為我國最早成立的康復之友協會。'},
  {id:'sw_111_1_35',subject:'sw',year:111,session:1,num:35,categories:['sw_practice_medical'],text:'我國「病人自主權利法」，下列敘述何者正確？',options:['A.係範定與安樂死及協助自殺有關的法規，與歐美國家潮流相符','B.為亞洲第一部完整地保障病人自主權利的專法，為保障末期病人家屬為核心的醫療決定','C.適用對象僅包括末期病人，不包含植物人或重度失智者等','D.緩和醫療是指為減輕或免除病人之生理、心理及靈性痛苦，施予緩解性、支持性之醫療照護'],answer:'D',explanation:'緩和醫療的定義正確（D）。台灣尚未通過安樂死相關法規（A錯）；病人自主權利法以病人本身的意願為核心，非家屬（B錯）；適用對象包含植物人及重度失智者（C錯）。'},
  {id:'sw_111_1_36',subject:'sw',year:111,session:1,num:36,categories:['sw_practice_family'],text:'對於臺灣推動性別權益之重要事件，下列何者不是民國 100 年之後的作為？',options:['A.於行政院成立性別平等處','B.制定司法院釋字第 748 號解釋施行法','C.大法官宣告刑法第 239 條通姦罪違憲','D.通過婦女政策綱領，作為擬定婦女相關政策之最高指導原則'],answer:'D',explanation:'行政院性別平等處於101年成立（A）；釋字748號施行法即同性婚姻專法於108年立法（B）；通姦罪於109年宣告違憲（C）；婦女政策綱領於民國93年通過（D），是最早的，故D不是民國100年之後的作為。'},
  {id:'sw_111_1_37',subject:'sw',year:111,session:1,num:37,categories:['sw_practice_school'],text:'單親母親罹患憂鬱症，讀國中的姊姊被要求請假在家照顧年紀小的弟妹與年邁的外婆，成為家中的實際照顧者。欲改善姊姊剝奪（deprivation）與排除（exclusion）的生活經驗，下列何做法相對效益不大？',options:['A.提供姊姊課業輔導與才藝班學費','B.協助案弟妹申請公托或課後照顧','C.引進長期照顧提供外婆身體照顧與陪診','D.心理衛生單位協助母親就醫'],answer:'A',explanation:'姊姊的核心問題是被迫擔任家庭照顧者而無法正常就學。提供課業輔導與才藝班費用（A）無法解決其被迫請假的根本原因，效益相對不大。協助弟妹托育（B）、外婆長照（C）、母親就醫（D）都能減輕姊姊的照顧負擔，讓她能回歸學校生活。'},
  {id:'sw_111_1_38',subject:'sw',year:111,session:1,num:38,categories:['sw_practice_disability'],text:'提供身心障礙者協助時，下列那個選項無法彰顯「身心障礙者權利公約」（CRPD）之精神？',options:['A.課後配置手語翻譯給聽障學生','B.導盲犬可進入教室陪視障學生','C.肢障學生轉換教室時，提供輪椅推送','D.考試空間與時間與修課同學一致，以維持公平'],answer:'D',explanation:'CRPD強調實質平等而非形式平等，應提供身心障礙者差別化協助以達到真正公平。考試空間與時間與一般同學完全一致，未提供合理調整，無法彰顯CRPD的實質平等精神。'},
  {id:'sw_111_1_39',subject:'sw',year:111,session:1,num:39,categories:['sw_practice_school'],text:'有關我國與美國學校社會工作發展的共同之處，下列敘述何者正確？',options:['A.早期學校社會工作者均稱為訪問教師','B.均明訂學校社會工作者有資格進行早期療育服務','C.早期均由民間社會福利機構開始，協助學校社會工作實務','D.均受所得稅法修正影響，促使學校社會工作進入駐校型'],answer:'C',explanation:'台灣與美國學校社會工作早期均由民間社會福利機構推動。台灣1976年起家扶等機構引進學校社工。美國則稱早期社工為「訪問教師」，台灣沒有此稱呼（A錯）。'},
  {id:'sw_111_1_40',subject:'sw',year:111,session:1,num:40,categories:['sw_practice_medical'],text:'醫院的社會工作者與醫療團隊成員的合作模式，若屬於各自進入無特定互動，無正式溝通機制，屬於下列何種模式？',options:['A.單一專業模式（uni-disciplinary model）','B.專業間模式（inter-disciplinary model）','C.多專業模式（multi-disciplinary model）','D.跨專業模式（trans-disciplinary model）'],answer:'C',explanation:'多專業模式（multi-disciplinary）指多個專業各自提供服務、各自為政，無特定互動或正式溝通機制。單一專業（A）只有一個專業；專業間模式（B）強調整合合作；跨專業模式（D）以案主為中心整合所有專業。'},

  // ===== 111年下 社會工作（40題）=====
  {id:'sw_111_2_01',subject:'sw',year:111,session:2,num:1,categories:['sw_nature_role'],text:'全球化與後工業化的衝擊下，2014 年國際社會工作者聯盟（IFSW）對社會工作提出不同內涵的定義，下列何者非其定義？',options:['A.社會工作是以實踐為本的專業及學術領域','B.社會工作專業核心任務為推動社會變遷、社會發展、社會凝聚、人民的充權及解放','C.社會工作協同個人與組織，面對人生挑戰促進人類的福祉','D.社會工作協助個人、團體、社區增強或恢復其社會功能'],answer:'D',explanation:'IFSW 2014年定義強調：以實踐為本的專業及學術領域（A）、推動社會改變與充權（B）、聯繫個人與組織促進福祉（C）。D選項「增強或恢復社會功能」屬舊定義內涵，並非2014年定義的文字。'},
  {id:'sw_111_2_02',subject:'sw',year:111,session:2,num:2,categories:['sw_ethics_code'],text:'解釋社會工作專業之形成有許多理論觀點，臺灣下列何種現象較符合「權力論」之論點？',options:['A.建立社會工作理論體系','B.訂定社會工作倫理守則','C.通過社會工作師法','D.設立社會工作相關科系'],answer:'C',explanation:'權力論強調透過取得法律地位與強制力來確立專業權威。通過社會工作師法賦予社工師法定資格與執業保障，具有強制力，最符合權力論的觀點。'},
  {id:'sw_111_2_03',subject:'sw',year:111,session:2,num:3,categories:['sw_history_intl'],text:'關於社會工作之起源與發展的敘述，下列何者正確？①英國的新濟貧法又稱為伊莉莎白第四十三號法 ②英國的新濟貧法相較於舊濟貧法更為嚴格 ③英美第一個慈善組織會社在1869 年成立於美國水牛城 ④慈善組織會社對於社會工作發展的重要意義之一在於強調以整個社區為工作對象 ⑤美國羅斯福總統的新政為社會安全制度開啟新氣象',options:['A.①③','B.②⑤','C.①②','D.④⑤'],answer:'B',explanation:'①伊莉莎白第43號法是1601年舊濟貧法，非新濟貧法；②新濟貧法（1834）比舊濟貧法更嚴格（正確）；③第一個COS於1869年成立於英格蘭，非美國水牛城；④COS強調個別化調查，非以社區為對象；⑤羅斯福1935年社會安全法為新政核心（正確）。故選②⑤。'},
  {id:'sw_111_2_04',subject:'sw',year:111,session:2,num:4,categories:['sw_nature_role'],text:'下列何者不是與非自願個案一起工作時的角色？',options:['A.監督者','B.訓誡者','C.治療者','D.問題解決者'],answer:'B',explanation:'與非自願案主工作時，訓誡者的角色會引發反彈，降低配合意願，不利於服務關係的建立。監督者（A）、治療者（C）、問題解決者（D）都是可能的適當角色。'},
  {id:'sw_111_2_05',subject:'sw',year:111,session:2,num:5,categories:['sw_ethics_value'],text:'社會工作的專業價值與社會環境具有密不可分的關係。下列敘述何者錯誤？',options:['A.當前的社會與文化價值，提供社會工作者和案主合作時對案主所處環境脈絡之瞭解','B.社會福利機構的宗旨、目標、服務流程和責信，皆可能反映了機構的價值取向','C.社會工作所服務的案主以弱勢族群居多，因此案主系統的價值觀變異不大','D.社會工作者應該時時檢視自己的價值觀，及個人價值觀對服務輸送的可能影響'],answer:'C',explanation:'每個人都是獨特的個體，即便來自相同弱勢族群，價值觀仍因個人經歷、文化背景、人格特質等而有相當大的差異。「變異不大」的說法是錯誤的刻板化假設。'},
  {id:'sw_111_2_06',subject:'sw',year:111,session:2,num:6,categories:['sw_practice_other'],text:'關於社會工作之目的，下列何者錯誤？',options:['A.尋求主流文化的價值','B.連結案主所需要的資源','C.增強案主解決問題的能力','D.促進社會的發展'],answer:'A',explanation:'社工強調尊重每個案主的多元文化背景，不將特定主流文化價值觀強加於案主。尋求主流文化的價值違背多元文化與社會正義的精神，不是社工的目的。'},
  {id:'sw_111_2_07',subject:'sw',year:111,session:2,num:7,categories:['sw_nature_role'],text:'社會工作的服務與其他助人專業有所差異，社會工作專業不強調下列何種觀點？',options:['A.社會工作介入人與其環境的互動','B.社會工作協助服務對象回復其生活功能','C.社會工作能鑑定服務對象的心理創傷','D.社會工作解決服務對象的困境'],answer:'C',explanation:'鑑定心理創傷屬醫師或心理師的專業職責。社工強調人與環境互動（A）、回復生活功能（B）、解決困境（D），但不包含心理創傷的鑑定診斷。'},
  {id:'sw_111_2_08',subject:'sw',year:111,session:2,num:8,categories:['sw_practice_medical'],text:'對於社會工作者的角色職責之敘述，下列何者正確？①住院病人醫療費用困難，護理站轉介家屬到社會服務室尋求協助 ②在十點過後的夜市發現家長帶著幼兒販售茶葉蛋，市民通報113，期望社會工作者出現停止對兒童不適當照顧 ③機構以招人困難為由，社會工作者職位長期懸缺，工作由其他行政人員處理 ④人力不足，受過培訓的志工協助危機家庭的接案與訪視，社會工作者負責督導',options:['A.①④','B.①②','C.②③','D.①③'],answer:'B',explanation:'①醫務社工協助醫療費用困難的家屬，符合職責。②可能涉及兒童照顧疏忽，社工出現協助評估是適當的。③行政人員處理社工職責不合適。④讓志工獨立承擔接案與訪視工作不符合專業責信。故選①②。'},
  {id:'sw_111_2_09',subject:'sw',year:111,session:2,num:9,categories:['sw_practice_family'],text:'家庭暴力防治法修法過程中，社會工作者代表目睹兒童及受暴者參與和主張修改保護令聲請程序，是發揮社會工作者何種角色？',options:['A.教育者','B.治療者','C.倡導者','D.情緒支持者'],answer:'C',explanation:'倡導者是指代表案主爭取最大利益，包含個案倡導、政策倡導、立法倡導。社工代表弱勢群體主張修改保護令聲請程序，是立法倡導的具體展現，屬倡導者角色。'},
  {id:'sw_111_2_10',subject:'sw',year:111,session:2,num:10,categories:['sw_ethics_value'],text:'有關社會工作專業目標之敘述，下列何者錯誤？',options:['A.增強人們解決問題、抗衡與發展的能量','B.連結人與環境體系，使體系運作獲得資源、服務與機會','C.推動社會大眾投入志願服務工作','D.促進環境體系有效與人性運作'],answer:'C',explanation:'NASW四大目標：①增強人們解決問題的能量（A）、②連結人與資源體系（B）、③促進環境體系有效人性運作（D）、④發展與促進社會政策。「推動社會大眾投入志願服務」並非NASW明定的專業目標，故C錯誤。'},
  {id:'sw_111_2_11',subject:'sw',year:111,session:2,num:11,categories:['sw_theory_eco'],text:'生態觀點運用於社會工作實務，下列敘述何者正確？',options:['A.案主的問題是源自於行為病態或道德瑕疵','B.生態觀點強調系統改變的能力，而非聚焦於人與環境之間的相互協調或適應','C.生態觀點於1970 年代納入增強權能的觀點，強調社會工作者與案主應建立上對下的權力關係','D.社工實務以生態觀點進行處遇時，一方面要增強案主個人控制環境的能力，一方面要影響外在環境朝向滋養性環境建構'],answer:'D',explanation:'生態觀點處遇重點在同時強化個人能力與改善環境（D正確）。生態觀點認為問題來自人與環境的互動，非個人病態（A錯）；生態觀點重視人與環境的協調適應（B錯）；增強權能強調夥伴關係而非上下關係（C錯）。'},
  {id:'sw_111_2_12',subject:'sw',year:111,session:2,num:12,categories:['sw_theory_other'],text:'Payne 將社會工作理論分為三種類型，下列何者錯誤？',options:['A.反思－治療性取向','B.社會－集體主義理論','C.外借－實踐理論','D.個人－改良主義理論'],answer:'C',explanation:'Payne的三種社會工作觀點：①治療觀點（反思－治療取向，A）、②轉變觀點（個人改良主義，D）、③社會秩序觀點（社會－集體主義，B）。「外借－實踐理論」並非Payne的分類，故C錯誤。'},
  {id:'sw_111_2_13',subject:'sw',year:111,session:2,num:13,categories:['sw_ethics_code'],text:'社會工作在運用系統理論或生態系統理論上，下列敘述何者正確？',options:['A.系統理論中所提之系統和各次系統之間具有靜態的關係','B.系統理論認為所有系統間的界線相當明確','C.系統理論較生態系統理論更重視服務對象系統與其所處的社會環境間交互作用','D.生態系統理論處遇的重點在個人與環境之間的介面'],answer:'D',explanation:'生態系統理論的處遇重點在個人與環境的介面（D正確）。系統間是動態關係（A錯）；系統界線並非絕對明確（B錯）；兩者皆重視人與環境交互作用，無明確優劣（C錯）。'},
  {id:'sw_111_2_14',subject:'sw',year:111,session:2,num:14,categories:['sw_theory_psychosocial'],text:'關於心理暨社會學派理論觀點之敘述，下列何者錯誤？',options:['A.採取人在情境（person-in-situation）的思考架構','B.理論基礎來自人本主義心理學','C.重視個體的早年生活經驗之影響','D.強調人的內在心理結構會影響其外顯的行為表現'],answer:'B',explanation:'心理暨社會學派（又稱診斷派）的理論基礎主要來自精神分析學派（弗洛伊德），以及系統理論，並非人本主義心理學。其核心是「人在情境中」（A）、重視早年經驗（C）、強調內在心理結構（D）。'},
  {id:'sw_111_2_15',subject:'sw',year:111,session:2,num:15,categories:['sw_nature_professional'],text:'關於「自我效能」的敘述，下列何者正確？',options:['A.是一種人在情境中調適狀況的能力感與掌握感','B.是一種助人者與個案的雙向關係','C.是一種約定，以獲致不同結果的方案','D.是一種透過自由聯想以產生自我洞察的方法'],answer:'A',explanation:'自我效能（Bandura提出）是指個人對自己能夠完成特定任務的信念，是一種對自身掌握感與能力感的主觀評估。B描述的是專業關係，C描述的是契約，D描述的是精神分析技術。'},
  {id:'sw_111_2_16',subject:'sw',year:111,session:2,num:16,categories:['sw_practice_family'],text:'一位失業單親父親無親友支持，社區托育資源稀缺且昂貴。每次應徵工作時，就將 5 歲的孩子獨留家中，因而觸法。從生活模型（life model）來看，該位單親父親及其家庭是面臨何種問題？',options:['A.家庭週期中必然的發展性危機','B.人與環境調和程度不足的問題','C.童年負面生活經驗導致無法負擔親職角色','D.認知應變能力不足所造成的負面結果'],answer:'B',explanation:'生活模型（Germain & Gitterman）關注人與環境的調和程度。本例中，父親無支持系統、社區托育資源不足，是典型的人與環境調和程度不足的問題，而非個人能力或早年經驗的問題。'},
  {id:'sw_111_2_17',subject:'sw',year:111,session:2,num:17,categories:['sw_practice_school'],text:'依據生態觀點，對曝險少年進行處遇，其目標不包含下列何者？',options:['A.改善少年與家庭、學校系統之間的交流品質','B.透過有效的個人與情境激勵，及行為學習技巧，以改善個人管理壓力的能力','C.要求少年配合學校的復學規範要求','D.影響個人所在的社會及物理環境條件，以滿足個人發展需要'],answer:'C',explanation:'生態觀點強調人與環境的雙向調適，目標在改善人與環境間的互動。「要求少年配合學校規範」是單向要求個人改變以適應環境，違背生態觀點雙向調適的精神，不在處遇目標之列。'},
  {id:'sw_111_2_18',subject:'sw',year:111,session:2,num:18,categories:['sw_nature_role'],text:'根據所羅門（Solomon, 1976）的觀點，社會工作者在運用增權觀點時，應具備下列那一條件？',options:['A.能協助案主看到他本身即為有助於問題改變的一個力量','B.能協助案主無條件接受社會工作者所具備的知識與技巧','C.幫案主抵抗外在的威脅','D.能協助案主順服社會工作者，以做為啟動問題解決的核心'],answer:'A',explanation:'Solomon（1976）的增權觀點強調協助案主發現自身的能力與力量，與案主建立夥伴關係。社工的角色是引導案主看見並運用自己的優勢，而非主導或控制（B、D），也非單純代替案主解決問題（C）。'},
  {id:'sw_111_2_19',subject:'sw',year:111,session:2,num:19,categories:['sw_theory_feminist'],text:'下列何者不是女性主義主張的社會工作處遇原則？',options:['A.分析案主早年生活經驗及心理動力的影響','B.社會工作者努力降低與案主間的權力差異','C.促進集體行動，帶動女性社會、經濟處境之發展','D.不必為了維持家庭完整犧牲自己'],answer:'A',explanation:'分析早年生活經驗及心理動力屬精神分析學派的技術，並非女性主義社工的處遇原則。女性主義社工強調降低權力差異（B）、促進集體行動（C）、支持個人自主（D）。'},
  {id:'sw_111_2_20',subject:'sw',year:111,session:2,num:20,categories:['sw_ethics_code'],text:'「社會工作者必須以清楚和易懂的言詞告知案主服務的目標、風險和服務限制等，案主可以拒絕或撤回同意的權利」，這是屬於那一項倫理守則規範的內涵？',options:['A.對案主的承諾','B.自我決定','C.知情同意','D.隱私與保密'],answer:'C',explanation:'知情同意（informed consent）是指在提供充分資訊後，讓案主做出自主決定，包含告知服務目標、風險、限制，以及案主可隨時拒絕或撤回同意的權利。'},
  {id:'sw_111_2_21',subject:'sw',year:111,session:2,num:21,categories:['sw_practice_women'],text:'「優勢觀點」已獲得社會工作實務界之認可與運用，但此觀點的限制為何？',options:['A.忽略結構面所帶來的壓迫','B.忽略個案的學習能力','C.忽視社區所潛藏的資源','D.忽視社會工作者與個案的合作關係'],answer:'A',explanation:'優勢觀點聚焦在案主本身的能力與資源，其限制在於較少關注外在社會結構性壓迫（如階級、種族、性別歧視等）對案主處境的影響，缺乏批判性的宏觀分析。'},
  {id:'sw_111_2_22',subject:'sw',year:111,session:2,num:22,categories:['sw_ethics_code'],text:'有關界線侵犯（boundary violation）與界線跨越（boundary crossing）之敘述，下列何者正確？',options:['A.界線跨越是指社會工作者與案主之間有侵害和剝削案主利益的雙重關係','B.界線侵犯是社會工作者與案主之間出現非有益之雙重關係','C.界線跨越不一定有傷害性，有時有助於處遇','D.只要有雙重關係就一定不對'],answer:'C',explanation:'界線跨越（boundary crossing）是指偏離標準規範的行為，但不一定有害，有時甚至有助於處遇關係。界線侵犯（boundary violation）才是指對案主造成傷害的行為。雙重關係也並非絕對不對（D錯）。'},
  {id:'sw_111_2_23',subject:'sw',year:111,session:2,num:23,categories:['sw_ethics_value'],text:'關於「價值觀」的特徵，下列何者錯誤？',options:['A.具體的','B.有歷史的起源與經驗的基礎','C.被一群體共同認定','D.對期望的事物帶有情感因素在內'],answer:'A',explanation:'價值觀是對人生、事物的看法或評價，是抽象的信念系統，無法被具體觀察或測量。B（來自歷史與經驗）、C（被群體認同）、D（帶有情感因素）均是價值觀的正確特徵。'},
  {id:'sw_111_2_24',subject:'sw',year:111,session:2,num:24,categories:['sw_ethics_value'],text:'社會工作專業向來致力於探討倫理與價值相關主題，而在 19 世紀末，社會工作專業開始發展之際，此時所關注的倫理焦點主要為何者？',options:['A.政府','B.組織','C.社會工作者','D.案主'],answer:'D',explanation:'19世紀末社工專業初期發展，倫理關注焦點放在服務的對象，即案主身上，關注如何正確地評估和協助案主。隨著專業化發展，倫理關注才逐漸擴及組織、雇主、同事等層面。'},
  {id:'sw_111_2_25',subject:'sw',year:111,session:2,num:25,categories:['sw_ethics_value'],text:'依 Donagan 的道德論（theory of morality），在進行專業倫理抉擇時，應採行何種方式？',options:['A.選擇可提升最大整體利益者','B.選擇傷害最小者','C.依既定之規範或原則','D.依自身最大利益'],answer:'B',explanation:'Donagan的道德論在倫理抉擇時主張選擇傷害最小的方案，這與效益主義最小傷害原則相近。A為效益主義最大利益原則，C為義務論，D為利己主義，均非Donagan的主張。'},
  {id:'sw_111_2_26',subject:'sw',year:111,session:2,num:26,categories:['sw_ethics_code'],text:'依據中華民國社會工作倫理守則第二版，社會工作師本應保守業務秘密，然而有些狀況社會工作師的保密會受到限制。下列何者不屬於保密的例外狀況？',options:['A.30 歲的案主在會談中告訴社會工作師隱藏已久的秘密：25 歲時曾未婚流產但未告知現任先生','B.案主涉及刑案時','C.社會工作師負有法律規定之通報責任','D.當案主有高度自殺風險'],answer:'A',explanation:'保密例外情況包含：涉及刑案（B）、法定通報責任（C）、高度自殺風險（D）等。案主個人隱私（25歲時的流產經歷），無傷害自己或他人之虞，不屬於保密例外，應受保密保護，故A不屬於例外狀況。'},
  {id:'sw_111_2_27',subject:'sw',year:111,session:2,num:27,categories:['sw_ethics_code'],text:'關於社會工作師怠職之敘述，下列何者錯誤？',options:['A.社會工作師錯誤安置兒童','B.社會工作師只顧慮保密，未能防止第三者受到傷害','C.對於案主需要面對的問題，社會工作師未提出警告','D.對於案主需要轉介服務時，社會工作師未轉介'],answer:'A',explanation:'Reamer業務過失三類型：怠職（遺漏未做應做之事）、瀆職（錯誤違法行為）、濫權（合法但不當行為）。B、C、D均屬遺漏未做（怠職）。A的「錯誤安置」可能屬瀆職或濫權，不明確屬於怠職，故A是錯誤的選項。'},
  {id:'sw_111_2_28',subject:'sw',year:111,session:2,num:28,categories:['sw_practice_disability'],text:'某被列為低收入戶的家庭，夫妻二人均有輕度身心障礙，共育有五名未成年子女，近日因疏忽照顧被列為脆弱家庭。除政府補助外，已有多個NPO提供津貼物資。夫妻向媒體、民代陳情需要更多資源。社會工作者是面對何種倫理實踐難題？',options:['A.案主自決或慈善父權','B.保密或溝通特權','C.義務與期望衝突','D.個人價值涉入'],answer:'C',explanation:'社工的專業評估（現有資源已足夠）與案主的期望（希望獲得更多資源）之間產生衝突，即義務（依專業評估分配資源）與期望（案主期待更多）的衝突。'},
  {id:'sw_111_2_29',subject:'sw',year:111,session:2,num:29,categories:['sw_ethics_value'],text:'關於防禦性社會工作之敘述，下列何者正確？',options:['A.社會工作者依照機構現有的資源分配給目前的案主','B.社會工作者爭取案主福利','C.社會工作者倡導法令修訂','D.社會工作者反思自己的價值判斷而提供服務'],answer:'A',explanation:'防禦性實務工作者的特徵：將注意力放在官僚程序的落實、照本宣科完成法律或組織規定的職責、職責被限縮在完成對機構的義務。A最符合此特徵。B、C、D均屬積極的、反思性的社工實踐。'},
  {id:'sw_111_2_30',subject:'sw',year:111,session:2,num:30,categories:['sw_ethics_code'],text:'Lowenberg 與 Dolgoff 所提出的社會工作專業服務之倫理抉擇優先順序，何者為順序最末之原則？',options:['A.最小傷害原則','B.生活品質原則','C.隱私保密原則','D.真誠原則'],answer:'D',explanation:'Lowenberg & Dolgoff的七大倫理原則優先順序（由高至低）：①保護生命→②差別平等→③自由自主→④最小傷害→⑤生活品質→⑥隱私保密→⑦真誠對待。真誠原則（D）排序最末。'},
  {id:'sw_111_2_31',subject:'sw',year:111,session:2,num:31,categories:['sw_practice_family'],text:'家庭系統理論提供社會工作者瞭解家庭關係的基礎。下列何者非正確運用家庭系統概念？',options:['A.親族規勸聲請保護令的離家婦女，能為了孩子保持家庭完整而撤回告訴。這樣子規勸婦女撤告的行為，是改變家庭界線（boundary）','B.父親工時長，母親在夜市做生意，長女從小學四年級起就負責買菜、煮飯、照顧弟妹、出席家長日。這位長女是親職化兒童（parental child）','C.婚後想搬出父母家，父親說同意但又暗示若媽媽頭暈時自己一個人可能照顧不來。這種表達是雙重束縛（double binding）','D.妻子抱怨丈夫像大孩子，兒子則在即將外地求學前提醒父親多關心母親。此現象的概念是三角關係（triangulation）'],answer:'A',explanation:'家庭界線（boundary）是指分隔家庭內不同次系統與成員的隱形界線，管控成員間的接觸量。親族規勸婦女撤告、回家是試圖改變家庭成員的行為決定，並非改變家庭界線的概念，故A使用概念有誤。'},
  {id:'sw_111_2_32',subject:'sw',year:111,session:2,num:32,categories:['sw_practice_justice'],text:'關於司法社會工作的運作，下列何者錯誤？',options:['A.參與兒童出庭之保護','B.參與家事事件之調解','C.參與收出養之訪視與建議','D.參與毒品法庭'],answer:'D',explanation:'司法社工在兒童出庭保護（A）、家事調解（B）、收出養評估（C）等有明確的法定角色。社工參與毒品法庭的規定較不明確，相較其他三項，D最不屬於司法社工的核心運作範疇。'},
  {id:'sw_111_2_33',subject:'sw',year:111,session:2,num:33,categories:['sw_practice_medical'],text:'有關社會工作者於高齡者照顧機構的工作與角色，下列何者正確？①說明與推動病人自主權益法 ②擬定與執行長者入住適應計劃 ③組織機構長輩擔任社區獨居長者電話問安工作，提供長輩自我實現機會 ④社會工作者在與家屬討論、說明醫療約束評估的過程中，並無角色功能',options:['A.①②③','B.①②④','C.②③④','D.①③④'],answer:'A',explanation:'①②③均為高齡照顧機構社工的適當工作內容。④錯誤，社工在與家屬討論醫療約束評估過程中仍有重要角色，如協助溝通、確保案主權益等。'},
  {id:'sw_111_2_34',subject:'sw',year:111,session:2,num:34,categories:['sw_practice_work'],text:'關於新住民（new immigrants）社會工作的主要服務方案，下列內容何者未包括在內？',options:['A.生活適應輔導','B.親職教養服務','C.子女就學優待','D.就業服務'],answer:'C',explanation:'新住民社工的主要服務方案包含：生活適應輔導（A）、親職教養服務（B）、就業服務（D）等。「子女就學優待」屬教育行政單位的措施，並非社工服務的主要方案內容。'},
  {id:'sw_111_2_35',subject:'sw',year:111,session:2,num:35,categories:['sw_practice_youth'],text:'兒童虐待的形式包括身體虐待、精神虐待、性虐待、疏忽與目睹暴力。關於兒童虐待的敘述，下列何者錯誤？',options:['A.持續地用不當口語辱罵兒童，屬於精神虐待範疇','B.對兒童施以身體的侵入、身體的觸摸，或強迫觀看色情影片，屬於性虐待範疇','C.六歲以下之兒童獨處或由不適當之人代為照顧，屬於疏忽的範疇','D.讓兒少持續處於骯髒、不衛生或衣著不當的情況下，屬於身體虐待的範疇'],answer:'D',explanation:'讓兒少持續處於骯髒不衛生、衣著不當的情況，屬於「疏忽」（neglect）的範疇，而非身體虐待。身體虐待是指對兒童施以直接的身體傷害行為。'},
  {id:'sw_111_2_36',subject:'sw',year:111,session:2,num:36,categories:['sw_practice_youth'],text:'下列何者不是有關青少年物質濫用之有效做法？',options:['A.教導青少年社會抵抗的技巧','B.組成藥物濫用青少年的同質團體','C.促使家長參與教育和治療的過程','D.發展青少年社區服務'],answer:'B',explanation:'同質性的藥物濫用青少年團體可能因同儕效應而強化藥物使用行為（同儕互相影響），反而不利於戒除。有效做法包含：提升個人抗拒技巧（A）、家長參與（C）、社區服務（D）等。'},
  {id:'sw_111_2_37',subject:'sw',year:111,session:2,num:37,categories:['sw_practice_disability'],text:'身心障礙者權利公約（CRPD）是檢視身心障礙者權益的尺規，關於身心障礙者權益保障的敘述，下列何者正確？①醫院完成硬體建築無障礙，身心障礙者即可享就醫平權 ②「共融」專指公園、遊戲場硬體空間設計 ③各級機關申辦活動，須進行活動設施設備無障礙檢核 ④身心障礙者與全國同世代上網率存在差距，60 歲以上身心障礙者是數位機會分配最少世代',options:['A.②③','B.③④','C.②④','D.①③'],answer:'B',explanation:'①硬體無障礙只是就醫平權的一部分，CRPD強調更廣泛的平等參與；②共融不只限於公園遊戲場，範圍更廣；③各級機關辦理活動須進行無障礙檢核，正確；④調查顯示身障者數位落差明顯，60歲以上族群最嚴重，正確。故選③④。'},
  {id:'sw_111_2_38',subject:'sw',year:111,session:2,num:38,categories:['sw_practice_medical'],text:'下列何者不是我國當前聘任學校社會工作師的法源依據？',options:['A.國民教育法','B.學生輔導法','C.精神衛生法','D.偏遠地區學校教育發展條例'],answer:'C',explanation:'學校社工師的法源依據包含：國民教育法（A）第十條、學生輔導法（B）第七條、偏遠地區學校教育發展條例（D）第九條。精神衛生法（C）並未規定聘任學校社工師。'},
  {id:'sw_111_2_39',subject:'sw',year:111,session:2,num:39,categories:['sw_practice_work'],text:'下列何者不屬於職業社會工作之範疇？',options:['A.協助提升工作效能','B.增強組織結構及資源管理','C.鼓勵員工轉任職務','D.研擬和工作有關的多元且創新之福利方案'],answer:'C',explanation:'職場社工的主要功能在協助提升員工工作效能（A）、增強組織結構與資源管理（B）、研擬多元創新福利方案（D）。「鼓勵員工轉任職務」屬人力資源管理範疇，並非職業社工的核心工作。'},
  {id:'sw_111_2_40',subject:'sw',year:111,session:2,num:40,categories:['sw_practice_medical'],text:'醫療服務使用者的自主與自決，帶來醫務社會工作以及健康照護管理的革新，臺灣的「病人自主權利法」在何年通過？',options:['A.2013','B.2014','C.2015','D.2016'],answer:'D',explanation:'病人自主權利法於中華民國105年（西元2016年）1月6日總統令制定公布，並自公布後三年（2019年）施行。本題原答案C與D均給分，以D（2016年）為主要答案。'},

  // ===== 112年上 社會工作（40題）=====
  {id:'sw_112_1_01',subject:'sw',year:112,session:1,num:1,categories:['sw_history_tw'],text:'我國政府正式透過國家考試納編約聘社會工作員，是從那一年開始？',options:['A.1970年','B.1980年','C.1990年','D.2000年'],answer:'C',explanation:'1990年，行政院通過「社會工作人員任用辦法」，用考試的方式逐年將現有約聘的社會工作員納編。'},
  {id:'sw_112_1_02',subject:'sw',year:112,session:1,num:2,categories:['sw_history_intl'],text:'有關慈善組織會社（Charity Organization Society, C.O.S.）的敘述，下列何者錯誤？',options:['A.希望整合救濟資源，避免職業乞丐（professional beggars）的產生','B.認為「值得救濟的貧民」（"worthy" poor）是指能自立自助的申請者','C.最初於1877年在英國倫敦成立第一個慈善組織會社','D.工作方法被視為個案工作與社區組織工作的前身'],answer:'C',explanation:'C.O.S.最初於1869年在英國倫敦成立，1877年是美國成立的時間。慈善組織會社希望整合救濟資源、杜絕職業乞丐，並將貧民分為值得與不值得救濟者；其親善訪問員工作為個案工作前身，整合資源則為社區工作前身。'},
  {id:'sw_112_1_03',subject:'sw',year:112,session:1,num:3,categories:['sw_ethics_code'],text:'我國社會工作師法制度是專業發展的重要里程碑，有關社會工作師證照建立過程，下列敘述何者錯誤？',options:['A.為回應當時省市政府約聘社會工作者無法納編問題','B.第一份社會工作師法草案由內政部委託社會工作專業協會承辦起草，邀請學術界、實務界專家共同參與','C.第一個社會工作師職業公會於1998年在臺北市成立','D.於1999年公布施行社會工作師法，後續訂定社會工作倫理原則，作為社會工作實務指引與規範'],answer:'D',explanation:'社會工作師法於1997年公布施行，而非1999年。其餘敘述皆正確：立法目的之一為解決約聘社工納編問題；草案由內政部委託社工專協起草；台北市社工師公會於1998年籌組。'},
  {id:'sw_112_1_04',subject:'sw',year:112,session:1,num:4,categories:['sw_theory_empower'],text:'佛雷勒（Freire）提出增權的倡導策略，屬於下列何種類型？',options:['A.廣義的社會教育','B.廣義的社會運動','C.廣義的社會革命','D.廣義的社會秩序'],answer:'A',explanation:'Freire是巴西著名教育家，主張解放教育，讓所有參與教育的人都能獲得增權，因此其增權倡導策略屬於廣義的社會教育。'},
  {id:'sw_112_1_05',subject:'sw',year:112,session:1,num:5,categories:['sw_practice_women'],text:'我國最新訂頒有關婦女權益保障之重要法規，為下列何者？',options:['A.性別平等教育法','B.性侵害犯罪防治法','C.消除對婦女一切形式歧視公約（CEDAW）施行法','D.家庭暴力防治法'],answer:'C',explanation:'CEDAW（消除對婦女一切形式歧視公約）為聯合國於1979年通過的公約，我國制定施行法以保障婦女權益，為最新訂頒之重要婦女權益保障法規。'},
  {id:'sw_112_1_06',subject:'sw',year:112,session:1,num:6,categories:['sw_practice_elderly'],text:'社會工作依據人在環境中的根本假設，視案主的情況和需要做環境調整，下列何者不屬於環境調整？',options:['A.在協助受虐兒童時，增強其施虐家長的親職能力並協助媒合穩定工作','B.在提供家暴相對人的服務時，協助其強化情緒管理的能力','C.協助受暴婦女時，將其從有危險的家中帶至安全的緊急安置處所','D.改善長照機構的方案和設備，以使機構老人能獲得更好的照顧品質'],answer:'B',explanation:'環境調整是指調整服務對象所處的環境。(B)的目標是協助家暴相對人，強化情緒管理能力是對相對人本身的直接服務，而非環境調整。(A)增強家長能力是調整兒童的環境；(C)是調整受暴婦女的環境；(D)是調整老人的環境。'},
  {id:'sw_112_1_07',subject:'sw',year:112,session:1,num:7,categories:['sw_practice_medical'],text:'社會工作重視連結社會資源以協助案主解決問題，下列何者非社會資源的概念？',options:['A.每月經濟補助','B.短期安置處所','C.案主的保健醫療知識','D.免費復健醫療接送'],answer:'C',explanation:'社會資源是指一個社會所擁有的各種資源，屬於外部可獲取的支援。案主個人所具備的保健醫療知識屬於個人資源，並非社會資源的概念。'},
  {id:'sw_112_1_08',subject:'sw',year:112,session:1,num:8,categories:['sw_nature_role'],text:'下列對於社區及社區工作的敘述，何者錯誤？',options:['A.社區工作者須具前瞻眼光與領導能力，其責任在為社區擬定發展方針，以改造社區使居民獲得更好的生活','B.社區主要可包含人民、地方或地理疆界，以及社會互動、認同等要素','C.社區工作是一種互動的過程，人們藉由從事集體行動來改善他們的社區，經由社區組織的運作，達到社區增權','D.社區工作發展的歷史，可追溯自英美所開展的睦鄰組織運動（Social Settlement Movement）'],answer:'A',explanation:'社區工作者與居民的關係是夥伴關係，工作者扮演使能者、倡議者的角色，而非上下的領導關係，不應由工作者單方面為社區擬定發展方針。其餘敘述均正確。'},
  {id:'sw_112_1_09',subject:'sw',year:112,session:1,num:9,categories:['sw_practice_school'],text:'社會工作者經常教導個案問題解決的技巧，以及督導機構部屬、新進社工和團隊內其他專業同僚，例如：學校心理衛生專題演講、提供福利諮詢或帶領父母效能團體。係指下列何種社會工作者的角色？',options:['A.教育者','B.增權者','C.行動者','D.倡議者'],answer:'A',explanation:'題目關鍵字為「教導」個案問題解決技巧，以及辦理演講、諮詢、帶領團體等，均屬教育者角色的展現。'},
  {id:'sw_112_1_10',subject:'sw',year:112,session:1,num:10,categories:['sw_nature_professional'],text:'根據2014年國際社會工作者聯盟（International Federation of Social Workers, IFSW）對社會工作專業的定義，社會工作專業目標為何？',options:['A.促進社會變遷和解決人際問題','B.增強、促進和恢復個人與家庭的社會功能','C.增進人類的幸福，協助人們滿足其基本生活需要','D.促進社會變遷、社會發展與社會凝聚，以及增權和解放個人'],answer:'D',explanation:'2014年IFSW定義指出，社會工作專業的核心任務包括推動社會變遷、社會發展、社會凝聚，以及人民的充權及解放。'},
  {id:'sw_112_1_11',subject:'sw',year:112,session:1,num:11,categories:['sw_nature_role'],text:'巴雷特（Bartlett）於1970年所提出的社會工作實施基礎，以下列何者為建立基點？',options:['A.社會問題','B.社會功能','C.社會價值','D.社會評估'],answer:'B',explanation:'Bartlett於1970年出版《社會工作實務的共同基礎》，以社會功能（social functioning）作為社會工作處置的目標，也是社會工作實務的共同基礎，認為社會工作致力於促使社會角色適應相關活動。'},
  {id:'sw_112_1_12',subject:'sw',year:112,session:1,num:12,categories:['sw_nature_role'],text:'有關心理暨社會學派，下列敘述何者錯誤？',options:['A.Florence Hollis 是代表人物之一','B.學派形成初期又被稱為診斷學派','C.處遇目標著重改善個人社會生活功能','D.立即介入案主的生活環境系統之修正'],answer:'D',explanation:'心理暨社會學派強調先診斷（評估）後處遇，不會立即介入修正。代表人物有Florence Hollis與Gordon Hamilton；初期稱為診斷學派；處遇目標除心理層面外，也重視個人社會環境生活功能。'},
  {id:'sw_112_1_13',subject:'sw',year:112,session:1,num:13,categories:['sw_theory_other'],text:'有關班都拉（Bandura）的社會學習理論，認為學習的主要過程，下列敘述何者正確？',options:['A.轉銜（transition）','B.模仿（modeling）','C.物質化（materialization）','D.同化（assimilation）'],answer:'B',explanation:'班都拉認為，除環境因素外，個人對環境的認知也是學習行為的重要因素，個體會透過觀察楷模的行為（模仿/modeling）來學習新行為，此為社會學習理論的核心主張。'},
  {id:'sw_112_1_14',subject:'sw',year:112,session:1,num:14,categories:['sw_theory_problem'],text:'有關危機干預工作步驟順序，下列何者正確？①了解和建立關係 ②評量致命性與安全性需求 ③協助列出處遇目標 ④指認主要問題 ⑤探討可能的各種選擇',options:['A.①②④⑤③','B.①②③④⑤','C.①④②③⑤','D.①④⑤②③'],answer:'A',explanation:'危機介入步驟：先建立關係①，確保安全②，找出問題所在④，探討可行選擇⑤，最後訂定處遇目標③。確保安全是危機當下最優先的任務。'},
  {id:'sw_112_1_15',subject:'sw',year:112,session:1,num:15,categories:['sw_theory_eco'],text:'針對系統觀點的社會工作模式，將要協助的對象視為下列何者？',options:['A.焦點系統（focal system）','B.超系統（super system）','C.次系統（subsystem）','D.總體系統（holistic system）'],answer:'A',explanation:'在系統觀點的社會工作模式中，協助的對象即為聚焦的焦點系統（focal system）。'},
  {id:'sw_112_1_16',subject:'sw',year:112,session:1,num:16,categories:['sw_theory_psychosocial'],text:'關於生活模式理論概念的敘述，下列何者錯誤？',options:['A.不同階段有不同處遇，要不斷評估以了解何者有效','B.案主在壓力下易窄化問題，工作者應基於專業導正案主','C.生活模式工作技巧與其他模式相似，重視權力結構與決策過程分析','D.對案主的假設是主動、有目標、有潛能發展學習'],answer:'B',explanation:'生活模式（life model）由Germain與Gitterman發展，強調生態觀點與「人在情境中」，著重環境面向，而非以病理模式由工作者單向導正案主，工作者與案主應是夥伴關係。'},
  {id:'sw_112_1_17',subject:'sw',year:112,session:1,num:17,categories:['sw_ethics_value'],text:'下列何者並非社會工作者個人價值觀對於實踐社會工作專業價值的影響？',options:['A.影響資訊蒐集、評估和決策','B.影響社會工作者的生活幸福','C.影響專業關係的建立','D.影響資源分配的公正性'],answer:'B',explanation:'個人價值觀對專業實踐的影響包括：影響資訊蒐集與決策、專業關係建立、資源分配公正性等。「影響社工者的生活幸福」並非個人價值觀對專業價值的影響，而是個人層面的議題。'},
  {id:'sw_112_1_18',subject:'sw',year:112,session:1,num:18,categories:['sw_practice_work'],text:'甲社工關切單親婦女的就業問題，關切勞動與經濟不平等議題，認為要透過社會、政經結構等社會改造，才能達成性別平等，是屬於下列何種女性主義派別？',options:['A.自由主義女性主義','B.社會主義女性主義','C.激／基進女性主義','D.後現代女性主義'],answer:'B',explanation:'社會主義女性主義主張男女差異來自社會化，著重在經濟面和家庭面的結構變革，符合題目強調勞動與經濟不平等、透過社會政經結構改造達成性別平等的主張。'},
  {id:'sw_112_1_19',subject:'sw',year:112,session:1,num:19,categories:['sw_nature_role'],text:'有關優勢觀點的實務原則與策略之說明，下列何者正確？①以專家的角色教育服務使用者 ②協助服務使用者與社區連結 ③傾聽服務使用者生活中的問題與缺點 ④採取正向樂觀的態度',options:['A.①②','B.③④','C.①③','D.②④'],answer:'D',explanation:'優勢觀點中，工作者與案主是夥伴關係（非專家角色），關注案主的優點與潛力（而非問題缺點），協助案主連結社區資源，並採取正向樂觀態度。故②④正確。'},
  {id:'sw_112_1_20',subject:'sw',year:112,session:1,num:20,categories:['sw_practice_other'],text:'有關多元文化社會工作發展歷史，下列敘述何者正確？①文化缺陷模式相信原住民族基因及其文化是劣等的，也是一種種族歧視的思維 ②忽視種族差異（color-blind）的思維並未將少數民族視為問題和病態的象徵，也承認少數民族作為其自我認同及其所處的社會真實處境 ③跨文化社會工作的核心概念是文化能力，跨文化工作者需要認識異文化的文化特徵 ④反歧視與反壓迫的社會工作是一種強調個人權益保障的消極多元文化主義',options:['A.①②','B.③④','C.①③','D.②④'],answer:'C',explanation:'①正確，文化缺陷模式確實帶有種族歧視色彩。③正確，文化能力是跨文化社會工作的核心。②錯誤，忽視種族差異反而會無視種族差異帶來的現實影響，不會承認少數民族的自我認同。④錯誤，反歧視與反壓迫是積極多元文化主義，而非消極。'},
  {id:'sw_112_1_21',subject:'sw',year:112,session:1,num:21,categories:['sw_ethics_value'],text:'關於社會正義，下列敘述何者正確？',options:['A.中西方社會的社會正義觀與實踐方法是相同的','B.儒家的正義觀主要依賴外在法律的約束','C.西方社會的正義，指的是分配正義，而不涉及程序正義','D.社工人員為追求社會正義而推動社會改變'],answer:'D',explanation:'社工人員推動社會改變正是追求社會正義的實踐。中西方正義觀有所差異；儒家正義觀主要依賴內在道德自律，而非外在法律；西方社會的正義同時涵蓋分配正義與程序正義。'},
  {id:'sw_112_1_22',subject:'sw',year:112,session:1,num:22,categories:['sw_ethics_dilemma'],text:'下列何者是社會工作者可能面臨的價值衝突？①社會工作者的主管因民意代表施壓而要求社會工作者提供經濟補助給特定民眾 ②社會工作者前往經濟補助案進行家訪，發現案主增購了最新款的昂貴手機 ③失智症日照中心的社會工作者未經長者同意，將活動過程錄音錄影以備評鑑之用 ④社會工作者利用個人網路權限，協助朋友找到想要聯絡的某位案主',options:['A.②③','B.①④','C.③④','D.①②'],answer:'D',explanation:'①為給特定民眾補助vs.給更有需要者的價值衝突；②為補助應用於基本需求vs.奢侈消費的價值衝突。③④已明確違反倫理與法律，屬倫理違規而非單純的價值衝突兩難。'},
  {id:'sw_112_1_23',subject:'sw',year:112,session:1,num:23,categories:['sw_ethics_code'],text:'有關道德與倫理的比較，下列敘述何者錯誤？',options:['A.兩者的共同性是著重人的行為善惡與對錯','B.在屬性上道德偏向客觀，倫理較為主觀','C.道德是個人內在取向，倫理為個人外在取向','D.倫理是教導實務工作者，該如何表現行為的指導準則'],answer:'B',explanation:'道德是個人內在取向，偏向主觀；倫理是個人外在取向（如社工師倫理守則是明確條列的外在規定），偏向客觀。(B)的敘述將道德與倫理的屬性說反了。'},
  {id:'sw_112_1_24',subject:'sw',year:112,session:1,num:24,categories:['sw_ethics_value'],text:'有關社會工作倫理之德行論，下列敘述何者錯誤？',options:['A.是以品格來界定專業工作者的特質','B.社會工作者具有尊重他人、關懷的特質','C.社會工作者具有專業誠信特質','D.本於工作原則提供服務'],answer:'D',explanation:'德行論以品格、特質來判斷道德，強調工作者的個人德行。「本於工作原則提供服務」是義務論的敘述，義務論強調遵守規則與原則，而非德行。'},
  {id:'sw_112_1_25',subject:'sw',year:112,session:1,num:25,categories:['sw_practice_elderly'],text:'評估老年人上街購物、食物烹調、家務維持、處理財務等任務是否能獨立完成或者需要協助，下列何者屬於這種評估？',options:['A.日常生活活動功能量表（ADLs）','B.工具性日常生活活動功能量表（IADLs）','C.心理與認知功能評估','D.社會家庭支持功能評估'],answer:'B',explanation:'IADLs（工具性日常生活活動功能量表）評估項目包括：上街購物、食物烹調、家務維持、處理錢財、外出活動、洗衣服、使用電話、服藥等。ADLs則評估進食、個人衛生、上廁所、洗澡、穿脫衣物等基本日常活動。'},
  {id:'sw_112_1_26',subject:'sw',year:112,session:1,num:26,categories:['sw_ethics_value'],text:'Reamer 指出，提供一個方便社會工作者檢視、批判相關倫理議題的架構，是預防倫理爭議及相關法律申訴最有效的方法之一。此一方法係屬下列何者？',options:['A.倫理預判','B.倫理教育','C.倫理印證','D.倫理審核'],answer:'D',explanation:'Reamer所指「提供架構讓工作者檢視批判倫理議題」的方法，屬於倫理審核（ethical audit），是預防倫理爭議及法律申訴的有效方式。'},
  {id:'sw_112_1_27',subject:'sw',year:112,session:1,num:27,categories:['sw_ethics_code'],text:'侵吞或挪用案主錢財之行為，係屬下列何種業務過失類型？',options:['A.濫權','B.瀆職','C.怠職','D.索賄'],answer:'B',explanation:'瀆職是指「不應為而為之」，屬於錯誤且不法的行為，侵吞或挪用案主錢財即屬此類。濫權是濫用權力（合法但不合理）；怠職是「應為而不為」（如未寫紀錄）。'},
  {id:'sw_112_1_28',subject:'sw',year:112,session:1,num:28,categories:['sw_practice_disability'],text:'下列相關法令，何者未明文規定社會工作人員有通報的法定責任與義務？',options:['A.社會工作師法','B.兒童及少年福利與權益保障法','C.家庭暴力防治法','D.身心障礙者權益保障法'],answer:'A',explanation:'社會工作師法中並未明文規定通報義務。兒少法第53條、家庭暴力防治法第50條、身心障礙者權益保障法第76條均有明文規定社工人員的通報責任。'},
  {id:'sw_112_1_29',subject:'sw',year:112,session:1,num:29,categories:['sw_practice_youth'],text:'下列何者不屬於經濟弱勢兒童少年在社會融合（social inclusion）過程中會面臨的挑戰？',options:['A.融入同儕建立友誼','B.家長對教育的價值觀','C.個人缺乏社交意願','D.有效參與學校學習活動的資源'],answer:'C',explanation:'經濟弱勢兒少在社會融合中面臨的挑戰包括：因物質差距難以融入同儕、家長教育價值觀差異、缺乏參與學習活動的資源等。「個人缺乏社交意願」並非經濟弱勢直接造成的結構性挑戰。'},
  {id:'sw_112_1_30',subject:'sw',year:112,session:1,num:30,categories:['sw_ethics_code'],text:'下列何者不是間接服務中常見的倫理兩難議題？',options:['A.組織倫理與勞資爭議之倫理兩難','B.揭發機構或專業團體內部不當行為','C.案主自我決定與父權主義之兩難','D.政府與民間部門社會福利之責任平衡'],answer:'C',explanation:'「案主自我決定與父權主義之兩難」屬於直接服務（個案工作）中的倫理議題，而非間接服務。間接服務的倫理兩難包含組織倫理、揭發機構不當行為、公私部門責任分配等。'},
  {id:'sw_112_1_31',subject:'sw',year:112,session:1,num:31,categories:['sw_practice_justice'],text:'有關家庭暴力相對人處遇，下列敘述何者正確？①家暴相對人只需要接受嚴厲的處罰，並不需要提供服務 ②家暴可視為是家庭系統互動的失衡現象 ③家暴相對人多數為自願性案主，多數願意配合社工處遇 ④雖然社工處遇等同於強制性的司法權力，社工員仍須尊重相對人的意願',options:['A.①③','B.①④','C.②③','D.②④'],answer:'D',explanation:'家暴相對人一詞轉換傳統加害者觀點，著重家庭系統互動失衡，需提供處遇服務。相對人多為非自願案主。社工雖具強制介入力量，仍應尊重相對人意願，強制安排不利問題改善。'},
  {id:'sw_112_1_32',subject:'sw',year:112,session:1,num:32,categories:['sw_practice_other'],text:'社會工作因應防災、減災及重建的基本原則，下列敘述何者錯誤？',options:['A.為求重建效率，應由上而下安排重建進程','B.為避免重建破壞社區生活，應保持最小程度異地遷村','C.重建始於災難發生日，應儘可能保存過去生活樣態','D.防災社區是指社區居民具備防災、救災知識與技能'],answer:'A',explanation:'重建過程應尊重案主意願與社區參與，而非由上而下強制安排，雖然由上而下是最有效率的方式，但此並非社會工作的基本原則。其餘敘述均正確。'},
  {id:'sw_112_1_33',subject:'sw',year:112,session:1,num:33,categories:['sw_practice_family'],text:'下列何者不屬於家庭社會工作的介入範疇？',options:['A.家庭關係衝突介入與關係強化','B.家庭成員社會適應困難問題解決','C.家庭危機事件的介入與功能強化','D.家庭生命週期的加速催化與重整'],answer:'D',explanation:'家庭生命週期是絕大多數家庭都會面臨的自然歷程，不一定會產生危機，無需工作者主動介入加速催化或重整。其餘選項均屬家庭社會工作的介入範疇。'},
  {id:'sw_112_1_34',subject:'sw',year:112,session:1,num:34,categories:['sw_practice_medical'],text:'根據全民健保醫療服務給付規定，下列何項診療項目可由精神科社工師（員）申報，並需附精神科專科醫師醫囑及簽名？',options:['A.行為評估與治療','B.家族治療','C.特殊團體心理治療','D.精神科診斷性會談'],answer:'B',explanation:'家族治療可由精神科醫師或精神科社工師執行，需附精神科專科醫師醫囑及簽名。行為評估與治療健保不給付；特殊團體心理治療由復健科醫師或臨床心理師執行；精神科診斷性會談由精神專科醫師執行。'},
  {id:'sw_112_1_35',subject:'sw',year:112,session:1,num:35,categories:['sw_practice_other'],text:'失智症是一種不可逆的退化性疾病，下列何者不屬於常見症狀？',options:['A.記憶障礙','B.失去完成每日生活任務的能力','C.冷漠及茫然不知所措','D.一天中大部分時間情緒沮喪'],answer:'D',explanation:'失智症常見症狀包括記憶障礙、失去完成日常任務的能力、冷漠茫然等。「一天中大部分時間情緒沮喪」並非失智症的典型症狀，失智症患者的情緒表現多為起伏大、易怒焦慮，而非持續沮喪（持續沮喪較符合憂鬱症特徵）。'},
  {id:'sw_112_1_36',subject:'sw',year:112,session:1,num:36,categories:['sw_practice_other'],text:'對未成年少女懷孕的服務，下列敘述何者錯誤？',options:['A.學校在得知有未滿18歲少女懷孕時，應依性侵害事件處理流程通報主管機關','B.未成年懷孕少女及其家庭可透過諮詢專線及求助網站，取得相關服務資訊','C.社會局（處）在接案後若評估需開案，應整合資源做個案管理','D.未成年懷孕少女的心理、經濟、醫療，產後子女的保健和托育等，都是需要服務的面向'],answer:'A',explanation:'滿16歲後具有性自主權，若為雙方合意，是否走性侵害流程應以少女意願為主，不得一律依性侵害事件處理流程通報。未滿16歲或非合意者，則均須通報。'},
  {id:'sw_112_1_37',subject:'sw',year:112,session:1,num:37,categories:['sw_practice_disability'],text:'關於身心障礙社會工作的原則，下列何者錯誤？',options:['A.否認身心障礙者的獨特性與多元性','B.增加身心障礙者的參與決策','C.強調身心障礙者的自我充權','D.排除身心障礙者的參與障礙'],answer:'A',explanation:'身心障礙社會工作應肯定並尊重身心障礙者的獨特性與多元性，而非否認。正確原則包括：增加參與決策、強調自我充權、排除參與障礙等。'},
  {id:'sw_112_1_38',subject:'sw',year:112,session:1,num:38,categories:['sw_practice_disability'],text:'下列何者同時實踐「身心障礙者權利公約」與「消除對婦女一切形式歧視公約」的主張？',options:['A.劇院、場館進出口無障礙設施','B.醫院乳房攝影室，提供無障礙設施','C.因女性障礙者難以迴避照顧者角色，培力活動需提供托兒服務','D.服務業定額僱用優先聘用女性障礙者'],answer:'B',explanation:'醫院乳房攝影室符合CEDAW中「保健」方面的女性權利保障，同時提供無障礙設施符合CRPD，故同時實踐兩公約。(A)僅符合CRPD；(C)與身障較無直接關聯；(D)可能對男性障礙者產生不平等，有違CRPD精神。'},
  {id:'sw_112_1_39',subject:'sw',year:112,session:1,num:39,categories:['sw_practice_work'],text:'有關職業社會工作的EAPs服務（員工協助方案）範圍，下列敘述何者錯誤？',options:['A.EAPs服務的案主是組織與員工','B.EAPs服務安排員工心理諮商為主','C.EAPs服務項目規劃的基礎是機構的組織文化','D.EAPs可由委外機構協助員工處理問題，組織不直接提供服務'],answer:'B',explanation:'EAPs（員工協助方案）服務範圍相當廣泛，涵蓋健康、法律、家庭、生活、工作等各面向，並非以心理諮商為主。EAPs案主包含組織與員工，規劃基礎考量機構文化，也可委外提供。'},
  {id:'sw_112_1_40',subject:'sw',year:112,session:1,num:40,categories:['sw_practice_medical'],text:'在醫療社會工作的個案工作紀錄中，採用SOAP問題取向記錄法中，「S」為下列何者之縮寫？',options:['A.system','B.support','C.suggestion','D.subjective'],answer:'D',explanation:'SOAP記錄法中，S代表Subjective（主觀），即服務對象的主觀陳述；O代表Objective（客觀），即工作者的客觀觀察；A代表Assessment（評估）；P代表Plan（計畫）。'},

  // ===== 112年下 社會工作（40題）=====
  {id:'sw_112_2_01',subject:'sw',year:112,session:2,num:1,categories:['sw_history_intl'],text:'有關新濟貧法（The New Poor Law）的實施，下列敘述何者正確？',options:['A.由美國政府於1934年通過','B.確立救助基礎以麵包量度（bread scale）為準，採客觀標準計算','C.友愛會社（friendly society）與該法形成一種救助的互補關係','D.該法較濟貧法（The Poor Law of 1601）寬鬆許多，使勞工階級重拾自尊心'],answer:'C',explanation:'新濟貧法由英國於1834年通過，友愛會社與該法形成互補的救助關係。麵包量度是1795年史賓漢蘭制的做法；新濟貧法比舊濟貧法更嚴格，拒絕對壯年男子的院外救濟，並非更寬鬆。'},
  {id:'sw_112_2_02',subject:'sw',year:112,session:2,num:2,categories:['sw_history_intl'],text:'有關1942年的貝佛里奇報告書（The Beveridge Report）的敘述，下列何者錯誤？',options:['A.其建議應放棄家戶資產調查的社會救助方式','B.其強調國家責任，忽略個人應有的負擔','C.其影響工黨在1945年執政後，願意加速各項社會安全立法','D.其背景為英國為解決二戰期間所造成民窮財盡的困頓'],answer:'B',explanation:'貝佛里奇報告書強調國家責任，設計「從搖籃到墳墓」的福利制度，但並未忽略個人應有的負擔，而是同時強調個人責任。其背景為二戰期間的戰後重建規劃。'},
  {id:'sw_112_2_03',subject:'sw',year:112,session:2,num:3,categories:['sw_history_tw'],text:'有關社會工作的專業化發展，下列敘述何者錯誤？',options:['A.專業化前的訓練養成為師徒制，缺點是品質不穩定','B.透過將實務工作所需的知識與技能統整，並透過集會交流、教育訓練與組織結社的方式傳遞','C.當前挑戰為嘗試以科學方法建立實務之有效性','D.國內社會工作專業為精於本土化發展，不需回應全球化議題'],answer:'D',explanation:'全球化議題對社會工作影響甚鉅，本土化發展並不代表可以忽略全球化。其餘敘述均正確：師徒制品質不穩定、透過組織結社傳遞知識、以證據為本建立實務有效性均是專業化發展的面向。'},
  {id:'sw_112_2_04',subject:'sw',year:112,session:2,num:4,categories:['sw_nature_role'],text:'社會的不公義是獲得權力與地位的差異所造成，屬於下列何種觀點？',options:['A.衝突論','B.功能論','C.歸因理論','D.社會達爾文主義'],answer:'A',explanation:'衝突論強調社會不平等是因為權力與地位的差異所造成，符合題目描述。功能論強調各種現象都有其功能；歸因理論研究人類如何進行歸因；社會達爾文主義主張適者生存。'},
  {id:'sw_112_2_05',subject:'sw',year:112,session:2,num:5,categories:['sw_practice_youth'],text:'下列何者是聯合國《兒童權利公約》的一般性原則？①禁止歧視原則 ②兒童最佳利益原則 ③生命權、生存及發展權 ④尊重父母指導權',options:['A.①②③','B.①②④','C.②③④','D.①③④'],answer:'A',explanation:'聯合國《兒童權利公約》四大一般性原則為：①禁止歧視原則、②兒童最佳利益原則、③生命權生存及發展權、④尊重兒童意見（而非尊重父母指導權）。'},
  {id:'sw_112_2_06',subject:'sw',year:112,session:2,num:6,categories:['sw_nature_professional'],text:'案主能否與社會工作者共同合作緩解問題，其主要關鍵因素為何？',options:['A.社工的人脈多寡','B.案主與社工間的關係','C.案主居住社區的資源','D.社工擁有證照'],answer:'B',explanation:'案主與工作者之間的關係是影響雙方能否有效合作緩解問題的主要關鍵因素。人脈多寡、社區資源、證照有無雖有一定影響，但均非最關鍵的因素。'},
  {id:'sw_112_2_07',subject:'sw',year:112,session:2,num:7,categories:['sw_ethics_code'],text:'罹患思覺失調症的案主在會談中述及最近一直懷疑房東站在門縫偷窺他，且已買好一把瑞士刀打算晚上就去質問住在樓上的房東，社會工作師決定告訴案主的房東。上述涉及何種倫理議題？',options:['A.對案主的不當壓力','B.警告第三者','C.人格毀謗','D.治療過失'],answer:'B',explanation:'社會工作師將案主可能傷害他人的資訊告知第三者（房東），涉及的是「警告第三者」的倫理議題，即在保密原則與保護潛在受害者之間的倫理兩難。'},
  {id:'sw_112_2_08',subject:'sw',year:112,session:2,num:8,categories:['sw_practice_elderly'],text:'對於團體及社會團體工作的解釋，下列敘述何者錯誤？',options:['A.二個以上的組合可稱為團體，並且成員之間必須有所互動，產生關聯','B.當我們有意識地使用團體中的人我關係來促成工作目標的完成，這可以說就是團體工作','C.社會團體工作是社會工作重要的工作方法，透過有目的的團體設計，來幫助團體中的個人，也達成團體任務與目的','D.近年來，社會團體工作已逐漸被濫用，如探索性團體、兒童遊戲團體、老人懷舊團體，並不能稱為社會團體工作'],answer:'D',explanation:'探索性團體、兒童遊戲團體、老人懷舊團體都是社會團體工作的正當應用，並非濫用。社會團體工作的應用範圍相當廣泛。'},
  {id:'sw_112_2_09',subject:'sw',year:112,session:2,num:9,categories:['sw_practice_other'],text:'有關社區能力建構（community capacity building），下列敘述何者錯誤？',options:['A.社區可依其自身的特性，採取不同的能力建構策略','B.由外部專業人士診斷社區的問題，決定目標和行動','C.是一種建立與累積社區能力的過程','D.是一種社區發展的方法，用於鼓勵鄰里自助、負責任的領導，以及一種對公民參與的承諾'],answer:'B',explanation:'社區能力建構強調由下而上，鼓勵居民自助互助，主體是社區居民，而非由外部專業人士由上而下診斷問題、決定目標。每個社區有其獨特性，應採取不同策略。'},
  {id:'sw_112_2_10',subject:'sw',year:112,session:2,num:10,categories:['sw_nature_role'],text:'下列何者是社會工作者的專業角色？①倡導者 ②監察者 ③諮商者 ④研究者 ⑤調解者',options:['A.①②③⑤','B.①②④⑤','C.②③④⑤','D.①③④⑤'],answer:'D',explanation:'社工的專業角色包括：倡導者（爭取服務對象權利）、諮商者（提供諮商輔導）、研究者（工作成果評估）、調解者（處理關係衝突）。「監察者」並非社工的專業角色。'},
  {id:'sw_112_2_11',subject:'sw',year:112,session:2,num:11,categories:['sw_nature_professional'],text:'有關綜融社會工作實務（generalist social work practice）的敘述，下列何者錯誤？',options:['A.最常運用心理暨社會學派與個案工作方法做處遇','B.實務干預時可以同時引用不同的理論取向與方法','C.社會工作者要能依據評估結論決定干預系統層次','D.社會工作實施包含微視實務工作和鉅視實務工作'],answer:'A',explanation:'綜融社會工作以生態系統觀點之問題解決模式為基礎，融合個案、團體、社區、行政、研究五大方法，並非最常運用心理暨社會學派。它根據評估去決定干預系統層次，涵蓋微視與鉅視工作。'},
  {id:'sw_112_2_12',subject:'sw',year:112,session:2,num:12,categories:['sw_nature_role'],text:'關於理論與實務關係之敘述，下列何者正確？①實證主義認為理論為一組具有邏輯性概念的體系，提供參考架構，以便組織和理解所觀察的事物 ②後現代主義有一組對於問題發生的原因和如何解決問題的假定 ③後現代理論認為社會工作者是一位專家 ④實證主義強調專業服務應以普遍存在的知識系統做為理解和研擬服務措施之基礎',options:['A.①②','B.②③','C.①④','D.③④'],answer:'C',explanation:'①實證主義確實強調具邏輯的理論體系。④實證主義強調以普遍客觀知識為基礎。②的敘述屬於實證主義，後現代主義強調個體主觀想法，尊重多元。③的敘述屬實證主義，後現代主義強調工作者與服務對象平等合作，非專家角色。'},
  {id:'sw_112_2_13',subject:'sw',year:112,session:2,num:13,categories:['sw_theory_psychosocial'],text:'社會工作者運用心理暨社會學派，向多次主動離職的青年說：「你有沒有注意到每當老闆對你提出工作改善討論的時候，你就會提出辭呈？」這是何種技術的運用？',options:['A.支持性技術','B.直接影響技術','C.探討、描述與宣洩技術','D.反映性討論技術'],answer:'D',explanation:'反映性討論技術旨在發展並增進服務對象的覺察性（對情境、動力、人格的覺察）。工作者指出案主的行為模式，協助其覺察自身的反應規律，屬於此技術。'},
  {id:'sw_112_2_14',subject:'sw',year:112,session:2,num:14,categories:['sw_theory_other'],text:'有關人的認知行為假設，下列敘述何者錯誤？',options:['A.人類行為是一種會持續改變的過程','B.人的行為與環境存在著互動的關係','C.常態行為與偏差行為的解釋法則完全不同','D.人類行為的研究需有科學實證基礎'],answer:'C',explanation:'認知行為理論認為常態行為與偏差行為的解釋法則是相同的，行為都是學習而來的結果，並非適用不同法則。人類行為是持續改變的過程，與環境相互影響，需有科學實證基礎。'},
  {id:'sw_112_2_15',subject:'sw',year:112,session:2,num:15,categories:['sw_theory_problem'],text:'有關Perlman提出的問題解決派中的「4P」，下列何者正確？',options:['A.person, problem, plan, process','B.predict, prevention, process, plan','C.professional, problem, process, prepare','D.person, problem, place, process'],answer:'D',explanation:'Perlman的問題解決學派4P為：person（人）、problem（問題）、place（地方/機構）、process（過程）。即一個人帶著問題到一個地方求助，工作者運用助人過程協助其解決問題。'},
  {id:'sw_112_2_16',subject:'sw',year:112,session:2,num:16,categories:['sw_practice_school'],text:'根據生態系統理論，個人所在的各個系統層次是一個層層相扣的巢狀組織，二個以上的微視系統間所發生的關聯及其歷程稱為：',options:['A.微視系統（microsystem）','B.中介系統（mesosystem）','C.外在系統（exosystem）','D.鉅視系統（macrosystem）'],answer:'B',explanation:'中介系統（mesosystem）是指個體所直接參與的兩個或兩個以上微視系統之間的互動關係，例如家庭與學校之間的互動。微視系統是個人直接接觸的環境；外部系統是間接影響個體的系統；鉅視系統是整體社會文化環境。'},
  {id:'sw_112_2_17',subject:'sw',year:112,session:2,num:17,categories:['sw_practice_youth'],text:'協助青少年父母養育嬰兒的方式，下列何者不屬於生態觀點的生活模式與原則？',options:['A.分析青少年父母被照顧經驗及未建立安全依附的原生家庭因素','B.社工安排家族會談，青少年向其原生家庭父母表達完成高中學業期待，希望能協助照顧新生兒','C.育兒指導員教導新生兒照顧技巧，社工與青少年父母討論育兒責任分工','D.社工組成青少年媽媽團體，青少年媽媽們分享育兒技巧與如何採購嬰兒用品'],answer:'A',explanation:'(A)分析童年被照顧經驗及依附關係屬於精神分析學派的觀點，而非生態觀點的生活模式。生態觀點強調個人與環境系統的互動，(B)(C)(D)均涉及青少年與各微視/中介系統的互動。'},
  {id:'sw_112_2_18',subject:'sw',year:112,session:2,num:18,categories:['sw_ethics_value'],text:'下列何者屬於「間接權能障礙」？',options:['A.貧窮者被標籤為福利依賴者','B.案主所需的醫療資源不足','C.限制案家取得生活扶助的資格','D.案主的童年創傷沒有被處理'],answer:'A',explanation:'間接權能障礙是指資源缺乏及強化不平等結構的社會價值，如負面烙印與標籤化。「貧窮者被標籤為福利依賴者」是一種負面標籤，屬於間接權能障礙。(B)(C)是社會資源的限制，屬於直接權能障礙。'},
  {id:'sw_112_2_19',subject:'sw',year:112,session:2,num:19,categories:['sw_practice_family'],text:'激（基）進主義的女性主義認為性暴力形成來自看似無害的觀念，往往成為共犯結構。下列何者不是促成性暴力的共犯結構？',options:['A.婚姻斜坡','B.社會鼓勵女性結交比他們年長、高大、富有的男性','C.認為夜歸女性道德有問題','D.追求互為主體的性別關係'],answer:'D',explanation:'「追求互為主體的性別關係」強調平等、尊重，是對抗性暴力共犯結構的做法，而非促成性暴力的觀念。婚姻斜坡、鼓勵女性依附男性、對夜歸女性的道德評判等，都是看似無害但促成性暴力的共犯結構。'},
  {id:'sw_112_2_20',subject:'sw',year:112,session:2,num:20,categories:['sw_history_meaning'],text:'有關社會建構主義（social constructivism）於實務運用，下列敘述何者正確？①與個案培養合作的關係 ②為個案訂定有意義的目標 ③對個案保持好奇的態度 ④使自己成為個案問題的專家',options:['A.①②','B.①③','C.②③','D.②④'],answer:'B',explanation:'社會建構主義強調人的認知是個體與他人協調發展的，重視合作關係。①培養合作關係、③保持好奇態度均符合此理論強調平等夥伴關係的精神。②由工作者訂定目標、④使自己成為專家，均是工作者主導的方式，不符合社會建構主義精神。'},
  {id:'sw_112_2_21',subject:'sw',year:112,session:2,num:21,categories:['sw_nature_role'],text:'有關運用靈性（spirituality）觀點於社工員替代性創傷的自我照顧模式，下列敘述何者正確？①在微觀層面可鼓勵社工員針對創傷進行冥想訓練，以面對恐懼經驗 ②在中距層面督導可以分享個人的靈性經驗，並發揮情感支持的功能 ③在宏觀層面機構可以提供神聖的空間作為靈性活動的場所，並提供固定的時間使用該空間 ④靈性觀點僅適用於以信仰為基礎的組織（faith-based organization），不適用於其他類型的社福單位',options:['A.①②③','B.②③④','C.①③④','D.①②④'],answer:'A',explanation:'①社工員個人層次屬微觀；②督導與社工員的關係屬中距層次；③機構的空間制度屬宏觀層面，均正確。④錯誤，靈性觀點不侷限於宗教組織，是社工的專業方法之一，任何社福單位均可運用。'},
  {id:'sw_112_2_22',subject:'sw',year:112,session:2,num:22,categories:['sw_practice_family'],text:'下列何種情境屬於社會工作價值衝突？①社工人員面對未完成的龐大個案紀錄，考量自己是否適合從事社會工作 ②社工人員面對無法提供生活照顧的家庭及其子女，考量子女是否要家外安置 ③社工人員面對已翹課逃學多天的街頭青少年，考量是否要通報教育局 ④社工人員面對不斷尋求各種社會資源補助的個案，考量是否為福利依賴者',options:['A.①②③','B.①②④','C.①③④','D.②③④'],answer:'D',explanation:'②安置保護兒少vs.維持家庭完整；③維繫專業關係vs.法定通報義務；④提供資源協助vs.擔憂福利依賴，均屬專業價值衝突。①是工作者個人的職涯考量，屬個人層面，非課本所指的專業價值衝突。'},
  {id:'sw_112_2_23',subject:'sw',year:112,session:2,num:23,categories:['sw_ethics_value'],text:'有關社會工作專業價值，下列敘述何者正確？',options:['A.價值觀存在於社會工作實務的每個面向','B.只要能認同專業價值，社會工作者就不會面臨價值衝突','C.機構的處遇模式必然都符合社會工作專業價值','D.社會工作者應勸導案主接受社會的主流價值觀'],answer:'A',explanation:'社工實務的每個面向都涉及價值觀的運用與挑戰。即便認同專業價值，專業價值彼此之間也可能相衝突；機構處遇模式不一定都符合專業價值；社工不應無條件強加主流價值觀於案主。'},
  {id:'sw_112_2_24',subject:'sw',year:112,session:2,num:24,categories:['sw_ethics_value'],text:'社會工作倫理的概念中，下列何者符合目的論的主要觀點？',options:['A.強調某種行為本身的對錯，不用考慮結果','B.認為決策必須依據各種行動可能之後果，及其優缺點來決定','C.認為無論如何都不能接受社工師說謊、不誠實','D.認為規則、權利和原則是神聖、不可侵犯的'],answer:'B',explanation:'目的論（後果論）強調依據行動可能的後果及優缺點來做決策，結果是判斷對錯的標準。義務論才強調行為本身的對錯、規則的神聖不可侵犯，以及無論如何都不能說謊。'},
  {id:'sw_112_2_25',subject:'sw',year:112,session:2,num:25,categories:['sw_theory_feminist'],text:'關懷倫理學（Ethics of Care）的敘述，下列何者錯誤？',options:['A.與女性主義取向特別有關聯','B.強調道德原則、公正性及理性','C.其學說核心之一為聯繫','D.強調關係取向，重視合作、溝通、關心'],answer:'B',explanation:'關懷倫理學由女性主義者Gilligan所建立，強調關係的重要性、合作、溝通與關心，以及聯繫（connectedness）。「強調道德原則、公正性及理性」是Kohlberg道德發展理論（以男性為基礎的理論）的特色，而非關懷倫理學。'},
  {id:'sw_112_2_26',subject:'sw',year:112,session:2,num:26,categories:['sw_practice_youth'],text:'某兒少社工酷愛清潔，在家訪時，發現個案居家環境堆滿各種囤積物品，其評估母親的精神狀態不佳，擬強制就醫並安置兒少。兒童強烈表示不想與母親分開，央求社工不要通報與安置。下列何者非屬社工面對的倫理難題？',options:['A.保密與隱私權','B.案主自我決定與專業父權主義','C.應否揭發機構內部不當行為','D.社工個人的價值涉入'],answer:'C',explanation:'題目情境中涉及：(A)是否通報（保密vs.保護）；(B)兒童不想安置但社工考慮強制安置（自決vs.父權主義）；(D)社工愛清潔的個人價值影響專業判斷。題目並未提及機構內部不當行為，故(C)非屬此情境的倫理難題。'},
  {id:'sw_112_2_27',subject:'sw',year:112,session:2,num:27,categories:['sw_theory_eco'],text:'有關個人復原力，下列敘述何者正確？①復原力是一個動態的過程，是一種良好的適應，是一種個人力量的恢復 ②從結構的觀點來看，復原力是個人處於社會結構的結果 ③社會工作者必須以建構保護因子為目標，培養弱勢者的復原力 ④復原力主要是個人先天具備的某些能力特質，而非後天環境重要因素所培育而成',options:['A.①②③','B.①③④','C.②③④','D.①②④'],answer:'A',explanation:'①復原力是動態的適應過程；②復原力受社會結構影響；③建構保護因子是培養復原力的重要目標，均正確。④錯誤，後天環境對復原力的培養至關重要，復原力並非僅由先天決定。'},
  {id:'sw_112_2_28',subject:'sw',year:112,session:2,num:28,categories:['sw_ethics_value'],text:'因社工師侵權行為而造成案主受損害，案主可依下列何種法律，請求機構與社工師負連帶賠償責任？',options:['A.犯罪防治法','B.行政法','C.刑法','D.民法'],answer:'D',explanation:'民法第188條規定：受僱人因執行職務，不法侵害他人之權利者，由僱用人與行為人連帶負損害賠償責任。因此案主可依民法請求機構與社工師負連帶賠償責任。'},
  {id:'sw_112_2_29',subject:'sw',year:112,session:2,num:29,categories:['sw_ethics_code'],text:'Reamer（1995）認為業務過失可以區分為三種形式，下列何者錯誤？',options:['A.濫權','B.瀆職','C.索賄','D.怠職'],answer:'C',explanation:'Reamer提出的三種業務過失形式為：濫權（濫用權力）、瀆職（不應為而為之）、怠職（應為而不為）。「索賄」並非Reamer所定義的業務過失類型。'},
  {id:'sw_112_2_30',subject:'sw',year:112,session:2,num:30,categories:['sw_practice_disability'],text:'關於照顧身心障礙子女的優勢觀點，下列何者正確？',options:['A.照顧者生活一切以子女為優先，犧牲自我','B.照顧者為了子女，爭取機會並學習和專業團隊溝通','C.照顧者遵從醫囑，提供子女治療性照顧','D.照顧者對子女的愧疚感，有助於家庭凝聚'],answer:'B',explanation:'優勢觀點強調看到服務對象的能力、潛力與優勢。(B)照顧者主動爭取機會、學習與專業溝通，展現了照顧者的能力與優勢，符合優勢觀點。(A)犧牲自我、(C)被動遵從醫囑、(D)愧疚感，均不是優勢觀點所強調的。'},
  {id:'sw_112_2_31',subject:'sw',year:112,session:2,num:31,categories:['sw_ethics_code'],text:'Banks認為依據社會工作者的道德立場與工作環境，可以分為那四種實務模式？',options:['A.承諾/激進模式、人本模式、社會行政模式、執業模式','B.承諾/激進模式、專業模式、技術官僚模式、準事業模式','C.承諾/激進模式、醫療模式、技術官僚模式、執業模式','D.承諾/激進模式、專業模式、社會行政模式、準事業模式'],answer:'B',explanation:'Banks提出四種實務模式：1.承諾/激進模式（優先考量社會公平正義）；2.專業模式（優先考量服務對象權益與專業倫理守則）；3.技術官僚模式（優先考量機構價值觀與規則）；4.準事業/市場模式（優先考量市場規範與營利）。'},
  {id:'sw_112_2_32',subject:'sw',year:112,session:2,num:32,categories:['sw_practice_family'],text:'「家庭復原力」具有動態發展的特質，並且會與環境相互交流。關於「家庭復原力」之相關概念的敘述，下列何者錯誤？',options:['A.「不顯現負向結果」與「顯現正向調適」都是家庭展現復原力的形式','B.家庭組織是指一套涵蓋價值觀、態度、偏見與假設的體系','C.家庭的風險因子可能會隨著家庭成員的年齡而有所變化','D.家庭儀式可促成家庭的穩定性與可預測性'],answer:'B',explanation:'(B)描述的「一套涵蓋價值觀、態度、偏見與假設的體系」是「家庭信念」的定義，而非家庭組織。家庭組織是指家庭成員之間的關係網絡與相互連結。其餘敘述均正確。'},
  {id:'sw_112_2_33',subject:'sw',year:112,session:2,num:33,categories:['sw_history_tw'],text:'關於社區工作的敘述，下列何者錯誤？①臺灣社區工作與福利工作並非自始相互結合 ②社區概念僅與特定地理區域連結 ③老舊市區經濟不振，政府推動城區更新，翻轉老舊市區樣貌，運用的是社區發展模式 ④為建立在地連結，志工式的服務方式，社區工作方能紮根經營',options:['A.①②③','B.①③④','C.①②④','D.②③④'],answer:'D',explanation:'②社區概念包含地理區域、規範與目標、人際互動三要素，不僅限於地理區域。③推動都更是「社區計畫模式」（著重解決特定問題），非社區發展模式。④過度強調志工化反而抑制專業介入，民94年前的社區組織過度志工化即是問題所在。①正確。'},
  {id:'sw_112_2_34',subject:'sw',year:112,session:2,num:34,categories:['sw_practice_family'],text:'原住民移居都市後，常從事骯髒、危險及辛苦之工作（俗稱3K產業），加之遠離原有的支持網絡，子女照顧、貧窮等問題導致家庭關係緊張、兒虐與家暴，下列何種改善做法錯誤？',options:['A.運用部落互助概念照顧幼兒，幼兒園作息配合家長工作時間','B.家暴不是個別家庭的事，應重視其所屬生態環境條件','C.應積極協助轉介從事3K工作原住民職訓，以提升職能，擺脫貧窮','D.都市社區原住民服務中心應依部落特性設計服務內容'],answer:'C',explanation:'(C)帶有主觀意識地認為服務對象「應該」改變職業，缺乏文化敏感度，也未尊重原住民的自我決定。正確做法應以服務對象的需求與意願為出發點，而非工作者主觀認定其應轉職。此題有爭議，送分。'},
  {id:'sw_112_2_35',subject:'sw',year:112,session:2,num:35,categories:['sw_practice_other'],text:'有關親職教養技巧訓練的敘述，下列何者錯誤？',options:['A.父母要能體認孩子行為與教養行為間的關係','B.主張父母要學會對孩子行為有不同回應方式','C.父母要能處理自己的創傷經驗後再執行親職','D.改變父母認為「問題只出在孩子身上」的看法'],answer:'C',explanation:'要求父母必須先完全處理好自己的創傷經驗才能執行親職，在實務上過於嚴苛且不切實際，連專業工作者也不一定能做到。親職教養技巧訓練的重點在於學習具體技能，同時在過程中慢慢自我覺察與調適，而非要求先處理創傷才能開始親職。'},
  {id:'sw_112_2_36',subject:'sw',year:112,session:2,num:36,categories:['sw_history_intl'],text:'有關美國衛生及公共服務部（Department of Health and Human Services）提出復原概念的十大原則，不包括下列何種原則？',options:['A.直線的過程（Linear）','B.全人關懷（Holistic）','C.以個人及個體為本（Individualized and Person Centered）','D.自我取向（Self Direction）'],answer:'A',explanation:'復原的十大原則包含：非線性過程（而非直線的過程）、全人關懷、以個人及個體為本、自我取向、賦權、優勢觀點、同儕支持、尊重、責任、希望。復原過程是非線性的，充滿挫折與學習，故(A)「直線的過程」不在其中。'},
  {id:'sw_112_2_37',subject:'sw',year:112,session:2,num:37,categories:['sw_practice_elderly'],text:'案主為78歲的獨居長者，因經濟困難而轉介老人福利服務中心。案主的獨子無力照顧，期望賣出老家房子，以籌措其養老照顧費用，案主不願意而與獨子發生嚴重衝突。下列何者並非社工服務重點？',options:['A.平衡老人期望與社工個人意見','B.面對案主自決與案主獨子意見的平衡','C.扮演家庭溝通者角色','D.尋求其他經濟補助資源'],answer:'A',explanation:'服務應以案主的期望與需求為中心，而非平衡案主期望與社工個人意見，社工個人意見不應凌駕於案主期望之上。服務重點應在協調案主自決與家人意見、扮演溝通角色、尋找其他資源等。'},
  {id:'sw_112_2_38',subject:'sw',year:112,session:2,num:38,categories:['sw_practice_family'],text:'在實務工作上，何者不是脆弱家庭服務的變革？',options:['A.公私協力','B.社福中心主責','C.民間團體主責','D.重視家庭兒少社區支持服務方案'],answer:'C',explanation:'脆弱家庭服務應由社福中心主責，非由民間團體主責。正確的服務變革方向包括：公私協力、社福中心主責、重視家庭兒少社區支持服務方案。(B)與(C)互相矛盾，答案在其中。'},
  {id:'sw_112_2_39',subject:'sw',year:112,session:2,num:39,categories:['sw_practice_youth'],text:'預防與處遇霸凌是校園重要的工作項目，發生的風險因素與處遇方式何者正確？',options:['A.校園出現霸凌是少數曝險少年造成的','B.通常霸凌者有共犯，而且施暴者與受害者認識','C.校安通報系統霸凌案件數反應與真實學生感受情況相合','D.預防校園霸凌應專注於校園圍牆內事件'],answer:'B',explanation:'霸凌通常發生在認識的人之間，且霸凌者常有共犯。校園霸凌的加害者樣貌多元，並非少數曝險少年造成；霸凌有很多黑數未通報，官方數字不能反映真實感受；預防霸凌應涵蓋校外場域。'},
  {id:'sw_112_2_40',subject:'sw',year:112,session:2,num:40,categories:['sw_practice_school'],text:'根據國民小學與國民中學未入學或中途輟學學生通報及復學輔導辦法規定，未經請假、請假未獲准或不明原因未到校上課，達連續幾日以上，即為中途輟學學生？',options:['A.3日','B.7日','C.14日','D.30日'],answer:'A',explanation:'依據「國民小學與國民中學未入學或中途輟學學生通報及復學輔導辦法」第2條，未經請假、請假未獲准或不明原因未到校上課，達連續3日以上，即認定為中途輟學學生，需進行通報。'},

  // ===== 113年上 社會工作（40題）=====
  {id:'sw_113_1_01',subject:'sw',year:113,session:1,num:1,categories:['sw_practice_work'],text:'社會福利從慈善到公民權利的發展歷程有幾個重要的轉折，下列敘述何者錯誤？',options:['A.貝佛里奇報告（The Beveridge Report）放棄資產調查的社會救助，規劃社會保險','B.新政（The New Deal）實施改變了濟貧由地方辦理的觀念，促成美國的社會安全法案','C.史賓漢蘭制（Speenhamland System）提出救助基礎的依據','D.新濟貧法主張救濟設施應因地制宜，濟貧所內收容人的待遇應低於一般工人'],answer:'D',explanation:'解析：(D)(A)正確，貝佛里奇報告主要針對社會保險制度的政策去做規畫(B)正確，1933年羅斯福新政，起因於1930年經濟大蕭條，造成嚴重的失業，政府介入加強國家對社會經濟生活的干預，振興經濟(C)正確，史賓漢蘭制採取院外救濟的形式，主要是補貼低薪的勞工至最低生活標準，在當時是以麵包作為衡量標準，也就是以麵包尺度來衡量，也就是題目提到的救助基礎的依據(D)錯誤，新濟貧法強調全國統一'},
  {id:'sw_113_1_02',subject:'sw',year:113,session:1,num:2,categories:['sw_practice_elderly'],text:'依長期照顧十年計畫 2.0「社區整體照顧服務體系」之規劃，服務於「社區整合型服務中心」的社會工作者，其主要專業角色為下列何者？',options:['A.個案管理者','B.照顧服務督導員','C.專業輔導人員','D.團體活動規劃者'],answer:'A',explanation:'解析：(A)(A)正確，俗稱A個管(B)錯誤，這個應該是B單位的職位(C)錯誤(D)錯誤*社區整合型服務中心(A)、複合型服務中心(B)、巷弄長照站(C)'},
  {id:'sw_113_1_03',subject:'sw',year:113,session:1,num:3,categories:['sw_theory_other'],text:'有關社會工作專業教育的發展，下列敘述何者不符合當前趨勢?',options:['A.透過社會工作實習制度，提升學生於理論與實務方面的整合能力','B.證照制度的實施造成人才的斷層與壟斷，應加以廢除','C.社會工作應兼具國際化與國情化，以提升專業性','D.社會工作應落實以證據為基礎的實務實施'],answer:'B',explanation:'解析：(B)(A)正確(B)錯誤，雖然各位考生會這樣想，但這是社工師考試，請選擇老師覺得正確的答案(C)正確(D)正確'},
  {id:'sw_113_1_04',subject:'sw',year:113,session:1,num:4,categories:['sw_practice_disability'],text:'有關臺灣社會工作專業發展取得法治基礎的重要事件，下列何者正確？',options:['A.1980 年制定「兒童福利法」','B.1997 年公布實施「社會工作師法」','C.2002 年修訂「身心障礙者權益保障法」','D.2009 年公布實施「專科社工甄審及教育辦法」'],answer:'B',explanation:'解析：(B)(A)錯誤，兒童福利法為1973年制定(B)正確，基本上這個可以記起來(C)錯誤，「身心障礙者保護法」，於民國96年(2007)更名為「身心障礙者權益保障法法」(D)錯誤，名稱為「專科社會工作師分科甄審及接受繼續教育辦法」'},
  {id:'sw_113_1_05',subject:'sw',year:113,session:1,num:5,categories:['sw_history_intl'],text:'有關「英美慈善組織會社（Charity Organization Society, COS）」的敘述，下列何者錯誤？',options:['A.為當代社區組織的精神與做法奠定發展的基礎','B.主要在糾正當時慈善組織缺乏聯繫協調的亂象，企圖整合救濟資源，以杜絕職業乞丐','C.慈善組織會社派「親善訪問員」訪問申請救濟者，被視為是社會個案工作的前身','D.提出救濟金的發放是依照家庭規模的大小加以計算，制定「史賓漢蘭制度（Speenhamland System）」'],answer:'D',explanation:'解析：(D)(A)正確(B)正確(C)正確(D)錯誤，史賓漢蘭制是1795年在慈善組織會社之前，這兩者不同'},
  {id:'sw_113_1_06',subject:'sw',year:113,session:1,num:6,categories:['sw_practice_school'],text:'臺灣社會工作的發展由日本從西方輾轉移植來臺，再由西方強勢國家擴散過來。若以本土化觀點看待臺灣社會工作，下列敘述何者正確？',options:['A.社會工作者應與案主保持正式專業關係，不可接受案主的回饋，如送禮等，如此才能與案主建立良好關係','B.臺灣社會工作發展迄今已有完整的本土化教材','C.中華文化的基本價值和自我觀影響案主因應方式和求助行為模式','D.不論西方或是臺灣的案主在因應方式或是求助行為模式都是類似的。因此，社會工作者不需要特別考量文化議題'],answer:'C',explanation:'解析：(C)(A)錯誤，題目重點：「以本土化觀點看待」，所以在台灣文化來說很講究人情味的，如果服務對象的送禮不要太昂貴的話，收下來有助於建立關係(B)錯誤，現在學校還是一堆美國的教材，本土教材有，但不完整(C)正確(D)錯誤，會因為文化而有所差異'},
  {id:'sw_113_1_07',subject:'sw',year:113,session:1,num:7,categories:['sw_history_intl'],text:'下列何者不是英國伊莉莎白 43 號法案之重要變革內容？',options:['A.區分具工作能力與無工作能力的貧民','B.每一教區設立濟貧監察員','C.分區辦理貧民救濟工作','D.強調政府責任'],answer:'D',explanation:'解析：(D)(A)正確(B)正確(C)正確(D)錯誤，強調親屬責任'},
  {id:'sw_113_1_08',subject:'sw',year:113,session:1,num:8,categories:['sw_practice_medical'],text:'89 歲獨居的服務對象，因中風入院治療後，經醫療團隊評估已可出院，社會工作者協助其返家居住，並提供服務對象獨立生活照顧之相關服務。社工的做法屬於下列何種服務？',options:['A.在地老化','B.就地合法','C.家庭自決','D.獨立自救'],answer:'A',explanation:'解析：(A)(A)正確，返家返回社區生活(B)錯誤，又不是違章工廠(C)錯誤(D)錯誤，這叫做優勢觀點，看到服務對象具備於社區自力生活的能力，提供獨立生活照顧之服務'},
  {id:'sw_113_1_09',subject:'sw',year:113,session:1,num:9,categories:['sw_nature_professional'],text:'有關社會工作特質的敘述，下列何者正確？',options:['A.社會工作強調社區資源的運用','B.社會工作重視人的一致性','C.社會工作強調個人的劣勢','D.社會工作強調「權力」是助人的關鍵'],answer:'A',explanation:'解析：(A)正確(B)錯誤，每個人都是獨一無二的(C)錯誤，是優勢不是劣勢(D)錯誤，強調權利'},
  {id:'sw_113_1_10',subject:'sw',year:113,session:1,num:10,categories:['sw_nature_role'],text:'社會工作是一項助人專業，它幫助個人、團體、社區增強或恢復其社會功能，這裡指的「社會功能」，下列何者為錯誤？',options:['A.滿意的生活角色扮演','B.與他人建立正向的關係','C.有自我價值感','D.解決個人精神層面的議題'],answer:'D',explanation:'解析：(D)(A)正確(B)正確(C)正確(D)錯誤，這不屬於「社會功能」'},
  {id:'sw_113_1_11',subject:'sw',year:113,session:1,num:11,categories:['sw_ethics_value'],text:'社會工作者向高中生介紹社會工作學系，下列敘述何者貼近社會工作的專業服務基礎？',options:['A.社會工作價值觀與主流社會價值是一致的','B.社會工作服務是以科學與價值為基礎的藝術','C.社會工作服務地點以機構的辦公室與會談室為限','D.社會工作重視理論，服務運用的知識都經過驗證'],answer:'B',explanation:'解析：(B)(A)錯誤，不見得和主流價值觀一致，很多時候要尊重非主流文化價值(B)正確，相當的藝術(C)錯誤，會有家訪或外展(D)錯誤，不是全部都經過驗證'},
  {id:'sw_113_1_12',subject:'sw',year:113,session:1,num:12,categories:['sw_theory_other'],text:'從日本引進的「減法照顧－提供長者剛剛好需要的照顧，不是照顧者認為該提供的照顧」，此精神與下列何種社會工作理念敘述最為接近？',options:['A.聚焦長者還擁有能力的優勢觀點','B.重視家庭照顧者負荷的系統觀點','C.回應長者不同性格的個別化照顧思考','D.照顧長者非一家之力，需動員社區資源'],answer:'A',explanation:'解析：(A)(A)正確，不要預設長者就是沒能力需要給予很多的幫忙(B)錯誤，不是題目所要強調的(C)錯誤，不是題目所要強調的(D)錯誤，與題目敘述不相干'},
  {id:'sw_113_1_13',subject:'sw',year:113,session:1,num:13,categories:['sw_practice_elderly'],text:'「充權」案主是社會工作者的工作目標，下列何者屬於案主消權？①與拒絕申請保護令案主，討論返家後續安全計畫 ②說服從事季節性工作案主，接受職訓找薪水穩定的工作 ③與獨居老人討論安裝緊急救援系統，以降低獨居風險 ④說服未婚懷孕青少女要出養嬰兒，才能接續完成高中學業',options:['A.①②','B.③④','C.②④','D.①③'],answer:'C',explanation:'解析：(C)①和服務對象討論，所以是有賦予權力，讓他思考和選擇②「說服」，也就是說由工作者說得算，讓服務對象沒得選，失去自主的能力③和服務對象討論，所以是有賦予權力，讓他思考和選擇④「說服」，也就是說由工作者說得算，讓服務對象沒得選，失去自主的能力'},
  {id:'sw_113_1_14',subject:'sw',year:113,session:1,num:14,categories:['sw_theory_other'],text:'Adams（2010）指出社會工作實務主要有三大面向工作。其中創造工作之內涵，下列敘述何者錯誤？',options:['A.跳脫例行性與程序性工作','B.綜理不同情境的訊息','C.適時地參與社會行動','D.分析複雜情境和問題'],answer:'C',explanation:'解析：(C)(A)(B)(C)(D)這題我不會QQ*找不到原文，只能推估可能是The Short Guide to Social Work(Robert Adams，2010)來的，大費周章查不到的東西，高機率只會出這次，若真的是重要文獻理論，肯定查得到，甚至有翻譯中文'},
  {id:'sw_113_1_15',subject:'sw',year:113,session:1,num:15,categories:['sw_nature_role'],text:'Beckett（2006）認為社會工作者角色分為三大類，其中直接改變之代理（agent）角色包括下列何者？①教育者 ②居間協調者 ③諮商者 ④催化者 ⑤直接倡導者',options:['A.①②③','B.①③④','C.②③⑤','D.②④⑤'],answer:'B',explanation:'解析：(B)①正確，是直接改變代理者②錯誤，是執行者③正確，是直接改變代理者④正確，是直接改變代理者⑤錯誤，是倡導者'},
  {id:'sw_113_1_16',subject:'sw',year:113,session:1,num:16,categories:['sw_theory_other'],text:'有關社會工作的理論與實務之間的關係，下列敘述何者錯誤？',options:['A.服務對象喜歡社會工作者清楚的告訴他們為什麼要這麼做','B.社會服務部門管理強調服務輸送的效率與效益','C.社會工作者必須向服務對象與經費提供者負責','D.社會工作者不需有太多工作假設，直觀地運用經驗處遇'],answer:'D',explanation:'解析：(D)(A)正確，可以避免誤會(B)正確，上層一天到晚都在要數字(C)正確，責信很重要(D)錯誤，需要假設目標結果才知道要做什麼行動。但實際上很多時候都直接用經驗去處理了'},
  {id:'sw_113_1_17',subject:'sw',year:113,session:1,num:17,categories:['sw_practice_other'],text:'對於社會工作者常運用的理論，下列敘述何者正確？①危機處遇－微觀理論 ②行為學派－中觀理論 ③系統理論－中觀理論 ④多元文化－巨觀理論 ⑤存在主義－巨觀理論',options:['A.①②③','B.①③④','C.②④⑤','D.③④⑤'],answer:'B',explanation:'解析：(B)①正確，危機介入是個案服務使用到的，所以是微觀②錯誤，行為學派是個案服務使用到的，所以是微觀③正確，系統非微觀也不是巨觀④正確，文化是一個很大的範圍⑤錯誤，是著重個體，是微觀'},
  {id:'sw_113_1_18',subject:'sw',year:113,session:1,num:18,categories:['sw_nature_role'],text:'協助服務對象覺知自己的固定行為表現是受到早年生活經驗所影響，以促使其進行適當地修正與控制，以免妨礙目前的社會生活功能，是屬於心理暨社會學派的那一種會談技巧？',options:['A.人與情境的反映性討論','B.型態－動力因素的反映性討論','C.人格發展因素的反映性討論','D.外在環境的反映性思考'],answer:'C',explanation:'解析：(C)(A)錯誤，題目不是提到人與情境(B)錯誤，題目不是提到型態－動力因素(C)正確，關鍵字「行為表現是受到早年生活經驗所影響」，符合人格發展的論述(D)錯誤，題目不是提到外在環境'},
  {id:'sw_113_1_19',subject:'sw',year:113,session:1,num:19,categories:['sw_theory_empower'],text:'社會工作者運用認知行為理論為服務對象發展處遇目標時，下列何者非屬主要關注焦點？',options:['A.改變不切實際的期待','B.修正不理性的自我對話','C.加強自我控制和自我管理','D.改善社會環境對服務對象的壓迫情形'],answer:'D',explanation:'解析：(D)(A)正確，認知行為中的認知(B)正確，認知行為中的認知(C)正確，認知行為中的行為(D)錯誤，這個比較偏向充權、賦權的理論'},
  {id:'sw_113_1_20',subject:'sw',year:113,session:1,num:20,categories:['sw_ethics_value'],text:'依據 James & Gilliand（2001）危機介入取向的觀點，將危機分為四種危機，下列何者錯誤？',options:['A.存在性危機（existential crisis）','B.發展性危機（developmental crisis）','C.意外性危機（accidental crisis）','D.需求性危機（demand crisi）'],answer:'D',explanation:'解析：(D)(A)存在性危機：懷疑人生，對於人生價值與定位感到茫茫。(我是誰我在哪裡我在做什麼)(B)發展性危機：生長過程中必須面臨到的各種轉捩點。例如：入學、畢業、考試、出社會、交往、結婚、生子(C)意外性危機：無法預料到的事件。例如：失業、離婚、出意外。(不出意外的話馬上就要出意外)(D)錯誤，應該改為環境性危機，像是天災、人禍'},
  {id:'sw_113_1_21',subject:'sw',year:113,session:1,num:21,categories:['sw_theory_problem'],text:'以任務中心取向，對於「任務」的解釋，下列敘述何者正確？',options:['A.任務主要是由服務對象的利害關係人訂定','B.任務的焦點放在增強服務對象不足的能力','C.任務較彈性，不用設定時間的完成期限','D.任務須具備有可欲性與可行性'],answer:'D',explanation:'解析：(D)(A)錯誤，由服務對象本人訂定(B)錯誤，專注在要完成的任務和目標上(C)錯誤，有時間限制(D)正確，任務目標必須可行、可達成'},
  {id:'sw_113_1_22',subject:'sw',year:113,session:1,num:22,categories:['sw_theory_problem'],text:'有關任務中心取向的任務（task），下列敘述何者錯誤？',options:['A.任務必然是服務對象之行動','B.任務是解決問題所需的努力或行動','C.任務是達成處遇目標之手段','D.任務可分為併行性任務和依序性任務'],answer:'A',explanation:'解析：(A)(A)錯誤，包含了服務對象和工作者各自要完成的行動(B)(C)正確，併在一起說就是，任務是為了解決問題達成目標的行動(D)正確，其中併行性任務又稱為同時性任務'},
  {id:'sw_113_1_23',subject:'sw',year:113,session:1,num:23,categories:['sw_theory_other'],text:'「增強權能取向」的處遇策略，在鉅視層面上可能會採用下列何種方法？',options:['A.個案工作','B.自助團體','C.社會行動','D.家庭協商'],answer:'C',explanation:'解析：(C)(A)錯誤，是微視(B)錯誤，是微視(C)正確，題目重點關鍵字「鉅視」，也就是改變鉅視面的權力結構(D)錯誤，是微視'},
  {id:'sw_113_1_24',subject:'sw',year:113,session:1,num:24,categories:['sw_practice_other'],text:'關於文化復原力的實務原則，下列敘述何者正確？',options:['A.忽略逆境中的結構性不利因素','B.重視文化連續感（cultural continuity）','C.聚焦個人特質的影響','D.服務時以社會工作者熟悉的語言為主'],answer:'B',explanation:'解析：(B)(A)錯誤，在文化鉅視角度上，結構性不利因素影響很大(B)正確，文化連續感是指該族群有能力「持續認識我們是誰」(C)錯誤，題目強調的是文化復原力，所以要聚焦在文化脈絡上(D)錯誤，要具備文化敏感度，以服務對象的語言為主'},
  {id:'sw_113_1_25',subject:'sw',year:113,session:1,num:25,categories:['sw_theory_other'],text:'有關靈性（spirituality）觀點在社會工作的運用，下列敘述何者正確？①社會工作強調身、心、靈、社會的全人關懷理念 ②社會工作專業早在 19 世紀末興起時，已經和宗教與靈性產生密切關係③社會工作的靈性觀點強調一種物質的世界 ④強調身、心、靈及社會彼此間的關係',options:['A.①②③','B.②③④','C.①②④','D.①③④'],answer:'C',explanation:'解析：(C)①正確②正確③明顯錯誤，並非強調一種物質的世界④正確'},
  {id:'sw_113_1_26',subject:'sw',year:113,session:1,num:26,categories:['sw_ethics_value'],text:'有關社會工作專業實務過程中，下列組合何者正確？①成熟明確的專業知識、原則及價值是專業服務的共同基礎 ②實踐社會工作助人使命只能仰賴社會工作價值與倫理 ③社會工作實務需要依循社會工作倫理原則 ④社會工作實務需要具備專業價值基礎的知識、倫理標準及相關法律',options:['A.①③④','B.①②④','C.②③④','D.①②③'],answer:'A',explanation:'解析：(A)①正確②錯誤，不只仰賴價值與倫理，能實踐助人使命的東西很多。解題技巧：「只能仰賴」，說得太死的東西通常有錯③正確，知識、倫理標準、相關法律都是④正確'},
  {id:'sw_113_1_27',subject:'sw',year:113,session:1,num:27,categories:['sw_theory_empower'],text:'有關社會建構主義（social constructivism）觀點，下列敘述何者正確？①包含反歧視、反壓迫的實務 ②採用增權觀點取向 ③認為社會工作者不夠了解個案 ④社會工作者必須接受服務對象對他人的歧視態度',options:['A.①②','B.②③','C.③④','D.①④'],answer:'A',explanation:'解析：(A)①正確，社會建構很常被用來探討社會是如何透過社會化、社會建構的方式，來形成現在歧視、壓迫的狀況，了解到這些現狀後，才能進一步致力於改善②正確，增權的目的在於減低弱勢族群遭受壓迫而產生的無力感，致力改善無力感的情況，激發服務對象的意念，以獲得權力和能力去掌控環境，提高掌控自我與環境的能力。③錯誤，在社會建構主義觀點下，「沒有事實，只有詮釋」，認為社會的事實是多數人主觀詮釋的結果，所以很難去判斷說工作者夠不夠了解個案④明顯錯誤'},
  {id:'sw_113_1_28',subject:'sw',year:113,session:1,num:28,categories:['sw_ethics_code'],text:'有關社會工作者與服務對象會談的相對保密，下列敘述何者錯誤？',options:['A.徵詢法律意見或個案研討','B.服務對象有明顯的自我傷害','C.非機構發言人，在網路上回應對機構服務對象之質疑言論','D.警告極有可能被服務對象傷害的第三人'],answer:'C',explanation:'解析：(C)(A)正確(B)正確(C)錯誤，不要亂說話(D)正確'},
  {id:'sw_113_1_29',subject:'sw',year:113,session:1,num:29,categories:['sw_practice_youth'],text:'某一社會工作者緊急安置保護某位兒少一段時間之後，面臨個案父母施壓想帶回兒少，社會工作者在查詢紀錄後，發現已經緊急安置兒少 6 個月了，此時社會工作者會被視為有違反何種倫理的風險窘境？',options:['A.怠職','B.瀆職','C.濫權','D.溺職'],answer:'A',explanation:'解析：(A)(A)正確，「應為而不為」。怠職是怠忽職守的意思，也就是應該去完成，卻沒有完成的，像是沒寫紀錄(B)錯誤，「不應為而為之」。瀆職是不應該去做，但做了。屬於錯誤且不法的。(C)錯誤，說文解字是「濫用權力」，也就是合法，但是不合理、不合乎道德的。像是主管討厭某員工，就分配比較多困難的工作給他(D)錯誤，教育部名詞說明為瀆職、失職、不盡職'},
  {id:'sw_113_1_30',subject:'sw',year:113,session:1,num:30,categories:['sw_theory_other'],text:'為解決案主所面臨的問題，社會工作者運用「增強權能」觀點，發展與增強服務使用者三方面的力量，有關此三方面的力量，下列何者錯誤？',options:['A.生物／基因','B.個人','C.人際','D.政治／社區'],answer:'A',explanation:'解析：(A)(A)錯誤，此非增強權能會討論的事項(B)正確(C)正確(D)正確'},
  {id:'sw_113_1_31',subject:'sw',year:113,session:1,num:31,categories:['sw_ethics_code'],text:'對於「專業倫理守則」的敘述，下列何者錯誤？',options:['A.指一個專業團體以集體自律的方式所訂定的守則或公約','B.以理論為中心，在施行上與個人價值相同','C.要求全體專業會員共同遵守的行為規範','D.通常對會員有強大而直接的約束力量'],answer:'B',explanation:'解析：(B)(A)正確，社會工作倫理守則就是由社會工作師公會全國聯合會訂定(B)錯誤，主要是集體的價值觀為主，所以和個人價值會不一樣(C)正確(D)正確'},
  {id:'sw_113_1_32',subject:'sw',year:113,session:1,num:32,categories:['sw_ethics_code'],text:'未滿 18 歲服務對象就醫時，醫生診治時發現疑似性侵案，通知社會工作者陪同就醫，但服務對象私下向社工表示是其和伴侶合意性行為，希望社工能保密。上述情境屬於何種倫理困境？',options:['A.尊重案主自決與法律規定責任通報的兩難','B.真誠原則與保護生命原則的兩難','C.不傷害原則與行善原則的兩難','D.保護生命原則與自由自主原則的兩難'],answer:'A',explanation:'解析：(A)(A)正確，題目提及到服務對象希望工作者保密，屬於案主自決，但法律規定上工作者就是得責任通報，所以兩難(B)錯誤，題目沒提及到(C)錯誤，題目沒提及到(D)錯誤，題目沒提及到'},
  {id:'sw_113_1_33',subject:'sw',year:113,session:1,num:33,categories:['sw_theory_other'],text:'有關幸福權中，人類社會三個根本「善」（goods）的敘述，下列何者正確？',options:['A.擁有支持性的社會網絡是一種「外在善」（external goods）','B.發展個人的自尊是一種「累加善」（additive goods）','C.維持穩定的住所和營養是一種「維持善」（nonsubtractive goods）','D.擁有親密的好友和寵物是一種「基本善」（basic goods）'],answer:'B',explanation:'解析：(B)(A)錯誤，是維持善(B)正確(C)錯誤，是基本善(D)錯誤，是維持善'},
  {id:'sw_113_1_34',subject:'sw',year:113,session:1,num:34,categories:['sw_practice_family'],text:'當兒少的原生家庭發生重大變故，因父母嚴重疏忽或虐待不適宜教養子女，透過社會工作者之協助，將兒少安置在政府核可的家庭，等問題改善，再重回其原生家庭。此種安排稱為？',options:['A.收養','B.出養','C.寄養','D.認養'],answer:'C',explanation:'解析：(C)(A)錯誤，收養又稱領養，是非具直系親子血緣的雙方透過法律認可建立形同血緣的親子關係，替兒童尋找一個永久家庭。方向：養父母從生父母接收親權(B)錯誤，出養相對於收養，指孩子的生父母透過法律的程序轉移父母的親權，是一種永久性替代原生家庭照顧孩子的方式。方向：生父母轉換親權給養父母(C)正確，寄養是當原生家庭發生重大變故、或生父母因嚴重疏忽或虐待等因素不適宜教養子女，短期內無法照顧孩子的狀況下，藉由社工專業提供孩子一個短期的替代性家庭照顧服務，將孩子安置在其他較適合的家庭中，待原生家庭解決問題後，孩子就能重回自己的家。(D)錯誤，認養是一種定期的金錢贊助方式，通常透過具公信力的社會福利機構捐款，協助貧苦無助的孩子得以維持溫飽或求學等，認養人可以藉著寫信或探訪與孩子建立關係，但不直接撫養亦無須法律認可。'},
  {id:'sw_113_1_35',subject:'sw',year:113,session:1,num:35,categories:['sw_practice_family'],text:'我國「家庭暴力防治法」中的相關規範，下列敘述何者錯誤？',options:['A.高級中等以下學校每學年應有 4 小時以上之家庭暴力防治課程，並得於總時數不變下，彈性安排於各學年實施','B.現有之同居關係適用家庭暴力防治法，而曾有之同居關係不適用家庭暴力防治法','C.保護令之聲請，由被害人之住居所地、相對人之住居所地或家庭暴力發生地之地方法院管轄','D.我國家庭暴力防治法已納入騷擾與跟蹤之行為'],answer:'B',explanation:'解析：(B)(A)正確(B)錯誤，曾同居伴侶也適用(C)正確(D)正確'},
  {id:'sw_113_1_36',subject:'sw',year:113,session:1,num:36,categories:['sw_theory_other'],text:'以能力為基礎（competency-based）的社會工作教育意涵，下列敘述何者錯誤？',options:['A.著重以技術為核心的實用性','B.關注實務導向的多元性與差異性','C.從事實務導向的研究','D.應有能力展現倫理與專業行為'],answer:'A',explanation:'解析：(A)(A)錯誤(B)正確，CSWE的九個核心能力的第二點(C)正確，CSWE的九個核心能力的第四點(D)正確，CSWE的九個核心能力的第一點'},
  {id:'sw_113_1_37',subject:'sw',year:113,session:1,num:37,categories:['sw_practice_other'],text:'下列何者屬於當代社會工作者應具備的多元文化能力內涵？',options:['A.社會工作者應堅守主流社會之價值理念','B.專業倫理應具備文化敏銳度','C.實務工作應避免挑戰社會秩序','D.實務過程應忽略文化壓迫'],answer:'B',explanation:'解析：(B)(A)錯誤，多元文化和主流文化或許有所衝突，不能堅守主流文化的價值(B)正確(C)錯誤，有時候主流文化所領導的社會秩序會有害於不同文化的族群(D)錯誤，文化壓迫在多元文化裡面是重要的概念'},
  {id:'sw_113_1_38',subject:'sw',year:113,session:1,num:38,categories:['sw_practice_youth'],text:'依照兒童及少年福利與權益保障法，村里幹事於執行業務時知悉兒童可能遭受身體虐待情形時，應立即向縣市主管機關通報，不得超過幾個小時？',options:['A.24 小時','B.36 小時','C.48 小時','D.72 小時'],answer:'A',explanation:'解析：(A)(A)正確，法定24小時(B)錯誤(C)錯誤(D)錯誤'},
  {id:'sw_113_1_39',subject:'sw',year:113,session:1,num:39,categories:['sw_practice_youth'],text:'青少年自殺防制之一、二級處置，核心要素包括下列何者？①問題解決能力 ②增加社會支持③憤怒與憂鬱管理 ④個別心理治療 ⑤減少酒類與毒品接觸',options:['A.①②③⑤','B.②③④⑤','C.①②④⑤','D.①③④⑤'],answer:'A',explanation:'解析：(A)④個別心理治療 ：屬於三級處置，和題目所敘述之一、二級處置不符'},
  {id:'sw_113_1_40',subject:'sw',year:113,session:1,num:40,categories:['sw_practice_disability'],text:'國際身心障礙者權益公約（CRPD）強調障礙者個人生活中有充分的參與權利，應能在社區中取得必要的生活支持與協助。下列敘述何者正確？',options:['A.如果家人無法提供照顧，障礙者就應該接受安排去住機構','B.自立生活指的是身心障礙者要儘可能的改變自己以符合社會期待，儘量做到不需要別人的協助','C.障礙者如果接受照顧服務就代表失去自我選擇的權利','D.正常化原則係指社會環境應確保身心障礙者能以公民身分被平等對待'],answer:'D',explanation:'解析：(D)(A)錯誤，障礙者若具備自理的能力，就可以在社區生活(B)錯誤，自立生活不見得都不用他人幫助，在部份協助下可以自立生活也屬之(C)錯誤，接受照顧服務不等同於失去自我選擇的權利(D)正確'},

  // ===== 113年下 社會工作（40題）=====
  {id:'sw_113_2_01',subject:'sw',year:113,session:2,num:01,categories:['sw_practice_medical'],text:'有關美國 1960 年代社會工作的醫療模式（medical model）發展之敘述，下列何者正確？',options:['A.醫療模式認為社會排除才是身心障礙者有障礙的主要因素','B.醫療模式介入重點包括微視系統和鉅視系統','C.醫療模式將問題焦點放置於疾病與障礙本身','D.醫療模式認為社會工作者是社會變遷媒介'],answer:'C',explanation:'解析：(C)(A)錯誤，醫療模式注重生理疾病本身，而社會模式認為社會排除才是身心障礙者有障礙的主要因素(B)錯誤，著重在微視的疾病與障礙本身，不包括鉅視(C)正確(D)錯誤，社會模式認為社會工作者是社會變遷媒介'},
  {id:'sw_113_2_02',subject:'sw',year:113,session:2,num:02,categories:['sw_practice_other'],text:'社會工作的發展受到社會變遷之影響，關於社會工作發展之敘述，下列何者正確？①社會工作以人為服務對象，高科技不會影響社會工作處遇 ②因為社會運動興起，我國各項福利服務自 1960年開始蓬勃發展 ③在社會變遷迅速下，社會工作實施領域應擴大，工作模式或方法應求新或適度修正 ④為因應多元文化社會發展趨勢，社會工作者應具備多元文化素養',options:['A.①③','B.②③','C.①④','D.③④'],answer:'D',explanation:'解析：(D)①錯誤，高科技會影響社會工作，例如電腦化、資訊化②錯誤，1960年代還在戒嚴，不太可能出現社會運動③正確④正確'},
  {id:'sw_113_2_03',subject:'sw',year:113,session:2,num:03,categories:['sw_theory_other'],text:'社會工作的工作面向相當多元，Payne（2011）從國際社會工作的定義來看社會工作者的工作面向時，未包括下列何種觀點？',options:['A.政治觀點','B.治療觀點','C.社會秩序觀點','D.轉型觀點'],answer:'A',explanation:'解析：(A)(A)錯誤，無此觀點(B)正確，治療觀點：社會工作藉由促進個人成長和自我實現，以追求服務對象的最佳福祉(C)正確，社會秩序觀點：將社會工作視為個人的福利服務，維持社會秩序，重點在於使陷入困境的個人，能夠儘快的回復正常。此觀點偏向自由、理性經濟政治哲學的觀點，強調在經濟市場中的個人自由(D)正確，轉型觀點：此觀點認為必須為了被壓迫者、貧窮者而去改變社會，只有社會改變，弱勢以及受迫者才能獲得充權。強調計畫經濟和社會介入，以促進社會公平與正義'},
  {id:'sw_113_2_04',subject:'sw',year:113,session:2,num:04,categories:['sw_nature_professional'],text:'有關綜融社會工作方法之步驟，下列實施程序何者正確？',options:['A.評量→行動→計畫→評鑑→結案','B.計畫→評量→行動→評鑑→結案','C.計畫→行動→評量→評鑑→結案','D.評量→計畫→行動→評鑑→結案'],answer:'D',explanation:'解析：(D)(A)錯誤，解題技巧：行動不會在計畫之前(B)錯誤，解題技巧：要先分析評量之後，才有辦法擬定計畫(C)錯誤，解題技巧：要先分析評量之後，才有辦法擬定計畫(D)正確'},
  {id:'sw_113_2_05',subject:'sw',year:113,session:2,num:05,categories:['sw_theory_other'],text:'社會工作實施取向的發展歷史中，下列何種服務方法發展的最晚？',options:['A.社會團體工作','B.社會個案工作','C.整合模式社會工作方法','D.社區工作'],answer:'C',explanation:'解析：(C)(A)錯誤(B)錯誤(C)正確，解題技巧：所謂的整合，就是已經有了很多參考的理論，再加以匯集(D)錯誤'},
  {id:'sw_113_2_06',subject:'sw',year:113,session:2,num:06,categories:['sw_nature_role'],text:'下列何者不屬於社會工作「系統維護者」的角色內涵？',options:['A.建議同仁在會議中討論問題','B.對需要福利資訊的服務對象提供專業諮詢','C.分析辨識組織與服務輸送障礙因素','D.對不同專業團隊成員提供專業諮詢'],answer:'B',explanation:'解析：(B)(A)正確，社會工作人員有責任評估組織機構、機構政策，與阻礙有效服務輸送的機構內部功能的角色(B)錯誤(C)正確，社會工作人員有責任評估組織機構、機構政策，與阻礙有效服務輸送的機構內部功能的角色(D)正確，在執行這類的角色時，若社會工作人員缺乏相關的專業知識，可以諮詢機構督導或是其他專業人員'},
  {id:'sw_113_2_07',subject:'sw',year:113,session:2,num:07,categories:['sw_nature_professional'],text:'有關綜融社會工作的敘述，下列何者錯誤？',options:['A.強調一般性而非複雜性問題的解決','B.強調要同時關注人與環境的互動關係','C.強調應將阻礙求助對象需求滿足或功能發揮的相關系統也視為服務對象','D.強調要考慮社會工作與服務對象之周圍人士的互動關係'],answer:'A',explanation:'解析：(A)(A)錯誤，強調複雜性而非一般性問題的解決(B)正確，綜融社會工作和生態系統理論有著密切關係(C)正確，綜融社會工作和生態系統理論有著密切關係(D)正確，綜融社會工作和生態系統理論有著密切關係'},
  {id:'sw_113_2_08',subject:'sw',year:113,session:2,num:08,categories:['sw_theory_other'],text:'下列那個社會工作理論主要是根據馬克思主義（Marxism）所發展而來？',options:['A.反壓迫實務','B.基變社會工作','C.女性主義社會工作','D.充權觀點'],answer:'B',explanation:'解析：(B)(A)錯誤(B)正確(C)錯誤(D)錯誤'},
  {id:'sw_113_2_09',subject:'sw',year:113,session:2,num:09,categories:['sw_theory_psychosocial'],text:'下列何者為心理暨社會學派的主要限制？',options:['A.無法兼顧不同利益團體','B.太過強調服務對象之正向思考','C.未能充分關切社會變遷的影響力','D.過度重視文化差異'],answer:'C',explanation:'解析：(C)(A)錯誤(B)錯誤(C)正確(D)錯誤'},
  {id:'sw_113_2_10',subject:'sw',year:113,session:2,num:10,categories:['sw_practice_youth'],text:'沉迷於線上遊戲的中輟少年認為自己是沒有用的人，怎麼努力都沒有用，人際關係也差。社會工作者可運用何種理論觀點來修正其原有信念並增強其正向的行為？',options:['A.精神分析學派','B.認知行為學派','C.優勢觀點','D.增強權能觀點'],answer:'B',explanation:'解析：(B)(A)錯誤(B)正確(C)錯誤(D)錯誤'},
  {id:'sw_113_2_11',subject:'sw',year:113,session:2,num:11,categories:['sw_theory_problem'],text:'任務中心取向在評估服務對象的標的問題時，下列敘述何者正確？',options:['A.標的問題可以是尚未明確的','B.標的問題以負向方式表達','C.標的問題將焦點擺在其他利害關係人身上','D.標的問題是服務對象表示願意處理的問題'],answer:'D',explanation:'解析：(D)(A)錯誤(B)錯誤(C)錯誤(D)正確'},
  {id:'sw_113_2_12',subject:'sw',year:113,session:2,num:12,categories:['sw_practice_other'],text:'服務對象 A 是美好社區的獨居長者，先生過世，無子女，經濟來源是微薄的退休金。近日其因為骨折入院，社會工作者在進行其社會支持網絡評量時，下列敘述何者錯誤？',options:['A.分析網絡中的人對於服務對象所提供的支持類型與程度','B.了解其社會關係網絡人數與接觸頻率','C.網絡支持的對象可以分為個人層次和社區層次','D.社會支持網絡無法使用量化工具評估'],answer:'D',explanation:'解析：(D)(A)正確(B)正確(C)正確(D)錯誤，有社會支持量表可以做使用'},
  {id:'sw_113_2_13',subject:'sw',year:113,session:2,num:13,categories:['sw_theory_other'],text:'有關「增強權能與倡導觀點」的敘述，下列何者正確？',options:['A.個人被視為個案，重視個案的症狀診斷治療','B.以個人問題為焦點','C.處遇計畫主要是依據社工人員的設計','D.相信個人與家庭是解決問題的專家'],answer:'D',explanation:'解析：(D)(A)錯誤(B)錯誤(C)錯誤(D)正確'},
  {id:'sw_113_2_14',subject:'sw',year:113,session:2,num:14,categories:['sw_theory_other'],text:'下列何者不是社會工作的微視理論？',options:['A.危機介入模式','B.任務中心模式','C.增權與倡導取向','D.問題解決學派'],answer:'C',explanation:'解析：(C)(A)正確(B)正確(C)錯誤(D)正確'},
  {id:'sw_113_2_15',subject:'sw',year:113,session:2,num:15,categories:['sw_theory_feminist'],text:'在女性主義流派中，認為男女並無本質差異，是社會結構對於女性造成歧視與不公，追求的是女性個人的自我實現的機會，與國家在政策和公領域層面的性別平等。此流派係屬下列何者？',options:['A.自由主義女性主義','B.社會主義女性主義','C.文化主義女性主義','D.激進主義女性主義'],answer:'A',explanation:'解析：(A)(A)正確(B)錯誤(C)錯誤(D)錯誤'},
  {id:'sw_113_2_16',subject:'sw',year:113,session:2,num:16,categories:['sw_nature_role'],text:'關於反歧視及反壓迫的社會工作實務，下列敘述何者正確？',options:['A.協助服務對象時，以專家角色自居提供正確改善方法','B.聚焦於服務對象的問題，焦點在於修正其非理性思維','C.以病理角度分析服務對象的問題，強調客觀中立價值','D.關注資源的可近性及服務對象所處文化脈絡的特殊需求'],answer:'D',explanation:'解析：(D)(A)錯誤，以夥伴的角色介入和服務對象一起工作(B)錯誤，修正非理性思維是行為認知學派(C)錯誤，這是診斷派的論述(D)正確，關注社會文化的壓迫，是環境導致服務對象產生狀況的看更多：1.認知行為學派2.心理暨社會學派(診斷派)3.增強權能'},
  {id:'sw_113_2_17',subject:'sw',year:113,session:2,num:17,categories:['sw_practice_disability'],text:'社會工作者在協助心智障礙者的案主自決（client self-determination）時，下列何者不包括在內？',options:['A.協助案主看清他的問題與需要','B.幫助案主認識社區的相關資源','C.激發案主的潛能','D.善用他人替代決策'],answer:'D',explanation:'解析：(D)(A)正確(B)正確(C)正確(D)錯誤，題目要案主自決，不是他人替代決策'},
  {id:'sw_113_2_18',subject:'sw',year:113,session:2,num:18,categories:['sw_ethics_code'],text:'甲教養院院長以提供服務對象最適切環境為由，將某次設施設備採購招標底標資料透露給特定廠商。其行為屬於下列何種過失？',options:['A.濫權','B.瀆職','C.怠職','D.侵占'],answer:'B',explanation:'解析：(B)(A)錯誤，說文解字是「濫用權力」，也就是合法，但是不合理、不合乎道德的。像是主管討厭某員工，就分配比較多困難的工作給他(B)正確，「不應為而為之」。瀆職是不應該去做，但做了。屬於錯誤且不法的。(C)錯誤，「應為而不為」。怠職是怠忽職守的意思，也就是應該去完成，卻沒有完成的，像是沒寫紀錄(D)錯誤，侵占為將非自己所有之物占為己有看更多：業務過失'},
  {id:'sw_113_2_19',subject:'sw',year:113,session:2,num:19,categories:['sw_theory_eco'],text:'關於社會工作的假設前提，下列何者錯誤？',options:['A.社會工作的介入可減緩問題的嚴重性','B.肯定每個人存在的重要性','C.接受人的互動過程中可能產生各種需求','D.強調個體在與環境互動中，都應該先改變環境'],answer:'D',explanation:'解析：(D)(A)正確(B)正確(C)正確(D)錯誤，改變環境是個方法，但不是絕對且優先的看更多：生態系統觀點'},
  {id:'sw_113_2_20',subject:'sw',year:113,session:2,num:20,categories:['sw_ethics_value'],text:'癌症末期的服務對象要求社會工作者不要告知其家人真實病情，並決定放棄治療。上述情形係屬何種社會工作倫理與價值議題？',options:['A.關係界線','B.價值涉入','C.自我決定','D.業務過失'],answer:'C',explanation:'解析：(C)(A)錯誤(B)錯誤(C)正確，題目所描述的是案主自決的範疇(D)錯誤看更多：社會工作倫理'},
  {id:'sw_113_2_21',subject:'sw',year:113,session:2,num:21,categories:['sw_theory_other'],text:'有關道德相對論之主要觀點，下列何者錯誤？',options:['A.因倫理之標準不一，故而需要有權力者訂定之','B.因社會文化差異性，故而沒有普遍性倫理標準','C.因個體生命經驗不同，故而有不同的價值','D.因社會時代變遷，故而無法有絕對客觀的倫理標準'],answer:'A',explanation:'解析：(A)(A)錯誤，道德相對論主張的是沒有一個統一標準的答案(B)正確(C)正確(D)正確看更多：社會工作之倫理哲學理論'},
  {id:'sw_113_2_22',subject:'sw',year:113,session:2,num:22,categories:['sw_practice_family'],text:'某社會工作者對經濟弱勢之受助家庭態度消極和不尊重，辯稱：「這些人都是福利依賴者，就算自己積極幫助也沒有用，反正他們也不會想改變什麼。」依據 Bandura（1986）的道德解離（mora disengagement）理論，上述情形屬於下列何種行為反應？',options:['A.責任存有','B.以權謀私','C.責任分散','D.非人性化'],answer:'D',explanation:'解析：(D)(A)錯誤，存有責任的話會講這種話???(B)錯誤，本題沒有提到工作者用手上的權力謀取自已的利益(C)錯誤，責任分散指的是因共同負責任，使自己會降低道德警覺，像是詐騙產業鏈(D)正確，貶低服務對象，來降低自己的愧疚感看更多：社會工作倫理'},
  {id:'sw_113_2_23',subject:'sw',year:113,session:2,num:23,categories:['sw_theory_eco'],text:'系統理論中強調對於服務對象面臨的問題須以「人在情境」的觀點剖析，下列敘述何者錯誤？',options:['A.個人與社會系統間有交互關係','B.各系統間存在著界線，各系統無法流動運行','C.社會工作者與服務對象間的關係是具有協商性的夥伴關係','D.個人會積極參與改變環境，環境也會形塑個人發展'],answer:'B',explanation:'解析：(B)(A)正確(B)錯誤，各系統會流動運行(C)正確(D)正確看更多：一般系統理論'},
  {id:'sw_113_2_24',subject:'sw',year:113,session:2,num:24,categories:['sw_ethics_code'],text:'關於社會工作者面對倫理衝突時，所依據之社會工作師倫理守則，下列敘述何者錯誤？',options:['A.社會工作者完全依循服務對象的自我決定權','B.社會工作者選擇保護服務對象的方法，不得與欲達成的目的有不相符合之損害','C.社會工作者有多種達成目標的方法時，應選擇服務對象的最佳權益、最少損害為原則','D.社會工作者採取之方法有助於爭取服務對象之利益'],answer:'A',explanation:'解析：(A)(A)錯誤，不可能完全案主自決(B)正確(C)正確(D)正確看更多：社會工作倫理兩難的抉擇原則'},
  {id:'sw_113_2_25',subject:'sw',year:113,session:2,num:25,categories:['sw_practice_medical'],text:'某癌末病人婉拒醫師採取安寧療護的建議，堅持要出院返家，不願再接受任何治療，經過社會工作者會談後，尊重其意願，這是符合社會工作倫理的那項原則？',options:['A.真誠原則','B.最小傷害原則','C.保護生命原則','D.自由自主原則'],answer:'D',explanation:'解析：(D)(A)錯誤(B)錯誤(C)錯誤(D)正確，題目關鍵字：尊重其意願看更多：社會工作倫理兩難的抉擇原則'},
  {id:'sw_113_2_26',subject:'sw',year:113,session:2,num:26,categories:['sw_ethics_value'],text:'當服務對象已死亡，社會工作者對於服務過程中的紀錄和報告應妥善保管，避免不當使用或外洩，這是社會工作倫理所強調的何種原則？',options:['A.維護隱私原則','B.真誠原則','C.平等原則','D.個別化原則'],answer:'A',explanation:'解析：(A)(A)正確，題目問的是保管紀錄和報告(B)錯誤(C)錯誤(D)錯誤看更多：社會工作倫理'},
  {id:'sw_113_2_27',subject:'sw',year:113,session:2,num:27,categories:['sw_practice_school'],text:'服務對象是未成年之高二生，從小與爺爺相依為命。爺爺罹患重度失智症後，他為照顧爺爺經常不穩定就學，最後成為中途離校生。學校社會工作者家訪後發現，服務對象將爺爺照顧得很好，兩人目前是靠爺爺退休金和存款能維持生計。社工與服務對象會談後，其仍決定先照顧爺爺。社工應以何種準則作為倫理抉擇？',options:['A.不應尊重服務對象的決定，因為個人幸福權優先於他人的自由權','B.應該尊重服務對象的決定，因為保護生命原則優先於自主自由原則','C.不應尊重服務對象的決定，因為生活品質優先於自主自由原則','D.應該尊重服務對象的決定，因為個人自由權優先於個人的基本幸福權'],answer:'D',explanation:'解析：(D)(A)錯誤，此題幹要表達的是服務對象決定要照顧爺爺，同時面臨到自己的幸福權問題，而個人幸福權優先於他人的自由權沒錯，但本題是個人的自由權，而不是他人的自由權。所以答非所問(B)錯誤，本題並沒有提到生命原則(C)錯誤，個人自由權>個人基本幸福權(D)正確看更多：社會工作倫理兩難的抉擇原則'},
  {id:'sw_113_2_28',subject:'sw',year:113,session:2,num:28,categories:['sw_practice_family'],text:'關於「原住民族家庭服務中心」的敘述，下列何者錯誤？',options:['A.服務扎根部落與社區','B.執行巡迴督導計畫','C.推行福利關懷諮詢服務與個案管理','D.建立服務地區人文與福利人口群統計資料'],answer:'B',explanation:'解析：(B)(A)正確(B)錯誤，家庭服務中心定位為原住民部落的社福中心(C)正確(D)正確'},
  {id:'sw_113_2_29',subject:'sw',year:113,session:2,num:29,categories:['sw_practice_family'],text:'有關單親家庭可能需要關注的議題，下列何者錯誤？',options:['A.角色負荷過重','B.未成年子女親職化','C.繼親屬難負管教之責','D.情緒及心理調適'],answer:'C',explanation:'解析：(C)(A)正確(B)正確(C)錯誤，題目問的是單親家庭，不是重組家庭(D)正確'},
  {id:'sw_113_2_30',subject:'sw',year:113,session:2,num:30,categories:['sw_ethics_value'],text:'關於人權歷史發展的敘述，下列何者正確？',options:['A.「世界人權宣言」宣示人人享有言論和信仰自由','B.第一代人權著重於社會、經濟及文化權利','C.「公民權利和政治權利國際公約」比「世界人權宣言」來得早','D.第二代人權著重於集體權利'],answer:'A',explanation:'解析：(A)(A)正確(B)錯誤，第一代人權是「消極人權」，主張個人權益不被侵犯，像是自由權、參政權、財產權(C)錯誤，「公民權利和政治權利國際公約」是1966年，「世界人權宣言」是1948年(D)錯誤，第二代是「積極人權」，主張人民積極爭取滿足日常所需的權利，像是生存權、工作權、健康權。而「集體權利」是第三代人權，主張保障弱勢族群權利'},
  {id:'sw_113_2_31',subject:'sw',year:113,session:2,num:31,categories:['sw_nature_professional'],text:'離婚子女監護權爭訟過程中，可能會出現所謂的「親子疏離症」。有關「親子疏離症」的敘述，下列何者正確？',options:['A.子女會主動積極遊說父母雙方復合','B.子女會對父母雙方皆充滿不捨','C.子女會對父母感到混淆、矛盾，不知如何與父母互動','D.父母會同時疏忽子女的需求'],answer:'C',explanation:'解析：(C)(A)錯誤(B)錯誤(C)正確，親子疏離症是指有些父母會在孩子面前故意說另一方的壞話，想讓孩子討厭對方、支持自己，把孩子當成爭奪監護權的工具或籌碼來利用。(D)錯誤'},
  {id:'sw_113_2_32',subject:'sw',year:113,session:2,num:32,categories:['sw_nature_professional'],text:'若移民者為捍衛自己的文化，刻意避免和主流社會接觸，僅限於跟自己的族群互動，是屬於下列那一種應對方式？',options:['A.邊緣化（marginalization）','B.隔離（separation）','C.同化（assimilation）','D.整合（integration）'],answer:'B',explanation:'解析：(B)(A)錯誤，這詞通常是被動的狀態，像是被排擠的狀態，但題目敘述的是，自我隔離而不是被主流社會排擠(B)正確，關鍵字：避免和主流社會接觸，也就是自我隔離(C)錯誤，同化是指融入主流社會，同時失去自己原本的模樣(D)錯誤，整合是不失去自己的模樣的同時，融入主流社會當中'},
  {id:'sw_113_2_33',subject:'sw',year:113,session:2,num:33,categories:['sw_theory_other'],text:'下列何者屬於反壓迫實務工作（anti-oppressive practice）之干預策略？',options:['A.著重以專家角度提供服務對象建議','B.以病理觀點分析服務對象之問題','C.避免觸及改變社會結構之相關議題','D.協助並提升服務對象之意識覺醒'],answer:'D',explanation:'解析：(D)(A)錯誤，這其實是一種壓迫，要服務對象聽從專家的建議(B)錯誤，病理觀點就是一種認為服務對象的狀況是種問題的壓迫(C)錯誤，壓迫是源自於社會結構，因此反壓迫的實務工作就會面臨到改變結構的議題(D)正確'},
  {id:'sw_113_2_34',subject:'sw',year:113,session:2,num:34,categories:['sw_practice_medical'],text:'在長期照顧領域的社會工作者需具備運用高齡與長期照顧方面的各種常用評估量表。下列組合何者正確？①社區常用評估認知障礙症的 AD-8 量表＞2 分表示需轉介醫療專業評估 ②評估憂鬱狀況可借助 MMSE 量表 ③長輩術後返家申請居家服務，評估基本行走與個人衛生自理能力需借助 IADL 量表 ④長輩術後或經歷生活重大失落等急性壓力事件後，出現視幻覺、被害妄想等疑似譫妄行為，應轉介醫療專業處理',options:['A.①②','B.③④','C.②③','D.①④'],answer:'D',explanation:'解析：(D)①AD-8 量表為極早期失智症篩檢量表，得分大於兩分就建議接受專科醫師進一步評估②錯誤，MMSE是認知功能評估量表，評估失智症的③錯誤，IADL是「工具性」日常生活活動量表，而評估能力的是用ADL④正確'},
  {id:'sw_113_2_35',subject:'sw',year:113,session:2,num:35,categories:['sw_practice_family'],text:'下列何者是兒童及少年保護的第三級預防工作？',options:['A.家庭支持方案','B.家庭訪視方案','C.寄養家庭方案','D.社區宣導方案'],answer:'C',explanation:'解析：(C)(A)錯誤，第二級預防，早期介入脆弱家庭(B)錯誤，第二級預防，早期介入脆弱家庭(C)正確，第三級預防是立即終止受虐狀況，協助安置隔離(D)錯誤，宣導為第一級預防'},
  {id:'sw_113_2_36',subject:'sw',year:113,session:2,num:36,categories:['sw_practice_youth'],text:'針對有童年逆境且受性剝削的青少年，社會工作者運用創傷知情（trauma informed）觀點之實務處置，下列敘述何者錯誤？',options:['A.設定界線，提升對健康人際互動的期望','B.運用心理教育性團體，逐次建立關係','C.關注青少年羞恥感與罪惡感受','D.即時採取價值觀修正之認知教育'],answer:'D',explanation:'解析：(D)(A)正確(B)正確(C)正確，創傷知情照護模式強調「理解創傷」，故關注青少年感受為正確(D)錯誤，創傷知情觀點是理解並同理服務對象，而非採取認知修正'},
  {id:'sw_113_2_37',subject:'sw',year:113,session:2,num:37,categories:['sw_practice_disability'],text:'疫病蔓延影響日常生活，有關實踐身心障礙者權利公約（CRPD）對身心障礙者權益保障原則的措施，包括下列何者？①補助藥局增改建無障礙設施 ②醫護人員戴口罩阻礙聽障者讀唇語，如病人是聽障者，可例外不戴 ③口罩均須憑證購買，提供特殊需求者個別配送，破壞公平機制④為身心障礙者研製特殊口罩，如小耳症',options:['A.①②','B.③④','C.①④','D.②③'],answer:'C',explanation:'解析：(C)①正確②錯誤，看起來是用心良苦，但實則會造成雙方陷入感染的風險之中③錯誤，看起來就很相反④正確'},
  {id:'sw_113_2_38',subject:'sw',year:113,session:2,num:38,categories:['sw_practice_school'],text:'有關學校社會工作者提供教師諮詢（consultation）服務有效性原則，下列敘述何者正確？',options:['A.僅處理在規劃好的標準化服務問題','B.目的在解決教師（諮詢者）工作有關的問題','C.可以依據長官指派主動處置特定教師的問題','D.可以無需顧慮同事職場關係將諮詢內容公開'],answer:'B',explanation:'解析：(B)(A)錯誤，那你就只是個答錄機(B)正確(C)錯誤，諮詢是等人來問，不是主動督導對方(D)錯誤，需要注意保密原則'},
  {id:'sw_113_2_39',subject:'sw',year:113,session:2,num:39,categories:['sw_practice_work'],text:'根據國際員工協助方案協會（EAPA）之學者研究，員工協助方案可以協助職場提升三大面向的價值，係屬下列那三大面向?',options:['A.社會投資成本、人力資本價值、健康成本','B.職場組織收益、人力資本價值、健康成本','C.職場組織收益、人力資本價值、員工家庭價值','D.職場經營成本、社會投資成本、人力資本價值'],answer:'B',explanation:'解析：(B)(A)錯誤(B)正確，讓員工健康，提升人力價值，才能讓組織賺錢(C)錯誤(D)錯誤'},
