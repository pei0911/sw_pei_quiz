  {id:'sw_113_2_40',subject:'sw',year:113,session:2,num:40,categories:['sw_practice_medical'],text:'腦中風病人住院治療 1 個月後，病況穩定，由社會工作者偕同醫療團隊，提供家屬慢性療養資訊，並協助家屬將服務對象轉至社區養護機構照護，上述情形屬何種專業服務？',options:['A.安寧療護服務','B.出院準備服務','C.緊急安置服務','D.中期照護服務'],answer:'B',explanation:'解析：(B)(A)錯誤，題目可沒說到居家安寧的任何關鍵字(B)正確，就是出院返回社區照顧(C)錯誤，緊急安置通常是沒有家屬的處理方式，與題幹不符(D)錯誤，中期照護是不符合住院條件，但仍需要復健，先去復健後再返家，但題目已經提到協助家屬將服務對象轉至社區養護機構照護，屬於返家的部分'},

  // ===== 110年上 社會工作直接服務（40題）=====
  {id:'ds_110_1_01',subject:'ds',year:110,session:1,num:1,categories:['ds_case_concept'],
   text:'有關個案工作的發展脈絡，下列敘述何者正確？',
   options:['A.因為佛洛伊德學說使社會工作專業反省貧窮、失業無法做個人性的單純歸因','B.因為人類行為科學諸多學說出現，所以美國自1960至70年代開始重視機構責信（accountability）','C.因為後現代主義與社工專業自我反思，而強調應建立案主與社工夥伴式專業關係','D.目前個案工作採用的是生態觀點和系統理論，而不是綜融取向社會工作'],
   answer:'C',explanation:'(A)佛洛伊德學說偏向個人歸因，而非使社工反省環境歸因。(B)機構責信概念隨1980年代新管理主義出現，非1960-70年代。(C)正確，後現代主義影響下強調社工與案主建立夥伴式專業關係。(D)現行社工如脆弱家庭服務偏向綜融取向。'},
  {id:'ds_110_1_02',subject:'ds',year:110,session:1,num:2,categories:['ds_case_theory'],
   text:'關於「以證據為基礎的實務」（evidence-based practice）之敘述，下列何者錯誤？',
   options:['A.強調提升服務的效益，並免去資源浪費','B.強調服務輸送的有效性，以最適當地滿足服務使用者的需求','C.強調提升社會工作者運用研究結果與執行研究的能力','D.強調書面工作手冊是培養社會工作者「以證據為基礎」服務能力的最好方法'],
   answer:'D',explanation:'以證據為基礎的實務（EBP）三大要素：①實務工作者的專業知識、②案主屬性、③最佳研究證據。「書面工作手冊」並非最好方法，EBP強調整合研究證據與專業判斷，故D錯誤。'},
  {id:'ds_110_1_03',subject:'ds',year:110,session:1,num:3,categories:['ds_case_theory'],
   text:'單案研究設計（single-system design）乃是根據可衡量的目標與可達成的目的進行評估。有關單案研究設計的敘述何者正確？',
   options:['A.需要分為實驗組及控制組，以比較服務介入產生之差異','B.需要進行隨機抽樣，以使研究結果更具推論性','C.需要執行前測和後測，以觀察服務介入的進展','D.家庭社會工作之評估不適合使用單案研究設計'],
   answer:'C',explanation:'單案研究設計針對單一個案，不需實驗組控制組或隨機抽樣。核心是觀察處遇前（基線期）與處遇後的變化，即需要前測和後測來評估介入效果，故C正確。'},
  {id:'ds_110_1_04',subject:'ds',year:110,session:1,num:4,categories:['ds_case_process'],
   text:'下列何者屬於對案主認知功能的評估？①現實感 ②自殺意圖 ③情感性疾病 ④自我概念',
   options:['A.①②','B.②③','C.③④','D.①④'],
   answer:'D',explanation:'認知功能的評估包含：現實感（①）和自我概念（④）。自殺意圖（②）屬行為/情緒評估，情感性疾病（③）屬情緒/精神狀況評估，均非認知功能的評估範疇，故選D。'},
  {id:'ds_110_1_05',subject:'ds',year:110,session:1,num:5,categories:['ds_case_skill'],
   text:'會談是社會個案工作的主要工作方法，下列敘述何者錯誤？',
   options:['A.會談過程中的對話與互動受到專業倫理的約束','B.會談雖有基本共同的內容，但每個個案的會談內容仍保有一定程度的個別化','C.每一次會談可達成有限的目的，多次會談累積後可達成服務目的','D.參與會談的個案與社會工作者都需承擔開啟會談的責任'],
   answer:'D',explanation:'社工是專業助人者，有責任開啟並引導會談，不能等待案主開口讓會談僵持。開啟會談主要是社工的責任，故D錯誤。'},
  {id:'ds_110_1_06',subject:'ds',year:110,session:1,num:6,categories:['ds_case_ethics'],
   text:'倫理決策是一個謹慎的過程，當社會工作者面對倫理困境時，下列那一項處理原則錯誤？',
   options:['A.要充分了解社會工作者的法律責任與義務','B.要同時考量倫理議題的脈絡與情境面向','C.當不同價值間有所衝突時，以法律規範為最優先之考量','D.過程中需記錄重要的倫理決策與判斷'],
   answer:'C',explanation:'倫理決策並非以法律規範為最優先。在某些情況下，倫理考量可能高於法律規定。「法律規範最優先」的說法過於絕對，故C錯誤。'},
  {id:'ds_110_1_07',subject:'ds',year:110,session:1,num:7,categories:['ds_group_concept'],
   text:'下列敘述何者正確？①有人會隱藏在團體裡造成「社會打混」（social loafing）的現象 ②「社會打混」的結果，會引起工作賣力成員的不滿，而導致衝突 ③團體成員的增加必然可以使團體績效相對提高 ④團體成員付出較少的努力，而隨著團體移動前進的情況，稱之為「搭便車效益」（free rider effect） ⑤團體裡有「搭便車」的人，後續難免出現冤大頭效益（sucker effect）',
   options:['A.①②③','B.①②④','C.①②④⑤','D.②③④⑤'],
   answer:'C',explanation:'①社會打混確實存在；②打混結果會引起賣力成員不滿導致衝突，正確；③成員增加不必然提高績效，③錯誤；④搭便車效益定義正確；⑤冤大頭效益（sucker effect）是指努力的人因他人搭便車而降低努力，正確。故選C（①②④⑤）。'},
  {id:'ds_110_1_08',subject:'ds',year:110,session:1,num:8,categories:['ds_group_theory'],
   text:'有關互惠模型（reciprocal model）的敘述，下列何者錯誤？',
   options:['A.互惠模型強調成員間的自助與互助系統','B.互惠模型的工作者角色主要是使能者','C.互惠模型的目標是治療與復健','D.互惠模型重視成員與社會環境的關係'],
   answer:'C',explanation:'「治療與復健」是治療模型（remedial model）的目標，而非互惠模型。互惠模型強調成員間創造自助與互助的體系，故C錯誤。'},
  {id:'ds_110_1_09',subject:'ds',year:110,session:1,num:9,categories:['ds_group_skill'],
   text:'團體工作者於帶領非自願團體時，下列那些處遇較為適當？①培養幾位團體成員，促成更多正向團體互動 ②不讓成員有宣洩太多被迫害的負面情緒 ③指出成員違法亂紀的行為並催化其改變動機 ④採用優勢觀點帶領團體',
   options:['A.①②','B.①③','C.①③④','D.②③④'],
   answer:'C',explanation:'帶領非自願團體適當做法：①培養正向成員帶動互動、③指出不當行為並催化改變動機、④採用優勢觀點，均適當。②「不讓成員宣洩負面情緒」不恰當，適當的情緒宣洩有助於建立關係，故選C（①③④）。'},
  {id:'ds_110_1_10',subject:'ds',year:110,session:1,num:10,categories:['ds_group_ethics'],
   text:'下列那一種團體最有可能有違 Gisela Konopka 所提社會團體工作倫理的界線？',
   options:['A.自我成長團體（self-growth group）','B.自助團體（self-help group）','C.遭受性剝削的青少年被強制要求參加的治療性團體','D.親職教育團體'],
   answer:'C',explanation:'Konopka強調社會團體工作的倫理包含自願參與、尊重成員的自我決定等。強制青少年參加治療性團體，違反了自願原則及案主自決原則，最有可能違反社會團體工作的倫理界線。'},
  {id:'ds_110_1_11',subject:'ds',year:110,session:1,num:11,categories:['ds_comm_concept'],
   text:'當社區的需求係由既有的標準或指標而來，係屬於下列何種性質的需求？',
   options:['A.感覺性需求（felt need）','B.規範性需求（normative need）','C.表達性需求（expressed need）','D.比較性需求（comparative need）'],
   answer:'B',explanation:'Bradshaw需求類型：規範性需求（normative need）是由既有的標準、指標或法規定義出來的需求，如國際標準、政府規定等。'},
  {id:'ds_110_1_12',subject:'ds',year:110,session:1,num:12,categories:['ds_comm_model'],
   text:'若採用「社區教育模式」來進行社區工作，社區工作者會有下列那些作法？①鎖定某個特別貧窮的區域設置補充教育 ②設置低階勞工或社區居民的成人教育服務 ③藉由社區教育來提高居民對社會參與動力 ④針對社區既有迷思舉辦公聽會來轉變其觀念',
   options:['A.①②③','B.②③④','C.①③④','D.①②④'],
   answer:'B',explanation:'社區教育模式強調透過教育提升居民意識與參與能力。②設置成人教育服務、③提高社會參與動力、④透過公聽會轉變觀念均符合。①「鎖定貧窮區域設置補充教育」較屬社會計畫模式，故選B。'},
  {id:'ds_110_1_13',subject:'ds',year:110,session:1,num:13,categories:['ds_comm_model'],
   text:'當社區居民為自身環境或權益，遭受到掌權者以各種形式加以干涉，進而聚集起來以各種不同形式活動來捍衛自身權益，屬於下列那一種社區工作模式？',
   options:['A.地方發展模式（locality development）','B.社會計畫模式（social planning）','C.社會行動模式（social action）','D.社區教育模式（community education）'],
   answer:'C',explanation:'社區居民聚集對抗掌權者以捍衛自身權益，涉及對抗性的集體行動與倡導，這正是社會行動模式（social action）的核心特徵：改變權力結構、對抗不公義。'},
  {id:'ds_110_1_14',subject:'ds',year:110,session:1,num:14,categories:['ds_comm_process'],
   text:'有關社區方案工作目標的設定，下列敘述何者錯誤？',
   options:['A.目標的設定應具體且可測量','B.目標應符合社區成員的需求與優先順序','C.工作目標一旦設定就不應變更以確保計畫穩定','D.目標的達成應有時間框架'],
   answer:'C',explanation:'社區工作方案的目標設定應保持彈性，能夠隨著社區情境的變化而調整。「一旦設定就不應變更」違背社區工作動態調整的原則，故C錯誤。'},
  {id:'ds_110_1_15',subject:'ds',year:110,session:1,num:15,categories:['ds_case_concept'],
   text:'關於個案工作、心理諮商和心理治療的敘述，下列何者正確？',
   options:['A.社會個案工作與心理諮商的主要差異在於社工較少採用科學知識','B.社會個案工作比心理治療更注重環境資源的連結與社會功能的提升','C.心理治療師不需了解案主的社會環境因素','D.社會個案工作主要處理深層的無意識衝突'],
   answer:'B',explanation:'社工與心理治療的主要差異之一，在於社工更注重環境資源的連結、社會支持網絡的建構與案主社會功能的提升，而非僅聚焦於深層心理治療，故B正確。'},
  {id:'ds_110_1_16',subject:'ds',year:110,session:1,num:16,categories:['ds_case_theory'],
   text:'關於危機干預（crisis intervention）的敘述，下列何者錯誤？',
   options:['A.危機干預著重在短期、有時限的介入','B.危機干預的目標是協助當事人恢復至危機前的功能水準','C.危機期間當事人的心理防衛機制通常較脆弱，是改變的契機','D.危機干預需等到當事人情緒完全平穩後才能開始介入'],
   answer:'D',explanation:'危機干預強調立即性介入（immediacy），正是在危機發生的當下及時介入，而非等到情緒完全平穩後才介入。等待只會錯失介入的黃金時機，故D錯誤。'},
  {id:'ds_110_1_17',subject:'ds',year:110,session:1,num:17,categories:['ds_case_theory'],
   text:'關於優勢觀點的敘述，下列何者錯誤？',
   options:['A.優勢觀點強調所有人都有學習、成長和改變的能力','B.優勢觀點將問題和診斷作為了解案主的主要切入點','C.優勢觀點重視案主所在社區的資源與機會','D.優勢觀點強調與案主建立合作夥伴關係'],
   answer:'B',explanation:'優勢觀點（Saleebey）強調以案主的能力、優勢、資源和潛能為起點，而非以問題和診斷為切入點。「將問題和診斷作為主要切入點」是病理取向的做法，與優勢觀點相悖，故B錯誤。'},
  {id:'ds_110_1_18',subject:'ds',year:110,session:1,num:18,categories:['ds_case_theory'],
   text:'下列何者不屬於任務中心學派（task-centered approach）的問題類別？',
   options:['A.人際衝突（interpersonal conflict）','B.心理病理（psychopathology）','C.角色扮演困難（difficulty in role performance）','D.情緒困擾（reactive emotional distress）'],
   answer:'B',explanation:'任務中心學派的問題類型包含：人際衝突、角色扮演困難、情緒困擾、獲取資源困難等日常生活問題。「心理病理」是醫療診斷取向的概念，任務中心模式不以此為問題類別，故B為答案。'},
  {id:'ds_110_1_19',subject:'ds',year:110,session:1,num:19,categories:['ds_case_process'],
   text:'社會工作者與個人的第一次接觸稱為「接案」（intake）。假設你是A機構中一名負責接案的社工員，下列何者並非是你在接案時的最主要職責？',
   options:['A.判斷案主的問題與需求是否符合機構的服務範疇','B.提供案主有關機構服務的相關資訊','C.若不符合機構服務範疇，協助案主轉介至其他適合機構','D.完整評估案主所有的問題並立即制定處遇計畫'],
   answer:'D',explanation:'接案（intake）的主要職責是判斷是否符合服務範疇（A）、提供機構服務資訊（B）、必要時轉介（C）。「完整評估所有問題並立即制定處遇計畫」屬後續預估和計畫階段的工作，並非接案的最主要職責，故D為答案。'},
  {id:'ds_110_1_20',subject:'ds',year:110,session:1,num:20,categories:['ds_case_process'],
   text:'關於結案過程中的工作重點，下列敘述何者錯誤？',
   options:['A.社工應協助案主整合與回顧服務過程中的成長與改變','B.應評估案主在結案後是否仍需要其他形式的服務','C.結案時社工應避免討論案主對於結案的情緒反應','D.應與案主共同確認其是否具備維持改變的能力'],
   answer:'C',explanation:'結案是服務過程中重要的一環，社工應正視並處理案主對結案可能產生的情緒反應（如失落、分離焦慮等）。「避免討論結案的情緒反應」反而不利於案主的調適，故C錯誤。'},
  {id:'ds_110_1_21',subject:'ds',year:110,session:1,num:21,categories:['ds_case_process'],
   text:'社會工作者進行訪視時需注意的事項，下列敘述何者錯誤？',
   options:['A.訪視前應事先告知案主，以尊重其隱私','B.訪視時可蒐集到辦公室會談無法獲得的家庭生活資訊','C.訪視時社工應保持高度警覺以評估案主的安全風險','D.訪視時若未見到案主，應放棄本次訪視不留任何記錄'],
   answer:'D',explanation:'若訪視時未見到案主，社工仍應留下記錄並依機構規定採取後續行動，而非放棄並不留任何記錄。紀錄是社工的專業責任，故D錯誤。'},
  {id:'ds_110_1_22',subject:'ds',year:110,session:1,num:22,categories:['ds_comm_process'],
   text:'某社會福利服務中心的社會工作者以「觀摩訪問」的方式來協助社區居民解決問題，請問這位社會工作者目的在連結那一種資源？',
   options:['A.正式資源（formal resources）','B.非正式資源（informal resources）','C.社會資源（social resources）','D.自助資源（self-help resources）'],
   answer:'A',explanation:'「觀摩訪問」通常是帶領社區居民參觀其他機構、組織或成功案例，目的在連結正式資源（formal resources），如政府機構、專業組織等的經驗與資源。'},
  {id:'ds_110_1_23',subject:'ds',year:110,session:1,num:23,categories:['ds_case_ethics'],
   text:'我國「社會工作師倫理守則」中提及「社會工作師應具備社會工作專業技能，不斷充實自我」，是屬於下列那一面向的倫理守則？',
   options:['A.社工師對案主的倫理守則','B.社工師對同事的倫理守則','C.社工師對專業的倫理守則','D.社工師對機構的倫理守則'],
   answer:'C',explanation:'「具備社工專業技能、不斷充實自我」是社工師對自身專業成長與發展的責任，屬於「社工師對專業的倫理守則」的範疇。'},
  {id:'ds_110_1_24',subject:'ds',year:110,session:1,num:24,categories:['ds_case_ethics'],
   text:'「在倫理兩難困境中，必須選擇不會造成任何人傷害的處理方式，不然的話，應該選擇造成最小或最少數人傷害的處理方式。」上述符合倫理學的那一種觀點？',
   options:['A.義務論（deontology）','B.效益主義（utilitarianism）','C.美德倫理學（virtue ethics）','D.關懷倫理學（ethics of care）'],
   answer:'B',explanation:'效益主義以行為的結果來判斷道德性，追求最大多數人的最大幸福，或在無法避免傷害時選擇造成最小或最少數人傷害的方式，正符合題目描述。'},
  {id:'ds_110_1_25',subject:'ds',year:110,session:1,num:25,categories:['ds_group_concept'],
   text:'有關團體工作的意義與功能，下列敘述何者錯誤？',
   options:['A.團體提供成員相互學習與分享的機會','B.團體工作只適用於有相同問題的同質性成員','C.透過團體互動，成員可以發展社交技巧','D.團體工作可以讓成員感受到「普同感」，知道自己並不孤單'],
   answer:'B',explanation:'團體工作並非只適用於同質性成員。異質性團體也有其獨特的治療因素，如提供多元觀點、互相學習等。「只適用於同質性成員」說法過於絕對，故B錯誤。'},
  {id:'ds_110_1_26',subject:'ds',year:110,session:1,num:26,categories:['ds_group_theory'],
   text:'有關社會交換理論對團體的觀點，下列敘述何者錯誤？',
   options:['A.成員加入團體是基於對利益與成本的評估','B.當成員覺得在團體中的獲得大於付出時，會傾向留在團體中','C.社會交換理論認為人際關係完全由利益計算所決定，情感因素毫不重要','D.成員若覺得在其他地方可以獲得更好的交換結果，可能會離開團體'],
   answer:'C',explanation:'社會交換理論確實以利益與成本分析人際關係，但情感連結本身也是一種「獲得」（reward），納入交換分析中。「情感因素毫不重要」過於極端，故C錯誤。'},
  {id:'ds_110_1_27',subject:'ds',year:110,session:1,num:27,categories:['ds_group_theory'],
   text:'Papell 和 Rothman 提出團體工作的社會目標模式，下列敘述何者錯誤？',
   options:['A.社會目標模式強調社會責任與民主精神','B.社會目標模式的工作者主要扮演使能者的角色','C.社會目標模式的重點是成員的治療與復健','D.社會目標模式關注成員對社會的貢獻與參與'],
   answer:'C',explanation:'「治療與復健」是治療模型的重點，而非社會目標模式。社會目標模式強調社會責任、民主精神、成員對社會的貢獻與參與，故C錯誤。'},
  {id:'ds_110_1_28',subject:'ds',year:110,session:1,num:28,categories:['ds_group_concept'],
   text:'有關開放式團體與封閉式團體的比較，下列敘述何者正確？',
   options:['A.封閉式團體成員固定，有助於建立深度信任感與凝聚力','B.開放式團體因成員穩定，較容易達到深度的情感分享','C.封閉式團體允許成員隨時加入，增加多元性','D.開放式團體成員固定，社工較易追蹤成員進展'],
   answer:'A',explanation:'封閉式團體（closed group）成員固定不變動，有助於建立穩定的信任感與凝聚力，也較容易達到深度的情感分享與改變。開放式團體允許成員隨時加入或離開，增加多元性但較難建立深度信任，故A正確。'},
  {id:'ds_110_1_29',subject:'ds',year:110,session:1,num:29,categories:['ds_group_ethics'],
   text:'在團體開始前，需要對團體成員公開的資訊，下列敘述何者錯誤？',
   options:['A.團體的目標與目的','B.領導者的專業背景與資歷','C.其他所有成員的個人詳細資料','D.成員的權利與責任'],
   answer:'C',explanation:'「其他所有成員的個人詳細資料」涉及隱私保護，不應在團體開始前就全部公開，故C為不應公開的資訊，即為錯誤敘述。'},
  {id:'ds_110_1_30',subject:'ds',year:110,session:1,num:30,categories:['ds_group_concept'],
   text:'針對自助團體的敘述，下列何者正確？',
   options:['A.自助團體通常由專業社工帶領，並依照治療計畫進行','B.自助團體成員具有共同的問題或生活經驗，彼此提供支持','C.自助團體不允許非專業人士擔任領導者','D.自助團體的目標主要是診斷成員的心理疾病'],
   answer:'B',explanation:'自助團體（self-help group）的核心特徵是成員具有共同的問題或生活經驗，彼此提供支持與協助，通常不需要專業社工帶領，故B正確。'},
  {id:'ds_110_1_31',subject:'ds',year:110,session:1,num:31,categories:['ds_group_skill'],
   text:'社工為住院70歲以上病人辦理一個出院準備團體，擬選擇幾個方案活動以刺激案主的生理和社會生活。下列那一個方案活動在刺激治療效果相較於其他方案活動效果較弱？',
   options:['A.烹飪課程活動','B.創意手工藝活動','C.觀賞電視節目','D.懷舊（reminiscence）活動'],
   answer:'C',explanation:'烹飪（A）、手工藝（B）、懷舊（D）都是主動參與性活動，能刺激生理協調、認知功能與社會互動。「觀賞電視節目」屬被動性活動，刺激較少，治療效果相對較弱，故C為答案。'},
  {id:'ds_110_1_32',subject:'ds',year:110,session:1,num:32,categories:['ds_group_ethics'],
   text:'有關團體進行過程中需要面對的倫理問題，下列敘述何者錯誤？',
   options:['A.保密原則在團體工作中比個案工作更難完全保障','B.成員在參與團體前應被告知保密的限制','C.領導者應保證其他成員不會洩露團體中的任何資訊','D.領導者本身有義務為成員的個人資訊保密'],
   answer:'C',explanation:'在團體工作中，領導者只能要求成員保密，但無法「保證」其他成員不會洩露資訊。領導者不應做出無法實現的承諾，故C錯誤。'},
  {id:'ds_110_1_33',subject:'ds',year:110,session:1,num:33,categories:['ds_comm_concept'],
   text:'影響社區工作專業及發展的主要因素有那些？①社會趨勢及社區需求特性 ②公部門的施政方針及制度設計 ③跨領域專業及組織的參與 ④女性及青年社區幹部的比率',
   options:['A.①②③','B.①②④','C.②③④','D.①③④'],
   answer:'A',explanation:'影響社區工作專業發展的主要因素包含：①社會趨勢及社區需求、②公部門施政方針及制度、③跨領域專業及組織參與，均為重要影響因素。④「女性及青年社區幹部的比率」並非主要影響社區工作「專業」發展的因素，故選A。'},
  {id:'ds_110_1_34',subject:'ds',year:110,session:1,num:34,categories:['ds_comm_model'],
   text:'Kretzmann 和 McKnight 提出以資產為基礎的社區發展模式，在初期階段中，下列何者不是社區資產（asset）的主要範疇？',
   options:['A.個人的技能與知識（individual abilities and knowledge）','B.地方性協會（local associations）','C.政府的補助款項（government grants）','D.機構（institutions）'],
   answer:'C',explanation:'ABCD模式（以資產為基礎的社區發展）強調社區內在資產，初期主要盤點：個人技能（A）、地方性協會（B）、機構（D）。「政府的補助款項」是外部資源，並非ABCD模式強調的社區內在資產，故C為答案。'},
  {id:'ds_110_1_35',subject:'ds',year:110,session:1,num:35,categories:['ds_comm_process'],
   text:'下列何者不是社區組織工作之過程？',
   options:['A.社區問題的識別與需求評估','B.組織社區居民共同行動','C.評估行動成效並修正策略','D.以社工專業決策取代社區居民的參與'],
   answer:'D',explanation:'社區組織工作強調居民的自主參與與能力建構。「以社工專業決策取代社區居民的參與」違背社區工作的核心精神，社工應是促進者、使能者，而非決策者，故D不是社區組織工作的過程。'},
  {id:'ds_110_1_36',subject:'ds',year:110,session:1,num:36,categories:['ds_comm_process'],
   text:'當社區工作的程序，進入循環性的社區組織能力增長的工作階段，此階段屬於下列何者？',
   options:['A.評估階段','B.擴大工作階段','C.永續工作階段','D.社區動員階段'],
   answer:'C',explanation:'當社區工作進入「循環性的社區組織能力增長」，表示社區已具備持續自我更新的能力，這屬於永續工作階段，持續調整社區組織並提出社區願景。'},
  {id:'ds_110_1_37',subject:'ds',year:110,session:1,num:37,categories:['ds_comm_concept'],
   text:'社區「整備程度」（readiness）的特性，下列何者錯誤？',
   options:['A.整備程度反映社區對某議題採取行動的意願與能力','B.不同社區對相同議題的整備程度可能不同','C.整備程度一旦評估完成就不會改變','D.高整備程度的社區較容易成功推動社區工作計畫'],
   answer:'C',explanation:'社區整備程度是動態的，會隨著時間、事件、外部資源投入等因素而改變。「一旦評估完成就不會改變」是錯誤的，故C錯誤。'},
  {id:'ds_110_1_38',subject:'ds',year:110,session:1,num:38,categories:['ds_comm_concept'],
   text:'社區能力的建構，在於提升社區總體所具有的儲能，是透過那幾個層次進行？',
   options:['A.個人、家庭、社區三個層次','B.個人、組織、社區三個層次','C.家庭、組織、政府三個層次','D.個人、家庭、組織、政府四個層次'],
   answer:'B',explanation:'社區能力建構（community capacity building）通常透過三個層次進行：個人層次（個人技能與知識）、組織層次（社區組織的運作能力）、社區層次（社區整體的合作與行動能力），故選B。'},
  {id:'ds_110_1_39',subject:'ds',year:110,session:1,num:39,categories:['ds_comm_concept'],
   text:'在2014年，各縣市成立的社區培力中心，下列敘述何者正確？①其設立係延續行政院文化建設委員會的社區總體營造計畫 ②此作法促進社會工作者在社區領域中累積專業及就業的機會 ③其輔導服務對象為社區發展協會 ④由我國中央政府發起，鼓勵地方政府成立中心',
   options:['A.①②','B.②③','C.①②③','D.②③④'],
   answer:'B',explanation:'2014年各縣市社區培力中心：②促進社工在社區領域的就業機會，正確；③輔導服務對象為社區發展協會，正確。①延續的是衛福部社政系統的社區發展政策，非文建會社區總體營造；④是由地方政府主導，非中央政府直接發起。故選B（②③）。'},
  {id:'ds_110_1_40',subject:'ds',year:110,session:1,num:40,categories:['ds_comm_process'],
   text:'社區工作者的角色會隨著工作歷程而有所變動，有關結案階段的角色敘述，下列何者錯誤？',
   options:['A.協助社區居民回顧工作成果並強化自主能力','B.撤除社工的介入以讓社區自行運作','C.在結案後完全不再與社區有任何接觸','D.協助社區建立永續經營的機制'],
   answer:'C',explanation:'社區工作結案後，社工並非「完全不再接觸」。通常會有定期追蹤的機制，確認社區能夠持續自行運作，必要時仍可提供諮詢。「完全不再接觸」過於絕對，故C錯誤。'},

  // ===== 110年下 社會工作直接服務（40題）=====
  {id:'ds_110_2_01',subject:'ds',year:110,session:2,num:1,categories:['ds_case_process'],
   text:'關於各類型個案紀錄的重點，下列敘述何者錯誤？',
   options:['A.開案紀錄的重點在於蒐集案主基本資料、目前狀況與服務需求','B.定期評估紀錄的重點在於整理案主在處遇計畫執行一段時間後的改變','C.結案評估紀錄的重點在於整合資源，轉介更合適的機構來提供服務','D.追蹤紀錄的重點在於評估案主處遇服務終止後的適應能力'],
   answer:'C',explanation:'結案評估紀錄的重點在於整合整個服務過程的成效，評估案主的改變與目標達成情形，並不是必然需要轉介其他機構。轉介是視需求決定，非結案評估的重點，故C錯誤。'},
  {id:'ds_110_2_02',subject:'ds',year:110,session:2,num:2,categories:['ds_case_concept'],
   text:'對於社會個案工作基本要素之敘述，下列何者錯誤？',
   options:['A.社會個案工作是立基於科學知識與技術運用的助人方法','B.社會個案工作需告知案主最佳的問題解決途徑','C.社會個案工作能發展案主潛在的能力','D.社會個案工作可協助個人與其環境相互調適'],
   answer:'B',explanation:'現代社會個案工作強調夥伴關係，與案主共同探討解決方法，而非由社工單方面「告知」案主最佳解決途徑。這樣的做法違反案主自決原則，故B錯誤。'},
  {id:'ds_110_2_03',subject:'ds',year:110,session:2,num:3,categories:['ds_case_process'],
   text:'會談依據性質與目的之不同，可分為資料性會談、預估性會談與治療性會談，下列敘述何者錯誤？',
   options:['A.資料性會談的主要目的是蒐集個案的相關背景與生活歷史資料','B.預估性會談的主要目的是蒐集相關資料，以決定是否提供服務，或提供那些服務','C.治療性會談的主要目的是了解個案的個人狀態，以便擬定因應處遇方法','D.治療性會談的主要目的是協助個案改變觀念、想法感覺或行為'],
   answer:'C',explanation:'「了解個案的個人狀態，以便擬定因應處遇方法」是預估性會談的目的，而非治療性會談。治療性會談的主要目的是協助案主改變（D），故C錯誤。'},
  {id:'ds_110_2_04',subject:'ds',year:110,session:2,num:4,categories:['ds_group_process'],
   text:'下列何者不是團體工作中間階段會有的團體動力現象？',
   options:['A.成員考量是否投入團體，認同團體目標','B.成員在團體地位競爭的衝突','C.成員可能挑戰領導權','D.團體成員信任團體目標，形成最有工作效能的階段'],
   answer:'A',explanation:'「成員考量是否投入團體，認同團體目標」是團體前身階段（pre-affiliation，初期）的現象，而非中間階段。中間階段的現象包含地位競爭（B）、挑戰領導（C）、信任形成並有效工作（D）等。'},
  {id:'ds_110_2_05',subject:'ds',year:110,session:2,num:5,categories:['ds_case_process'],
   text:'下列何者不是社會工作者進行「訪視」能達到目的之一？',
   options:['A.認識個案的家庭生活情境','B.評估個案的內外在資源','C.評估個案依賴機構的程度','D.了解個案的居住社區'],
   answer:'C',explanation:'訪視（家訪）的目的包含：認識家庭生活情境（A）、評估資源（B）、了解社區環境（D）等。「評估個案依賴機構的程度」無法透過訪視有效評估，也非訪視的主要目的，故C為答案。'},
  {id:'ds_110_2_06',subject:'ds',year:110,session:2,num:6,categories:['ds_case_ethics'],
   text:'訂定社會工作倫理守則的重要性不包括下列何者？',
   options:['A.辨識社會工作使命的核心價值','B.建立一套指導實務的道德標準','C.促進社會個案工作的類型化','D.有助社會工作專業得到社會的認可'],
   answer:'C',explanation:'訂定社工倫理守則的重要性：辨識核心價值（A）、建立道德標準（B）、獲得社會認可（D）等。「促進社會個案工作的類型化」並非倫理守則的目的，社工價值強調每個服務對象的獨特性，故C不屬於倫理守則的重要性。'},
  {id:'ds_110_2_07',subject:'ds',year:110,session:2,num:7,categories:['ds_case_theory'],
   text:'關於生態系統觀點的敘述，下列何者正確？',
   options:['A.「棲息地」指的是個人在所屬社會所占的地位與角色','B.社會工作者要能覺察價值偏見對個人發展與行為的影響和壓迫','C.「生活壓力」是人與環境相互影響和調整所達到的最佳調適狀態','D.「適應」指的是問題解決能力與處理負向情緒的能力'],
   answer:'B',explanation:'(A)「棲息地」（habitat）是案主居住的生活環境，「個人在社會的地位與角色」是棲位（niche）；(C)說明的是「適應」的概念，非「生活壓力」；(B)生態系統觀點確實強調覺察外在環境（包含價值偏見）的壓迫性影響，正確。'},
  {id:'ds_110_2_08',subject:'ds',year:110,session:2,num:8,categories:['ds_case_ethics'],
   text:'當一位社會工作者發現自己對於一位習慣性偷竊的案主感到非常生氣時，下列反應何者錯誤？',
   options:['A.社會工作者需覺察並承認這些感受','B.社會工作者可尋求協助，以探索感受背後的價值觀','C.社會工作者可邀請案主協助進行對自己的探索','D.社會工作者需敏察自己的感受對案主的影響'],
   answer:'C',explanation:'社工對案主感到憤怒時，應進行自我覺察（A）、尋求督導協助（B）、注意自身情緒對案主的影響（D）。然而「邀請案主協助進行對自己的探索」不適當，這涉及將社工的個人問題帶入專業關係，有倫理疑慮，故C錯誤。'},
  {id:'ds_110_2_09',subject:'ds',year:110,session:2,num:9,categories:['ds_group_theory'],
   text:'有關團體工作的實施模型工作重點，下列何者正確？',
   options:['A.社會目標模型（social goals model）工作聚焦在減輕問題或關心的事情，以及改善因應技巧','B.互惠模型（reciprocal model）工作聚焦在較大的社會環境脈絡中的倡議','C.治療模型（remedial model）工作主要在治療和復健','D.社會目標模型（social goals model）工作主要在團體成員間創造一個自助和互助的體系'],
   answer:'C',explanation:'三大模型：(A)描述的是治療模型；(B)較大社會環境倡議是社會目標模型；(C)治療模型工作主要在治療和復健，正確；(D)創造自助互助體系是互惠模型。故選C。'},
  {id:'ds_110_2_10',subject:'ds',year:110,session:2,num:10,categories:['ds_group_skill'],
   text:'有關腦力激盪的敘述，下列何者正確？①適合運用在大範圍模糊議題的聚焦上 ②適合運用在範圍定義明確的議題上 ③通常使用腦力激盪的成員因為過度緊張，在腦力激盪後往往對團體不滿意 ④腦力激盪後成員往往對團體的滿意度更高',
   options:['A.①③','B.②③','C.②④','D.①④'],
   answer:'C',explanation:'腦力激盪適合用在範圍明確的議題上（②），讓成員自由提出想法。腦力激盪後成員因能自由表達、被接納，往往對團體的滿意度更高（④）。故選C（②④）。'},
  {id:'ds_110_2_11',subject:'ds',year:110,session:2,num:11,categories:['ds_comm_model'],
   text:'有關赫爾館（Hull House）的主張與敘述，下列何者錯誤？',
   options:['A.針對不同居民，提供多元化的社區服務','B.強調與在地居民一起生活、工作及進行決策','C.需優先提升在地服務的效益而非社會立法倡議','D.關心勞動者的貧窮及職業災害問題'],
   answer:'C',explanation:'Hull House的創辦人Jane Addams積極推動社會立法倡議，促成全美童工保護法和婦幼保護法制。立法倡議是Hull House重要工作，並非應優先放棄的，故C錯誤。'},
  {id:'ds_110_2_12',subject:'ds',year:110,session:2,num:12,categories:['ds_group_skill'],
   text:'有關領導者的權力基礎，下列敘述何者正確？①動員人力資源的影響力，稱為連結權 ②權力因指派而擁有，稱為強制權 ③握有分派利益的權力，稱為合法權 ④擁有某種典範及被追隨效法的魅力，稱為參照權 ⑤達到目標的特殊技能，稱為資訊權',
   options:['A.③⑤','B.①⑤','C.①④','D.②③'],
   answer:'C',explanation:'①動員人力資源的影響力＝連結權（正確）；②因指派而擁有的權力＝合法權（非強制權）；③握有分派利益＝獎酬權（非合法權）；④被追隨效法的魅力＝參照權（正確）；⑤特殊技能＝專家權（非資訊權）。故①④正確，選C。'},
  {id:'ds_110_2_13',subject:'ds',year:110,session:2,num:13,categories:['ds_comm_process'],
   text:'資源管理對於運用社會資源的每一個程序，都有一定的規範，下列何者為落實資源管理的第一步？',
   options:['A.盤點資源','B.發掘資源','C.建立資源檔','D.規劃社區資源'],
   answer:'A',explanation:'資源管理的第一步是「盤點資源」：先清點現有資源，確認現有資源的類型與狀況，以及資源缺口在哪裡。確認現有資源後才能建立資源檔，找到缺口後才知道要去發掘或規劃哪些資源。'},
  {id:'ds_110_2_14',subject:'ds',year:110,session:2,num:14,categories:['ds_comm_model'],
   text:'下列何者不屬於湯恩比館對社區工作推動的重要啟示？',
   options:['A.強調助人者與受助者一同生活一同工作','B.強調激發受助者改變困境的盼望','C.按既定工作計畫、發展及需要而定','D.受助者必須為其未來的幸福與改變而努力'],
   answer:'C',explanation:'湯恩比館（Toynbee Hall）強調：助人者與受助者一起生活和工作（A）、激發改變的盼望（B）、受助者努力改變（D）。並非「按既定工作計畫」，而是依照受助者的需要彈性調整，故C不屬於其啟示。'},
  {id:'ds_110_2_15',subject:'ds',year:110,session:2,num:15,categories:['ds_comm_process'],
   text:'下列何者為執行聯合社區服務時較少遇到的狀況？',
   options:['A.服務多元難以凸顯績效','B.專職人力的供過於求','C.費時的溝通與協商','D.社區參與程度不平衡'],
   answer:'B',explanation:'聯合社區服務常見問題：服務多元難以凸顯績效（A）、各單位溝通協商費時（C）、社區參與程度不平衡（D）。「專職人力的供過於求」在社工領域中相當罕見，社工人力一向不足，故B為較少遇到的狀況。'},
  {id:'ds_110_2_16',subject:'ds',year:110,session:2,num:16,categories:['ds_comm_model'],
   text:'Rothman提出的社區工作模式中，社會計畫模式的主要工作角色為何？',
   options:['A.倡導者','B.行動者','C.專家','D.使能者'],
   answer:'C',explanation:'Rothman三大模式的主要角色：社區發展（地方發展）模式→使能者（D）；社會計畫模式→專家（C，發現問題、分析資料、提出解決方案）；社會行動模式→倡導者（A）、行動者（B）。'},
  {id:'ds_110_2_17',subject:'ds',year:110,session:2,num:17,categories:['ds_comm_process'],
   text:'社區工作的程序中，其工作內容為持續調整社區組織及提出社區願景，係屬下列何者工作階段？',
   options:['A.評估階段','B.擴大工作階段','C.永續工作階段','D.結案階段'],
   answer:'C',explanation:'「持續調整社區組織及提出社區願景」代表社區已進入穩定持續運作的狀態，這屬於永續工作階段，社區具備自主調適和持續發展的能力。'},
  {id:'ds_110_2_18',subject:'ds',year:110,session:2,num:18,categories:['ds_case_concept'],
   text:'關於個案工作基本概念的相關敘述，下列何者正確？',
   options:['A.在家庭系統部分強調個人的獨特性與需求','B.環境系統裡的社會環境也包含生活設備','C.環境當中的娛樂系統是一種物理環境','D.個人與其生活環境不斷的交互作用'],
   answer:'D',explanation:'(A)家庭系統中較強調家庭成員之間的關係，而非單一個人；(B)社會環境是指外部社會關係，生活設備屬物理環境；(D)個人與其生活環境不斷交互作用，是系統理論的核心，正確。'},
  {id:'ds_110_2_19',subject:'ds',year:110,session:2,num:19,categories:['ds_case_theory'],
   text:'關於任務中心學派的敘述，下列何者錯誤？',
   options:['A.主要倡議的學者是芝加哥大學的Reid和Epstein','B.認為人有改變動力，但只想減輕困難到可以忍受程度','C.所謂問題指的是案主因重大創傷阻礙的認知和行動','D.所謂任務是指案主為緩和問題嚴重性想要採取的行動'],
   answer:'C',explanation:'任務中心學派所謂的「問題」是指案主生活中能力暫時受限所產生的具體困難，而非因重大創傷阻礙的認知和行動（那是心理創傷取向的概念）。任務中心模式不處理深層創傷，故C錯誤。'},
  {id:'ds_110_2_20',subject:'ds',year:110,session:2,num:20,categories:['ds_case_skill'],
   text:'心理暨社會學派曾經提出了支持性技術（sustaining procedures），下列那些技術屬於支持性技術？①接納（acceptance） ②鼓勵（encouragement） ③實質伸援（reaching out） ④堅持（urging or insisting） ⑤建議（making a suggestion）',
   options:['A.①④⑤','B.③④⑤','C.②③④','D.①②③'],
   answer:'D',explanation:'心理暨社會學派的支持性技術包含：接納（①）、鼓勵（②）、實質伸援（③）、非語言支持、再保證。「堅持」（④）和「建議」（⑤）屬於直接改變技術，故選D（①②③）。'},
  {id:'ds_110_2_21',subject:'ds',year:110,session:2,num:21,categories:['ds_case_ethics'],
   text:'關於社會工作者在多元文化能力上的培養，下列敘述何者錯誤？',
   options:['A.社會工作者應深化對特定文化的信念、價值觀、溝通模式之知識','B.社會工作者應釐清自我認同，並覺察個人的限制與偏見','C.社會工作者應連結文化資產讓服務對象受益','D.社會工作者應運用文化融合方式將差異性降低'],
   answer:'D',explanation:'多元文化能力強調尊重每個文化的獨特性，應接納和欣賞文化差異，而非「文化融合」將差異降低。這樣的做法是一種文化霸權，違背多元文化社工的精神，故D錯誤。'},
  {id:'ds_110_2_22',subject:'ds',year:110,session:2,num:22,categories:['ds_case_theory'],
   text:'關於社會工作學派發展年代的敘述，下列何者正確？',
   options:['A.心理暨社會學派早於診斷學派發展','B.行為主義取向社工在1950年代開始受到重視','C.任務中心學派約在1970年代發展','D.系統理論在1940年代已廣泛應用於社會工作'],
   answer:'C',explanation:'任務中心學派（Reid & Epstein）約在1970年代發展，1972年出版《任務中心個案工作》。(A)心理暨社會學派即診斷學派；(B)行為主義取向在1960-70年代較受重視；(D)系統理論在1970年代才廣泛應用於社工。故C正確。'},
  {id:'ds_110_2_23',subject:'ds',year:110,session:2,num:23,categories:['ds_case_theory'],
   text:'有關「優勢觀點」的敘述，下列何者正確？',
   options:['A.優勢觀點起源於醫療診斷模式，強調找出案主的病理','B.優勢觀點認為社工應優先確認案主的問題清單','C.優勢觀點強調每個人都有能力、知識和資源去面對挑戰','D.優勢觀點認為案主的過去創傷是最重要的評估面向'],
   answer:'C',explanation:'優勢觀點（Saleebey）起源於對醫療診斷病理模式的批判，強調每個人都有能力、知識和資源去面對挑戰（C）；應以案主優勢而非問題清單為起點；關注案主的潛能與資源。故C正確。'},
  {id:'ds_110_2_24',subject:'ds',year:110,session:2,num:24,categories:['ds_case_skill'],
   text:'關於「面質」技巧的敘述，下列何者錯誤？',
   options:['A.面質是指社工指出案主言行之間的不一致','B.面質需要在信任關係建立後才適合使用','C.面質是一種溫和且具支持性的技術，可以在初次會談使用','D.面質的目的是促進案主的自我覺察'],
   answer:'C',explanation:'面質（confrontation）需要在足夠的信任關係建立後才適合使用，不適合在初次會談中使用（初次會談應以建立關係為主）。故C錯誤。'},
  {id:'ds_110_2_25',subject:'ds',year:110,session:2,num:25,categories:['ds_case_ethics'],
   text:'針對倫理兩難議題的處理，Reamer曾提出「解決問題模式」（problem-solving model）。關於這個模式的原則，下列敘述何者錯誤？',
   options:['A.需辨識相關的倫理議題與介入其中的人員','B.倫理問題涉及的法律與倫理標準需加以確認','C.當倫理守則提供了明確的指引時，社工仍應優先考量個人價值','D.需考量行動後可能造成的後果及風險'],
   answer:'C',explanation:'Reamer的倫理決策解決問題模式強調：在倫理守則提供明確指引時，應依循專業倫理守則，而非個人價值。「優先考量個人價值」而非倫理守則，是錯誤的做法，故C錯誤。'},
  {id:'ds_110_2_26',subject:'ds',year:110,session:2,num:26,categories:['ds_group_concept'],
   text:'在社會團體工作發展歷史中，對團體工作專業發展具有重要性的機構或組織，不包括下列何者？',
   options:['A.睦鄰之家（Settlement Houses）','B.基督教青年會（YMCA）','C.精神分析學會（Psychoanalytic Societies）','D.美國團體工作學會（American Association of Group Workers）'],
   answer:'C',explanation:'對社會團體工作專業發展有重要性的機構：睦鄰之家（A）、基督教青年會（B）、美國團體工作學會（D）等。精神分析學會（C）主要影響個案工作的發展，對社會團體工作的專業發展並無直接重要性。'},
  {id:'ds_110_2_27',subject:'ds',year:110,session:2,num:27,categories:['ds_group_concept'],
   text:'有關團體工作與個案工作的比較，下列敘述何者錯誤？',
   options:['A.團體工作強調成員間的互動與相互支持','B.個案工作通常是一對一的工作關係','C.團體工作中，社工是唯一的改變媒介，成員間的互動不具治療效果','D.團體工作中，同儕的影響力是重要的治療資源'],
   answer:'C',explanation:'在團體工作中，社工並非唯一的改變媒介。成員之間的互動、回饋、支持和相互影響，本身就是重要的治療因素（Yalom提出十一項療效因子，多數來自成員間的互動），故C錯誤。'},
  {id:'ds_110_2_28',subject:'ds',year:110,session:2,num:28,categories:['ds_group_theory'],
   text:'系統觀點所提出的團體構成要素，不包括下列何者？',
   options:['A.邊界（boundary）','B.輸入（input）','C.個人心理治療（individual psychotherapy）','D.回饋（feedback）'],
   answer:'C',explanation:'系統觀點的團體構成要素包含：邊界（A）、輸入（B）、輸出、過程、回饋（D）等系統元素。「個人心理治療」是一種服務類型，並非系統觀點的團體構成要素，故C為答案。'},
  {id:'ds_110_2_29',subject:'ds',year:110,session:2,num:29,categories:['ds_comm_concept'],
   text:'社區工作發展需要足夠的人力參與，下列敘述何者正確？①人力資源整合是社工需要努力的要點 ②社區社工本身也算是一種專家人力資源 ③爭取社區里長、民意代表或在地家族勢力之支持有其必要性 ④社區專業人士皆有意願參與社區工作',
   options:['A.①②③','B.①②④','C.②③④','D.①③④'],
   answer:'A',explanation:'①人力資源整合是重要課題、②社區社工本身是專家人力資源、③爭取在地關鍵人物支持有必要性，均正確。④「社區專業人士皆有意願」過於絕對，並非所有專業人士都有意願參與，故④錯誤。選A（①②③）。'},
  {id:'ds_110_2_30',subject:'ds',year:110,session:2,num:30,categories:['ds_group_concept'],
   text:'下列何者不屬於團體動力的面向？',
   options:['A.溝通與互動模式','B.凝聚力（cohesion）','C.成員的個人薪資水準','D.規範（norms）'],
   answer:'C',explanation:'團體動力的面向包含：溝通與互動模式（A）、凝聚力（B）、規範（D）、角色、領導、目標等。「成員的個人薪資水準」是個人的外部社會經濟因素，與團體動力無直接關係，故C不屬於團體動力的面向。'},
  {id:'ds_110_2_31',subject:'ds',year:110,session:2,num:31,categories:['ds_group_process'],
   text:'有關團體過程的敘述，下列何者錯誤？',
   options:['A.團體過程包含成員間的互動、溝通和關係的發展','B.社工應在適當時機介入以促進正向的團體過程','C.衝突在團體過程中是不正常的，社工應立即消除','D.團體的發展通常會經歷不同的階段'],
   answer:'C',explanation:'衝突在團體過程中是正常現象（Garland等人的團體發展階段中，「權力與控制」階段即包含衝突），適當處理衝突有助於團體的發展與成員的成長。社工不應立即消除衝突，而是協助成員建設性地處理，故C錯誤。'},
  {id:'ds_110_2_32',subject:'ds',year:110,session:2,num:32,categories:['ds_group_process'],
   text:'團體成效評估，關於評量方式的敘述，下列何者正確？',
   options:['A.只能在團體結束後進行評估','B.量化評量比質性評量更能完整評估團體成效','C.評量可以在團體的不同階段（前、中、後）進行','D.成員的自我評量不具有參考價值'],
   answer:'C',explanation:'團體成效評估可以在團體不同階段進行：前測（了解基線）、過程評量（追蹤進展）、後測（評估成效），而非只能在結束後。量化與質性評量各有優缺點，應互補使用。成員自我評量是重要資料來源。故C正確。'},
  {id:'ds_110_2_33',subject:'ds',year:110,session:2,num:33,categories:['ds_group_ethics'],
   text:'有關團體工作的倫理守則，下列敘述何者錯誤？',
   options:['A.成員在參與前應被充分告知團體的目標、方法和可能的風險','B.領導者有責任維護成員在團體中的隱私','C.社工可以在未告知成員的情況下，為了成員好處而強制其參與團體活動','D.成員有退出團體的權利，雖然退出可能有一定後果'],
   answer:'C',explanation:'社工倫理守則強調案主的知情同意（informed consent）和自我決定（self-determination）。「未告知成員就強制其參與」違反了知情同意原則，即使出於善意也不符合倫理，故C錯誤。'},
  {id:'ds_110_2_34',subject:'ds',year:110,session:2,num:34,categories:['ds_case_ethics'],
   text:'一般而言，信守承諾是對的；但在特殊情境下（例如有更重要的倫理因素要被考量），信守承諾可被打破。上述符合倫理學的那一種觀點？',
   options:['A.行為效益主義（act-utilitarianism）','B.規則效益主義（rule-utilitarianism）','C.康德義務論（Kantian deontology）','D.自由主義（liberalism）'],
   answer:'B',explanation:'規則效益主義認為道德規則（如信守承諾）通常應該遵守，因為遵守規則通常能帶來最大效益，但在特殊情境下，當有更重要的倫理考量時，規則可以被打破，符合「一般遵守，特殊可破」的描述。'},
  {id:'ds_110_2_35',subject:'ds',year:110,session:2,num:35,categories:['ds_comm_model'],
   text:'Rothman & Tropman（1987）所提出的社區發展模式中，下列敘述何者錯誤？',
   options:['A.地方發展模式強調廣泛的社區參與和民主過程','B.社會計畫模式強調以事實為基礎的問題解決','C.社會行動模式強調強制性的結構改變和倡導','D.三種模式在實際運用中是相互排斥的，不能混用'],
   answer:'D',explanation:'Rothman & Tropman的三大模式在實際應用中並非相互排斥，可以根據社區需求和情境加以混合運用（mixed models），故D錯誤。'},
  {id:'ds_110_2_36',subject:'ds',year:110,session:2,num:36,categories:['ds_comm_process'],
   text:'下列何者不是「社區工作績效評量」的基本原則？',
   options:['A.評量指標應與社區工作的目標相符','B.評量過程應涵蓋社區居民的參與','C.評量應以量化數據為唯一標準','D.評量應考量社區工作的過程和成果'],
   answer:'C',explanation:'社區工作績效評量應同時考量量化與質性指標。「以量化數據為唯一標準」過於狹隘，忽略了社區工作中難以量化的成果，故C錯誤。'},
  {id:'ds_110_2_37',subject:'ds',year:110,session:2,num:37,categories:['ds_comm_concept'],
   text:'社區發展協會有法定權責的正式會議，下列何者正確？',
   options:['A.社區發展協會的最高決策機構是理事長','B.會員大會是社區發展協會的最高決策機構','C.監事會擁有社區發展協會的最高決策權','D.社區發展協會不需要召開正式會議'],
   answer:'B',explanation:'依社區發展工作綱要及人民團體相關規定，社區發展協會的最高決策機構是「會員大會」（全體會員參與）。理事長和監事會各司其職，但最高決策權屬全體會員組成的會員大會。'},
  {id:'ds_110_2_38',subject:'ds',year:110,session:2,num:38,categories:['ds_comm_process'],
   text:'會議為社區工作推動過程中常進行的活動之一，運用會議來推行社區工作，係在落實下列那一項社區工作的原則？',
   options:['A.社區自決原則','B.民主參與原則','C.資源整合原則','D.效率優先原則'],
   answer:'B',explanation:'透過會議讓社區居民共同討論、表達意見、集體決策，正是「民主參與原則」的體現。民主參與是社區工作的核心原則之一，強調居民有權參與影響自身生活的決策過程。'},
  {id:'ds_110_2_39',subject:'ds',year:110,session:2,num:39,categories:['ds_comm_concept'],
   text:'有關「社區發展工作綱要」第2條規定，下列何者錯誤？',
   options:['A.社區發展是社區居民基於共同需要所進行的社區集體行動','B.社區發展工作以倡導社區意識、推動社區公共事務為核心目標','C.社區發展協會是推動社區發展的唯一合法組織','D.政府應輔導協助社區居民推動社區發展工作'],
   answer:'C',explanation:'依社區發展工作綱要，社區發展工作可透過各類社區組織推動，並非只有「社區發展協會」是唯一合法組織。社區內其他組織也可參與社區發展工作，故C錯誤。'},
  {id:'ds_110_2_40',subject:'ds',year:110,session:2,num:40,categories:['ds_comm_model'],
   text:'對社區中有價值的在地特產或文化遺跡進行活化及創新經營，此作法符合Giloth（1998）下列那一個提振社區經濟的策略？',
   options:['A.資產開發策略（asset-based development）','B.人力資本策略（human capital development）','C.社區企業策略（community enterprise）','D.就業媒合策略（job matching）'],
   answer:'A',explanation:'Giloth（1998）提振社區經濟的策略中，「資產開發策略（asset-based development）」是指識別、挖掘並活化社區內在資產（包含在地特產、文化遺跡、自然環境等），透過創新經營提振社區經濟，符合本題描述。'},

  // ===== 110年上 社會政策與立法（40題）=====
  {id:'sp_110_1_01',subject:'sp',year:110,session:1,num:1,categories:['sp_policy_ideology'],
   text:'在社會政策的規劃與制定中，平等是一個相當重要的價值概念。雷格蘭（Le Grand）提出五種政府推動社會政策的平等策略，下列敘述何者屬於最終成果的平等？',
   options:['A.每位小學生享有相同的教育預算','B.全民健保對每一位公民的健康改善狀況相等','C.就所得而言，每位公民擁有相同的所得','D.每位公民承擔健保部分負擔金額相等'],
   answer:'B',explanation:'Le Grand的五種平等策略中，「最終成果的平等」指的是每個人在接受服務後所獲得的結果（outcome）達到相等，如健康改善狀況相等（B）。公共支出平等（A）是投入相等；最後所得平等（C）是縮小所得差距；負擔成本平等（D）是付出相等。'},
  {id:'sp_110_1_02',subject:'sp',year:110,session:1,num:2,categories:['sp_law_children'],
   text:'根據兒童及少年福利與權益保障法，下列敘述何者錯誤？',
   options:['A.從事收出養媒合服務，以經主管機關許可之財團法人、公私立兒童及少年安置、教養機構為限','B.收出養媒合服務者應評估安排收養人與兒童、少年先行共同生活或儘快接觸','C.收出養媒合服務者從事收出養媒合服務，得向收養人收取服務費用','D.有關收出養媒合服務之收費項目、基準及其他遵行事項之辦法，由中央主管機關定之'],
   answer:'B',explanation:'依兒童及少年福利與權益保障法第15條第二款，收出養媒合服務者應評估並安排收養人與兒童、少年先行共同生活或「漸進式」接觸（非「儘快」接觸），以維護兒少最佳利益，故B錯誤。'},
  {id:'sp_110_1_03',subject:'sp',year:110,session:1,num:3,categories:['sp_policy_ideology'],
   text:'英國新工黨時期政府執政所提出的政策目標在「有能者工作、失能者給付、用工作取得報酬。」上述之政策目標是以何種意識形態為基礎？',
   options:['A.個人主義','B.社會民主主義','C.第三條路','D.新自由主義'],
   answer:'C',explanation:'第三條路（Third Way，布萊爾新工黨）強調「社會投資國家」，將福利視為投資，以強化就業能力（employability）為核心，讓有能力者工作、失能者給付，用工作取得報酬。社會民主主義偏向充分就業與結果平等，新自由主義強調小政府與市場機制。'},
  {id:'sp_110_1_04',subject:'sp',year:110,session:1,num:4,categories:['sp_policy_org'],
   text:'1980年代新自由主義開始檢視政府主導的公共福利活動時，強調3Es的概念。下列那一個選項組合為3Es？①經濟（economy） ②效益（effectiveness） ③影響（effect） ④效率（efficiency）',
   options:['A.①②④','B.①②③','C.②③④','D.①③④'],
   answer:'A',explanation:'新自由主義強調的3Es為：①經濟（economy）——以最低成本達成目標、②效益（effectiveness）——達成預期目標的程度、④效率（efficiency）——投入與產出的比率。③影響（effect）並非3Es之一。'},
  {id:'sp_110_1_05',subject:'sp',year:110,session:1,num:5,categories:['sp_policy_process'],
   text:'政府在民國103年修正中華民國人口政策綱領，關於其基本理念的敘述，下列何者錯誤？',
   options:['A.倡導適齡婚育，尊重生命價值，維繫家庭功能，維持合理人口結構','B.建立完整社會安全網，提供兒童、少年、婦女、高齡者等弱勢者之完善社會福利','C.推動環境保護及永續發展，落實個人、家庭、社區之平衡，並實施國土規劃促進人口合理分布','D.精進移民政策，保障移入人口基本權益，營造友善外來人口之環境'],
   answer:'C',explanation:'依民國103年中華民國人口政策綱領第7條，應落實的平衡是「生活、生態、生產」之平衡，而非「個人、家庭、社區」之平衡，故C敘述錯誤。'},
  {id:'sp_110_1_06',subject:'sp',year:110,session:1,num:6,categories:['sp_policy_ideology'],
   text:'1990年代開始出現福利緊縮，有關福利國家緊縮的敘述，下列何者錯誤？',
   options:['A.影響福利國家緊縮的外部因素為全球化','B.福利給付縮減、門檻提高、限制政府支出等為福利國家緊縮的作法','C.影響福利國家緊縮的內部因素為國內政經變化，及人口結構改變','D.系統性福利緊縮作法包括減稅、降低民眾對公共性社會供給的依賴、強化支持福利國家的利益團體'],
   answer:'D',explanation:'系統性福利緊縮作法應是「削弱」支持福利國家的利益團體（如工會），而非「強化」，以減少對擴大福利的政治壓力。故D敘述錯誤。'},
  {id:'sp_110_1_07',subject:'sp',year:110,session:1,num:7,categories:['sp_policy_ideology'],
   text:'我國1980年通過三個重要社會福利立法，不包括下列何者？',
   options:['A.殘障福利法','B.少年福利法','C.老人福利法','D.社會救助法'],
   answer:'B',explanation:'我國1980年通過的三個重要社會福利立法為：老人福利法（C）、殘障福利法（A）、社會救助法（D）。快速記憶法：「老殘窮」。少年福利法（B）並非1980年通過，故B為答案。'},
  {id:'sp_110_1_08',subject:'sp',year:110,session:1,num:8,categories:['sp_policy_ideology'],
   text:'Titmuss（1974）認為「當社會福利是社會主要整合制度，提供有別於市場的普及性服務，理論基礎考量社會變遷、經濟體系等多重效果，以及社會平等原則。」這是屬於下列何種模式？',
   options:['A.俾斯麥模式','B.殘補式福利模式','C.工業成就模式','D.制度再分配模式'],
   answer:'D',explanation:'Titmuss的三種福利模式：①殘補式（residual）——社會福利是最後手段；②工業成就績效模式——福利與工作/績效連結；③制度再分配模式（institutional redistributive）——社會福利是社會主要整合制度，提供普及性服務，強調社會平等，符合題目描述。'},
  {id:'sp_110_1_09',subject:'sp',year:110,session:1,num:9,categories:['sp_policy_org'],
   text:'關於臺灣福利政策執行確實受到各種思潮和理念變化的影響，下列對這些思潮變化的敘述，何者錯誤？',
   options:['A.受到歐美1980年代新公共管理或新管理主義的影響','B.將過去「通用主義」式的社會福利供給走向「後通用主義」的彈性生產','C.為了管控政府人事編制與支出，透過契約委外方式進行','D.非營利組織承擔多數地方的福利服務，呈現福利多元主義或福利混合經濟的現象'],
   answer:'B',explanation:'臺灣福利政策的思潮變化是將「福特主義」（Fordism，標準化大量生產）走向「後福特主義」（Post-Fordism，彈性化生產），而非「通用主義」走向「後通用主義」。故B敘述錯誤。'},
  {id:'sp_110_1_10',subject:'sp',year:110,session:1,num:10,categories:['sp_policy_ideology'],
   text:'有關社會給付優先受益者的敘述，下列何者錯誤？',
   options:['A.生活機會不足者應是社會給付的優先受益者','B.社會弱勢者應是社會給付的優先受益對象','C.繳所得稅較高者應是社會給付的優先受益對象','D.遭受社會排除者應是社會給付的優先受益對象'],
   answer:'C',explanation:'社會給付的目的是幫助弱勢、有需求者，而非依據繳稅多寡決定。「繳所得稅較高者優先受益」違背社會給付的基本精神（社會正義、需求優先），故C明顯錯誤。'},
  {id:'sp_110_1_11',subject:'sp',year:110,session:1,num:11,categories:['sp_policy_process'],
   text:'社會福利輸送體制的設計，是一連串相互關聯之不同選擇的集合。Gilbert 和 Terrell（2014）列出幾個需要考量的向度，下列何者並非為其考量的項目？',
   options:['A.行政集中化或分散化','B.單一的個別體系或綜合式體系','C.不同體系間的整合或分散','D.成效效率或服務品質之維持'],
   answer:'D',explanation:'Gilbert & Terrell（2014）提出社會福利輸送體制設計需考量的向度包含：行政集中化或分散化（A）、單一體系或綜合體系（B）、不同體系間的整合或分散（C）、行政者主動辦理或使用者申請、掌權者為專家或社區團體等。「成效效率或服務品質之維持」並非其列出的考量向度，故D為答案。'},
  {id:'sp_110_1_12',subject:'sp',year:110,session:1,num:12,categories:['sp_policy_process'],
   text:'Gilbert 和 Terrell（2014）提到常見社會福利服務輸送失敗的問題，其中指服務未能達到其所應宣稱或承諾的目標或效果，屬於下列何者？',
   options:['A.片斷（fragmentation）','B.不連續（discontinuity）','C.權責不符（unaccountability）','D.不易接近（inaccessibility）'],
   answer:'C',explanation:'Gilbert & Terrell的服務輸送失敗類型：片斷（A）指服務未整合；不連續（B）指服務銜接有空窗期；權責不符（unaccountability）（C）指服務未能達到其承諾的目標或效果，即無責信；不易接近（D）指特定族群難以使用服務。本題符合C。'},
  {id:'sp_110_1_13',subject:'sp',year:110,session:1,num:13,categories:['sp_policy_ideology'],
   text:'有關俾斯麥模式與貝佛里奇模式之比較，下列何者錯誤？',
   options:['A.俾斯麥模式財源主要來自稅收，貝佛里奇模式財源主要來自保險費','B.俾斯麥模式以社會保險為基礎，福利資格的取得依據過去的繳費紀錄','C.貝佛里奇模式以全體國民為對象','D.俾斯麥模式之給付為所得相關，貝佛里奇模式之給付為定額'],
   answer:'A',explanation:'恰好相反：俾斯麥模式（社會保險模式）的財源主要來自保險費（雇主與受雇者繳納）；貝佛里奇模式（全民保健服務模式）的財源主要來自稅收（一般稅源）。故A錯誤。'},
  {id:'sp_110_1_14',subject:'sp',year:110,session:1,num:14,categories:['sp_policy_org'],
   text:'關於「社會資本」的敘述，下列何者錯誤？',
   options:['A.社會資本是指社會成員間的信任、規範與網絡','B.社會資本可以促進集體行動與合作','C.社會資本越高的社區，社會問題的解決越困難','D.普特南（Putnam）是社會資本理論的重要學者'],
   answer:'C',explanation:'社會資本（social capital）理論（Putnam等人）認為：社會成員間的信任、規範與網絡（即社會資本）越豐富，越有助於集體行動、合作，也越容易解決社會問題。「社會資本越高越難解決問題」與理論核心相悖，故C錯誤。'},
  {id:'sp_110_1_15',subject:'sp',year:110,session:1,num:15,categories:['sp_policy_org'],
   text:'有關「新管理主義」的敘述，下列何者正確？',
   options:['A.新管理主義主張擴大政府直接提供公共服務的規模','B.新管理主義強調以成本效益為核心，引進私部門管理模式','C.新管理主義反對績效評估與責信機制','D.新管理主義認為政府應負責所有社會福利的直接輸送'],
   answer:'B',explanation:'新管理主義（New Managerialism/New Public Management）的核心特徵是：引進私部門管理模式、強調成本效益與3Es、績效評估、契約外包、競爭機制等，目的是提高公共服務效率。B正確。'},
  {id:'sp_110_1_16',subject:'sp',year:110,session:1,num:16,categories:['sp_policy_org'],
   text:'將決策權由中央向地方下放，增加民眾參與感，讓服務更具品質與彈性的敘述，屬於下列何種觀點？',
   options:['A.中央集權觀點','B.去中心化（decentralization）觀點','C.官僚化觀點','D.科層體制觀點'],
   answer:'B',explanation:'去中心化（decentralization）是指將決策權由中央下放至地方或基層，以增加民眾參與感、讓服務更具彈性與回應性。這是新公共管理的重要特徵之一，故B正確。'},
  {id:'sp_110_1_17',subject:'sp',year:110,session:1,num:17,categories:['sp_policy_org'],
   text:'關於「網絡式治理」的敘述，下列何者正確？',
   options:['A.網絡式治理強調由中央政府單一主導公共服務的提供','B.網絡式治理排除非政府組織的參與','C.網絡式治理強調多元行動者（政府、市場、公民社會）之間的協作','D.網絡式治理完全以市場競爭機制取代政府角色'],
   answer:'C',explanation:'網絡式治理（network governance）強調政府、市場、非政府組織、公民社會等多元行動者之間的相互依賴與協作，共同提供公共服務，而非單一主導或完全市場化。故C正確。'},
  {id:'sp_110_1_18',subject:'sp',year:110,session:1,num:18,categories:['sp_policy_process'],
   text:'關於老年保險持續性年金給付的敘述，下列何者錯誤？',
   options:['A.年金給付的財務設計可分為隨收隨付制（PAYG）與基金制（funded）','B.隨收隨付制是以當期工作者的保費支付當期退休者的給付','C.基金制是將保費累積為基金，退休後由個人帳戶支領','D.隨收隨付制在人口老化情況下比基金制更具財務穩定性'],
   answer:'D',explanation:'隨收隨付制（PAYG）在人口老化（老年人口增加、工作人口減少）的情況下，財務壓力反而增大，因為需要更多工作者繳費來支撐更多退休者的給付。基金制雖有投資風險，但相對不受人口結構影響。故D說「PAYG更具財務穩定性」是錯誤的。'},
  {id:'sp_110_1_19',subject:'sp',year:110,session:1,num:19,categories:['sp_policy_process'],
   text:'關於社會津貼制度的給付原則，下列何者正確？',
   options:['A.社會津貼的領取資格需通過財力調查','B.社會津貼以保險費繳納紀錄為給付依據','C.社會津貼以公民身分或特定人口類別為給付依據，無需財力調查','D.社會津貼的給付金額與個人所得成正比'],
   answer:'C',explanation:'社會津貼（social allowance/demogrant）是以公民身分或特定人口類別（如老人、兒童）為資格，不需通過財力調查（means test），也不依保費繳納紀錄，給付金額通常為定額。例如：老農津貼、育兒津貼等。故C正確。'},
  {id:'sp_110_1_20',subject:'sp',year:110,session:1,num:20,categories:['sp_policy_ideology'],
   text:'下列何者不屬於財稅福利（fiscal welfare）的政策？',
   options:['A.購屋貸款利息可申報所得稅扣除額','B.撫養親屬可申報免稅額','C.政府直接補貼低收入戶租金','D.企業提供員工福利可抵稅'],
   answer:'C',explanation:'Titmuss的福利三分法：社會福利（直接服務）、財稅福利（fiscal welfare，透過稅收優惠提供的福利）、職業福利（雇主提供）。購屋利息扣除額（A）、撫養免稅額（B）、企業員工福利抵稅（D）都是透過稅收機制的財稅福利。「政府直接補貼低收入戶租金」是直接的社會福利給付，非財稅福利，故C為答案。'},
  {id:'sp_110_1_21',subject:'sp',year:110,session:1,num:21,categories:['sp_law_elderly'],
   text:'依老人福利法之規定，下列敘述何者正確？',
   options:['A.老人福利法所稱老人，係指年滿65歲以上之人','B.老人福利法所稱老人，係指年滿70歲以上之人','C.安養機構以提供生活自理能力缺損需他人照顧之老人為服務對象','D.長期照顧機構以健康或生活功能正常之老人為服務對象'],
   answer:'A',explanation:'依老人福利法第2條規定，本法所稱老人係指年滿65歲以上之人，故A正確。安養機構以「生活自理能力正常」的老人為服務對象（C錯誤）；長期照顧機構以「需要長期照顧」之老人為服務對象（D錯誤）。'},
  {id:'sp_110_1_22',subject:'sp',year:110,session:1,num:22,categories:['sp_law_welfare'],
   text:'有關低收入戶資格之審查規定，下列何者錯誤？',
   options:['A.低收入戶係指經直轄市、縣（市）主管機關審核認定，家庭總收入未達最低生活費之一定倍數，且家庭財產未超過中央、直轄市主管機關公告之當年度一定金額者','B.最低生活費由各直轄市、縣（市）主管機關參照中央主管機關公布之消費支出金額，扣除特定費用後公告','C.戶籍與實際居住地不符時，不影響低收入戶申請資格之審查','D.符合一定條件之在學學生，其薪資所得可予以免計'],
   answer:'C',explanation:'依社會救助法，低收入戶申請需以戶籍所在地作為申請依據。戶籍與實際居住地不符時，確實會影響申請資格的審查（需以戶籍地辦理），故C敘述錯誤。'},
  {id:'sp_110_1_23',subject:'sp',year:110,session:1,num:23,categories:['sp_policy_ideology'],
   text:'新右派（New Right）主張透過市場機制來作為分配或再分配福利資源的政策。下列何者屬於新右派取向？',
   options:['A.擴大公立醫院的規模與服務','B.提高政府直接提供福利服務的比例','C.推動教育券（voucher）制度，讓家長自由選擇學校','D.加強工會保障勞工集體談判權'],
   answer:'C',explanation:'新右派（New Right/新自由主義）主張市場機制、競爭、選擇自由，反對大政府。教育券（voucher）制度讓家長自由選擇學校，引入市場競爭機制，是典型的新右派政策工具。擴大公立醫院（A）、提高政府直接提供比例（B）、加強工會（D）都是偏向社會民主或左派的取向。'},
  {id:'sp_110_1_24',subject:'sp',year:110,session:1,num:24,categories:['sp_law_children'],
   text:'依據兒童及少年福利與權益保障法，私人或團體辦理兒童及少年福利機構，有對外勸募行為或享受租稅減免者，最遲應於設立許可之日起多久時間內辦理財團法人登記？',
   options:['A.3個月','B.6個月','C.1年','D.2年'],
   answer:'C',explanation:'依兒童及少年福利與權益保障法相關規定，私人或團體辦理兒童及少年福利機構，如有對外勸募行為或享受租稅減免者，最遲應於設立許可之日起1年內辦理財團法人登記，故選C。'},
  {id:'sp_110_1_25',subject:'sp',year:110,session:1,num:25,categories:['sp_law_disability'],
   text:'依據身心障礙者權益保障法規定，身心障礙者之緊急保護安置，不得超過幾小時？',
   options:['A.24小時','B.48小時','C.72小時','D.96小時'],
   answer:'C',explanation:'依身心障礙者權益保障法規定，身心障礙者之緊急保護安置，不得超過72小時，故選C。'},
  {id:'sp_110_1_26',subject:'sp',year:110,session:1,num:26,categories:['sp_law_disability'],
   text:'依據身心障礙者權益保障法規定，關於視覺功能障礙者就業權益的敘述，何者錯誤？',
   options:['A.非視覺功能障礙者不得從事按摩業','B.視覺功能障礙者得在醫療機構從事醫療按摩工作','C.視覺功能障礙者在按摩及理療按摩工作具有優先就業保障','D.視覺功能障礙者可以自行開設按摩院'],
   answer:'B',explanation:'依身心障礙者權益保障法相關規定，視覺功能障礙者的按摩及理療按摩工作保障規定中，視覺功能障礙者不得在醫療機構從事醫療按摩工作（該工作限於有醫療執照者），故B錯誤。'},
  {id:'sp_110_1_27',subject:'sp',year:110,session:1,num:27,categories:['sp_law_dv'],
   text:'依據家庭暴力防治法規定，關於通常保護令之效期，下列敘述何者正確？',
   options:['A.通常保護令之效期最長為1年','B.通常保護令之效期最長為2年','C.通常保護令不得聲請延長','D.通常保護令由當事人雙方同意後方可延長'],
   answer:'B',explanation:'依家庭暴力防治法規定，通常保護令之效期為1年以下，法院得依聲請或依職權撤銷、變更或延長之，延長後每次期間不得逾2年。最長效期（含延長）可達2年，故選B。'},
  {id:'sp_110_1_28',subject:'sp',year:110,session:1,num:28,categories:['sp_law_dv'],
   text:'依據家庭暴力防治法規定，下列何者並非屬於社會工作人員的職責？',
   options:['A.提供被害人緊急保護及安置','B.協助被害人申請保護令','C.逮捕家庭暴力行為人','D.對被害人進行訪視及心理輔導'],
   answer:'C',explanation:'依家庭暴力防治法，社會工作人員的職責包含：緊急保護安置（A）、協助申請保護令（B）、訪視及心理輔導（D）等。「逮捕家庭暴力行為人」屬警察機關的職責，並非社工人員的職責，故C為答案。'},
  {id:'sp_110_1_29',subject:'sp',year:110,session:1,num:29,categories:['sp_law_welfare'],
   text:'下列何者為社會救助業務之中央主管機關？',
   options:['A.內政部','B.衛生福利部','C.勞動部','D.國家發展委員會'],
   answer:'B',explanation:'依社會救助法規定，社會救助業務之中央主管機關為衛生福利部（原內政部社會司，於2013年改制後移至衛生福利部），故選B。'},
  {id:'sp_110_1_30',subject:'sp',year:110,session:1,num:30,categories:['sp_law_other2'],
   text:'依據精神衛生法，下列關於精神醫療照護業務的敘述何者錯誤？',
   options:['A.精神衛生主管機關於中央為衛生福利部','B.精神疾病嚴重病人之強制住院，須經過嚴格的法定程序','C.社區精神復健機構得單獨設立，不須附設於精神醫療機構','D.嚴重精神病人強制住院期間，家屬得隨時申請出院'],
   answer:'D',explanation:'依精神衛生法規定，嚴重精神病人強制住院是依法定程序執行，並非由家屬任意決定出院時間。強制住院後需依規定程序辦理，不得由家屬「隨時」申請出院，故D錯誤。'},
  {id:'sp_110_1_31',subject:'sp',year:110,session:1,num:31,categories:['sp_law_sw'],
   text:'依社會工作師法第21條規定，申請設立社會工作師事務所之社會工作師，須執行業務幾年之工作，並得有工作證明者才能申請？',
   options:['A.1年','B.2年','C.3年','D.5年'],
   answer:'B',explanation:'依社會工作師法第21條規定，申請設立社會工作師事務所之社會工作師，須執行該法第12條所訂之業務2年以上，並得有工作證明者才能申請，故選B。'},
  {id:'sp_110_1_32',subject:'sp',year:110,session:1,num:32,categories:['sp_law_sw'],
   text:'依據社會工作師法，下列敘述何者錯誤？',
   options:['A.社會工作師非加入社會工作師公會，不得執業','B.社會工作師公會分直轄市及縣（市）公會，並得設社會工作師公會全國聯合會','C.社會工作師執業，應向所在地直轄市或縣（市）主管機關申請執業執照','D.社會工作師事務所名稱須標明所在地'],
   answer:'A',explanation:'依社會工作師法修正後，社會工作師加入公會並非執業的強制條件，即已不再採強制入會制度。「非加入公會，不得執業」的規定已有所調整，故A敘述有誤。'},
  {id:'sp_110_1_33',subject:'sp',year:110,session:1,num:33,categories:['sp_law_child2'],
   text:'有關安置兒少性剝削被害人之中途學校的敘述，下列何者正確？',
   options:['A.中途學校設立於一般校園之中，不作區隔','B.中途學校之主管機關為衛生福利部','C.被安置於中途學校之兒少，其在校期間之課業輔導由教育部負責','D.中途學校可收容男女生'],
   answer:'D',explanation:'依兒童及少年性剝削防制條例相關規定，中途學校可收容遭受性剝削的男女被害兒少（D正確）。中途學校的設立地點通常與一般校園有所區隔（A錯）；中途學校主管機關為教育主管機關，但社政機關也參與其中（B需確認）；課業輔導由教育部門負責執行（C部分正確）。'},
  {id:'sp_110_1_34',subject:'sp',year:110,session:1,num:34,categories:['sp_law_child2'],
   text:'下列何者並非特殊境遇家庭扶助條例所定之扶助項目？',
   options:['A.緊急生活扶助','B.子女生活津貼','C.傷病醫療補助','D.購屋補貼'],
   answer:'D',explanation:'特殊境遇家庭扶助條例的扶助項目包含：緊急生活扶助（A）、子女生活津貼（B）、傷病醫療補助（C）、兒童托育津貼、法律訴訟補助、創業貸款補助等。「購屋補貼」並非特殊境遇家庭扶助條例所定之扶助項目，故D為答案。'},
  {id:'sp_110_1_35',subject:'sp',year:110,session:1,num:35,categories:['sp_law_disability'],
   text:'關於身心障礙者權益保障法中通報處理之相關規定，下列何者錯誤？',
   options:['A.警察人員發現身心障礙者疑似遭受虐待，應通報主管機關','B.醫事人員發現身心障礙者疑似遭受虐待，應通報主管機關','C.通報後主管機關應在72小時內完成調查','D.社會工作人員為法定通報義務人之一'],
   answer:'C',explanation:'依身心障礙者權益保障法，法定通報義務人（包含警察、醫事、社工人員等）於知悉疑似虐待情事時應通報。通報後主管機關應「立即」或在法定時限內完成初步處理，但「72小時內完成調查」的說法並非正確的法定規定（完整調查通常有不同期限），故C敘述有誤。'},
  {id:'sp_110_1_36',subject:'sp',year:110,session:1,num:36,categories:['sp_law_volunteer'],
   text:'依據志願服務法規定，下列何者不屬於志願服務者的義務？',
   options:['A.遵守倫理守則，不得利用機會謀取私利','B.接受教育訓練','C.向運用單位反映服務心得','D.依法繳納志願服務所得之報酬稅款'],
   answer:'D',explanation:'志願服務法明定志願服務者的義務包含：遵守倫理守則（A）、接受教育訓練（B）、向運用單位反映服務心得（C）等。「依法繳納志願服務所得之報酬稅款」並非志願服務法所定的義務（且志願服務本質為無償），故D為答案。'},
  {id:'sp_110_1_37',subject:'sp',year:110,session:1,num:37,categories:['sp_law_pension'],
   text:'國民年金保險之月投保金額調整的依據為何？',
   options:['A.依消費者物價指數（CPI）調整','B.依基本工資調整','C.依勞動部公告之薪資水準調整','D.依行政院公告之平均薪資調整'],
   answer:'A',explanation:'依國民年金法規定，國民年金保險之月投保金額，依消費者物價指數（CPI）的累計成長率達一定幅度（5%）時，由主管機關調整公告，故選A。'},
  {id:'sp_110_1_38',subject:'sp',year:110,session:1,num:38,categories:['sp_law_ltc'],
   text:'我國長期照顧服務法中，為擴增及普及長照服務量能，應設置特種基金。有關特種基金來源之敘述，下列何者錯誤？',
   options:['A.遺產稅及贈與稅收入提撥一定比率','B.菸酒稅收入提撥一定比率','C.健保費收入提撥一定比率','D.政府預算撥充'],
   answer:'C',explanation:'長期照顧服務法的長照特種基金來源包含：遺產稅及贈與稅收入提撥（A）、菸酒稅收入提撥（B）、政府預算撥充（D）等。「健保費收入提撥」並非長照特種基金的法定來源，健保費是用於全民健保，故C錯誤。'},
  {id:'sp_110_1_39',subject:'sp',year:110,session:1,num:39,categories:['sp_law_other2'],
   text:'依據公益勸募條例，勸募活動之勸募所得財物應返還捐贈人之情形不包括下列何者？',
   options:['A.勸募活動未獲許可','B.勸募活動所得超過計畫所需','C.捐贈人要求退款','D.勸募許可遭廢止或撤銷'],
   answer:'C',explanation:'依公益勸募條例，應返還捐贈人的情形包含：勸募活動未獲許可（A）、許可遭廢止或撤銷（D）、活動未如期舉辦等。「勸募活動所得超過計畫所需」的部分需依規定處理，但「捐贈人單方面要求退款」並非條例明定必須返還的情形，故C為答案。'},
  {id:'sp_110_1_40',subject:'sp',year:110,session:1,num:40,categories:['sp_law_child2'],
   text:'依據兒童及少年未來教育與發展帳戶條例，所謂開戶人是指下列何者？',
   options:['A.兒童本人','B.兒童之法定代理人或主管機關指定之人','C.安置兒少之機構負責人','D.社會福利主管機關'],
   answer:'B',explanation:'依兒童及少年未來教育與發展帳戶條例，所謂「開戶人」係指為符合資格之兒童及少年開立帳戶者，即兒童之法定代理人或主管機關指定之人（針對無法定代理人之安置兒少），故選B。'},

  // ===== 110年下 社會政策與立法（40題）=====
  {id:'sp_110_2_01',subject:'sp',year:110,session:2,num:1,categories:['sp_policy_ideology'],
   text:'社會政策的內容，常因分析取向的不同，而倚重倚輕。其中伊爾斯肯（Erskine）提出的四個分析取向，不包括下列何者？',
   options:['A.社會議題','B.社會問題','C.社會分工','D.社會群體'],
   answer:'C',explanation:'Erskine提出的四個社會政策分析取向為：①社會議題（政策回應社會議題）、②社會問題（政策解決社會問題）、③社會服務（政策提供福利服務）、④社會群體（政策保障特定群體）。「社會分工」並非其四個取向之一，故C為答案。'},
  {id:'sp_110_2_02',subject:'sp',year:110,session:2,num:2,categories:['sp_policy_ideology'],
   text:'有關公民權利（citizenship）的討論，透納（Turner）認為馬歇爾（Marshall）的論述忽略了勞工應享有之工作條件、工資及利潤分配，此為何種權利？',
   options:['A.公民權（civil right）','B.政治權（political right）','C.社會權（social right）','D.經濟權（economic right）'],
   answer:'D',explanation:'Marshall提出公民權（18世紀）、政治權（19世紀）、社會權（20世紀）三種公民權利。Turner認為Marshall忽略了工作條件、工資及利潤分配等「經濟權（economic right）」，故D正確。'},
  {id:'sp_110_2_03',subject:'sp',year:110,session:2,num:3,categories:['sp_policy_ideology'],
   text:'綠色主義（Greenism）的取向，可分為溫和的綠色主義與強硬的綠色主義，下列何者不屬於溫和的綠色主義？',
   options:['A.鼓勵公家機關採購陶瓷製品，減少紙杯使用量','B.倡導採用稅務政策、支持有利環境保護的工業','C.鼓勵政府推行使用環境保護之物品','D.應該採取嚴格的措施限制人口成長，避免剝削地球其他物種的生存權'],
   answer:'D',explanation:'溫和的綠色主義（light green）主張在現有體制內推動環保改革，如稅收優惠、鼓勵購買環保產品等（A、B、C均屬此類）。強硬的綠色主義（dark green）主張更根本的社會與生活方式改變，包括「嚴格限制人口成長、避免剝削其他物種」等激進主張（D），故D不屬於溫和綠色主義。'},
  {id:'sp_110_2_04',subject:'sp',year:110,session:2,num:4,categories:['sp_policy_org'],
   text:'有關「專業主義」的敘述，下列何者錯誤？',
   options:['A.在需求複雜的領域，服務輸送奠定在運用專業判斷的基礎上','B.專業人員相對於服務使用者，是屬於有權力的一方','C.權力正當性來自於專業人員所擁有的專家知識','D.專業自主權只依賴國家權威的保障'],
   answer:'D',explanation:'專業主義中，專業自主權來自專業人員所擁有的專家知識（C），而非「只依賴國家權威」。專業的正當性建立在知識權威上，雖然國家也可能賦予某些保障，但並非唯一來源，故D錯誤。'},
  {id:'sp_110_2_05',subject:'sp',year:110,session:2,num:5,categories:['sp_policy_ideology'],
   text:'有關普及式福利與選擇式福利之敘述，下列何者錯誤？',
   options:['A.普及式福利有高涵蓋性','B.選擇式福利行政成本較低','C.普及式福利可促進社會整合','D.選擇式福利較針對真正需求者'],
   answer:'B',explanation:'選擇式福利（selective welfare）需要進行財力調查（means test），這個審查程序比起普及式福利耗費更多行政成本。「選擇式福利行政成本較低」是錯誤的，故B為答案。'},
  {id:'sp_110_2_06',subject:'sp',year:110,session:2,num:6,categories:['sp_law_disability'],
   text:'身心障礙者權利公約（CRPD）影響全球身心障礙者之權利保障，其八大原則下列何者錯誤？',
   options:['A.尊重個人自主，包括自己做決定的自由','B.充分融入社會','C.機會均等','D.尊重老人，保障身心障礙老人的權利'],
   answer:'D',explanation:'CRPD八大原則包含：尊重個人自主（A）、充分融入社會（B）、機會均等（C）、不歧視、尊重差異、無障礙、男女平等、尊重兒童（非老人）發展能力及保留兒童身分認同。八大原則中是「尊重兒童」而非「尊重老人」，故D錯誤。'},
  {id:'sp_110_2_07',subject:'sp',year:110,session:2,num:7,categories:['sp_law_children'],
   text:'1989年聯合國大會通過兒童權利公約（CRC），對各締約國具有法令的約束力，對於該公約的內容，下列敘述何者錯誤？',
   options:['A.締約國應尊重本公約所揭櫫之權利，確保其管轄範圍內的每一兒童均享有此等權利','B.所有關係兒童之事務，均應以兒童最佳利益為優先考量','C.締約國應採取一切適當的立法、行政及其他措施，實現本公約所確認之各項權利','D.締約國承認兒童有與生俱來之生活權，但不涉及確保兒童生存與發展之義務'],
   answer:'D',explanation:'CRC明確規定締約國承認兒童有與生俱來之生活權，並應「盡最大可能確保兒童的生存與發展」。「不涉及確保兒童生存與發展之義務」與公約內容相悖，故D錯誤。'},
  {id:'sp_110_2_08',subject:'sp',year:110,session:2,num:8,categories:['sp_policy_ideology'],
   text:'有關福利國家的萌芽與成長的理論觀點中，下列何者屬於工業主義觀點？',
   options:['A.福利國家的發展是資本主義與勞工階級鬥爭的結果','B.工業化導致社會結構改變，產生新的社會需求，促使福利國家發展','C.福利國家是統治階級用來緩和社會衝突的工具','D.宗教組織是福利國家發展的主要推動力'],
   answer:'B',explanation:'工業主義觀點（industrialism approach）認為福利國家的發展是工業化進程的自然結果——工業化導致傳統家庭與社區功能瓦解，產生老年、失業、疾病等新社會需求，國家需以社會政策回應，故B符合工業主義觀點。A是社會民主（衝突）觀點，C是馬克思主義觀點。'},
  {id:'sp_110_2_09',subject:'sp',year:110,session:2,num:9,categories:['sp_policy_org'],
   text:'有關社會福利組織的型態與服務提供，下列何者錯誤？',
   options:['A.非正式部門（informal sector）包含家庭、鄰里與朋友所提供的照顧','B.志願部門（voluntary sector）是指非政府、非營利的組織提供服務','C.私人部門（private sector）以市場競爭機制提供服務，以利潤為導向','D.公部門（public sector）提供的服務必須向使用者收取費用'],
   answer:'D',explanation:'福利多元主義的四個部門：非正式（A）、志願（B）、私人（C）、公部門（D）。公部門提供的服務並非必須向使用者收取費用，許多公部門服務是免費或補貼的（如義務教育、公衛服務），故D錯誤。'},
  {id:'sp_110_2_10',subject:'sp',year:110,session:2,num:10,categories:['sp_policy_process'],
   text:'對於社會政策過程具有影響的統合論（corporatism），下列敘述何者錯誤？',
   options:['A.統合論強調國家、資本與勞工三方的協商與合作','B.統合論認為利益團體在政策形成過程中扮演重要角色','C.統合論認為政策制定是由多元競爭的利益團體自由競爭決定','D.北歐福利國家的發展常被視為統合論的典型例子'],
   answer:'C',explanation:'「政策制定由多元競爭的利益團體自由競爭決定」是多元主義（pluralism）的觀點，而非統合論。統合論強調國家、資本（雇主）、勞工三方的正式協商與合作（如社會對話、三方協定），故C描述的是多元主義而非統合論，C錯誤。'},
  {id:'sp_110_2_11',subject:'sp',year:110,session:2,num:11,categories:['sp_policy_process'],
   text:'對於民國100年社會福利政策綱領特別揭示其內容符合公民與政治權利國際公約及經濟、社會文化權利國際公約，而此兩公約也依規定訂有施行法。下列敘述何者錯誤？',
   options:['A.公民與政治權利國際公約（ICCPR）保障人民的言論、集會等公民自由','B.經濟、社會文化權利國際公約（ICESCR）保障工作權、受教育權等','C.我國已批准兩公約並制定施行法，使其具有國內法效力','D.兩公約僅適用於具有中華民國國籍之公民，不適用於外籍人士'],
   answer:'D',explanation:'兩公約（ICCPR及ICESCR）的施行法明定，兩公約所揭示的人權保障，適用於我國管轄範圍內的所有人，並不限於本國籍公民，外籍人士亦受保障，故D錯誤。'},
  {id:'sp_110_2_12',subject:'sp',year:110,session:2,num:12,categories:['sp_policy_org'],
   text:'有關福利多元主義的涵義，下列何者錯誤？',
   options:['A.福利多元主義強調由多元的提供者共同承擔社會福利的責任','B.福利多元主義的提供者包含國家、市場、志願組織及非正式部門','C.福利多元主義主張國家應退出所有福利服務的提供','D.福利多元主義又稱為「福利混合經濟」'],
   answer:'C',explanation:'福利多元主義（welfare pluralism）強調由多元主體共同提供福利，國家仍是重要的角色，但不再是唯一提供者。「國家應退出所有福利服務的提供」是過於極端的新自由主義立場，並非福利多元主義的主張，故C錯誤。'},
  {id:'sp_110_2_13',subject:'sp',year:110,session:2,num:13,categories:['sp_policy_ideology'],
   text:'有關 Esping-Andersen 福利國家體制之比較，下列何者錯誤？',
   options:['A.自由主義體制（liberal regime）以市場為主，福利給付具有資產調查性質','B.社會民主體制（social democratic regime）強調普及性、去商品化程度高','C.保守主義體制（conservative regime）以職業別為給付基礎，強調家庭角色','D.社會民主體制的代表國家是美國和英國'],
   answer:'D',explanation:'Esping-Andersen三種福利國家體制：①自由主義（美國、英國、加拿大）、②保守主義（德國、法國）、③社會民主（北歐各國：瑞典、丹麥等）。「美國和英國」是自由主義體制的代表，並非社會民主體制，故D錯誤。'},
  {id:'sp_110_2_14',subject:'sp',year:110,session:2,num:14,categories:['sp_policy_org'],
   text:'有關「福利科層」特色的敘述，下列何者錯誤？',
   options:['A.福利科層具有層級節制、按規則辦事的特性','B.福利科層強調彈性、快速回應個別需求','C.福利科層是傳統公共行政的典型代表','D.福利科層容易產生過度僵化、缺乏彈性的問題'],
   answer:'B',explanation:'福利科層（welfare bureaucracy）是指依照韋伯式科層體制運作的福利行政機構，特色是層級節制、按規則辦事、非人格化（A、C、D均正確）。「強調彈性、快速回應個別需求」是新公共管理或網絡治理的特色，並非科層體制的特色，故B錯誤。'},
  {id:'sp_110_2_15',subject:'sp',year:110,session:2,num:15,categories:['sp_policy_org'],
   text:'有關「新公共管理」特色的敘述，下列何者最正確？',
   options:['A.新公共管理主張政府直接提供所有公共服務，排除私部門參與','B.新公共管理引進私部門管理技術，強調績效、競爭與顧客導向','C.新公共管理反對任何形式的績效評估','D.新公共管理主張完全由市場決定所有公共服務的提供'],
   answer:'B',explanation:'新公共管理（New Public Management）的核心特色：引進私部門管理技術、強調3Es（經濟、效率、效益）、績效評估、顧客導向、市場競爭機制、契約外包等。B最準確描述其特色。'},
  {id:'sp_110_2_16',subject:'sp',year:110,session:2,num:16,categories:['sp_policy_org'],
   text:'關於「責信（accountability）」的敘述，下列何者錯誤？',
   options:['A.責信是指組織或個人對其行動負責並向相關人士說明的義務','B.責信機制包含財務責信、績效責信和程序責信等面向','C.責信只對上級負責，不需對服務使用者負責','D.新公共管理的興起使責信議題更加受到重視'],
   answer:'C',explanation:'責信（accountability）強調向多方負責，包含：對上級（行政責信）、對服務使用者（顧客責信）、對公眾（民主責信）等。「只對上級負責，不需對服務使用者負責」是過時的科層體制觀點，現代責信概念包含對服務使用者的責任，故C錯誤。'},
  {id:'sp_110_2_17',subject:'sp',year:110,session:2,num:17,categories:['sp_policy_org'],
   text:'關於「網絡式治理」的敘述，下列何者錯誤？',
   options:['A.網絡式治理強調多元主體間的協作與相互依賴','B.網絡式治理的核心是政府對所有行動者的單向命令與控制','C.網絡式治理中政府角色從直接提供者轉變為協調者','D.網絡式治理涉及政府、非政府組織、私人部門的協同'],
   answer:'B',explanation:'網絡式治理的核心是多元主體間的「協作與相互依賴」，政府角色從命令控制轉變為協調、促進（C正確）。「政府對所有行動者的單向命令與控制」是傳統科層體制的特徵，與網絡式治理精神相悖，故B錯誤。'},
  {id:'sp_110_2_18',subject:'sp',year:110,session:2,num:18,categories:['sp_policy_process'],
   text:'有關社會保險保費的敘述，下列何者正確？',
   options:['A.社會保險保費通常依被保險人的所得比例計算，所得越高繳費越多','B.社會保險保費與個人的健康風險直接掛鉤，風險越高繳費越多','C.社會保險的給付與個人繳費金額完全對應，多繳多領','D.社會保險具有強制性，所有符合資格者必須自願加入'],
   answer:'A',explanation:'社會保險（與商業保險不同）的保費通常依被保險人的所得比例計算（量能繳費），所得越高繳費越多（A正確）。社會保險不以個人健康風險為計費基礎（B錯）；社會保險具有所得重分配功能，給付與繳費並非完全對應（C錯）；社會保險具有「強制性」，但並非「自願加入」（D錯）。'},
  {id:'sp_110_2_19',subject:'sp',year:110,session:2,num:19,categories:['sp_policy_process'],
   text:'臺灣的就業安定基金也是辦理相關就業促進的重要財源之一，有關其用途下列敘述何者錯誤？',
   options:['A.辦理本國勞工就業促進相關業務','B.補助外國人聘僱許可及管理業務','C.補充全民健保財務缺口','D.補助因聘用外國人而連帶雇用本國勞工之雇主'],
   answer:'C',explanation:'就業安定基金的用途主要為：辦理本國勞工就業促進（A）、補助外國人管理業務（B）、補助相關就業服務措施（D）等。「補充全民健保財務缺口」並非就業安定基金的用途，健保財務由健保收支管理，故C錯誤。'},
  {id:'sp_110_2_20',subject:'sp',year:110,session:2,num:20,categories:['sp_law_welfare'],
   text:'有關社會救助給付原則，下列敘述何者正確？',
   options:['A.社會救助給付採用普及原則，所有人均可申請','B.社會救助給付採用補充性原則，以其他社會保障已窮盡為前提','C.社會救助給付採用高額給付原則，確保受助者生活寬裕','D.社會救助給付採用定額原則，不考量個別家庭的差異'],
   answer:'B',explanation:'社會救助是「最後一道安全網」，採用補充性原則（subsidiarity principle）——在家庭、社區、其他社會保障等資源已用盡的前提下，國家才介入提供救助。社會救助是選擇式（非普及）、最低生活保障（非高額）、依家庭情況計算（非定額）。故B正確。'},
  {id:'sp_110_2_21',subject:'sp',year:110,session:2,num:21,categories:['sp_law_elderly'],
   text:'依老人福利法第21條規定，下列敘述何者正確？',
   options:['A.老人因直系血親卑親屬或依契約對其有扶養義務者有虐待、遺棄情事，老人得聲請法院宣告死亡','B.老人因被扶養義務者虐待，得聲請法院宣告與該扶養義務者斷絕關係','C.老人因扶養義務者虐待或遺棄，法院得宣告扶養義務者喪失繼承權','D.老人因直系血親卑親屬或依契約對其有扶養義務者有虐待、遺棄情事，老人得聲請法院宣告其為廢棄扶養義務者'],
   answer:'D',explanation:'依老人福利法第21條規定，老人因直系血親卑親屬或依契約對其有扶養義務者有虐待、遺棄等情事，致有生命、身體、健康或自由之危難，老人得聲請法院宣告此情形，以廢除其扶養請求權或調整扶養程度，D的描述最接近法條精神。'},
  {id:'sp_110_2_22',subject:'sp',year:110,session:2,num:22,categories:['sp_law_elderly'],
   text:'依老人福利法第19條規定，為滿足老人居住機構之需求，下列敘述何者錯誤？',
   options:['A.主管機關應自行或結合民間資源辦理老人福利機構','B.安養機構以需他人照顧或無家可歸之老人為服務對象','C.長期照顧機構以罹患長期慢性疾病且需醫護服務之老人為服務對象','D.養護機構以生活自理能力缺損需他人照顧之老人為服務對象'],
   answer:'B',explanation:'依老人福利法，安養機構以「生活自理能力正常」但無家可歸或需要安置之老人為服務對象，而非「需他人照顧」的老人（那是養護機構的服務對象）。故B敘述錯誤，安養機構是給生活可以自理的老人。'},
  {id:'sp_110_2_23',subject:'sp',year:110,session:2,num:23,categories:['sp_law_children'],
   text:'依據兒童及少年福利與權益保障法規定，主管機關應至少每幾年對兒童及少年身心發展、社會參與、生活及需求現況進行調查、統計及分析並公布結果？',
   options:['A.3年','B.4年','C.5年','D.6年'],
   answer:'C',explanation:'依兒童及少年福利與權益保障法規定，主管機關應至少每5年對兒童及少年身心發展、社會參與、生活及需求現況進行調查、統計及分析並公布結果，故選C。'},
  {id:'sp_110_2_24',subject:'sp',year:110,session:2,num:24,categories:['sp_law_children'],
   text:'依據兒童及少年福利與權益保障法規定，因受寄養家庭或安置機構提供兒童及少年必要服務所需之生活費、衛生保健費、學雜費等，得向下列何者收取？',
   options:['A.兒童或少年本人','B.兒童或少年之法定代理人','C.國家統一支付，不向任何人收取','D.安置機構所在地之縣市政府'],
   answer:'B',explanation:'依兒童及少年福利與權益保障法規定，寄養家庭或安置機構提供兒少必要服務所需之生活費、衛生保健費、學雜費等，得向兒童或少年之「法定代理人」（即父母或監護人）收取，故選B。'},
  {id:'sp_110_2_25',subject:'sp',year:110,session:2,num:25,categories:['sp_law_disability'],
   text:'依據身心障礙者權益保障法規定，主管機關應遴聘相關代表辦理身心障礙者權益保障事項；其中遴聘身心障礙者或其監護人代表及民間相關機構、團體代表，不得少於多少比例？',
   options:['A.二分之一','B.三分之一','C.四分之一','D.五分之一'],
   answer:'A',explanation:'依身心障礙者權益保障法規定，主管機關遴聘相關代表辦理身心障礙者權益保障事項時，其中身心障礙者或其監護人代表及民間相關機構、團體代表，不得少於二分之一（1/2），故選A。'},
  {id:'sp_110_2_26',subject:'sp',year:110,session:2,num:26,categories:['sp_law_disability'],
   text:'依據身心障礙者權益保障法，身體系統構造或功能之損傷或不全之規定，共計幾款？',
   options:['A.6款','B.7款','C.8款','D.9款'],
   answer:'C',explanation:'依身心障礙者權益保障法第5條規定，本法所稱身心障礙者之身體系統構造或功能損傷或不全，共分為8款（如神經系統、眼、耳、聲音與言語、肌肉骨骼、精神及行為、心血管等），故選C。'},
  {id:'sp_110_2_27',subject:'sp',year:110,session:2,num:27,categories:['sp_law_dv'],
   text:'依據家庭暴力防治法第63條之1規定，被害人年滿幾歲，遭受現有或曾有親密關係之未同居伴侶施以身體或精神上不法侵害之情事者，可準用相關規定申請保護令？',
   options:['A.14歲','B.16歲','C.18歲','D.20歲'],
   answer:'B',explanation:'依家庭暴力防治法第63條之1規定，被害人年滿16歲，遭受現有或曾有親密關係之未同居伴侶施以身體或精神上不法侵害之情事者，得準用保護令相關規定申請保護，故選B。'},
  {id:'sp_110_2_28',subject:'sp',year:110,session:2,num:28,categories:['sp_law_children'],
   text:'依據兒童及少年福利與權益保障法規定，所謂居家式托育服務，指兒童由其幾親等內親屬以外人員，於居家環境中提供收費之托育服務？',
   options:['A.一親等','B.二親等','C.三親等','D.四親等'],
   answer:'C',explanation:'依兒童及少年福利與權益保障法規定，居家式托育服務係指兒童由其三親等內親屬以外人員，於居家環境中提供收費之托育服務，故選C。三親等內親屬（如父母、祖父母、叔伯舅等）提供的照顧不算居家式托育服務。'},
  {id:'sp_110_2_29',subject:'sp',year:110,session:2,num:29,categories:['sp_law_welfare'],
   text:'依社會救助法第5條之1規定，有關家庭總收入中工作收入之計算，下列何者錯誤？',
   options:['A.16歲以上未滿65歲之家庭成員，有工作能力者，應計算工作收入','B.身心障礙者符合一定條件時，其工作收入得部分免予計入','C.家庭成員為在校學生，其工作收入全額免予計入家庭總收入','D.未就業者以最低工資計算工作收入，但有特殊情形者得認定'],
   answer:'C',explanation:'依社會救助法規定，在校學生之薪資所得得部分免予計入（並非「全額免予計入」），有一定的免計上限規定，故C錯誤。'},
  {id:'sp_110_2_30',subject:'sp',year:110,session:2,num:30,categories:['sp_law_welfare'],
   text:'有關社會救助法相關規定，下列何者錯誤？',
   options:['A.直轄市及縣（市）主管機關每年應定期辦理低收入戶調查統計及公告','B.社會救助包含生活扶助、醫療補助、急難救助及災害救助','C.直轄市、縣（市）主管機關對低收入戶，應積極協助其自立','D.社會救助業務中，低收入戶之審核一律由中央主管機關辦理'],
   answer:'D',explanation:'依社會救助法，低收入戶的資格審核是由直轄市、縣（市）主管機關（地方政府）辦理，而非中央主管機關，故D錯誤。中央主管機關負責訂定標準及監督，地方主管機關負責實際審核作業。'},
  {id:'sp_110_2_31',subject:'sp',year:110,session:2,num:31,categories:['sp_law_sw'],
   text:'依社會工作師法之規定，社會工作師事務所因故未能繼續開業，負責社會工作師死亡或無承接者，該事務所全部服務紀錄應如何處理？',
   options:['A.由家屬保存','B.銷毀，以保護案主隱私','C.移交當地主管機關保存','D.移交中華社會工作師公會保存'],
   answer:'C',explanation:'依社會工作師法規定，社會工作師事務所因負責社會工作師死亡或無承接者而無法繼續開業時，其全部服務紀錄應移交當地（所在地直轄市或縣市）主管機關保存，以確保案主資料的妥善保存與延續性，故選C。'},
  {id:'sp_110_2_32',subject:'sp',year:110,session:2,num:32,categories:['sp_law_sw'],
   text:'依據社會工作師法第19條之規定，社會工作師依法執行公權力職務，有受到身體或精神上不法侵害之虞者，得請求那一個機關提供必要之協助？',
   options:['A.衛生福利部','B.所在地警察機關','C.中華社會工作師公會','D.所服務機構之主管機關'],
   answer:'B',explanation:'依社會工作師法第19條規定，社會工作師依法執行公權力職務，有受到身體或精神上不法侵害之虞者，得請求所在地「警察機關」提供必要之協助，故選B。'},
  {id:'sp_110_2_33',subject:'sp',year:110,session:2,num:33,categories:['sp_law_child2'],
   text:'依兒童及少年性剝削防制條例第10條規定，有關兒少性剝削被害人偵查或審理受詢問時，得陪同在場者不包括下列何者？',
   options:['A.法定代理人或其委託之人','B.被害人之社工人員','C.心理師或輔導人員','D.加害人之辯護律師'],
   answer:'D',explanation:'依兒童及少年性剝削防制條例第10條規定，兒少性剝削被害人偵查或審理受詢問時，得陪同在場者包含：法定代理人或委託之人（A）、社工人員（B）、心理師或輔導人員（C）等，目的在於保護被害人。「加害人之辯護律師」並非被害人的陪同在場者，故D為答案。'},
  {id:'sp_110_2_34',subject:'sp',year:110,session:2,num:34,categories:['sp_law_child2'],
   text:'依據特殊境遇家庭扶助條例，有關特殊境遇家庭收入標準的規定，下列敘述何者正確？',
   options:['A.家庭總收入每人每月未達當地區每人每月最低生活費2.5倍','B.家庭總收入每人每月未達當地區每人每月最低生活費3倍','C.家庭成員所有不動產之價值未超過一定金額','D.A和C均需符合才可申請'],
   answer:'D',explanation:'依特殊境遇家庭扶助條例，特殊境遇家庭的收入標準須同時符合：①家庭總收入每人每月未達當地區最低生活費2.5倍，且②家庭成員所有不動產之價值未超過中央主管機關公告之一定金額，兩項條件均須符合，故選D。'},
  {id:'sp_110_2_35',subject:'sp',year:110,session:2,num:35,categories:['sp_law_sexual'],
   text:'對於性別工作平等法的條文內容，下列敘述何者錯誤？',
   options:['A.雇主對受僱者之薪資，不得因性別或性傾向而有所差異','B.受僱者或求職者遭受性騷擾，雇主應採取立即有效之糾正及補救措施','C.雇主僱用員工達100人以上者，應設置哺（集）乳室及托兒設施','D.受僱者申請育嬰留職停薪期間，雇主得不發給任何薪資'],
   answer:'C',explanation:'依性別工作平等法規定，雇主僱用員工達「一定人數（現為250人）」以上者，應設置哺（集）乳室及托兒設施或提供托兒措施。「100人以上」的門檻不正確，依現行規定應為較高人數門檻，故C敘述錯誤。'},
  {id:'sp_110_2_36',subject:'sp',year:110,session:2,num:36,categories:['sp_law_volunteer'],
   text:'依據志願服務法規定，關於志願服務運用單位的職責，下列敘述何者錯誤？',
   options:['A.辦理志願服務教育訓練','B.給予志願服務者從事服務之必要協助','C.替志願服務者投保意外險','D.給予志願服務者每月固定薪資'],
   answer:'D',explanation:'依志願服務法，志願服務的本質是「無償服務」，運用單位不需也不應給予志願服務者固定薪資（可補貼交通費、餐費等必要費用，但非薪資）。「給予每月固定薪資」違背志願服務的精神，故D錯誤。'},
  {id:'sp_110_2_37',subject:'sp',year:110,session:2,num:37,categories:['sp_law_pension'],
   text:'有關國民年金保險之保險給付規定，下列何者錯誤？',
   options:['A.老年年金給付分為A式和B式兩種計算方式，擇優給付','B.身心障礙年金給付之被保險人須為重度以上身心障礙','C.遺屬年金給付之請領資格包含配偶、子女及父母','D.生育給付為一次性給付，標準為生育當月起前6個月之月投保金額之合計'],
   answer:'B',explanation:'依國民年金法規定，身心障礙年金給付的申請資格為符合「中度以上」身心障礙（非「重度以上」），故B敘述錯誤（條件比重度更寬鬆）。'},
  {id:'sp_110_2_38',subject:'sp',year:110,session:2,num:38,categories:['sp_law_ltc'],
   text:'依長期照顧服務法規定，機構住宿式服務類之長照機構，應投保何種保險以確保機構服務使用者之生命安全？',
   options:['A.公共意外責任保險','B.火災保險','C.長期照顧保險','D.全民健康保險'],
   answer:'A',explanation:'依長期照顧服務法規定，機構住宿式服務類之長照機構，應投保「公共意外責任保險」，以確保機構服務使用者（住民）之生命安全，並確保發生意外時能獲得賠償，故選A。'},
  {id:'sp_110_2_39',subject:'sp',year:110,session:2,num:39,categories:['sp_law_elderly'],
   text:'依據老人福利法第18條之規定，為提高家庭照顧老人之意願及能力，下列敘述何者正確？',
   options:['A.主管機關應對家庭照顧者提供喘息服務','B.主管機關應補助家庭照顧者購置照顧器材','C.主管機關應強制家庭照顧者參加照顧技巧訓練','D.A和B均正確'],
   answer:'A',explanation:'依老人福利法第18條規定，為提高家庭照顧老人之意願及能力，主管機關應對家庭照顧者提供喘息服務、照顧技巧訓練、諮詢服務及其他必要之支持性服務。喘息服務（A）是明確列明的服務項目，故A正確。（補助購買器材B及強制訓練C均非法條明確規定。）'},
  {id:'sp_110_2_40',subject:'sp',year:110,session:2,num:40,categories:['sp_law_other2'],
   text:'依據公益勸募條例規定，下列敘述何者錯誤？',
   options:['A.公益勸募活動以向不特定多數人募集財物為前提','B.勸募團體應為財團法人或公益社團法人','C.勸募活動所得財物，應專款專用，不得移作他途','D.政府機關得自行辦理公益勸募活動'],
   answer:'D',explanation:'依公益勸募條例規定，政府機關（公務機關）不得自行辦理公益勸募活動；公益勸募活動的主體應為符合資格的財團法人、公益社團法人等民間組織。「政府機關得自行辦理公益勸募」違反條例規定，故D錯誤。'},

  // ===== 110年上 人類行為與社會環境（40題）=====
  {id:'hb_110_1_01',subject:'hb',year:110,session:1,num:1,categories:['hb_theory_cognitive'],text:'下列敘述是一位學生的認知模式：「思考型態不再侷限於具體事務或問題，開始可運用抽象的、邏輯的思考方式去推理或判斷，並解決周遭的問題」，以Piaget的認知發展論而言，此學生的認知已發展到那一期？',options:['A.感覺動作期','B.準備運思期','C.形式運思期','D.具體運思期'],answer:'C',explanation:'Piaget認知發展四階段：感覺動作期（0-2歲）、前運思期（2-7歲，自我中心）、具體運思期（7-11歲，可逆思考但限具體事物）、形式運思期（11歲以上，可進行抽象思考與邏輯推理）。題目描述「抽象思考、邏輯推理」正是形式運思期的特徵。'},
  {id:'hb_110_1_02',subject:'hb',year:110,session:1,num:2,categories:['hb_stage_elder'],text:'當個體認知有缺損，其評量篩檢分數比正常老化還嚴重，但沒有阿茲海默症或其他失智症常見的功能障礙與行為問題，稱之為「輕度認知障礙」。在DSM-5中以那個說法來取代「輕度認知障礙」？',options:['A.輕度神經認知障礙（mild neurocognitive disorder）','B.早期失智症（early dementia）','C.認知退化症候群（cognitive decline syndrome）','D.老年認知衰退（age-related cognitive decline）'],answer:'A',explanation:'DSM-5以「輕度神經認知障礙（mild neurocognitive disorder）」取代「輕度認知障礙（mild cognitive impairment）」，強調認知功能的輕度下降但不達失智症診斷標準，故選A。'},
  {id:'hb_110_1_03',subject:'hb',year:110,session:1,num:3,categories:['hb_theory_family'],text:'在家庭中，通過親密的情感交流，讓父母親的價值、理想和信仰，經由仿效、認同及內化的方式，融入兒童的人格，並成為兒童的理想、價值和態度。以上敘述，比較傾向下列家庭的何種功能？',options:['A.經濟保障功能','B.社會化功能','C.情感支持功能','D.生育功能'],answer:'B',explanation:'透過親密情感交流，讓兒童內化父母的價值觀與信仰，成為兒童人格的一部分，這正是家庭的「社會化功能」——將社會規範、文化價值傳遞給下一代。'},
  {id:'hb_110_1_04',subject:'hb',year:110,session:1,num:4,categories:['hb_div_family'],text:'離婚可視為家庭壓力與危機之一。有關離婚對兒童產生的影響與適應之敘述，下列何者錯誤？',options:['A.父母衝突程度越高，對兒童的負面影響越大','B.離婚後的監護安排對兒童的適應有重要影響','C.男童比女童更難適應父母離婚的狀況','D.離婚後若能維持穩定的親子關係，有助於兒童的調適'],answer:'C',explanation:'父母離婚對兒童的影響因性別有所不同，但並非一概「男童比女童更難適應」。男童較易出現外化行為問題，女童較易出現內化問題，兩者只是反應方式不同，故C錯誤。'},
  {id:'hb_110_1_05',subject:'hb',year:110,session:1,num:5,categories:['hb_theory_cognitive'],text:'主張人類的行為來自對外在刺激進行解釋、分析、然後再據以反應的觀點，比較傾向下列那種說法？',options:['A.行為主義（behaviorism）','B.認知理論（cognitive theory）','C.精神分析理論（psychoanalytic theory）','D.人本主義（humanism）'],answer:'B',explanation:'「對外在刺激進行解釋、分析，然後再反應」強調認知處理過程在行為中的中介角色，這正是認知理論的核心。行為主義強調刺激-反應的直接連結，不重視中間的認知處理過程。'},
  {id:'hb_110_1_06',subject:'hb',year:110,session:1,num:6,categories:['hb_theory_family'],text:'從家庭系統看夫妻面對癌症與疾病的敘述，下列何者錯誤？',options:['A.疾病會打亂家庭原有的互動模式和角色分配','B.家庭成員因疾病產生的壓力反應會相互影響','C.面對癌症，家庭系統的最佳策略是維持現有結構不做任何改變','D.社工應協助家庭發展新的因應策略以適應疾病帶來的改變'],answer:'C',explanation:'從家庭系統觀點，面對重大疾病，家庭需要進行動態調整——重新分配角色、調整規則、尋找新資源。「維持現有結構不做任何改變」是僵化的應對方式，故C錯誤。'},
  {id:'hb_110_1_07',subject:'hb',year:110,session:1,num:7,categories:['hb_stage_youth'],text:'有關親子衝突的理論觀點敘述，下列何者錯誤？',options:['A.演化論觀點認為親子衝突有助於子女爭取更多資源','B.心理分析觀點認為青少年需要與父母分離以建立自主性','C.親子衝突對兒童和青少年的發展完全沒有任何功能','D.社會學習觀點認為衝突可以是學習協商和解決問題的機會'],answer:'C',explanation:'多種理論均認為親子衝突在某些程度上具有功能性意義，如協助子女建立自主性、學習協商技巧等。「完全沒有任何功能」說法過於絕對，故C錯誤。'},
  {id:'hb_110_1_08',subject:'hb',year:110,session:1,num:8,categories:['hb_theory_social'],text:'有關生態系統論中「中介系統（mesosystems）」的敘述，下列何者正確？',options:['A.中介系統是指個人直接接觸的環境，如家庭、學校','B.中介系統是指個人未直接參與但受影響的環境，如父母的職場','C.中介系統是指兩個或多個微視系統之間的互動關係','D.中介系統是指社會文化、意識形態和政策制度'],answer:'C',explanation:'Bronfenbrenner生態系統論：微視系統（個人直接接觸的環境）、中介系統（兩個或多個微視系統之間的關係，如家庭與學校的關係）、外部系統（個人未直接參與但受影響的環境）、鉅視系統（社會文化與政策）。C正確描述中介系統。'},
  {id:'hb_110_1_09',subject:'hb',year:110,session:1,num:9,categories:['hb_theory_social'],text:'結構中的成員可以自外界獲取能力、知識與報酬的敘述，比較符合系統理論的那一項特點？',options:['A.開放性（openness）','B.非加總性（non-summativity）','C.回饋（feedback）','D.穩定狀態（steady state）'],answer:'A',explanation:'系統理論的「開放性（openness）」是指系統能與外界環境進行能量、資訊、資源的交換。「結構中的成員可以自外界獲取能力、知識與報酬」正是系統開放性的體現。'},
  {id:'hb_110_1_10',subject:'hb',year:110,session:1,num:10,categories:['hb_theory_social'],text:'生態論中說明個人行為須因應環境限制和要求，環境也須遷就其成員需要的現象，比較接近下列何者？',options:['A.適應（adaptation）','B.棲息地（habitat）','C.棲位（niche）','D.勝任能力（competence）'],answer:'A',explanation:'生態論中「適應（adaptation）」是指個人與環境之間的互動調整過程——個人因應環境的限制與要求而改變，環境也因成員的需求而調整，達到動態平衡。'},
  {id:'hb_110_1_11',subject:'hb',year:110,session:1,num:11,categories:['hb_stage_elder'],text:'下列何者不是Rowe與Kahn（1997）所提「成功老化」的特性？',options:['A.避免疾病和疾病相關的失能','B.維持高度的認知和身體功能','C.積極參與生活（包含社會關係與具生產力的活動）','D.完全退出社會活動以享受休閒生活'],answer:'D',explanation:'Rowe & Kahn（1997）提出成功老化的三大要素：①避免疾病與失能、②維持高度認知與身體功能、③積極參與生活。「完全退出社會活動」是撤退理論的概念，並非Rowe & Kahn的成功老化特性，故D為答案。'},
  {id:'hb_110_1_12',subject:'hb',year:110,session:1,num:12,categories:['hb_div_family'],text:'不同世代因不同社會變遷衍生不同價值觀，日本學者以人類出生年代給予特殊名稱。下列選項何者正確？①1965年後出生的是X世代 ②1975年後出生的是Y世代 ③1985年後出生的是Z世代 ④1995年後出生的是J世代',options:['A.①②','B.①③','C.②③','D.③④'],answer:'B',explanation:'世代分類：X世代約1965年後出生（①正確）；Z世代約1995年後出生（③正確）。②1975年後為Y世代說法年份不準確；④J世代的說法並非廣為接受的分類。故選B（①③）。'},
  {id:'hb_110_1_13',subject:'hb',year:110,session:1,num:13,categories:['hb_div_gender'],text:'Gilligan認為女性道德發展與男性不同。下列何者不是Gilligan的主張？',options:['A.女性的道德發展以關懷與責任為核心','B.男性的道德發展以正義與權利為核心','C.女性道德觀強調人際關係與情境脈絡','D.女性的道德發展比男性更高階、更成熟'],answer:'D',explanation:'Gilligan批評Kohlberg的道德發展理論以男性為標準，認為女性道德發展以關懷倫理為核心（A、B、C均正確）。但Gilligan並未主張女性道德「比男性更高階或更成熟」，兩者只是不同取向，故D不是Gilligan的主張。'},
  {id:'hb_110_1_14',subject:'hb',year:110,session:1,num:14,categories:['hb_theory_social'],text:'請選出「生態系統論」中，個體所需具備與社會環境互動三大主要因應技巧的正確組合？①個體要取得和使用社會資源 ②個體要改變舊有無效因應方式適應生活轉變問題 ③個體要充分覺察內在本能衝突合理使用防衛機制 ④個體要主動影響和改變社會環境使之能回應其需求',options:['A.①②③','B.①②④','C.②③④','D.①③④'],answer:'B',explanation:'生態系統論的三大因應技巧：①取得和使用社會資源、②改變舊有無效因應方式以適應生活轉變、④主動影響和改變社會環境。③「覺察內在本能衝突合理使用防衛機制」屬精神分析取向，非生態系統論的因應技巧，故選B。'},
  {id:'hb_110_1_15',subject:'hb',year:110,session:1,num:15,categories:['hb_stage_early'],text:'下列何者最不適宜作為自閉症兒童社工處遇的目標？',options:['A.提升自閉症兒童的社交技巧','B.協助家庭了解自閉症的特性與需求','C.強迫自閉症兒童與同儕建立深度情感關係','D.連結相關專業資源提供整合性服務'],answer:'C',explanation:'社工處遇目標應是提升社交技巧（A）、協助家庭理解（B）、連結資源（D）。「強迫」建立深度情感關係不尊重自閉症兒童的特質與自主，且強迫方式可能造成傷害，故C最不適宜。'},
  {id:'hb_110_1_16',subject:'hb',year:110,session:1,num:16,categories:['hb_stage_elder'],text:'有關安寧照護核心觀點的敘述，下列何者錯誤？',options:['A.安寧照護的目標是改善末期病人及家屬的生活品質','B.安寧照護強調積極治療以延長病人的生命','C.安寧照護重視病人的尊嚴與自主','D.安寧照護的服務範圍包含病人的身心靈與社會層面'],answer:'B',explanation:'安寧照護的核心理念是「舒適照護」而非「積極延長生命」。安寧照護強調生命品質、減少痛苦、尊重病人自主，「強調積極治療以延長生命」違背安寧照護精神，故B錯誤。'},
  {id:'hb_110_1_17',subject:'hb',year:110,session:1,num:17,categories:['hb_stage_adult'],text:'Sternberg（1988）的愛情三角理論，有一種愛是彼此的關係只剩下承諾，沒有親密的關係，也沒有熱情的存在，是怎樣的愛？',options:['A.空洞的愛（empty love）','B.伴侶的愛（companionate love）','C.迷戀（infatuation）','D.浪漫的愛（romantic love）'],answer:'A',explanation:'Sternberg愛情三角理論包含三要素：親密、熱情、承諾。空洞的愛（empty love）只有承諾，沒有親密與熱情，如長久婚姻中感情已淡只剩義務，故A正確。'},
  {id:'hb_110_1_18',subject:'hb',year:110,session:1,num:18,categories:['hb_theory_cognitive'],text:'鷹架理論（Scaffolding Theory）常常被青少年工作者所引用，下列理由何者最為恰當？',options:['A.鷹架理論強調青少年應獨立解決所有問題','B.鷹架理論強調成人提供適當支持，協助青少年在「近側發展區」內發展能力','C.鷹架理論認為青少年的發展完全由基因決定','D.鷹架理論主張青少年應避免接受任何外部協助'],answer:'B',explanation:'鷹架理論源自Vygotsky的「近側發展區（ZPD）」概念，強調成人提供適當支持（鷹架），協助個體達成其獨立無法完成但在支持下可以完成的任務。這對青少年工作具有重要意義，故B正確。'},
  {id:'hb_110_1_19',subject:'hb',year:110,session:1,num:19,categories:['hb_stage_early'],text:'學齡兒童重要發展及訓練是保留概念，下列何者不屬於此概念？',options:['A.質量守恆（conservation of mass）','B.數量守恆（conservation of number）','C.自我中心思考（egocentric thinking）','D.體積守恆（conservation of volume）'],answer:'C',explanation:'Piaget的「保留概念（conservation）」是具體運思期的重要發展，包含質量守恆（A）、數量守恆（B）、體積守恆（D）等。「自我中心思考」是前運思期（2-7歲）的特徵，非保留概念，故C為答案。'},
  {id:'hb_110_1_20',subject:'hb',year:110,session:1,num:20,categories:['hb_theory_cognitive'],text:'Sternberg的智力三元論認為一個人的智力應該包含解決實用問題的能力，下列何者正確？',options:['A.分析性智力（analytical intelligence）','B.創造性智力（creative intelligence）','C.實用性智力（practical intelligence）','D.情緒智力（emotional intelligence）'],answer:'C',explanation:'Sternberg智力三元論包含：①分析性智力（學業性問題解決）、②創造性智力（面對新奇情境）、③實用性智力（解決日常實際問題，適應環境）。「解決實用問題的能力」正是實用性智力，故選C。'},
  {id:'hb_110_1_21',subject:'hb',year:110,session:1,num:21,categories:['hb_stage_early'],text:'美國食品藥物管理局（FDA）將懷孕用藥分為ABCDX等五級，其中X級代表的用藥安全級數是？',options:['A.動物實驗未見危害，但人類試驗不足','B.動物實驗發現危害，人類試驗亦有危害','C.胎兒危害已被明確證實，禁止孕婦使用','D.人類試驗未見危害，但數據不足'],answer:'C',explanation:'FDA懷孕用藥X級表示胎兒危害已被明確證實，風險明顯大於任何可能的效益，懷孕或可能懷孕的婦女禁止使用，故選C。'},
  {id:'hb_110_1_22',subject:'hb',year:110,session:1,num:22,categories:['hb_theory_family'],text:'人類行為與社會環境之重要概念也包含增權、優勢及復原力，其中在思考家庭的優勢（strengths）時，不包含下列何者？',options:['A.家庭成員的技能與才能','B.家庭建立的社會支持網絡','C.家庭的文化傳統與價值觀','D.家庭成員的病理診斷與缺陷清單'],answer:'D',explanation:'優勢觀點在評估家庭優勢時，聚焦於成員的技能才能（A）、社會支持網絡（B）、文化傳統與價值觀（C）等正向資源。「病理診斷與缺陷清單」是問題取向的評估方式，非優勢觀點的內容，故D不包含在家庭優勢的思考中。'},
  {id:'hb_110_1_23',subject:'hb',year:110,session:1,num:23,categories:['hb_theory_cognitive'],text:'Piaget針對認知發展分為四個階段，下列敘述何者錯誤？',options:['A.感覺動作期的嬰幼兒開始發展物體恆存概念','B.前運思期兒童具有自我中心傾向，難以從他人角度看問題','C.具體運思期兒童可進行抽象邏輯推理與假設思考','D.形式運思期青少年能進行抽象、假設性與邏輯性思考'],answer:'C',explanation:'具體運思期（7-11歲）的兒童可進行可逆思考，理解保留概念，但思考仍需依賴具體事物，無法進行純粹的抽象邏輯推理。「抽象邏輯推理與假設思考」是形式運思期的特徵，故C描述錯誤。'},
  {id:'hb_110_1_24',subject:'hb',year:110,session:1,num:24,categories:['hb_stage_youth'],text:'青少年發展階段中很重要的部分是同儕壓力跟從眾，下列敘述何者正確？',options:['A.青少年的從眾行為在整個青少年期均逐漸增加','B.青少年的從眾行為在青少年中期達到高峰，之後逐漸下降','C.青少年的同儕壓力對所有行為的影響程度相同','D.青少年接受同儕影響的程度與父母影響的程度完全相同'],answer:'B',explanation:'研究顯示，青少年的從眾行為（conformity to peers）在青少年中期（約13-15歲）達到高峰，之後隨著自我認同的發展與自主性的增強逐漸下降，故B正確。'},
  {id:'hb_110_1_25',subject:'hb',year:110,session:1,num:25,categories:['hb_theory_psycho'],text:'一個長期被霸凌的小孩，會轉向欺負其他比自己更弱小的對象，是那一種現象？',options:['A.替代性攻擊（displacement aggression）','B.投射（projection）','C.合理化（rationalization）','D.壓抑（repression）'],answer:'A',explanation:'替代性攻擊（displacement aggression）是指將對某一對象的攻擊衝動，轉移到另一個較安全（較弱小）的對象上，如被霸凌的孩子轉而欺負更弱小的人。這也是心理防衛機制之一，故選A。'},
  {id:'hb_110_1_26',subject:'hb',year:110,session:1,num:26,categories:['hb_stage_youth'],text:'相信自己是獨特的，全能而不必擔心被危險攻擊，這是因為他們相信自己是無懈可擊的／全能的；這是David Elkind（2006）對那一個發展階段的敘述？',options:['A.兒童期（childhood）','B.青少年期（adolescence）','C.成年初期（early adulthood）','D.中年期（middle adulthood）'],answer:'B',explanation:'David Elkind描述青少年的「個人神話（personal fable）」——青少年相信自己是獨特的、無懈可擊的、特殊的存在，認為危險不會降臨在自己身上。這是青少年期的典型思考特徵，故選B。'},
  {id:'hb_110_1_27',subject:'hb',year:110,session:1,num:27,categories:['hb_theory_psycho'],text:'Freud將人格結構分為本我（id）、自我（ego）和超我（superego），下列敘述何者正確？',options:['A.本我遵循現實原則，尋求安全和理性的滿足方式','B.自我遵循快樂原則，追求立即的慾望滿足','C.超我代表道德良知，依據社會規範和道德標準運作','D.本我、自我和超我都存在於意識層面'],answer:'C',explanation:'Freud人格三結構：本我（id）遵循快樂原則，追求立即滿足；自我（ego）遵循現實原則，在現實與本我之間調節；超我（superego）代表道德良知，依社會規範運作（C正確）；本我主要在潛意識層面（D錯誤）。'},
  {id:'hb_110_1_28',subject:'hb',year:110,session:1,num:28,categories:['hb_stage_elder'],text:'下列那項觀點主張個體在老年時傾向於繼續維持一致的行為模式，來代替失去的社會角色，個體將會尋找相似的角色以因應社會環境的變化，以維持原有的適應？',options:['A.活動理論（activity theory）','B.撤退理論（disengagement theory）','C.持續理論（continuity theory）','D.社會交換理論（social exchange theory）'],answer:'C',explanation:'持續理論（continuity theory，Atchley）主張個體在老年期傾向維持一致的行為、習慣、人格特質和社會關係模式，以因應角色的喪失（如退休），個體會尋找相似角色來維持生活連貫性，故選C。'},
  {id:'hb_110_1_29',subject:'hb',year:110,session:1,num:29,categories:['hb_stage_adult'],text:'人從出生到死亡都被期待在固定時間完成生命的任務，例如：一個女孩在30歲左右應該要開始準備結婚，所以家人會積極安排相親。係指下列何者？',options:['A.生理時鐘（biological clock）','B.社會時鐘（social clock）','C.心理時鐘（psychological clock）','D.文化規範（cultural norm）'],answer:'B',explanation:'「社會時鐘（social clock）」是指社會文化對於人在特定年齡應完成某些生命任務（如結婚、生子、退休）的規範性期待。題目描述「在固定時間被期待完成生命任務」正是社會時鐘的概念，故選B。'},
  {id:'hb_110_1_30',subject:'hb',year:110,session:1,num:30,categories:['hb_theory_family'],text:'有關父母採用威權施壓管教方式的敘述，下列何者正確？',options:['A.威權管教（authoritarian parenting）強調溫暖與溝通，重視子女的意見','B.威權管教的子女通常有較高的自尊與獨立性','C.威權管教強調服從與紀律，較少給予子女解釋理由','D.威權管教是Baumrind認為最理想的管教方式'],answer:'C',explanation:'Baumrind管教風格：威權型（authoritarian）強調嚴格服從與紀律，較少解釋理由，少有溫暖（A錯）；其子女可能較服從但自尊與獨立性較低（B錯）；威權型並非最理想方式，權威型（authoritative）才是（D錯）。C正確描述威權型的特徵。'},
  {id:'hb_110_1_31',subject:'hb',year:110,session:1,num:31,categories:['hb_stage_elder'],text:'有關憂鬱的敘述，下列何者錯誤？',options:['A.憂鬱症是最常見的精神疾病之一','B.女性的憂鬱症罹患率通常高於男性','C.老年人的憂鬱症狀與年輕人完全相同，容易診斷','D.憂鬱症可能影響個人的認知功能、睡眠和食慾'],answer:'C',explanation:'老年人的憂鬱症狀往往與年輕人不同，常以身體症狀（如疼痛、疲倦）為主要表現，且容易與老年失智症或正常老化混淆，反而不容易診斷。「與年輕人完全相同，容易診斷」是錯誤的，故C錯誤。'},
  {id:'hb_110_1_32',subject:'hb',year:110,session:1,num:32,categories:['hb_stage_adult'],text:'依據Kalish與Reynolds（1976）在成年期（20-39歲）、中年期（40-59歲）、老年期（60歲以上）等不同年齡層個體對死亡恐懼的研究，下列敘述何者正確？',options:['A.老年期的個體對死亡恐懼程度最高','B.成年期的個體對死亡恐懼程度最低','C.中年期的個體對死亡恐懼程度最高','D.對死亡的恐懼程度與年齡無關'],answer:'C',explanation:'Kalish & Reynolds（1976）的研究發現，中年期（40-59歲）的個體對死亡的恐懼程度最高，因為中年人意識到死亡的現實性但又覺得有許多未完成的事。老年人因對死亡有較多的思考與準備，恐懼程度相對較低，故選C。'},
  {id:'hb_110_1_33',subject:'hb',year:110,session:1,num:33,categories:['hb_stage_youth'],text:'社會工作者對青少年未婚懷孕的處理，下列何者正確？',options:['A.社工應直接告知青少年最佳的處置方式（如繼續懷孕或人工流產）','B.社工應尊重青少年的自我決定，協助其了解各種選擇的後果並做出自己的決定','C.社工應通知其父母，由父母代為決定','D.社工應避免討論任何關於懷孕處置的選項'],answer:'B',explanation:'社工的核心價值包含案主自決（self-determination）。面對青少年未婚懷孕，社工應尊重其自主性，協助其了解各種選擇的利弊與後果，而非替其做決定或由父母代決，也不應迴避討論，故B正確。'},
  {id:'hb_110_1_34',subject:'hb',year:110,session:1,num:34,categories:['hb_div_race'],text:'有關種族主義的敘述，下列何者正確？',options:['A.種族主義只存在於少數族群對多數族群的偏見','B.種族主義是基於種族差異而對他人產生的偏見、歧視或不公平對待','C.種族主義在現代社會已完全消除','D.種族主義只涉及個人態度，不涉及制度或結構層面'],answer:'B',explanation:'種族主義（racism）是指基於種族差異而對他人產生的偏見、歧視或不公平對待，可存在於個人態度層面，也可存在於制度與結構層面（制度性種族歧視）。並非只存在於少數對多數（A錯），也並未消除（C錯），故B正確。'},
  {id:'hb_110_1_35',subject:'hb',year:110,session:1,num:35,categories:['hb_div_race'],text:'有關馬克思（Karl Marx）的社會階級之敘述，下列何者錯誤？',options:['A.馬克思將社會分為資產階級（bourgeoisie）和無產階級（proletariat）','B.馬克思認為社會階級衝突是推動歷史發展的動力','C.馬克思認為社會階級由個人的生產關係決定','D.馬克思認為社會階級主要由個人的教育程度和社會聲望決定'],answer:'D',explanation:'馬克思的社會階級理論認為階級由生產關係（是否擁有生產資料）決定。「由教育程度和社會聲望決定」是韋伯（Weber）的多元分層理論，非馬克思的觀點，故D錯誤。'},
  {id:'hb_110_1_36',subject:'hb',year:110,session:1,num:36,categories:['hb_div_race'],text:'社會學者採用個人收入、教育程度與職業之指標建構量表，以作為測量人們所屬社會階層的綜合依據。此稱為何種量表？',options:['A.社會距離量表（social distance scale）','B.社會經濟地位量表（socioeconomic status scale）','C.生活品質量表（quality of life scale）','D.社會排除量表（social exclusion scale）'],answer:'B',explanation:'社會經濟地位量表（SES scale）以收入、教育程度、職業等三個指標綜合測量個人或家庭的社會經濟地位，是社會學研究中最常用的社會分層測量工具，故選B。'},
  {id:'hb_110_1_37',subject:'hb',year:110,session:1,num:37,categories:['hb_div_race'],text:'有關功能論者對貧窮的看法，下列敘述何者錯誤？',options:['A.功能論認為貧窮是社會結構運作的必然結果','B.功能論認為貧窮有其社會功能，如提供廉價勞動力','C.功能論認為貧窮的存在有助於社會系統的穩定','D.功能論認為應積極透過衝突與對抗來消除貧窮'],answer:'D',explanation:'功能論（functionalism）認為貧窮是社會結構的產物，有其功能（如提供廉價勞力、維持社會階層動機等），並傾向於維持社會穩定。「透過衝突與對抗消除貧窮」是衝突論的觀點，故D不屬於功能論的看法。'},
  {id:'hb_110_1_38',subject:'hb',year:110,session:1,num:38,categories:['hb_div_race'],text:'2006年諾貝爾和平獎頒給了孟加拉經濟學家穆罕默德·尤努斯和他創辦的鄉村銀行（Grameen Bank）。下列敘述何者不符合鄉村銀行所推動的方式？',options:['A.以小額貸款協助貧窮者（尤其是婦女）自立創業','B.以群體連帶保證取代個人抵押品','C.要求借款人提供大額抵押品作為擔保','D.強調社群支持與互助的運作模式'],answer:'C',explanation:'鄉村銀行的核心創新在於：以群體連帶保證（B）取代傳統的個人抵押品要求，讓沒有抵押品的貧窮婦女也能獲得小額貸款（A），並強調社群互助（D）。「要求大額抵押品」恰好是傳統銀行的作法，與鄉村銀行的精神相悖，故C不符合。'},
  {id:'hb_110_1_39',subject:'hb',year:110,session:1,num:39,categories:['hb_div_race'],text:'關於貧窮及社會排除之敘述，下列何者正確？',options:['A.社會排除僅指物質層面的貧窮','B.社會排除強調個人被排除在社會主流活動和制度之外的多面向過程','C.貧窮與社會排除是完全相同的概念','D.社會排除的原因只有經濟因素'],answer:'B',explanation:'社會排除（social exclusion）是一個多面向概念，強調個人或群體被排除在社會主流活動、制度之外，不僅限於物質貧窮（A錯），也包含文化、政治、社會關係等面向（D錯）。社會排除比貧窮概念更廣，兩者不完全相同（C錯），故B正確。'},
  {id:'hb_110_1_40',subject:'hb',year:110,session:1,num:40,categories:['hb_theory_cognitive'],text:'有關人類道德發展之敘述，下列何者正確？',options:['A.Kohlberg的道德發展理論認為所有人都能達到最高層次的道德發展','B.Kohlberg的道德發展理論強調道德推理的過程，而非行為的結果','C.Gilligan批評Kohlberg的理論對女性道德發展的描述過於寬鬆','D.Kohlberg認為道德發展可以跳級，不需依序通過每個階段'],answer:'B',explanation:'Kohlberg的道德發展理論強調道德推理的認知歷程，而非行為結果（B正確）。並非所有人都能達最高層次（A錯）；Gilligan批評Kohlberg以男性為標準，對女性道德發展描述不足（C錯誤描述方向）；Kohlberg認為道德發展是循序漸進的（D錯），故選B。'},

  // ===== 110年下 人類行為與社會環境（40題）=====
  {id:'hb_110_2_01',subject:'hb',year:110,session:2,num:1,categories:['hb_stage_adult'],text:'艾力克森（Erikson）在心理社會理論中指出，中年期的心理社會任務為何？',options:['A.自我統整 vs. 絕望（ego integrity vs. despair）','B.生產性 vs. 停滯（generativity vs. stagnation）','C.親密 vs. 孤立（intimacy vs. isolation）','D.自主 vs. 懷疑（autonomy vs. doubt）'],answer:'B',explanation:'Erikson心理社會發展八階段中，中年期（約40-65歲）的任務是「生產性 vs. 停滯（generativity vs. stagnation）」，關注是否能對下一代或社會有所貢獻。老年期是自我統整vs.絕望（A），成年初期是親密vs.孤立（C），幼兒期是自主vs.懷疑（D）。'},
  {id:'hb_110_2_02',subject:'hb',year:110,session:2,num:2,categories:['hb_stage_early'],text:'針對0歲到2歲的個體，各心理理論的發展階段，下列敘述何者正確？',options:['A.Erikson：基本信任 vs. 不信任期','B.Freud：肛門期','C.Piaget：前運思期','D.Kohlberg：成規道德期'],answer:'A',explanation:'0-2歲各理論對應：Erikson→基本信任vs.不信任（A正確）；Freud→口腔期（非肛門期，B錯，肛門期約1-3歲）；Piaget→感覺動作期（非前運思期，C錯）；Kohlberg→前成規道德期（D錯）。故選A。'},
  {id:'hb_110_2_03',subject:'hb',year:110,session:2,num:3,categories:['hb_theory_cognitive'],text:'Piaget的認知發展階段中，在第一個階段感覺運動期中，有關嬰幼兒的認知發展，依序分為那六個階段？',options:['A.反射、初級循環反應、次級循環反應、次級基模協調、三級循環反應、內在表徵','B.感覺、動作、語言、符號、邏輯、抽象','C.口腔、肛門、性器、潛伏、生殖、成熟','D.信任、自主、主動、勤奮、認同、親密'],answer:'A',explanation:'Piaget感覺動作期的六個次階段：①反射活動期→②初級循環反應→③次級循環反應→④次級基模協調（物體恆存概念發展）→⑤三級循環反應→⑥內在表徵（心智符號開始出現）。A正確。'},
  {id:'hb_110_2_04',subject:'hb',year:110,session:2,num:4,categories:['hb_theory_psycho'],text:'Freud對於人格發展的敘述，下列何者較為正確？',options:['A.人格發展在青少年期完成，之後不再改變','B.性心理發展的固著（fixation）可能源於特定階段的過度滿足或挫折','C.潛伏期是指青春期的性衝動爆發階段','D.自我（ego）遵循快樂原則，追求立即滿足'],answer:'B',explanation:'Freud性心理發展理論：固著（fixation）是指在某一發展階段因過度滿足或未被充分滿足，導致心理能量留存在該階段，影響後來的人格（B正確）。潛伏期（6-12歲）是性衝動平靜的階段（C錯）；自我遵循現實原則（D錯，快樂原則是本我的）。'},
  {id:'hb_110_2_05',subject:'hb',year:110,session:2,num:5,categories:['hb_div_family'],text:'在當前的極端氣候下，因豪雨導致房屋受損，下列何者不是家庭的成員會面臨的議題？',options:['A.經濟壓力：房屋修繕的費用','B.心理創傷：目睹災難的恐懼與壓力','C.角色轉變：家庭成員需要重新分配任務','D.社交媒體使用習慣的改變'],answer:'D',explanation:'家庭面對天災（房屋受損）時面臨的議題包含：經濟壓力（A）、心理創傷（B）、角色轉變（C）等實質性挑戰。「社交媒體使用習慣的改變」並非房屋受損後家庭最直接面臨的核心議題，故D為答案。'},
  {id:'hb_110_2_06',subject:'hb',year:110,session:2,num:6,categories:['hb_theory_family'],text:'社會工作者十分關注服務對象所居住的家庭及其社區，試問，「家庭」是屬於下列那一個層次？',options:['A.微觀（micro）層次','B.中介（mezzo）層次','C.宏觀（macro）層次','D.鉅視（mega）層次'],answer:'B',explanation:'社會工作的三個實務層次：微觀（micro）層次關注個人；中介（mezzo）層次關注家庭、小團體、社區等中間系統；宏觀（macro）層次關注社會、政策、組織等大系統。「家庭」屬於中介層次，故選B。'},
  {id:'hb_110_2_07',subject:'hb',year:110,session:2,num:7,categories:['hb_stage_elder'],text:'「成為祖父母」，為老年期的家庭重要任務之一，有關祖父母的角色，下列何者錯誤？',options:['A.祖父母可以提供孫子女情感支持和家庭歷史傳承','B.隔代教養的祖父母往往承受較大的照顧壓力','C.所有祖父母都渴望並享受主動照顧孫子女的角色','D.文化背景影響祖父母與孫子女的互動方式'],answer:'C',explanation:'祖父母的角色多元，並非所有祖父母都渴望或享受主動照顧孫子女的角色。有些祖父母偏好與孫子女保持較輕鬆的關係，而非承擔主要照顧責任。「所有祖父母都渴望主動照顧」過於絕對，故C錯誤。'},
  {id:'hb_110_2_08',subject:'hb',year:110,session:2,num:8,categories:['hb_div_gender'],text:'案主受到歧視與被壓迫的經驗是社會及政治結構的結果，並非單純個人本身的問題。以上敘述，比較傾向女性主義中的何種原則？',options:['A.個人即政治（the personal is political）','B.意識覺醒（consciousness raising）','C.姐妹情誼（sisterhood）','D.反階層（anti-hierarchy）'],answer:'A',explanation:'「個人即政治（the personal is political）」是女性主義的核心原則之一，主張個人所經歷的壓迫與歧視不是純粹個人問題，而是社會及政治結構的結果，符合題目描述，故選A。'},
  {id:'hb_110_2_09',subject:'hb',year:110,session:2,num:9,categories:['hb_theory_social'],text:'多數由社會學者創設，用以闡述社會環境、社會事件及各種社會組織中一大群人互動與行為的理論，比較偏向下列那一種？',options:['A.心理動力理論','B.認知行為理論','C.社會結構理論','D.人文主義理論'],answer:'C',explanation:'社會結構理論（social structural theory）由社會學者發展，用以解釋社會環境、社會事件、社會組織中大群體之間的互動與行為模式，如功能論、衝突論、符號互動論等。題目描述的特徵正符合社會結構理論，故選C。'},
  {id:'hb_110_2_10',subject:'hb',year:110,session:2,num:10,categories:['hb_theory_social'],text:'下列有關「人類行為與社會環境」理論的評述，何者較為正確？',options:['A.單一理論足以解釋所有人類行為與社會環境的複雜關係','B.社工應選擇最正確的理論並一致地應用於所有案主','C.不同理論提供不同的視角，社工應整合多元理論理解案主的情境','D.人類行為的理論與社會環境理論是完全分離、互不相關的'],answer:'C',explanation:'人類行為與社會環境涵蓋複雜多元的面向，單一理論無法完整解釋（A錯）。社工應依據不同案主的情境，整合多元理論視角（C正確），而非一成不變地應用單一理論（B錯）。行為理論與社會環境理論密切相關（D錯）。'},
  {id:'hb_110_2_11',subject:'hb',year:110,session:2,num:11,categories:['hb_stage_elder'],text:'下列關於「成功老化」的敘述，何者較不恰當？',options:['A.成功老化強調老年人維持積極的生活參與','B.成功老化的定義應考量個人主觀幸福感','C.只有身體健康、沒有疾病的老人才算成功老化','D.文化背景影響老人對成功老化的詮釋'],answer:'C',explanation:'成功老化的概念不應等同於「完全沒有疾病」，這樣的標準過於狹隘，無法反映大多數老年人的實際狀況。當代研究也強調主觀幸福感（B）與文化脈絡（D）的重要性。「只有身體健康沒有疾病才算成功老化」是不恰當的，故C為答案。'},
  {id:'hb_110_2_12',subject:'hb',year:110,session:2,num:12,categories:['hb_stage_early'],text:'Kostelnik（1988）等學者所稱「核心情緒」，下列選項何者正確？',options:['A.快樂、憤怒、恐懼、悲傷、驚訝、厭惡','B.快樂、難過、生氣、嫉妒、羞恥、罪惡感','C.愛、恨、憤怒、喜悅、悲傷、焦慮','D.興奮、平靜、煩躁、沮喪、憤怒、恐慌'],answer:'A',explanation:'Kostelnik等學者所稱的「核心情緒（basic emotions）」包含六種：快樂（happiness）、憤怒（anger）、恐懼（fear）、悲傷（sadness）、驚訝（surprise）、厭惡（disgust）。這也與Ekman的基本情緒理論相符，故選A。'},
  {id:'hb_110_2_13',subject:'hb',year:110,session:2,num:13,categories:['hb_stage_youth'],text:'許多研究結果顯示，青少年的自尊心會隨著青少年階段而改變。下列有關青少年自尊心的敘述，何者較不適當？',options:['A.青少年初期（約國中）的自尊心通常有短暫下降的趨勢','B.身體意象（body image）是影響青少年自尊的重要因素','C.同儕的接受程度對青少年自尊有重要影響','D.青少年的自尊心在整個青少年期都持續穩定地上升'],answer:'D',explanation:'研究顯示青少年自尊的變化並非「持續穩定上升」，而是在青少年初期有短暫下降（進入國中後，面對新環境與身體變化），之後逐漸回升。「整個青少年期都持續穩定上升」不符合研究發現，故D較不適當。'},
  {id:'hb_110_2_14',subject:'hb',year:110,session:2,num:14,categories:['hb_stage_adult'],text:'非計劃性懷孕對女性來說是有壓力的，她接下來可能得面臨是否繼續或終止懷孕的問題。有關社會工作者協助這樣的婦女，下列何者正確？',options:['A.社工應根據個人價值觀直接告知婦女應繼續懷孕','B.社工應提供客觀資訊並支持婦女做出自己的決定','C.社工應安排婦女立即與家人商量，以家人意見為準','D.社工應避免討論終止懷孕的選項以免造成婦女壓力'],answer:'B',explanation:'社工的核心原則包含案主自決與非評判態度。面對非計劃性懷孕，社工應提供客觀資訊（各選項的說明）並尊重婦女的自主決定（B），而非強加個人價值觀（A），也不應以家人意見取代婦女的自決（C），更不應迴避討論任何選項（D）。'},
  {id:'hb_110_2_15',subject:'hb',year:110,session:2,num:15,categories:['hb_stage_early'],text:'當兒童遭遇災難，或是目睹暴力，可能會受到很大的衝擊，甚至可能產生創傷後壓力症候群（PTSD）。社會工作者在協助兒童和家庭因應創傷的作為上，下列那個做法較為適當？',options:['A.要求兒童立即詳細描述所有創傷細節，以協助宣洩情緒','B.告訴兒童創傷已過去，不應再有恐懼或難過的感受','C.提供安全感、穩定的例行作息，並允許兒童以其步調表達感受','D.讓兒童獨立面對創傷，以培養其復原力'],answer:'C',explanation:'創傷後處遇的基本原則是：建立安全感、提供穩定的環境、允許個人以自己的步調表達感受（C）。強迫立即描述創傷細節（A）可能造成再創傷；否定兒童的情緒反應（B）不恰當；讓兒童獨立面對（D）缺乏支持，故C為適當做法。'},
