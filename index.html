<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社工師考古題練習系統</title>

<script type="module" src="./firebase-init.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div id="loadingOverlay" class="loading-overlay" style="display:none">
  <div class="loading-spinner"></div>
  <div class="loading-text">載入中，請稍候⋯⋯</div>
</div>

<div id="app">
  <header>
    <div class="header-logo" onclick="showScreen('home')">📚 社工師練題系統</div>
    <nav class="header-nav">
      <button class="nav-btn" onclick="showScreen('heart')">❤️ 愛心題目</button>
      <button class="nav-btn" onclick="showScreen('stats')">📊 統計</button>
    </nav>
  </header>

  <main>
    <!-- 首頁 -->
    <div id="screen-home" class="screen active">
      <div class="home-hero">
        <h1>社工師考古題練習系統</h1>
        <p>110年～114年考古題 · 依命題大綱分類 · 跨裝置同步</p>
      </div>
      <div class="subject-grid" id="subjectGrid"></div>
    </div>

    <!-- 科目頁 -->
    <div id="screen-subject" class="screen">
      <button class="back-btn" onclick="showScreen('home')">← 返回首頁</button>
      <div class="page-header">
        <h2 id="subjectTitle"></h2>
        <p id="subjectDesc"></p>
      </div>
      <button class="notes-btn" onclick="openSubjectNotes()">📖 查看本科目重點筆記總覽</button>
      <div class="category-list" id="categoryList"></div>
    </div>

    <!-- 分類頁 -->
    <div id="screen-category" class="screen">
      <button class="back-btn" id="catBackBtn">← 返回科目</button>
      <div class="page-header">
        <h2 id="categoryTitle"></h2>
        <p id="categoryDesc"></p>
      </div>
      <button class="notes-btn" id="categoryNotesBtn">📖 查看本分類重點筆記</button>
      <button class="btn-primary" style="width:100%;margin-bottom:10px" onclick="startQuiz()">開始練習（亂序出題）</button>
      <div id="catStatsRow" style="font-size:13px;color:var(--text-secondary);margin-bottom:4px"></div>
    </div>

    <!-- 練習頁 -->
    <div id="screen-quiz" class="screen">
      <div class="quiz-topbar">
        <button class="back-btn" style="margin-bottom:0" onclick="exitQuiz()">← 結束練習</button>
        <div class="quiz-info">第 <strong id="quizCurrent">1</strong> / <strong id="quizTotal">1</strong> 題 &nbsp;·&nbsp; 本次正確 <strong id="quizCorrect">0</strong></div>
      </div>
      <div id="questionContainer"></div>
      <div class="quiz-actions" id="quizActions">
        <button class="btn-primary" id="confirmBtn" onclick="confirmAnswer()">確認答案</button>
        <button class="btn-primary" id="nextBtn" onclick="nextQuestion()" style="display:none">下一題 →</button>
        <button class="btn-secondary" onclick="exitQuiz()">結束練習</button>
      </div>
    </div>

    <!-- 愛心題目 -->
    <div id="screen-heart" class="screen">
      <div class="heart-header">
        <h2>❤️ 愛心題目</h2>
        <button class="btn-primary" onclick="startHeartQuizAll()" style="font-size:13px;padding:8px 14px">全部複習</button>
      </div>
      <div id="heartList"></div>
    </div>

    <!-- 統計 -->
    <div id="screen-stats" class="screen">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px">
        <h2 style="font-family:var(--font-serif);font-size:20px;font-weight:700">📊 學習統計</h2>
        <button class="reset-btn" onclick="confirmReset()">重置記錄</button>
      </div>
      <div id="statsContent"></div>
    </div>
  </main>
</div>

<!-- 筆記 Modal -->
<div class="modal-overlay" id="notesModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="notesModalTitle">重點筆記</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="notesModalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="./subjects.js"></script>
<script src="./notes.js"></script>
<script src="./questions.js"></script>
<script src="./app.js"></script>
</body>
</html>
